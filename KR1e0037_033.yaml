body:
  text: 春秋集註卷三十三宋髙閌撰昭公三十有三年春叔弓帥師圍費南蒯以費叛不書者家臣微賤名不登于史册也但書大夫圍之則邑叛可知矣罪大夫無政使家臣得専邑而叛也克之不書本魯邑故也言叔弓帥師圍之又見家臣之彊且罪季氏之無君也家臣以邑叛不以君命而使大夫討之如是則大夫非魯之大夫也季氏之大夫也師非魯之師也季氏之師也如是而欲討蒯不思之甚也夏四月楚公子比自晉歸于楚弑其君䖍于乾谿先言比歸者明在外本無弑君之心也及其以棄疾之請也遂有得位之心故復言弑者正比之罪也既曰歸于楚又曰弑于乾谿者非比親弑之也加之罪爾家語曰楚靈王起章華之臺于乾谿國人潰叛是靈王遇弑蓋有以取之矣初楚子麋疾靈王因而弑之殺其子而自即位公子比以是出奔晉比在晉十年矣其能一旦自外歸而弑其君乎蓋靈王無道公子棄疾將作亂故使觀從召比于外脅而立之以弑靈王雖棄疾脅比而立靈王自縊而死若比不從棄疾之脅則靈王未必死以此言之棄疾不得比之勢則無以濟其亂比見利而動遽欲為君則成楚靈之縊者乃比也蓋是時比當效死不立而既立矣又烏得避是名哉若使人受其名已享其利則後世姧人苟有藉口以濟其私者莫不皆寘力焉故聖人正名比之弑君所以絶後世姧人之禍也雖然比之歸也䖍猶在楚其不言入何也觀從召之楚人與之楚人不拒則比之歸無難也楚公子棄疾殺公子比此復稱公子而不以討賊之辭加之者此非討賊辭也殺而伐之之辭也憫比墮棄疾之謀也亦所以深罪棄疾也棄疾本圖位而脅立比比既立而已遂殺而篡之然不書弑其兄者比亦弑其兄俱無骨肉之愛也然陳侯之弟招殺世子偃師而繫之陳此殺公子比不繫之楚何也偃師當立無罪故以國氏之比簒逆罪與棄疾等爾比既死棄疾遂自立改名曰居蓋春秋凡弑君之人名在諸侯之策故公子圍弑君自立改名曰䖍公子棄疾弑君自立改名曰居春秋因其自嫌而實書之秋公會劉子晉侯齊侯宋公衞侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于平丘八月甲戌同盟于平丘霸圖不競久矣晉主夏盟諸侯皆貳叔向曰諸侯不可不示威乃並徵會以楚棄疾立將謀討之故平丘之會諸侯之衆兵車之盛奕世未覩又有天子之使以臨之使晉之威靈少振而聳動吳楚此叔向之謀也楚子専盟會者十年矣今晉昭一旦與劉子合諸侯于平丘者非能與楚子抗也乘楚靈弑逆之禍姑以兵甲耀之爾若果能因楚平弑逆而與劉子大合諸侯以討其罪亦足以彊中國之威矣今但同盟于此何所為哉故但書日月以間之惡諸侯輒與王臣同盟也雖然陳蔡之復國楚人自是不入寇而中國為之少安亦由此盟也故會盟同地再書平丘書之重言之複其中必有美惡焉公不與盟此晉侯聽邾莒之訴而辱公使不得與盟也夫晉侯與公同體當同心同力以攘夷狄而諸侯咸會乃聽邾莒之妄訴與衆棄公不以比數非所以宗諸侯也天下孰不解體故自是訖會召陵諸侯不出者復二十四年至鄟陵之會晉自不出此不足宗諸侯可知也上文方譏諸侯輒與王臣同盟今公不與翻得免于同盟之罪亦可謂幸矣晉人執季孫意如以歸公至自會公不獲與盟又國卿見執而以會致者為其有辭也十年書伐莒不書取郠為是故也蔡侯廬歸于蔡陳侯吳歸于陳廬蔡靈公少子世子有之弟先儒謂世子有之子非也吳陳世子偃師之子也楚靈不道暴滅陳蔡而平王始依陳蔡之國藉以發難今既得位聞諸侯有平丘之會于是復二國之後暴靈之惡而收恩于已以説中國春秋不言楚納之亦不言歸自楚者見二國之復乃自當復非楚得滅而復之也蓋先王建國固非楚人可滅亦非楚人可復聖人因書其本爵以明二國之君位其所固有國其所宜歸也雖二國之命制在楚而平丘之會實有功焉故聖人特以陳蔡自歸為文所以抑楚而存中國也冬十月葬蔡靈公蔡復而始克葬也蔡靈不宜葬也而春秋葬之遏夷狄存中國也公如晉至河乃復晉不與公盟今又執吾卿而公復朝之無恥甚矣豈欲因晉之執而請討季氏之罪乎然季氏在晉宜其不見納也吳滅州來成六年吳入州來蓋本楚屬也至是取之盡殺其吏民無道之甚故稱滅焉春秋詳楚伐吳略吳伐楚而志其甚者滅州來是也吳人以州來封季子之後又以遷蔡焉十有四年春意如至自晉魯大夫執則致重其危及宗社也行父之不致從公也意如不書族前見也按季孫在晉子服惠伯私于中行穆子曰魯事晉何以不如夷之小國土地猶大所命能具若為夷棄之使事齊楚何瘳于晉乃歸季孫夫晉之始執季孫為邾莒之訴而非有扶弱擊强之義也及其歸之又以土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣故平丘之會深加貶斥自是而後諸侯不合二十餘年至于召陵又以賄敗以十有八國諸侯之衆而書侵楚以譏之于是晉日益衰外攜内叛不復振矣夫利之能敗人國家一至于此此春秋所以深戒夫好利者而季氏富于周公遂能以利幸脱于禍此聖人所以深嫉之三月曹伯滕卒曹武公立二十七年其子須立是為平公夏四月一時無事書首月存天道王法也秋葬曹武公因魯往會而著其臣子私諡之罪八月莒子去疾卒莒著丘公立十四年其子郊公立國人弗順乃逐郊公而迎去疾之弟庚輿立之冬莒殺其公子意恢春秋凡小國大夫如薛滕邾莒皆不書名氏以小國無命卿不足錄也此直曰公子意恢者前既書莒子之卒則知此所謂公子是宜為君者也不然意恢之殺不當志于春秋矣與陳殺其公子禦寇文意略同十有五年春王正月吳子夷末卒夷未立十七年欲授其弟札札逃去乃立其子僚二月癸酉有事于武宫籥入叔弓卒去樂卒事成六年立武宫非禮也此有事于武宫則知自立宫之後祭之如親廟方其祭也叔弓涖事籥入而卒此豈特雉鼎之變而已哉武宫之祭非所當祭可因此而廢也卿佐之喪何痛如之宜遽為之變也方持誠敬之心以事鬼神忽焉目覩卿佐之死則哀慼之心奪之矣此心一變舉措失常而强去樂以卒事是知其不可為而為之者也然則如之何則可曰禮大夫當祭聞君之喪攝主而往臣遭臣喪何獨不然若非涖事之大夫則勿以聞可也檀弓記衞侯之言曰栁莊死雖當祭必告然則當祭不告者禮也非涖事之臣故也叔弓蓋叔老之子子叔敬子也夏蔡朝吳出奔鄭楚子之入也朝吳有力焉夫朝吳為蔡之大夫而有功于楚是有二心也豈可罪費無極之譖哉宜其不容于蔡而出奔也六月丁巳朔日有食之日食雖有常度亦人事所召有食之者秋晉荀吳帥師伐鮮虞嘗狄晉矣則荀吳何以無貶于初伐貶餘實錄而已爾冬公如晉猶以平丘之會故十有六年春齊侯伐徐景公之時吳楚方爭晉又不逺略以齊之强修其政刑糾合諸侯復霸可也而區區助楚伐徐以懼吳人師至蒲隧徐人賂以甲父之鼎而還嗚呼志亦卑矣斥言齊侯罪在齊侯也楚子誘戎蠻子殺之春秋之世彊凌弱衆暴寡故殺諸侯者有矣而彊楚殺人之君者二焉誘蔡侯般書月書曰書名書地以其誘殺中國疾之也誘戎蠻子皆不書以其自相誘殺也夷狄自相攻殺君子不疾也曷為不疾若不疾焉乃深疾之也夏公至自晉晉人猶以前故而止公至此始得歸秋八月己亥晉侯夷卒晉昭公立六年其子去疾立是時六卿强公室卑矣九月大雩因旱祭志僭也季孫意如如晉冬十月葬晉昭公喪事三月而葬皆非禮也且著其臣子私諡之罪十有七年春小邾子來朝哀七年小邾子與郯子亦相繼來朝夏六月甲戌朔日有食之日食雖有常度亦人事所召有食之者秋郯子來朝按史記註徐廣謂郯一作譚即莊十年齊師滅譚譚子奔莒是也不知何據而言八月晉荀吳帥師滅陸渾之戎宣三年楚子伐陸渾之戎自是陸渾睦于楚而為中國之害至是荀吳帥師滅之晉三書滅國林父之于潞氏士會之于甲氏皆不舉名氏至是書卿帥師者夷不亂華而陸渾之戎密邇王室縱之雜處則非膺戎狄别内外之義與闢土服逺以圖霸者有間矣是以纔得不貶焉春秋于内外之辨謹言如此冬有星孛于大辰申須曰諸侯其有火災梓慎曰若火作其在宋衞陳鄭乎許翰曰大辰宋分受災深故有華向之難心為明堂王者忌之故王室亂楚人及吳戰于長岸長岸吳地人楚而狄吳吳之惡甚于楚也書楚之及又以罪楚也勝負相敵故但書戰而不書敗績十有八年春王三月曹伯須卒夏五月壬午宋衞陳鄭災四國同日而俱災豈皆人之力所能為蓋異之甚者此為天下記異也六月邾人入鄅鄅䢵姓國也屬于宋其夫人宋向戌女也邾人以詐力襲而俘之春秋惡焉且為宋公伐邾起也秋葬曹平公因魯往會而著其臣子私諡之罪冬許遷于白羽許自遷也楚人因其畏鄭而使之遷許亦自樂遷焉故以自遷為文至是三遷矣十有九年春宋公伐邾為鄅故也天下無霸而宋元于此一正入鄅之亂是以春秋錄而進之夏五月戊辰許世子止弑其君買許悼公瘧餘止之藥而卒夫瘧非遽死之病也止之進藥雖不志乎弑而君由止以卒則是弑也且世子君之貳也當朝夕問膳如文王之為世子乃萬世之法如使其可以冒昧進藥則亂臣賊子得容其姧矣故聖人正止弑君之罪以絶萬世之禍也穀梁曰止不嘗藥累及許君此説是矣春秋之義不同而辭一施之學者所宜深察也己卯地震秋齊髙發帥師伐莒冬葬許悼公先儒以君弑賊不討不書葬此書葬以止不成乎弑故君子赦之也是不然止既不立自責而死則是能自討矣又何赦之有蓋因魯往會而著其臣子私諡之罪爾悼公立二十四年止既自責而死乃立其弟斯是為元公二十年春王正月一時無事書首月存天道王法也夏曹公孫會自鄸出奔宋會者公子喜時之子喜時者所謂子臧是也鄸其采邑也凡奔未有言自者此言自鄸蓋大夫有罪自歸其邑以待放也凡大夫待罪于邑君賜之環則還賜之玦則去然春秋時臣能専其邑無不畔其國者能使其衆無不要其君者以臧武仲之智猶據防以求後于魯是以孔子譏之以為大亂之道也故深察夫公孫會之自鄸奔宋也其賢于臧武仲逺矣故春秋因其奔而書自鄸以别之秋盜殺衞侯之兄縶此罪衞侯寵任其兄至能奪大臣官邑以故為盜所殺而不忌也然以左氏攷之則殺縶者齊豹也豹為衞司冦嗣守大夫其書為盜所謂欲求名而不得者也而衞侯以千乘之國不能保其兄則其政可知也冬十月宋華亥向寧華定出奔陳宋元公無信多私而惡華向之族于是三子謀曰亡愈于死先諸遂干君而出奔于陳夫三子者同時而出又同奔陳是將為國患不可不慮也十有一月辛卯蔡侯廬卒蔡平公立八年其子朱立是為悼公春秋集註卷三十三
