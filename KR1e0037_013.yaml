body:
  text: 春秋集注卷十三宋高閌撰閔公元年春王正月不書即位者上不受于天子內不受于先君不正其始也齊人救邢凡書救者皆善之也然以狄之强而將卑師少豈能救之此必齊侯親往但以逼于管仲畏簡書之言非有實救之心所以無功而還故春秋存其善意而書人以譏之夏六月辛酉葬我君莊公十有一月而葬者亂故也臣子既不能事生又不能事死兩失之矣勝敵克亂曰莊此又臣子私諡也秋八月公及齊侯盟于落姑及者內為主公特為此盟者以齊侯為受命之霸也諸侯之仰霸者蓋欲以記社稷也閔公以幼沖新立而慶父通乎君母勢傾公室國人洶洶思得忠良以平內難故居喪特出為落姑之盟請復季子季子之歸否制在齊侯故也季子來歸季子謂誰公子友也友名也季字也子者男子之通稱也凡人臣出奔而反國則書曰歸或曰復歸經未有季子出奔之文而書來歸何也凡奔云者負罪以出迫逐而不遑暇之辭也今魯國連喪二君當凶禍艱難之際季子以貴戚之重違而去之是之謂全身逺害求援以庇國既而國人以慶父之故思得賢公子以輔幼主視公族之中惟季子託辭以出若愛其生以有待者魯人惟恐其不歸故公與齊侯盟而請之其書來歸者所以變乎歸之文又變乎復歸之文也既歸而遂以國政付之是其委任亦不輕矣惟其委任之重所以沒其去國之因而責其後效聖人特字之而不名又不稱公子者見季子自以賢德為國人所與不緣宗親之故則所以望于季子者重矣然季子既歸乃託親親之故卒不能平姜氏之亂討慶父之惡致使二人卒弒吾君明年書公子慶父出奔莒夫人姜氏孫于邾以著季子徒然來歸無補于急難大失國人之望是以變文書來歸者亦所以責之與內女被黜而歸者同冬齊仲孫來此齊侯既復季子因使仲孫來窺我非使于我也故不書齊侯使而止書齊仲孫來所以嘉仲孫而譏齊侯也譏齊侯有窺魯之心失霸者之義而嘉仲孫能俾齊侯務寧魯難有全魯之功故特書字以褒之二年春王正月齊人遷陽陽小國也齊侯迫逐而遷之以其恃強而兼弱也故貶稱人陽自是不復見矣故不地夏五月乙酉吉禘于莊公刺不能三年也庶人薦而不享大夫享而不祫諸侯祫而不禘禘者天子之祭魯不當禘也然成王賜天子之禮以享周公而先公因僭用之過在前世聖人不一一追貶但因事書之蓋魯國常事不可勝書故也今以周公之禘禘于莊公已為非禮又况當喪而祭乎初魯之喪莊公也既葬而經不入庫門士大夫既卒哭而麻不入則當時君臣雖未終喪蓋皆吉服矣豈獨禘為然哉禘大祭也故于是譏之然閔公幼弱何知焉聖人書此以著季子之徒執國政者之罪也雖然此特用其禮物耳非有追配審諦之事言禘于莊公不言莊宫者以三年之中未可以宫稱也秋八月辛丑公薧公薨不地者著其被弒之微意也不書葬者見無臣子也君弒而不討賊何臣子之有昔季子對莊公之言曰臣願以死奉般般死而季子出復歸而相閔公公又被弒于此見季子之歸不能平內難適所以召弒逆之禍耳九月夫人姜氏孫于邾公子慶父出奔莒先書公薨而繼書此則知夫人姜氏與公子慶父此二人者實弒公也夫季子者閔公盟而歸之以為國卿正為姜氏慶父故耳季子専魯國之政足以有為今已踰年既不能防間其君毋稱治慶父之罪而反召弒君之禍又不能率魯國之衆以討弒君之賊乃縱之使逸故此書夫人姜氏孫于邾公子慶父出奔莒者非特著姜氏慶父之罪又以見季子孤國人之望也或謂春秋不責季子不能全閔公而嘉其能立僖公嗚呼是不忠于前君而自結于後君也豈賢者之所為乎又謂緩追逸賊親親之道是尤不然人臣之義莫大乎為君討賊故曰大義滅親今季子于慶父親也而于閔公則親而又尊者也慶父弒閔彼尊尊親親之義已絶矣苟能誅之則尊尊親親之義兩得之舍慶父而忍乎閔公是尊尊親親之義兩失之也棄兩得而從兩失賢者之所為果如是乎冬齊高子來盟魯難繼作齊侯不修霸主之義謷然有取魯之心使高子將南陽之甲而至者非使于我也而高子乃能因事制宜勉其君于霸遂與魯盟以定嗣君之位故于其來盟而稱高子善其能恤魯且得奉使之宜從義不從命也十有二月狄入衛衛懿公遂為狄所殺而此但書入衛而已何也聖人不與狄殺衛君且為齊桓起也國人立黔年之弟公子頑之子申蓋宣姜所生也是為戴公戴公繼卒遂立其母弟燬是為文公鄭棄其師狄既滅衛諸國皆震鄭伯遣師禦之而將非其人師久而潰故書鄭棄其師者惡鄭伯也鄭伯有其師而無其將將者人之司命也鄭伯以百姓之命授匪其人非棄而何蓋人君之使臣也知其賢而使之則功必成知其不賢而使之則事必敗夫不知其不賢而過使之至于敗事君子猶曰君不知人當自罪爾而况已知其不賢而强使之不獨陷其身又屬之以民乎觀鄭詩清人刺文公也高克好利不顧其君文公惡而逺之不能使高克將兵而禦狄于境陳其師旅翺翔河上久而不召衆散而歸觀此則非師之棄鄭鄭棄其師也鄭伯輕授高克將權自取此禍聖人不罪高克而直書鄭棄其師以為後世人君之戒春秋集注卷十三
