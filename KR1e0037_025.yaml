body:
  text: 春秋集註卷二十五宋髙閌撰成公二五年春王正月把叔姬來歸棄而來歸也以叔姬之歸為魯之過也杞伯來朝而告絶則知杞伯之有辭矣餘義同宣十六年仲孫蔑如宋夏叔孫僑如會晋荀首于穀荀首如齊逆女而僑如徃餫諸穀此之謂非禮之禮故以大夫會大夫之辭書之梁山崩夫先王之制名山大川不以封梁山雖屬于韓而非諸侯正受封之地故春秋書梁山崩而不繫之國者為天下記異是以不言晋也夫國主山川豈特晋國當之哉秋大水此亦非特魯國之災也皆當時人事之所召冬十有一月己酉天王崩不書𦵏者罪諸侯之不赴也十有二月己丑公會晋侯齊侯宋公衛侯鄭伯曹伯邾子祀伯同盟于蟲牢鄭數伐許許人愬于楚楚人不直鄭鄭伯遂復棄楚而請盟于晋晋侯于是會諸侯而為此盟也夫天王崩諸侯不奔赴于京師而私會于蟲牢可乎故謹而日之且書同盟以見其皆不臣也杞雖復稱伯而列邾子之下盖猶以其用夷禮貶之也六年簡王即位春王正月公至自會書至自會者非奔天王之喪也二月辛丑立武宫諸侯立廟古有彛制過則毁之不可復立武公乃伯禽之元孫獻公之子于是為十一世祖非始封之君毁之已乆而輒立者盖武公敖在宣王時南征北伐實佐王師有功而諡曰武焉至成公時季孫行父因鞌之戰自多其功崇尚武事一旦特出私意再為立宫同于世室與伯禽為二祧盖僭用周天子之禮若文武之祧也故明堂位曰魯公之廟文世室也武公之廟武世室也聖人于此特書立武公以著季氏僭亂妄作之由故謹而日之取鄟公羊以為邾婁之邑是也然不繫之邾者邾本魯之附庸其邑即是魯邦域之中也何取之有然邾與魯抗若敵國然故書曰取内以罪魯之貪外以罪邾之抗可謂簡嚴矣衛孫良夫帥師侵宋按左氏晋将復會諸侯而宋人辭以難故帥衛鄭及諸戎伐之而經獨書衛者當是時晋謀襲衞衞不知自保乃為之非理加兵于他人之國不可歸罪于晋故專罪良夫而以侵為文夏六月邾子來朝魯取鄟而邾子遂來朝其強弱可知矣且天王新卽位不朝周而朝魯此可見邾弱之甚惟陵我者是畏也公孫嬰齊如晋晋召之欲使魯伐宋故也壬申鄭伯費卒鄭悼公立二年其弟睔立是為成公不書𦵏者當晋楚爭伐之際臣子不得盡禮于大事故也秋仲孫蔑叔孫僑如帥師侵宋晋復使魯伐宋故二卿同帥師而出也便魯伐宋者雖晋之命而魯不以大義諭之遽為之興師則罪專在魯矣責與衞孫良夫同故書侵楚公子嬰齊帥師伐鄭鄭棄楚復從晋受盟盡牢故楚乘其喪而伐之然不貶而人之者正著嬰齊之專且暴也冬季孫行父如晋晋遷于新田文子徃賀之晋欒書帥師救鄭雖大夫專兵無功而還亦善其能救也善其能救者所以深惡楚也楚伐鄭喪而悼公不𦵏則晋救雖至已苦兵矣然而不背蟲牢之盟是以善之也七年春王正月鼠食郊牛角改卜牛䑕又食其角乃免牛鼠一名甘鼠能食人畜而不痛其曰食郊牛角見所以備災之道不盡也過有司也改卜又食則非人之所能也所以免有司之過也有司免過變異甚矣呉伐郯呉實我大伯之後按國語曰命圭有命固曰呉伯不曰呉王然則呉本伯爵以僭竊大號春秋所以不書自壽夢得申公巫臣呉始為楚患令伐郯則入為中國之害始見于春秋故但書曰呉從夷狄之稱也夏五月曹伯來朝諸侯舍天王不朝而相繼朝魯可乎不郊猶三望用是知魯郊或以五月非特定公也免牛則不郊矣復書不郊者以呉曹二事隔其文故為三望起也夫三望因郊而設不郊則望祭之禮不備矣正祭已廢而舉其從祀此僖公之舉也祭從先祖盖有惑焉仲尼書之著不明也秋楚公子嬰齊帥師伐鄭去冬欒書救鄭而楚師還未得志于鄭故復伐之公㑹晋侯齊侯宋公衛侯曹伯莒子邾子杞伯救鄭諸侯奔命而至楚師已退矣諸侯稱爵者以其有攘楚之心也祀伯在邾莒之下盖以削弱之甚八月戊辰同盟于馬陵諸侯同心病楚且尋蟲牢之盟故同為此盟以固鄭志莒子于是乎同盟春秋予之故謹日之公至自會諸侯會而楚師退故不以救鄭致呉入州來呉楚爭強始見于此州來雖楚屬所謂下蔡是也乆屬于中國矣凡蠻夷之屬楚者呉盡取之至是乘楚伐鄭又以兵入州來故春秋謹之又著楚雖情強而呉敢與之敵且著十五年之所以會于鍾離也冬大雩冬非旱時曰大雩者志其早且僭也衛孫林父出奔晋衛定公惡林父故遂之林父亡七年而恃晋反衞權貴用事又十九年遂逐其君卒以邑叛則定公可謂知所惡矣八年春晋侯使韓穿來言汶陽之田歸之于齊齊不㑹晋晋侯患之幸勝于鞌之戰盟于爰婁又盟于蟲牢又盟于馬陵令俾我歸田焉所以堅齊也夫汶陽田者魯國之舊嘗為齊所取矣鞌之戰齊請盟晋命齊反魯衞侵地故我得復而取之亦可謂義也令齊事晋晋乃使韓穿來命魯歸之則非義矣何則魯國之分地乃先君受之于天子晋不當為齊請于魯齊不當求之于晋韓穿為晋卿不當為齊言于魯魯不當以晋侯之故遂以先君之分地與齊然書曰來言則晋非必令魯歸之也言之而已曰歸之于者強歸之辭盖以明晋之失言也夫汶陽魯田自齊歸魯曰歸可也自魯之齊安得謂之歸惟晋不察此故使韓穿來言也季文子之言盡矣晋欒書帥師侵蔡晋得齊之後冀盡得夫諸侯也蔡則畏楚終不與晋自文十五年晋卿缺入蔡之後蔡人不與中國盟㑹者又幾三十年至是欒書復加兵以侵之然非執辭討罪之舉故書侵以罪公孫嬰齊如莒因馬陵之盟始復與莒通嬰齊因聘而自逆婦是以春秋志之宋公使華元來聘凡諸侯相聘必有事焉非專行聘禮也華元之來盖圖婚耳録伯姬始此夏宋公使公孫壽來納幣婚禮不稱主人此其稱主人者何也辭窮也辭窮者何無母也禮有母母當命諸父兄師友稱父兄師友以行宋公無母莫使命之故自命焉皆禮所謂宗子無父母命之是也然此常事何以書為公孫壽書也公孫壽同姓之卿也納幣而使卿非禮也使同姓之卿又非禮也且起伯姬之賢以宋之請魯之嫁皆致厚焉而不知越禮逾制非所以重大婚之道也且婚禮有六春秋獨書其二以納幣方締成逆女為事終舉重之義也晋殺其大夫趙同趙括趙朔者晋侯之壻妻曰莊姬其季父嬰通乎莊姬而同括其兄也怒而放嬰于齊于是莊姬譖同括于晋侯而欒氏郤氏為之徴曰將作亂晋侯乃追論趙氏弑君之事而殺之殺之之志均故不言及自古婦寺作慝則必假朝廷以示意公朝有亂政亦必由婦寺以取信二者相待而後人君之威福亡觀莊姬欒郤之讒可不戒諸然同括内不正其親外專戮以干其其君亦足以殺其身而已故稱名以殺者有罪也秋七月天子使召伯來賜公命先王之制小國之君不過五命次國之君不過七命三公一命衮若有命則賜不過九命夫有加而賜所謂賜命也或曰賜命或曰錫命何也錫命者世襲之爵賜命則過其本爵正加其身而非世襲者也成公無明德大功簡在王室而簡王旣除喪遽加以賞典故稱天子以懲之覲禮有稱王稱天子之辨其稱王者以大臨之也稱天子者以恩加之也此不稱天王而曰天子者見簡王不能以大臨之而行姑息之恩也何則周之所以王者以其秉天子之權而行天下之義也賞在我罰在我是天子之權也賞可賞罰可罰是天下之義也及其衰也有其權而亡其義故賞罰俱濫然而天子之權猶在也及其衰之甚也天子之權去矣其位與諸侯夷矣其待諸侯也有賞以為姑息而已未嘗有罰以加焉者也觀春秋所書見天王加恩于諸侯者甚衆而其所以懲御諸侯者于經無見焉何者權去而威不行也權去而威不行則不能致罰于諸侯不能致罰于諸侯則吾之賞也不足以為諸侯之榮亦不足以勸諸侯之功又不足以服諸侯之心徒致恱于一人爾非姑息而何此天子來賜命春秋所以譏也冬十月癸卯杞叔姬卒叔姬為把所黜與把絶矣不當繫之把今猶稱祀而日其卒者魯人將脅祀而歸之未許其絶也未許其絶故自以為許夫人之喪而不以吾女卒之晋侯使士變來聘叔孫僑如會晋士夑齊人邾人伐郯諸侯來聘必有事焉士夑之來實興魯共以伐郯也七年呉伐郯諸侯莫有救者于是與呉成旣與呉成而士夑遂樓諸侯以伐之夫内討如殺趙同趙括外討如伐郯則何以為政于天下聞救邢救衛之風亦可愧哉衛人來媵衛人聞伯姬之賢宋已納幣故來媵夫媵小事不書而伯姬之嫁諸國來媵故書之以見其賢也且為齊晋來媵起例也春秋之時女子之賢尚聞于諸侯如此九年春王正月杞伯來逆叔姬之喪以歸已出之妻恩義旣絶雖有子亦不為之服况其夫乎禮有婦來練而出旣練而反則出婦有反歸之禮今叔姬生未反子杞及其已死而杞伯來逆其喪豈非叔姬本不應黜故魯人得以義責之使復歸𦵏乎聖人詳録其始卒欲為後鑒使之永終知敝也公㑹晋侯齊侯宋公衞侯鄭伯曹伯莒子杞伯同盟于蒲晋不足以宗諸侯旣為此盟而諸侯皆于是貳鄭叛不服莒潰莫救故書同盟以著其惡公至自會伯姬將以二月歸宋而公以正月出㑹而卽歸者晋以汶陽之田故諸侯皆有貳心焉亦足以見蒲盟之不信也二月伯姬歸于宋内女歸不書此書者譏宋公之不親逆也婚禮之大者在親迎今伯姬之歸子然如匹婦之行此豈國君娶夫人之禮哉夏季孫行父如東致女女旣嫁父母使人安之謂之致女古者三月而廟見始成婦也伯姬有賢行魯國重之遂使卿致非禮也晋人來媵伯姬已嫁而晋始來媵盖譏其不及事且為齊媵起也秋七月丙子齊侯無野卒晋人執鄭伯鄭伯旣受盟于蒲楚人以重賂誘之復會楚公子成于鄧秋鄭伯如晋晋人執之然經不書鄭伯㑹鄧者所以恕鄭而深罪晋也何則鄭伯雖與楚㑹旋即悔過而躬朝子晋以此言之是已知前日之失而自服其罪矣晋人當舍其前失而待之以禮可也乃因其來朝而執之豈有以禮來朝而反蒙執辱者哉又况鄭使伯蠲行成而晋人殺之卯聖人所以深罪晋而人之也殺行人不書盖以執君為重也晋欒書帥師伐鄭自文宣以來晋楚争盟而伐鄭鄭從楚則晋師至從晋則楚師至然而自泌之戰鄭之從楚者十年其從晋侯數伐鄭更蟲牢馬陵之㑹然後鄭伯受盟及蒲之㑹所以尋前日之盟也而晋人乃執辱鄭伯又使案書伐之明年又使衛侵鄭又會諸侯伐鄭方是時楚適備呉來暇争鄭故鄭之在晋者亦五年及楚一求成于鄭而鄭伯甘心于楚者盖追怒晋之不徳弗恤小國之難而輕辱其君故與楚伐許侵宋同撓中國凡二十年間諸侯之師侵伐盟會曽無虚嵗鰓鰓然常以失鄭為憂是禍也實晋有以啟之盖以不信蒲之盟故爾冬十有一月𦵏齊頃公因魯徃㑹而著其臣子私諡之罪楚公子嬰齊帥師伐莒楚人侵陳以救鄭然蒲之盟陳不與焉莒子恃陋而不備故楚子重移師以伐而晋人不恤同盟之急是又自背蒲之盟也庚申莒潰莒潰書曰者惡楚之潰中國故謹之亦見莒人之恃救所以深罪同盟也與蔡沈潰有間矣楚人入鄆鄆本莒邑魯嘗取而城之經不言遂而再舉楚人則知鄆今屬魯也楚人非有意伐我特以鄆本莒邑莒潰而遂以兵入之直以為一事而已一事而先書楚公子帥師者著其專且恭衆也再書楚人重貶之也秦人白狄伐晋晋為盟主旣執鄭伯又不救鄭故諸侯擕貳而秦人連白狄以伐之且見鄭景公不能霸矣且宣八年晋師連白狄伐秦今秦又連白狄以伐晋然則夷狄之無常可為後世之鑒且為十二年晋人敗狄十三年㑹諸侯伐秦書也鄭人圍許鄭以晋人執其君故追咎于許而圍之為將改立君者而紓晋師示不急也是為諼也以䇿則可以教則非是以春秋惡而人之城中城内城謂之郛外城謂之郭盖以莒無備而潰楚人入鄆懼而城之也君子于是乎見魯徳之衰矣其所衛者狹矣春秋集註卷二十五
