body:
  text: 春秋集注卷二十二宋髙閌撰宣公二六年春晉趙盾衛孫免侵陳趙盾前會衛侯救陳今更與衛孫免加兵於其國故書侵以正主盟者之罪雖以陳背晉即楚亦以晉救之無功故也春秋之法君弒而賊未及討則經不復重出其人聖人之意以為弒君之賊而使得偷生於嵗月之間是中國臣子亦復忘其君父故不復重出其名所以罪其臣子討賊之緩且不忍以大惡之名再見於春秋也今趙盾弒君而孫免為衛卿乃反與之比以兵加人之國用見當時習於悖亂不知君臣大義直以趙盾為無罪之人故春狄因其自視若無罪而為之再見於此所以重其罪也非赦盾也夏四月秋八月螽夏冬無事而書首月者存天道王法也秋螽書八月者惟八月有之非歷時也螽為農災王道所重今以月書則為災不久輕於以時書者矣然而聖人猶書以示後世者欲人君知以農為重也冬十月七年春衛侯使孫良夫來盟此盟乃衛欲為晉致魯蓋魯專事齊未與晉通故也何以知之宣公不義得國以是自疑而衛侯任其無咎故遣良夫來為此盟然而黑壤之會公卒見辱則知是盟之無信也是盟之無信亦公自疑二爾視下文可見夏公會齊侯伐萊公方與衛盟將復從晉而又應齊侯之命興兵以凌弱小之國此取辱之道也然非公本意故書公會秋公至自伐萊為齊興兵踰時而歸故以伐萊致大旱軍旅之後必有凶牟蓋征役怨嗟之氣感動天地而旱乾作矣書旱而不書雩著公無恤民之心也冬公會晉侯宋公衛侯鄭伯曹伯於黑壤鄭伯來服故為此會且盟焉而不書盟者公自弒立即齊之後惟與齊會未嘗會他國也晉人以為討而止公於是公不得與盟焉故止書會而已八年春公至自會古者國有凶荒則殺禮而不舉公夏會伐萊而秋至冬會黑壤而此年春至其間大旱之不恤而區區以侵伐期會為急又為晉人所執幸以賂免故黑壤之盟不書而此以會致自是不敢如晉矣夏六月公子遂如齊至黃乃復不稱有疾者大夫受命而出雖死以尸將命豈可以疾而廢君命耶乃者無其上之辭復者事未畢而返之辭辛巳有事於太廟仲遂卒於垂壬午猶繹萬入去籥垂齊地公子遂未至齊國而旋未及魯境而卒適與祭同日故不書祭名但書有事而已凡祭必七日戒三日齊故當祭不以凶事告又况卒於國郊之外豈宜遽訃於廟中乎此事之失雖不在主祭者然仲遂弒逆之罪雖死猶當討之宣公以援立之故既不正其罪而即以為卿於其死也又當祭而告遽為之變君臣之恩其厚乃如此亦可謂非常矣稱仲遂者著其生而賜族不稱公子前見也此聖人存君臣之義也繹者明日之祭也孝子當尸不敢即棄故明日復祭此非正祭比卿喪為輕不可以輕而廢重故檀弓記孔子之言曰卿卒不繹猶繹者可以己之辭也如卿佐之喪繫一國之戚而不宜作樂則勿用可也今乃去其有聲之籥而用其無聲之舞是不知樂也夫手舞足蹈是真樂也豈在聲音之間哉蓋仲既立公公固欲厚其終然而國人弗順也諸臣弗與也故於卒雖為之變而妄意去留如此夫體貌大臣自有常禮苟其人不足以堪此則黜其位可也由一人而變常節此春秋之所以譏也戊子夫人嬴氏薨此文公之妄也何以稱夫人薨援成風之例蓋著其僭也然無貶辭者公羊子曰其餘從同同晉師白狄伐秦晉不能糾合諸侯以攘夷狄乃外連白狄以伐秦直書而貶自見矣殽之役書晉人及姜戎此不言及者以傳考之白狄為主也經先晉者不與夷狄之會中國也中國而為夷狄所帥晉之辱也楚人滅舒蓼僖三年徐人取舒至是楚人滅舒蓼成十七年又滅舒庸襄二十五年又滅舒鳩蓋羣舒之别種非二國也秋七月甲子日有食之既按長歷七月乙未朔則甲子乃三十日也食之既則為變大矣冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬五月而葬者禮之也妾而以夫人禮薨之葬之又别為之諡其為非禮甚矣禮曰庶人葬不為雨止非特庶人也自天子至於庶人皆當然爾何以知之凡喪之行必有潦車以載簑笠蓋備雨也送葬者猶不避塗潦况自葬其親乎且雨之遲久不可豫知或浹句彌月者有之今此經先書己丑葬而復書雨則是將窆而遇雨也夫喪事有進無退豈可停柩以待故書不克葬以譏其無備也平明而葬日中而虞禮也今以明日日中而葬則失虞祭之時矣敬嬴私事襄仲殺太子及其母弟經書子卒夫人姜氏歸於齊而傳謂哭而過市市人皆哭讀者有傷切之意焉蓋以秉彞不可滅也夫襄仲與敬嬴逆天理而拂人性之狀慘矣仲嬴之卒相去八日仲死不得其地嬴死不得其時孰謂無天道乎城平陽懼晉故也方舉大喪又城平陽重困民力也城義見隱公十年楚師伐陳陳以晉衛見侵復棄楚而從晉故楚以為討稱師稱伐所以譏其始謀之失也然晉不能救陳陳遂復即楚此晉之辱也九年春王正月公如齊公至自齊公有母喪而以嵗之首月逺朝強齊非特見公之無哀亦不知有天王矣故書王正月以志之且齊魯之相與如此可以不危矣然公每如齊必書至焉以危之者蓋非義相與危在其中矣夏仲孫蔑如京師左氏謂王使來徴聘也信斯言也益見王室之微矣且公親弒立九年矣未通乎王乃自朝齊而使大夫聘天子顛倒甚矣齊侯伐萊狄比侵齊而齊不敢報萊不敢犯齊而齊亟伐之畏衆強而虐微弱如此於此可以觀惠公之政矣秋取根牟案根牟公羊以為邾邑杜預以為東夷國此注未有定論七年公會齊伐萊此齊侯再伐萊公雖不與伐而乘危敢根牟春秋所甚惡而其辭若緩者以內大惡故婉其辭也左昭八年傳秋大搜於紅自根牟至於商衛八月滕子卒自隱七年書滕侯卒至此始書滕子者滕昭公也魯不會其葬而書其卒為下文起也九月晉侯宋公衛侯鄭伯曹伯會於扈晉荀林父帥師伐陳復謀齊也齊與諸侯不睦而魯獨事之故公不與會陳不來會即楚故也據左氏晉荀林父以諸侯之師伐陳夫楚伐陳晉不能救今乃因諸侯之師而伐之晉之不義甚矣不書諸侯之師者諸侯不與伐陳也辛酉晉侯黑臀卒於扈諸侯非王事不出境今晉成公會於扈而卒非正也不言卒於會者諸侯散而晉侯以疾留其卒於扈不出晉地也凡立七年其子獳立是為景公不書葬者魯專事齊不會其葬也然齊人愈得志矣冬十月癸酉衛侯鄭卒衛成公立三十五年其子速立是為穆公宋人圍滕宋文公興師以伐有喪之國春秋惡之故貶以稱人楚子伐鄭晉郤缺帥師救鄭楚子聞晉侯卒於扈以重兵來討鄭伯之二於是鄭復與楚平鄭已與楚平救之無益也自是晉楚交伐鄭陳殺其大夫泄冶泄冶無罪而書名何也冶以強諌激怒其君使雖喪亂在前弗肯回顧斯實無益於人之國故孟子不多宮之竒之諫而以百里奚為智魏鄭公不願為忠臣而願為良臣蓋諫者既死則必有亡國弒君之禍是以春秋特書其名為徵舒弒君楚子滅陳之端以垂後世不容直言之戒觀陳風株林澤陂之所刺則知宣公君臣宣淫無復忌憚亦已甚矣泄冶至此而強諫亦足以殺其身而已矣十年春公如齊公至自齊公頻年朝齊勤亦至矣諸侯有會而謀齊者而公不與焉雖事天王亦不如是然不書王正月非若九年夏有仲孫蔑如京師之事以相形也公事齊雖勤而不與諸侯之事亦危道也齊人歸我濟西田按元年公會齊侯於平州公子遂如齊齊人取濟西田蓋公子遂殺子惡而立宣公故以濟西田賂齊而齊人取之至是而歸者公比年朝齊齊侯感公朝事之勤因其請而歸之也夫魯之分地先君受之於天子豈可失墜又况負弒逆之罪賂以免討乎齊人取弒逆之賂以縱惡故其取其歸皆謹書之然其他歸田未有言我而此獨曰我濟西田者獨此本魯田也若哀八年歸歡及闡定十年齊人來歸鄆歡龜隂田皆魯侵諸侯而得之非周公之本封也既本他國之田故不言我蓋以衆暴寡以大侵小而得之者如有王者作則魯在所豫乎在所奪乎聖人所書以正王法爾鄆歡龜陰田特書曰來歸者夾谷之會孔子相焉質以禮義齊人自服而來歸也他秪書歸者皆因請而得之爾夏四月丙辰日有食之按長歷丙辰朔不書朔史失之也日食雖有常度亦人事所召有食之者己巳齊侯元卒齊惠公立十年卒其子無野立是為頃公齊崔氏出奔衛崔杼有寵於惠公高國畏其逼也而逐之以其世卿專權故書氏而以自奔為文公如齊公二年天王崩如弗聞也今聞齊侯卒而奔其喪是以事天子之禮事齊也五月公至自齊癸巳陳夏徵舒弒其君平國君通乎夏姬故其子弒之靈公立十五年其子午立是為成公成公既立不討君父之賊則知靈公之惡播於國人而徵舒殺之國人之所弗憝也六月宋師伐滕前圍滕以伐人之喪貶而人之今伐滕而稱師焉則正著其暴橫加小國以其衆也然滕子恃晉而不朝宋討得其罪故稱伐焉公孫歸父如齊葬齊惠公公自奔其喪又使貴卿會葬不顧天王之禮闕然莫之供也比事考辭其義自見而臣子私諡之罪亦無所逃晉人宋人衛人曹人伐鄭鄭復與楚平故晉會三國伐之當是時陳有弒君之亂曾不是圖而有事於鄭故楚之伐鄭稱爵晉與諸侯伐鄭稱人蓋罪諸侯不先自正也秋天王使王季子來聘宣公弒嗣君而篡立天王不問其罪反使季子來聘又不見答失禮甚矣公孫歸父帥師伐邾取繹自文公時邾魯有隙宣公篡位而邾子首朝之自是絶迹魯庭者又十年故歸父帥師以討其罪然以貴卿為將舉大衆而征伐不施於亂臣賊子而凌弱侵小近在附庸之國是為盜也故特書取繹以重其罪大水兵役怨氣之所感也義見桓十一年季孫行父如齊文子初聘通嗣君也冬公孫歸父如齊以伐邾故恐齊人以為討遂謀伐莒焉甚矣魯之懼齊也二嵗之間而公與大夫如齊者五齊侯使國佐來聘嗣子踰年即位始稱君未踰年稱子故葵丘之會稱宋子蓋齊桓方倡大義以尊中國諸侯之從者惟恐後故宋公雖在喪而來與會亦不深責怒其不獲已而趨急務爾魯之與齊與國也聘雖後時亦何害耶惠公之卒葬之既速又未踰年而以君命遽遣使來聘焉謀伐莒也然當凶釁而行吉禮忘哀思而結歡好蓋有速成君之意故如其意而書曰齊侯以著其惡也饑國無三年之蓄曰國非其國也今以秋大水而冬即饑則其為國可知矣水旱螟螽天災也然民有蓄積則未必饑書饑則不獨天災也見民無蓄積也非特民無也國亦無也非特國無也鄰國亦無可告糴者矣前此不書饑者百姓尚足故也至是而百姓不足矣於是乎有稅畝之事焉楚子伐鄭是夏鄭因晉帥三國見伐而復棄楚故楚子又伐鄭據左氏載晉士會救鄭及諸侯戌鄭而春秋削之者責晉雖得鄭而不能有之也故楚伐稱爵春秋集注卷二十二
