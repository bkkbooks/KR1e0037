body:
  text: 春秋集注春秋類提要臣等謹案春秋集注四十卷宋髙閌撰閌字抑崇明州鄞縣人紹興元年以上舍選賜進士第厯官禮部侍郎事蹟具宋史儒林傳是書以程子春秋傳為本故其序直引伊川傳序而無片語附益其于唐宋諸家之說亦多擇善而從鎔以已意不載各書之名體例略與胡安國春秋傳相似史稱秦檜疑閌薦張九成出知筠州不赴卒而樓鑰序是書則云以直道忤時宰一斥不復家食纍年略不以事物自攖日有定課風雨弗渝蓋閌家居以後歷久始卒晚年精力盡在是書故當時學者甚重之書中大㫖雖宗程傳而亦間有異同者如子糾齊桓長幼之次三傳注疏並以糾為兄桓為弟與史記荀子所載同獨程子見漢薄昭與淮南王書有齊桓殺弟之文遂謂糾為桓弟不知當薄昭時漢文于淮南為兄其避兄言弟特一時遷就之語未可據依閌則云子糾小白皆襄公弟糾於諸弟最長當立實足以正程傳之失他如解衛人立晉解夫人氏之喪至自齊解取濟西田諸條皆深得聖人微㫖其解及向戍盟于劉云凡因來聘而盟者必在國內劉王畿采地豈有來聘魯而逺盟于劉者乎蓋下文有劉夏傳者以為春夏之夏與文四年夏逆婦姜于齊文同故誤增于劉二字耳所見創闢而確鑿尤為自來說春秋者所未及又如以子般卒為善終以州蒲為州滿之訛考核精詳亦非漫然立異者惟于地理少疏故如隱九年㑹防之防在琅邪華縣東南隱十年取防之防在髙平昌邑縣西南文十二年城諸及鄆之鄆在城陽姑幕南成四年城鄆之鄆在東郡廩丘縣東閌乃混為一地未免牽合然在宋代春秋詩家中正大簡嚴實可與張洽相匹非孫復崔子方輩所可幾及故欽定春秋傳說彚纂採取最多特是有明以來其書久佚彚纂所録祗就元以後諸書引用閌說者隨條摘入而海內究以未覩全書為憾今幸值聖代右文搜羅祕籍是書之散見永樂大典內者復可薈萃成編謹按次排比是正訛舛其永樂大典原闕者則採各書所引閌說補之首尾完備復為全書考陳振孫書録解題馬端臨文獻通考俱稱是書十四卷今以卷帙繁重析為四十卷又宋史本傳稱閌有春秋集傳而永樂大典實作集注與書録解題同當是宋本原題今並從之至所載經文多從左氏而亦有間從公穀者蓋唐宋諸儒解經大都兼采三家固未可以漢世專門之學律之也乾隆四十九年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序吾鄉四明慶歷皇祐間杜楊二王及我高祖正議號五先生俱以文學行誼表率於鄉杜先生又繼之講明經術名公輩起儒風益振厥後伊洛二程先生之興得其傳以歸者惟故禮部侍郎高公公天資純篤濟以勤敏師友淵源學問精詣入上庠登舍選己有盛名諸公貴人爭欲壻之拂衣而歸建炎二年升補上舍紹興改元德音免殿試賜同進士出身十三年高宗初建太學遴擇名儒為四方所推服者為少司成公實應選士子雲集凡學之規則皆所裁定明年三月車駕幸學講易泰卦於上前擢二卿將嚮用矣以直道忤時宰一斥不復家食纍年中壽而殁洎端明汪公登從班奏言公學行出處之詳始詔復次對官諸子而公之名愈顯矣自頃王荆公廢春秋之學公獨耽玩遺經專以程氏為本又博採諸儒之說為之集注其說粹然一出於正然猶未行於世也仲子得全知黃州始取道藳刻之而屬鑰以序鑰生長外家汪氏于公有連雖生晚不及承教然猶記拜公牀下竊聞之公既投閒杜門屏居略不以事物自攖日有定課風雨弗渝此書之所以成也嗚呼泰山孫公明復著尊王發微深欲明夫子褒貶之旨伊川先生則謂後世以史觀春秋謂褒善貶惡而已至於經世之大法則不知也自有春秋以來未有發此祕者公亦曰仲尼懼先王經世之法墜地莫傳欲立為中制俾萬世可以通行故假周以立王法而託始於隱公焉且以文武之道期後王以周公之事業望魯之子孫也以此推之春秋固非一王之法乃萬世通行之法也其推明伊川之意類如此昔曾子每誦夫子之言則必曰吾聞諸夫子子夏使西河之民疑女于夫子曾子罪之說者曰言其不稱師也觀公之序直引伊川之序不更一辭可謂稱師而知所本矣伊川有序而傳未成公之書成而未有序此當屬之深於春秋者鑰何人而敢與此黃州言之再四竊幸因得託名於不腐乃弗敢辭公諱閌字抑崇子孫能守家法其興蓋未艾也嘉定四年季冬己卯朔樓鑰序自序昔伊川先生欲著春秋傳而先為之序曰天之生民必有出類之才起而君長之治之而爭奪息導之而生養遂教之而倫理明然後人道立天道成地道平二帝而上聖賢世出隨時有作順乎風氣之宜不先天以開人各因時而立政暨乎三王迭興三重既備子丑寅之建正忠質文之更尚人道備矣天運周矣聖王既不復作有天下者雖欲倣古之迹亦私意妄為而已事之謬秦至以建亥為正道之悖漢專以智力持世豈復知先王之道也夫子當周之末以聖人之不復作也順天應時之治不復有也於是作春秋為百王不易之大法所謂考諸三王而不謬建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑者也先儒之論曰游夏不能贊一辭辭不待贊也言不能與于斯耳斯道也惟顔子嘗聞之矣行夏之時乘殷之輅服周之冕樂則韶舞此其準的也後世以史觀春秋謂褒善貶惡而已至于經世之大法則不知也春秋大義數十其義雖大炳如日星乃易見也惟其微辭隱義時措從宜者為難知也或抑或縱或與或奪或進或退或微或顯而得乎義理之安文質之中寬猛之宜是非之公乃制事之權衡揆道之模範也夫觀百物而後識化工之神聚衆材而後知作室之用于一事一義而欲窺聖人之用心非上智不能也故學春秋者必優游涵泳默識心通然後能造其微也後王知春秋之義則雖德非禹湯尚可以法三代之治自秦而下其學不傳豫悼夫聖人之志不明于後世也故作傳以明之俾後之人通其文而求其義得其意而法其用則三代亦可復也是傳也雖未能極聖人之藴奧庶幾學者得其門而入矣
