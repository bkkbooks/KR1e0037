body:
  text: 春秋集註卷四宋高閌撰桓公一元年春王正月公即位桓公弑君而立不天無王之極也而書春王正月公即位者以天道王法正其罪也蓋隱公被弑經但書薨而賊亦不見主名若其嗣君實預其故而無以爲别則後之觀者安知賊之為誰乎聖人欲使弑逆者無幸免于後世故著其簒立之罪而特書其自即位奈何以不弑自居也三月公㑹鄭伯于垂㑹者外爲主甚矣鄭伯之無道也知公之簒逆不自安特爲好㑹將以求賂焉度魯亟于㑹諸侯必從所欲故也夫弑君之賊人皆得而討之况鄭伯與隱公同盟和好固非一日今見其賊不能討反有所邀求欲以定其位是誠何心哉鄭伯以璧假許田先言㑹于垂而繼言假許田見鄭伯貪利忘義之甚也夫璧者饑不可食寒不可衣非若土地人民之重而魯亦何用璧爲哉特以桓既弑立懼諸侯之討已鄭伯得其情姑以璧藉口而實欲得許田耳聖人若書魯以許田賂鄭則無以顯鄭伯之罪故書鄭伯以璧假許田而魯之罪自見矣此春秋微顯闡幽之道也先儒以許田爲魯地鄭伯以祊易之若果爾則祊初入魯而許田即當入鄭又安得數年不報必待鄭伯更以璧假之然後與耶况魯地見于經者皆舉地名如鄆讙龜陰及闡之類是也今云許田則繫以國名與邾田同矣安得爲魯地耶據左傳昭十二年楚靈王謂子革曰昔我皇祖伯父昆吾舊許是宅今鄭人貪賴其田我若求之其與我乎對曰與君王哉周不愛鼎鄭敢愛田以此攷之其爲許國之田無疑矣按去年公及齊侯鄭伯入許據左傳則遂滅許據經則許自此不見至十五年始書許叔入于許蓋當時三國同入許而魯實取其田鄭雖利其與已接境而欲得之勢不可也今度許已歸服必不復興又乘桓公弑立恐懼不自安之時自可必得之而無以爲辭故特爲垂之會欲以璧假之假之爲言婉其辭以示不強取而于魯亦無嫌也先儒但見鄭先歸魯祊今來假許田遂以爲相易殊不知鄭始結魯以拒敵故歸祊以市魯魯今簒君以求援故賂田以償鄭其地雖若相易而其事不相涉也夫鄭伯既乘隙以邀利而魯又嘗入鄭之祊今又得鄭之璧而許田本非魯有遂因以賂之可以滅口而掩惡又何憚而不爲耶夏四月丁未公及鄭伯盟于越公自會垂之時固欲結鄭援以自安鄭既得許田始與公爲此盟以成公意也公以會垂未可保其必信也故又爲此盟而位乃定焉夫弑逆之人凡民罔不憝而鄭納賂與盟以定之其罪大矣故書日以詳著其惡秋大水君修德則和氣應而雨𤾉若今桓行逆德致隱沴乃其宜也春秋書大水者九義見十三年冬十月一時無事書首月存天道王法也二年春王正月戊申宋督弑其君與夷及其大夫孔父宋華督將弑殤公孔父正色而立于朝則人莫敢過而致難于君者于是先攻孔父殤公趨而救之皆死焉人臣死君難故書及以著其節稱大夫以明不失其官也夫死者人之所甚難而忠臣義士慷慨發難雖不救而以身死之世人見其事之不成從而咎之者衆矣聖人特著其節又稱其官以勉進忠義之士使爲于不可爲之時救于無可奈何之際故春秋見弑之君三十有六而死難之臣三人而已孔父仇牧荀息是也按宋世系正考父生嘉字孔父其孫睪夷因以爲氏昔人名嘉而字孔者多矣鄭公子嘉字子孔所謂司徒孔者也楚成嘉字子孔所謂令尹子孔者也或謂名其君于前不當字其臣于後則父亦名也是不然與夷之名此正之不可變者也何害于孔父之字且鄭伯寤生卒而繼書祭仲仲亦名乎殤公立十年督迎公子馮于鄭而立之以親鄭也宋鄭交惡由宋穆公啟之故華督得以爲辭也滕子來朝此滕侯也而稱子者示外之也禮曰東夷北狄西戎南蠻雖大曰子故呉楚僭王而春秋亦書曰子而已先儒謂五等之爵自有定制其所升黜皆由霸主若春秋擅自升黜是自爲亂也是不然當此之時霸主未起孰黜之乎春秋天子之事也孔子曰知我者其惟春秋乎罪我者其惟春秋乎正謂此也春秋之誅亂臣賊子尤嚴于亂臣賊子之黨使人知亂臣賊子之爲大惡而莫之與則無以立于世而簒弑之禍息矣滕侯始與隱公同好七年往弔其喪十一年來朝于我今隱為桓所弑而滕不能討其同好之賊反率先朝之此不仁不義之甚外裔之道也故春秋因以外裔待之三月公㑹齊侯陳侯鄭伯于稷以成宋亂春秋之法㑹不繫事以爲事之善惡無足勸懲則沒去其事而但著其出㑹之罪也㑹而繫事者二澶淵之會宋災故自見本義此書公㑹諸侯以成宋亂尢爲天下之大惡也桓弑君而立方懼諸侯之討已乃因宋督弑君特會諸侯以成其亂春秋深嫉之故以宋亂之成歸罪于公公若㑹諸侯以討宋宋亂不成矣惟公以亂助亂是以成也是四國始以宋之故更相侵伐今因宋督弑君又各釋其怨立公子馮納督之賂而封殖之聖人深罪四國之君無人君之道保人之賊私人之賂反成就其志俾賊而立于君之側政而歸于賊之手故特書其爵而繫之以成宋亂明此四君者皆好亂之君也故亂人以爲資夏四月取郜大鼎于宋宋督賂四國以免誅而以郜鼎歸公不曰宋使來歸而曰取于宋以見公乃自以爲功而取之専罪公也戊申納于大廟鄰國之亂力不能救則已耳今公反㑹三國納賂以成之聖人實書之所以示其惡于後世也公不知納賂之爲惡又欲誇于神明置其器于周公之廟以明示百官是教之習爲悖逆之行也然則慶父仲遂意如之惡又何誅焉聖人爲此懼而作春秋使後世知寵賂之行保邪廢正能敗人之國家如此也故日以謹之且謂之郜大鼎則宋安得而有之此見宋公本以不義得之也宋本以不義得之魯又以不義取之周公饗義必不受也故書曰納納者弗受而強致之也白華之詩美孝子之潔白美其不肯以不義汚其親也况諸侯乎宋以郜鼎賂魯魯以許田賂鄭其罪惟均故聖人所書之意亦同秋七月紀侯來朝案經文公穀作紀侯左氏作杞侯此從公穀左氏因下有入杞之文附㑹作杞非也杞爵非侯凡稱杞侯者皆紀侯自紀侯大去其國之後紀不復稱侯矣弑逆之人紀侯朝之何爲不與滕子同貶乎當是時齊欲滅紀紀侯來求魯爲援耳非爲桓立而朝之也蔡侯鄭伯㑹于鄧隱四年蔡與宋陳衞魯伐鄭十年又與宋衞伐鄭其積怨未解今鄭與齊宋魯陳皆釋去前憾故蔡與鄭于是始平于鄧也然至五年而蔡人復從王伐鄭則此㑹亦不足恃也鄧嬴姓侯國也地以國則鄧亦與焉左氏以爲懼楚非也時楚雖已僭號尚未敢入侵中國何爲而先自懼乎九月入杞以滕紀皆來朝而杞獨不至故也此年入杞八年伐邾其辭雖略而罪有餘也夫桓弑君莫入莫伐倖也乃反入人伐人是使天下共蒙其恥也是春秋之深意也公及戎盟于唐隱滕與戎盟于唐矣未幾而伐凡伯則戎之不可信必矣今必以桓有敗盟之事是以再爲此盟也冬公至自唐君出而至必告廟此常事也春秋所書或過時且危之也桓公自弑立之後嘗與齊鄭陳㑹矣皆同爲不義者也至是逺與戎盟故危之而書至蓋戎若不如三國之黨惡則討之矣此聖人居夷浮海之意也三年春正月春秋之法凡首時書月則書王此正月不書王者桓公弑君而立聖人雖不敢斥言然豈可盡沒其迹故微文以見之使後世可追攷焉蓋弑君之賊不可使一日偷生奈何緩之至十八年之久縱而不討乎聖人以桓弑逆自立乃敢晏然南面爲君以朝其臣民故元年書王以正其罪二年又書王者以王室微弱力不能行天討而桓公之罪已顯著不可掩若于二年而能誅之雖爲小緩亦足以為王誅也今至于三年之喪畢而竟自爲君而天王竟不加誅非天下無王何以至此自是遂不書王以見當時之王竟不能討而桓公之惡竟遂其欲也公㑹齊侯于嬴齊侯知公之弑逆欲以文姜妻之公亦欲援齊以自安故爲此㑹夏齊侯衞侯胥命于蒲胥命者何自相命也其命維何相推爲牧伯也昔齊衞之先蓋嘗爲牧伯矣故齊管仲言天子賜我先君履五侯九伯皆得征之而詩言黎之臣子作旄丘之詩責衞伯不能修方伯連帥之職是知齊衞本皆牧伯之職也爲牧伯者皆禀天子之命以令諸侯書曰王言惟作命未有諸侯而得言命也是以文王之爲西伯也以天子之命命將帥以討夷狄之難詩人歌而美之今也齊僖衞宣欲修其職不請于王而自相命焉在易泰之上九曰城復于隍其命亂也命亂則尊卑上下不復辨方伯連帥之職無所統而強者爲伯而已是無王也此東周大亂之形也春秋書之旨在于此而傳者失其意使聖經微旨久而不明可爲重太息也諸儒以伯爲霸字蓋本于方伯之伯衞本侯爵而旄丘謂之衞伯則方伯連帥之稱伯固其所也及方伯連帥之職廢而諸侯強大者遂行其職故霸通于伯而齊衞所以自相推也然則二侯胥命何爲不盟地醜德齊兩不相服也盟必有主者主者爲尊胥命則莫適爲尊自是齊日強而衞日弱故不復相命而屢盟盟則齊專爲霸矣春秋之變始于齊衞胥命而終于呉晉爭盟自爭盟觀胥命所謂彼善于此也故荀卿曰春秋善胥命六月公㑹紀侯于郕公自簒立之後無歳不與諸侯盟㑹蓋結外援以自固也紀侯懼齊亦欲親魯雖郕亦然秋七月壬辰朔日有食之既既盡也食盡見爲異之大者天下無王之象也經書日食三十六而食之既者二此年與宣八年秋七月是也天變之甚獨于二公見孰謂無天道乎日食義見隱二年公子翬如齊逆女翬于此稱公子者先公之子至親且尊而桓公以嘗立已之故命爲正卿故也夫人母儀一國上以奉宗廟社稷内以率正妾與君敵體而公既不能親迎乃使公子逺迎之曾無嫌疑之心焉齊女又不待禮乃行皆不正其始也九月齊侯送姜氏于讙禮諸侯之娶女入國則稱夫人讙我地也而姜氏不稱夫人者以齊侯身送之有父之親未可繫夫而稱夫人也自齊侯言則宜曰季姜而曰姜氏者不正文姜故不與其盡父之稱也且父母送女不下堂况守土之君乎今齊侯出境而送姜氏于讙者公子翬以之歸也豈逺父母兄弟之道哉公㑹齊侯于讙讙之㑹實受姜氏于齊侯以歸而經但以㑹讙爲文者以爲萬世之嗣己則輕之而公子逆之齊侯之強己則畏之而親往㑹之是公之行其重在齊侯而不在姜氏也若齊侯不送則公亦不至于讙故書公㑹齊侯于讙以罪之也夫人姜氏至自齊不言翬以致者公受之于讙故也至者見于廟也書至自齊是不與其㑹于讙也春秋之時婚姻失道鮮有賢女輔佐君子故文姜亂魯驪姬惑晉南子傾衞夏姬喪陳上下化之滔滔皆是故自隱而下内女夫人出處之迹聖人謹而書之曰逆女曰納幣曰歸曰來曰薨曰卒曰𦵏所以謹其終始而著其罪也然事有繁者不可槩舉則略其常事而著其非常者故迎女不親則書之居喪納幣則書之歸來無故則書之㑹享求婦則書之凡非常之事悉書焉以懲以戒爲萬世法冬齊侯使其弟年來聘隱七年齊嘗使弟年來聘今桓弑隱而奪之位齊既與之爲婚又復使年來聘春秋書此以見齊侯與魯雖簒弑易君恬不爲意其相聘也初無繼好息民之意各計利害如市道之交驩耳今來聘者致夫人也因致女而聘又非禮也有年桓弑君而立逆天理亂人倫天地之氣爲之水旱凶變乃其宜也今乃降豐年以安之使得憑厚而不忌斯亦異矣凡人力之所不能及者必推之天以天理之有常不若人事之錯亂也今反常理故書其異四年春正月公狩于郎桓始婚于齊而天以有年奉之凡侈心生于中則逸德見于外自然之符也郎魯疆埸也遠狩于疆埸危之也何以危之公有弑君之惡諸侯皆得而討之魯不是念而遠狩于郎于是知其安于弑君恬不懐懼也夫先王以征伐不可偃于天下故隱之于農以武事不可奪農時也毎因農隙以教之蓋古者兵農未判一民而已遂寓其令于四時田獵之間而時田之禮亦斯民之樂從也故因追捕而教以金鼔旌旗之用因殺獲而教以獻執俘馘之功人知禽獲之利而已不知擊刺之道由于斯也人知馳騁之樂而已不知軍旅之政寓于斯也然則講練軍實纘習武功以備不虞以威夷狄實在乎此又豈直肆盤遊逐禽獸而已哉然先王懼蹂躪之爲害故于國郊爲苑囿養禽獸以備之文王之囿方七十里其後諸國亦皆有之若鄭之原圃秦之具囿魯之大野是也故西狩于大野無譏焉特爲獲麟書耳其他狩于郎于禚蒐于紅于比蒲于昌間皆以非地而書也凡非其地者皆託蒐狩爲名實欲爲防戰之備耳况春秋之時習于田獵謂之賢嫻于馳逐謂之好未嘗因田以教民也設有能教民以戰陳之事又非其地其非地之中又有非時非禮者此聖人不得不詳著之以垂世誡也夏天王使宰渠伯糾來聘按天子之宰以佐王治邦國爲職今桓公内弑其君以自立外又成人之亂天王弗能討反使其宰聘之示加尊寵則天理滅而人道亡矣書天王言當奉天而其所爲乃若是也糾者宰渠伯之名也天子之宰不名此名之者見尊卑貴賤之義亡矣桓自是益無顧忌在洪範爲狂爲豫莫之首貞此有春夏而無秋冬之時蓋天理既滅天運乖矣陰陽失序歳功不能成矣故不具秋冬春秋集註卷四
