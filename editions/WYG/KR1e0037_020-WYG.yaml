body:
  text: 春秋集註巻二十宋髙閌撰文公四十有五年春季孫行父如晉為單伯與子叔姬故也使魯能修其政刑則齊亂可以義討今乃因晉以請豈非自取之乎三月宋司馬華孫來盟司馬之職國兵在焉宋昭公不能其大夫而華耦為司馬不由君命擅來求盟故不言宋公使而直書宋司馬華孫來盟以罪之其來盟奈何宋司城之來奔魯實復之故宋之權臣德魯而願盟此其意可見也耦既來盟公與之宴辭曰君之先臣督得罪宋殤公名在諸侯之䇿臣承其祀其敢辱君聖人以耦無故而暴其祖因書曰華孫者明此司馬乃華督之孫言孫所以正其不能祖也不名者義不繫于名也夏曹伯來朝五年而兩朝於魯魯亦晏然受之此齊侯所以怒而討其罪也齊人歸公孫敖之喪齊人執單伯執子叔姬而歸公孫敖之喪執生而歸死所以惡魯也然其歸之也亦以敖之子請之故也請之故不曰以歸不曰來歸不曰歸自齊且敖者公子慶父之子穆伯也慶父桓公之長庶而欲自同于正故不以伯為字而稱仲其後以字為仲孫氏故春秋祗書仲孫而國人以其實出長庶之後止稱孟孫所以論語稱孟孫問孝而左氏亦皆謂之孟孫盖從衆人之同稱也凡奔大夫不書卒非我臣也敖盖先君之宗卿而文伯恵叔皆其子也魯既許之復而立其子為仲孫氏矣豈有臣其子而不使之奔其父之喪者乎崇公族之㤙篤君臣之義則姑聽其家以其喪歸可也雖然聖人以齊人自歸其喪為文盖明敖之喪在齊而已歸與不歸非魯之所得專也六月卒丑朔日有食之鼓用牲于社莊二十五年三十年皆以日食而鼓用牲于社其非禮妄作義已著矣今文公亦復如此者必以為先朝故事可舉而行之也嗚呼後世人君舉行先朝故事而不顧義之可否雖有甚害亦因循不改自謂遵制掦功以拒絶臣下之言者多矣皆因陋承誤不知春秋之㫖者也可為萬世之戒單伯至自齊内大夫為他國所執而見釋者皆書其至以見執非其罪且執既書則其歸不得不著也晉郤缺帥師伐蔡戊申入蔡蔡侯既與楚子次于厥貉故新城之盟不與焉晉郤缺帥師伐之斯有名矣凡伐不言入伐之不服然後入焉見蔡雖附楚楚人不之救也故書戊申入蔡足以知楚之不足恃矣此雖蔡人自取之亦所以甚晉也然晉魯不修所以服楚而暴小國以争諸侯欲使區區之蔡捍楚之强而不貳則亦難矣故言伐言入甚之也謹而日之又甚之也是嵗蔡侯甲午卒不書盖以其附楚不以中國待之也其子申立是為文公秋齊人侵我西鄙齊商人篡弑其君又執其君母又執我國大夫罪不勝誅而反加兵于我故書侵以惡之又貶而人之季孫行父如晉一嵗再如晉者皆為齊故冬十有一月諸侯盟于扈尋新城之盟且為我故謀齊難也齊人賂晉故弗克我但盟而已公以齊難不與此盟夫晉為霸國而齊弑其君莫能正之諸侯又莫之討若謂諸侯不專征則田常弑簡公孔子請討焉夫豈非不義而孔子行之今晉號為主盟而趙盾實執國政其勢力亦足以率衆諸侯而諸侯亦皆俛首從命而皆不足以有為是以春秋不復列序者以示中國無盟主也無盟主者不霸靈公也不霸靈公者政在盾也政在盾而諸侯無争之者盾之能也盾之能而不霸靈公者春秋之意也著盾之專而不能有為也霸國猶晉國也十有二月齊人來歸子叔姬晉㑹諸侯盟于扈受齊賂而不伐齊故齊人自歸子叔姬以解諸侯之意凡内女見黜皆書來歸罪在姬也此書齊人來歸者罪在齊人也未有子而黜其母者也若曰姬無罪也齊人自來歸之云爾又異乎敖之喪也春秋閔子叔姬之事故異其辭以辨之然不直書齊母何也夫天下豈有無母之國哉而商人至于囚執其母則人之所不忍言者也故以父母之辭錄之曰子叔姬盖自魯人為之辭不得使為商人之母此春秋所以存天下之大教也齊侯侵我西鄙遂伐曹入其郛諸侯為扈之㑹不能討齊國弑君父之賊反受其賂而還是成商人為君也故自此遂書齊侯以罪諸國之會于扈者商人知諸國之無能為遂益肆其威且恚魯仗晉以謀已故一嵗而再侵我西鄙又伐曹討其來朝我也惡魯而及曹非理甚矣夫齊商人弑君而自立諸侯會于扈謀伐之晉人取賂而還致齊益無顧忌侵我伐曹以肆其暴豈特齊有罪焉亦見諸侯之縱亂矣凡伐不言入入其郛者甚之也殆矣哉㡬欲其國矣非特若侵魯西鄙而已也因我而加兵于曹曰侵可也而曰伐者討其朝魯執辭正也十有六年春季孫行父會齊侯于陽穀齊侯弗及盟晉侯既幼不在諸侯齊侯恃强數見侵伐故魯不得已而事之以行父當齊侯宜齊侯弗肯與盟也而曰弗及者恥也内辭也然亦行父奉使失辭謂公有疾致齊侯拒而弗受爾如必待公親自出盟則魯亦安用臣子為哉雖齊侯之意必欲與公盟則使臣當善為之辭可也且受命不受辭者使臣之職也今不能專對則罪在行父矣季文子三思曾是不思何哉夏五月公四不視朔朔者天子之所頒也諸侯上禀天子之命下授萬民之時故其奉王朔告于廟則謂之告朔退而視朝以授民則謂之視朔前此未有書不視朔者若其有疾則亦常事不書爾此特書者見公非有疾而然也盖欲符季孫行父之言使齊侯不疑爾至定哀間子貢欲去告朔之餼羊則見魯君日尋盟會常不在國廢禮多矣然而其禮未亡此孔子所以愛之也六月戊辰公子遂及齊侯盟于郪丘陽穀之會齊侯弗及盟者非特行父奉使之失也晉為魯故會諸侯于扈將以伐齊齊侯賂之遂不果伐于是齊侯欲取償于魯焉至是公使公子遂納賂于齊而復求盟所以得盟于郪丘則有辭矣謂公四不視朔實有疾故也然則春秋書公四不視朔非特譏公之怠亦以見公子遂得盟之因則知此盟非齊侯之所欲故明年齊侯復伐我西鄙僅能少紓而已是以謹而日之秋八月辛未夫人姜氏薨毁泉臺有蛇自泉臺出而聲姜薨故毁之盖譏其妄畏妖祥非民之道也夫泉臺先君之所築也重民力而為之又重民力而毁之不如勿處而已矣楚人秦人巴人滅庸楚率秦巴以滅人之國則秦又聽服于楚矣夫城濮之役秦人在焉自是遂與中國盟㑹而晉襄因殽之役報復不已自是失秦矣夫秦兵之强後世莫及焉使其協和以攘楚且討其弑君父之罪盖有餘力而晉襄反棄秦以資楚此中國所以不振也故春秋前書秦人入鄀此書楚人秦人巴人滅庸以致意焉冬十有一月宋人弑其君杵臼宋昭公立九年不能其大夫國人襄夫人亦惡之乃因其田使帥甸攻而弑之立其弟鮑是為文公其稱人以弑見國亂而無主名者所以儆天下後世之為人君者也不書葬賊不討也不討賊者嗣君之罪也或曰杵臼之死襄夫人為之也雖因國人以首禍豈得遂委之于衆耶夫夫人淫于其國又安能有所為由杵臼失衆之久故能乗間而發若專歸其罪于夫人則杵臼失衆之惡無自而見惟以衆言之則夫人之罪在中矣此之謂善志或曰春秋之世君以無道致禍者衆矣獨杵臼與齊商人莒密州稱人弑何哉天之所廢必若桀紂然以桀之虐民欲與之偕亾而成湯放之猶有慙德以紂之不善億兆離心而文王事之猶不敢違況君罪未至此而輒為賊害之計乎故春秋書弑賊之名所以正臣子之惡凡稱人者所以示人君之戒十有七年春晉人衞人陳人鄭人伐宋宋人弑君而晉荀林父會衞孔達陳公孫寧鄭石楚同討之遂立文公而還夫行天討而反成其亂失天職也故不以卿書昔田常弑簡公孔子沐浴請討之曰以吾從大夫之後不敢不告也況正居卿位大夫之職者乎春秋誅逆亂如魯宣公者與謀也如楚公子比者與事也若宋文公始無弑君之謀終無弑君之逆而天下以為弑君者有其情也今諸國之師不能探其情而無所委罪焉貶而人之不亦宜乎自閔僖以來陳常在衞上今卿會在衛下非上卿故也夏四月葬我小君聲姜邦君之妻君稱之曰夫人夫人自稱曰小童邦人稱之曰君夫人稱諸異邦曰寡小君異邦人稱之亦曰君夫人葬夫人而稱小君者自四方㑹葬者言之故用稱諸異邦之辭也九月而葬慢也不稱僖姜而别為之諡非禮也文公三不與諸侯盟會四不視朔又慢葬其君母則公之怠于國事可知也已齊侯伐我西鄙齊猶以公不親盟復來討焉于此見郪丘之盟無益矣六月癸未公及齊侯盟于穀晉不能救故公竟不免親與齊盟然書公及者是公欲之正其終者商人終欲盟公而肆伐不已一盟而退師公之善意也是以謹而日之諸侯會于扈前書諸侯盟于扈為不能討齊略也此書諸侯會于扈為不能討宋略也宋文定而昭公之賊不討則是輔其亂也故不復列序諸侯見中國無霸主也秋公至自穀穀本齊地僖二十六年公以楚師伐齊取之齊人以是憾魯今公不與扈之㑹而盟强齊于穀苟免齊難而已是可危也且書至自穀則不會于扈可知矣冬公子遂如齊拜穀之盟也公已與齊侯盟而公子遂復往者政在遂故也且見齊侯篡弑而諸侯反畏之如此十有八年春王二月丁丑公薨于臺下臺下非死所不正其終也秦伯罃卒秦雖伯益之後本附庸也僻在西夷自秦仲始大至平王時秦襄始有功于周室列于諸侯賜爵為伯及穆公與于城濮之戰自後與中國交聘盟會遂霸西戎九年來歸僖公成風之禭始與魯通好至是遂書其卒而弔其喪也夏五月戊戌齊人弑其君商人春秋之法弑君之賊以弑君討之則以賊書商人弑君自立至于五年宜加討賊之詞而稱齊人弑其君者齊人恬不討賊皆北面事之遂令商人專行無道而邴歜閻職乃自以私怨殺之故以弑君之罪歸之齊人以誅亂賊之黨且見齊無臣子而商人得遂為君也既君之復弑之則篡弑代立相弑之禍何時而已故雖魯桓篡弑自立聖人不没其罪然亦從而君之名以著商人有以致之也于是齊人廢其子而迎公子元于衞而立之元桓公子也是為恵公六月癸酉葬我君文公慈恩愛民曰文此臣子之私諡也冬十月子卒子者文公之世子惡也子般子野卒皆名此不名何也不忍言也文公夫人姜氏生惡及視其次妃敬嬴生宣公而私事公子遂于是公子遂殺子惡及其母視而立宣公宣公之立與聞乎弑也故子惡雖未踰年未成君聖人不忍名也是時叔彭生死君命何以不書貶也人臣無將將則必誅公子遂之將彭生知之矣昉乎殺子惡而立宣公者彭生為之也是以貶而不書也夫人姜氏歸于齊此書歸者大歸也一去不返之辭也夫亡矣子弑矣而逆賊篡立矣嬴氏為君母矣是夫人有可去之道故自歸于齊焉君子以為姜氏見微者也先書子卒而繼書夫人姜氏歸于齊則知惡及視皆死而夫人無所依矣季孫行父如齊前乎子卒書如齊後乎子卒書如齊齊與聞乎故也所以惡齊也而季孫行父之罪則又不待貶絶而見者按左氏宣十八年公薨季孫行父言于朝曰使我殺適立庶以失大援者仲也夫乃逐遂之族以此驗之行父實與公子遂同弑子惡而立宣公故夫人姜氏歸于齊而行父遽如齊焉惡實齊之甥恐齊人聽夫人之訴而來討于是議納賂以請平焉此見魯國臣子之罪皆不可勝誅也莒弑其君庶其莒紀公生太子僕及季佗愛季佗而黜僕且多行無禮于國僕因國人以弑紀公故稱國以弑專罪嗣君也盖與殺大夫稱國同義春秋稱國弑君者四皆罪其嗣君春秋集註巻二十
