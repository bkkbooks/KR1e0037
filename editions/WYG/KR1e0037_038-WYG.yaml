body:
  text: 春秋集註卷三十八宋高閌撰定公三十有二年春薛伯定卒薛襄公立十三年卒其子比立夏葬薛襄公春秋書薛卒者三而書葬者二不日不月略之也且著其臣子私諡之罪叔孫州仇帥師墮郈魯懲侯犯之難以其險固恐為國患故墮之墮邑而至于帥師是邑之力足以抗也前此未有墮邑之事墮邑亂之至也傳以為是時孔子為魯司冦行乎季孫三月不違曰家不藏甲邑無百雉之城于是乎墮郈墮費蓋以墮郈墮費為孔子之功是不然魯以大夫專國政不臣諸侯陪臣專家政不臣大夫上下循習之所致非一日矣苟欲其不叛在正其本而已矣諸侯正則大夫正矣大夫正則陪臣正矣何城池兵甲之患哉惟季孫叔孫不知出此故墮郈墮費所以譏也而傳反歸功于孔子亦不思之甚矣衛公孟彄帥師伐曹諸侯同叛晉而齊不能一之衛之伐曹亦自適已事而已季孫斯仲孫何忌帥師墮費昔者季氏將伐顓臾孔子曰是社稷之臣也何以伐為冉求曰顓臾固而近于費孔子曰季孫之憂不在顓臾而在蕭牆之内也今焉費叛豈非蕭牆之内歟公山弗擾帥費人以攻魯魯人伐而勝之始墮其城然弗狃之叛召孔子子欲往子路曰何必公山氏之之也孔子曰夫召我者而豈徒哉如有用我者吾其為東周乎孔子之意謂天下叛周矣不狃而叛季氏亦奚足憂而能用我使不狃而興東周是不叛也然則孔子之㫖逺矣仲由所不知也秋大雩因旱祭志僭也冬十月癸亥公㑹齊侯盟于黄結叛晉也故謹而日之十有一月丙寅朔日有食之日食雖有常度亦人事所召有食之者公至自黄以叛晉故危之十有二月公圍成天子令行乎天下諸侯令行乎一國故天子未嘗有伐諸侯者諸侯亦未嘗有伐其國之邑者以其令之則從也春秋之時天下無王而諸侯擅命故有王伐鄭之事陪臣擅國而權在私家故有公圍成之事無復先王之制矣夫先王制國不過千乘都城不過百雉家富不過十乘以此坊民諸侯猶有叛者今費也郈也成也三家之邑也魯國之政在大夫故三家越禮各固其城三桓既微陪臣擅命而恃其城數有叛者故三家亦不能制也乃至屢圍而不克遂師帥墮之叔孫既墮郈矣季氏既墮費矣孟氏將墮成而其臣不服至是公親圍之亦不克墮故經書叔孫州仇帥師墮郈季孫斯仲孫何忌帥師墮費而獨書公圍成若著公之弱甚不能墮成也三子能墮郈墮費而公不能墮成則知公室凌夷而政在三子矣為國家者可不慎于禮哉公至自圍成國内而以圍致者魯蓋視成如敵國矣此制國外重之戒也夫君行而至必書法所當爾也然春秋書至或以㑹或以地或以侵伐蓋以時君輕肆出入無度舉非王命動非民事踰時歴嵗宗社無主朝廷無政畏途之中事變莫測故公行凡一百七十有六而書至者八十有二皆危之也隱公當春秋之始天下之亂未甚故雖有㑹盟侵伐未嘗致也至桓二年及戎盟于唐十六年㑹諸侯伐鄭始于此致焉蓋桓公弑君自立敢外交夷狄又助篡伐鄭踰年始還故危之也莊僖㑹盟最數而無致者時齊侯外攘夷狄内安諸夏屢合諸侯不以兵車故魯君之出無他虞也惟牡丘之盟過三時淮之㑹踰年故致爾成襄之間齊楚爭霸諸侯日尋干戈故盟㑹侵伐鮮不致焉及㑹于蕭魚之後楚雖稍息然中國皆大夫專政魯亦有三桓之患至有敢逐其君而自廢置者故終春秋之世公出罕有不致者此雖伐邑亦致焉可謂危亂之世矣十有三年春齊侯衛侯次于垂葭二君以師伐晉而書次于垂葭者與九年次于五氏同春秋書次者十有三意各有所主不可以例推也晉至定公于是乎失諸侯春秋崇霸主所以撥亂而反之正也其意深矣夏築蛇淵囿大蒐于比蒲築蛇淵囿囿者所以養禽獸以待田獵也今乃蒐于比蒲則囿何為哉魯既叛晉而三桓至是日懼人之圖已故數蒐焉衛公孟彄帥師伐曹衛比伐曹者曹不叛晉故也靈公志在軍旅之事不知以禮為國故亟戰如此秋晉趙鞅入于晉陽以叛據土背君曰叛鞅殺邯鄲午固有罪矣范中行氏特以姻親之故興師以攻鞅故鞅入晉陽以拒之因興晉陽之甲託辭以逐君側之惡而不知投鼠忌器之義雖曰不要君吾不信也故聖人正名曰叛以著其不由君命而專土興兵之罪然鞅入晉陽由范中行氏始禍不書者亦以入朝歌叛為重故也晉政如此何以主諸侯耶冬晉荀寅士吉射入于朝歌以叛二子因攻趙氏幾亂公室鞅既奔晉陽荀躒言于晉侯請皆逐之二子反以兵攻公不勝遂入于朝歌以叛以趙鞅之罪較之則二子之情尤為可恕晉趙鞅歸于晉此蓋二子既出晉侯自謂趙鞅保其邑以違荀范之難實非叛者故許之歸也先儒以歸善辭遂遂謂鞅有叛迹而無叛心春秋先正其罪以厲臣節此許其歸以廣君恩是不然叛者人臣之大惡也脱使鞅所以初入晉陽本拒范中行氏而非有叛君之心然人臣無君命輒據土興兵此豈可赦乎使後世亂臣賊子敢稱兵犯闕以除君側惡人名名而實欲脅君奪權者皆先儒啓之也可不辨乎況衛孫林父亦書歸爾何善之有薛弑其君比始志薛故見魯之衰矣稱國以殺者罪在嗣君也蓋惠公夷嗣立十有四年春衛公叔戍來奔衛趙陽奔宋趙陽者公叔戍之黨也戍富而驕衛侯惡之又將去夫人南子之黨反為夫人所愬并其黨逐之此自取之也故以自奔為文二月辛巳楚公子結陳公孫佗人帥師滅頓以頓子牂歸頓子欲背楚事晉而絶陳好故楚與帥師師滅之不别以歸何國者明楚陳以滅入國為重而頓子以不死位為重也陳公孫佗人專兵以助強楚滅諸侯之國又執其國君歸縱或歸于楚其罪等爾故謹而日之蓋春秋但從重而論不必見其所歸之國也頓子見獲故生名之夏衛北宫結來奔公叔戍之故也衛靈之無道也沈耳于閨以奔其世臣又及其所與是以其國聽之也五月於越敗吳于檇李吳子光卒敗吳者憂辭也曷憂乎諸夏微而楚張楚微而吳張吳張而於越爭於越而能敗吳雖曰蠻夷自斃而中國則可憂也其憂奈何王室不綱霸者不作而蠻夷交熾諸夏之憂也吳伐越越使罪人詐吳而敗之于檇李吳子光傷而卒按吳敗六國之師書胡子髠沈子逞滅此不書吳子光滅何也吳子傷而自卒于陘非若沈胡二君即死于兵也于是光之子夫差立而不忘報父讎光亦稱闔閭觀闔閭玩兵滅身亦可以為殘民滅國者之戒公㑹齊侯衛侯于牽牽衛地三國同救范中行氏兵襲晉而經以㑹書者惡其襲霸主也公至自㑹不以牽致三國㑹故也㑹則以地致且惡不襲晉也秋齊侯宋公㑹于洮宋亦叛晉矣天王使石尚來歸脤古者以脤膰之禮親兄弟之國蓋國之大事在祀與戎祀有執膰戎有受脤脤者宜社之肉也盛以脤器故謂之脤以賜同姓之國者所以同福祿也周自王季子來聘之後王命不復加于諸侯今敬王有事于社魯未嘗有敵王所愾之功而天王使石尚尚忽為是舉雖天子損禮之甚是猶有盛王之意也聖人于周眷眷如此故使使歸脤以見焉曰天子之在惟祭與號而已衛世子蒯聵出奔宋蒯瞶為南子所譖而出奔春秋不去其世子者著衛侯之罪也南子之惡亦已甚矣其欲害世子之意亦已明矣而靈公信其譖言不亦蔽乎雖然瞶蒯則不能無罪者也其罪奈何人子之處頑嚚則有道矣不至于以弑見誣也此亦蒯瞶有以致之也衛公孟彄出奔鄭比年志公孟彄帥師此衛國用事之卿而靈公疑其為蒯瞶之黨逐之非其罪也夫衛國一嵗之中其卿大夫凡出奔者五人而衛侯獨與南子處此靈公之無道也宋公之弟辰自蕭來奔辰懼洮之謀來奔魯故復書宋公之弟存其本心所以罪宋公也大蒐于比蒲邾子來㑹公大蒐皆不書公者非公所主也三家者以公為名而行其私意也下書邾子來㑹公則知凡蒐狩皆與衆共之雖不言公公在焉可知也然則公狩于郎公及齊人狩于禚皆特書公何也此又専罪公也比蒲之蒐三家之事故特言㑹公以别之此與莊二十三年蕭叔朝公同蓋未嘗期約因來朝而偶與公為㑹耳城莒父及霄公叛晉助范中行氏故懼而城此二邑也此年不書冬無所終也公元年無正至是而著無所終者次年哀受之也十有五年春王正月邾子來朝去年所以㑹公比蒲者欲因來朝正故也邾之微弱可知矣鼷䑕食郊牛牛死改卜牛不言食角所食非一處也夫魯不當郊郊牛死傷廢郊可也而改卜牛是違天也二月辛丑楚子滅胡以胡子豹歸昭二十四年胡為楚伐吳吳敗其師而殺胡子髠于是豹立而背楚遂與諸侯㑹于召陵以侵楚吳之人郢也胡子盡俘楚邑之近胡者楚人至是滅之而以其君歸所謂國必自滅而後滅之也也故楚子稱爵而胡子稱名又謹而日之夏五月辛亥郊昔者成王以周公為有勲勞于天下命鲁公世世祀周公天子之禮樂是以魯君孟春乘大輅載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也然則魯郊當在孟春今以改卜牛在滌三月故至五月乃郊非禮可知矣壬申公薨于高寢高寢非死所不正其終也嗟乎定公立十五年豈不欲政自己出權不外奪乎而卒不能者以其愚蔽故季氏立之爾夫季氏藉祖父之勢僭有國柄一旦制在陽虎僅而脱禍公不能乘其衰微尊任聖賢以自固則公之愚蔽可知矣是時季孫創艾禍難勉用孔子而齊人章章歸其侵疆則公與季氏豈不知聖賢之可以安國而取榮焉卒之齊人歸女樂君臣共觀之遂廢朝事而孔子行蓋公之愚蔽如此鄭罕達帥師伐宋齊侯衛侯次于渠蒢左氏謂謀救宋而不果然其文意乃與五氏垂葭同邾子來奔喪天王崩諸侯未有奔其喪者今來奔魯喪可乎特畏三家之強而求説于魯耳秋七月壬申姒氏卒姒氏乃定公之妾而書者蓋以其為哀公之母而以夫人之禮喪之故也然哀公乃未踰年之君則其行喪禮不可加于母子未成為君故母亦不隨例稱夫人八月庚辰朔日有食之日食雖有常度亦有事所召有食之者九月滕子來㑹葬此亦畏三桓故爾于定公何有哉丁巳葬我君定公雨不克葬戊午日下昃乃克葬安民大慮曰定此臣子之私諡也雨不克葬譏不能塟也塟不為雨止而不克葬者見無備之甚也義見宣八年然彼言日中而克葬此言日下昃乃克葬日中則裕于昃矣日下昃則失虞之時甚矣君子之于親不忍一日離也故葬日虞者所以寧親也乃者難乎而之辭乃克葬者所以重孝子之情也辛巳葬定姒春秋自成風後妾母皆僭稱夫人譏不正也此不稱小君以子未成君故母亦未成夫人但以夫人之禮葬耳然魯夫人之葬未有加以其君之諡者此妾也而加以其君之諡非禮之甚也況襄四年葬我小君定姒是襄公之母也又豈可同諡乎冬城漆漆非魯邑邾庶其以之來奔者魯受叛人而取其地今將伐邾故又勞民城之以為備譏其非所當城而城也夫國再大喪始葬又勞民如此所謂不待貶絶而罪惡自見者也春秋集註卷三十八
