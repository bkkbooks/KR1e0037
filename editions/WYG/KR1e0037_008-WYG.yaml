body:
  text: 春秋集註卷八宋高閌撰莊公一元年春王正月公上不受于天子而父以弑逆得位又不以其道終無所受之故不書即位者不正其始也或曰莊公嫡長其為儲副明矣乃不可即位乎曰諸侯之嫡子必誓于天子而後稱世子世子又必命于天子然後為諸侯安得擅有其國而自即諸侯之位耶三月夫人孫于齊魯君及夫人出奔聖人皆婉其辭而書曰孫孫者謙避之名若内不見容而去不復返也若昭公哀姜是已今夫人往來于齊魯之間數矣此豈出奔也哉盖夫人嚮與桓公如齊公以故遇禍今及練期又不奉其祭祀遽出境以從讎其無恩于先君甚矣男女辨姓人之大倫夫人之行無人倫矣故聖人因其如齊特去姜氏而書曰孫盖嫉之之甚也其不替夫人之號者示子無絶母之義也是時公年十有四矣齊人旣歸惡于彭生而魯之大臣往往畏齊且以夫人之故不敢明言于公而公亦未之察焉所以公與夫人母子如常而夫人數如齊公亦數與齊侯會而不知其惡已播于萬民矣夏單伯逆王姬王姬下嫁諸侯禮雖不傳而以義推之諸侯固當躬至京師天子置館命同姓之尊者行賓主之禮然後逆姬歸本國此亦男下女之義也今齊旣不朝王又不親迎而魯之單伯反往逆之盖莊王命魯主婚故也魯之先君為齊所弑不能訴于天王已無臣子之道且天王豈不知魯有大喪自可因而辭之乃遽使單伯往逆焉在諒陰之中而修嘉好之禮廢經常之事而為創見之舉天下固多同姓之國矣何必在魯是魯人默順王命陷王于不義也春秋恕天王之過而責魯尤深故不書單伯如京師而直書單伯逆王姬猶曰魯自逆之耳秋築王姬之館于外特為王姬築館者以公為之主則不可于公之寢又不可于魯之廟故特築館以逺嫌也且夏逆而秋築館又見前逆之為太早計矣于外者不在魯國宮廟之内也冬十月乙亥陳侯林卒陳莊公初立正在桓王時至是卒王使榮叔來錫桓公命禮諸侯嗣位三年喪畢以士服朝天子天子錫之黼冕圭璧然後歸以臨其民謂之受命桓以篡弑未嘗入朝未嘗受命今王命魯主婚故追錫桓公以寵之夫寵篡弑以瀆三綱是無天道故去天以示貶或曰天王之惡莫斯甚乎曰春秋之義以明微也殺弟及出居則覩文而見義至于錫桓公命則廢大義滅人倫與葬成風同盖臣弑君妾僭嫡而王尊禮之若不異其文則無以見其惡且魯桓已葬矣因魯之自諡而錫之尤為非禮王姬歸于齊夏逆秋築館而冬始歸所以遲遲者魯知其不可又以夫人之故不能自克故也且書逆書築館而不書歸則無以見其事之終矣姬不稱伯季尊王姬也紀季姜特書者以王后故謹其辭也齊師遷紀郱鄑郚此紀三邑也邑不言遷遷不言師其以師遷之者見紀民猶足與守齊特恃衆迫而遷之且見紀力不贍猶謀所以存國也夫紀與齊乃同姓之國況天子娶后于紀而王姬又歸于齊豈無親親之愛今乃背黃之盟一舉而遷三邑盖自是遂滅紀矣二年春王正月葬陳莊公因魯往會而著其國臣子私諡之罪夏公子慶父帥師伐於餘丘據二傳於餘丘邾邑也邑而曰帥師伐者誌慶父之得兵權故大其事若一國然也莊公幼年即首以慶父主兵柄卒致閔公之禍故於餘丘法不當書聖人特書之以誌亂之所由為後世戒也魯在春秋中君弑者三其賊未有不得國之兵權者盖慶父翬遂是也秋七月齊王姬卒檀弓記齊告王姬之喪魯莊公為之大功或曰外祖母也故為之大功或曰由魯嫁故為之服姊妹之服夫莊公忘父讎而為之主其婚今未及朞而卒又從而為之服可謂盡禮于仇讎而無恩于先君也冬十有二月夫人姜氏會齊侯于禚夫人孫而反國不書者魯人不受也不以夫人録也不以夫人錄而此夫人之者子母之義也夫人而氏之者貶不再也是時公幼未習國事故夫人得以託國事而出會齊侯也乙酉宋公馮卒觀宋莊忮求敗類則穆公之不以其國與子有以知之矣三年春王正月溺會齊師伐衞穀梁子曰此公子溺也其不稱公子何也惡其會仇讎伐同姓故貶而名之也夫衞朔出奔齊齊人欲納之然天王已絶朔而立公子黔牟為侯矣魯輒興兵會仇讎之人抗天子之命納不義之君其罪大矣為人臣子而所為如此故貶而名自公孫兹不貶矣原註事在僖公四年夏四月葬宋莊公因魯往會而著其國臣子私諡之罪五月葬桓王平王之崩求賻于諸侯然後克葬至于桓崩七年乃克葬者盖承諸侯背叛王師傷敗之後力益不足矣夫以天下而葬一人安可緩也聖人書之以著天下臣子之罪也若曰改葬則聖人明書之矣自莊王以後王室益弱無有以緩葬書者而有速葬者抑以禮滋略歟秋紀季以酅入于齊齊強國也圖紀久矣而紀謀所以存國之道亦備矣今紀侯自度滅亡無日天王必不能正鄰國必不能救與其絶祀殘民生受屈辱孰若使季以酅為附庸以事齊庶幾宗社之不隕也此從權以紓一時之禍不得已之甚所以謀存其國可謂切矣槩以王法則紀季擅以天子封邑入于齊齊侯不由天王之命納人之邑均有罪也故書入以示義季不書叛已原其有兄之命矣而又字之何也明其為紀侯之異母弟也且析地而去國降志以事讎此非紀季之心也以宗國為寄矣聖人恕紀季而重罪齊侯也冬公次于郎郎我地之近齊者夫紀魯婚姻之國也今齊欲滅紀先遷其三邑而季又以酅事之其國􅂷亡而公以伯姬之故雖有救紀之心而不能決往但次于郎以示相親恤之意而已聖人以其終不能救也故但書公之所次若無故而自出者焉且魯與齊有不共戴天之讎苟能救紀抑齊一舉而兩善併矣是以聖人惡其見義不為也四年春王二月夫人姜氏享齊侯于祝丘按禮姑姊妹女子已嫁而反兄弟不與同席而坐況兩君相見之禮非夫人所用也非夫人所用而用之者盖為名而已矣名為紀故而享齊侯實乃行其私意也然春秋之法責婦人輕觀猗嗟載驅南山之詩亦豈嘗専刺文姜哉唐之武后非無才智也使高宗能刑寡妻以御家邦則武后之惡未必至斯也以高宗身不行道是以至于此三月紀伯姬卒外夫人卒不書豈以紀滅亡而伯姬憂憤所致故歟然此不記其卒則無以見下文之義夏齊侯陳侯鄭伯遇于􅂷齊將滅紀恐陳鄭救之故求于二國結其驩心先遇于􅂷使紀失其援也此鄭伯即突也或以為子儀則非也忽雖世子其出奔猶不得稱子其復歸猶不得稱爵以其實不能君況子儀雖乘間得立其為君微矣豈敢輕去國都而與諸侯會乎故知此書鄭伯即突也其始終稱伯不沒其實也雖有篡兄之惡君子以其納王之功盖之矣紀侯大去其國大者紀侯之名也生名之著失國也按齊之圖紀固非一日先以兵遷其三邑志固在于滅矣紀量力之不支無以為計遂使季以酅事之夫紀地不過百里而去其四邑則地幾盡矣今齊方與陳鄭遇兵未加于其國而紀侯不暇葬其妻遽委之而去此何理哉夫為國君者死社稷不以難去今紀無内難但為齊所逼而敵猶未至境也借使齊以兵臨我猶當勵其臣民固其禦備而為之守上訴于天子近赴于鄰國求我之援不幸而力不足則亦死之可也惡有先自委其國而去之者哉先儒以太王之事擬之過矣太王為狄所侵雖不得已而去亦非敢自擅也在詩有曰古公亶父來朝走馬率西水滸至于岐下爰及姜女聿來胥宇盖先奔告于天子然後邑于岐山之下故民從之如歸市也今紀與齊同為天子守土之臣而齊人亦豈以狄人自待哉春秋之作所以明微齊之滅紀其惡易見紀侯之去其罪難知是以聖人不書齊侯滅紀而専罪紀侯之去也先儒以齊襄復九世之讐春秋大之此尤害教之甚矣復讎乃亂世之事況以九世乎漢武帝因此而雪平城之恥興大兵伐匈奴連歲不已天下彫弊戸口減半嗚呼不達春秋之㫖而貽萬世之禍者其此言也夫六月乙丑齊侯葬紀伯姬齊襄以紀侯自去其國非我顯滅之故葬紀伯姬以示已之恩以盖其迹甚矣齊人之多詐也其容紀季似義其葬伯姬似仁聖人皆不沒其實焉凡書葬者臣子之事今斥齊侯則非所葬而葬適所以為愧而以伯姬為義弗受也且紀侯畏禍迫己急于去國雖其妻在殯亦不暇葬魯實伯姬父母之國旣不能救其國之亡則當往而恤其喪乃畏不敢前反使齊侯假以為名聖人亦以此罪魯所謂文起于彼而義見于此也春秋書紀之亡見聖人有眷眷不忍之意焉秋七月一時無事書首月存天道王法也冬公及齊人狩于禚父母之讎不共戴天此言公及齊人者即齊侯也貶而人之惡其賊吾君之父通吾君之母也夫齊侯自元年以來見于經者數矣何獨于此焉貶曰前此欲著文姜襄公宣淫而無忌憚文勢不可云齊人今因與公狩始得一貶也莊公父為齊侯所殺母為齊侯所通而乃越境逺出而就之狩且狩以奉宗廟者也與人共之猶且不可況其親之讎乎為人子而忍情如此故不沒公而書及所以深罪之五年春王正月一時無事書首月存天道王法也夏夫人姜氏如齊師會非也享甚矣如又甚焉會享猶假禮而行也如則無名焉況齊侯在師中而夫人如焉不書地者師之次止無常也二人者宣淫于衆殊無愧恥矣盖自是夫人之出無復以月日紀也秋郳犁來來朝先王之制諸侯有相見之禮無相朝之義而諸侯見諸侯自稱曰朝者謙詞也非禮之正也故春秋書朝者皆兩罪之也今郳犂來特邾之别封最為微弱而能親附大國厥後數赴中國諸侯之㑹王命以為小邾子盖于此已能自進于禮矣昔子服景伯蠻夷邾莒則郳又其陋者也而能自進于禮如此詩曰出自幽谷遷于喬木如齊魯宋衞以列國為天下望而日以敗亂盖有愧于犂來矣攷經文上下所書無復有人之大倫故書郳之來朝相形于中以示譏焉冬公會齊人宋人陳人蔡人伐衞衞朔譖其兄使至于死而盜其位此其罪大矣然而以其父命之諸侯莫得而討也天王治其舊惡而廢之斯得宜矣而諸侯乃舉兵強納之悖抗王命不臣之甚故貶而人之貶諸侯則魯在其中矣不言納朔而書伐衞者衞亦拒王命納朔故也六年春王正月王人子突救衞此見王命不行乎諸侯也夫衞朔有罪王命絶之而諸侯乃共納之是逆王命也王人雖微以王命救衞而稱其字是善之也善子突則以尊王命故也尊王命者所以重諸侯之罪也然子突討則不能服救則不能定春秋曷為善之曰天下方亂賤奪貴少陵長而天子不能禁者凡以綱紀失而賞罸不明也幸而發憤赫然以誅衞為事而諸侯同類相黨上逆天子之命前雖貶而人之猶未足以著王所為之是也故復託正于子突子突正則王正矣然子突以辭直之師不能勝黨惡之諸侯亦可醜矣是以不書天王之使子突也雖然王者有征而無救書救已見王室之微矣字王人而人四國則公之惡又從而可知也夏六月衞侯朔入于衞始朔出奔名者以王命絶之也今入于衞名者其位已絶又藉諸侯之力抗天子之命強入其國故也入者篡辭以其逆王命故也王命天命也天其可違乎違天逆理故朔終始名以重絶之而諸侯之罪亦不容于誅矣夫諸侯之罪旣不容誅則子突不能救衞從可知也朔旣入衞黔牟遂奔京師秋公至自伐衞螟螟食苗心者以災故書冬齊人來歸衞寶案經文公穀作寶左氏作俘此從公穀此春秋結正諸侯之罪也初朔之奔也齊侯容之其入也又齊侯連諸侯納之故朔賂齊以其所寶而齊侯不自以為功又以分三國焉故主齊言之而曰來歸衞寶則同黨之罪各有所歸而齊其首誅也左氏以寶為俘俘軍獲也軍獲則非受衞朔之賂矣春秋集註卷八
