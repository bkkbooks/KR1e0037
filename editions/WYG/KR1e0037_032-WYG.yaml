body:
  text: 春秋集註卷三十二宋髙閌撰昭公二七年春王正月暨齊平齊魯世為婚姻至襄公時齊靈數侵伐魯自是盟好中絶及景公一使慶封來聘而不書報非無報使也著有餘怨然魯方附楚而齊亦方與楚睦故齊自伐北燕還求平于我而公將朝楚亦懼齊之議其後是以與之平故書曰暨暨與也不得已也齊欲平而我與之之辭也齊强魯弱葢魯之所願而曰我與之者所以抑齊之强而伸魯之弱也故不言會齊平又不曰齊及我平而特書曰暨也三月公如楚楚子成章華之臺使薳啓彊來召公落之公于是朝于楚夫楚靈非强君也數會諸侯焉皆其微者又且多叛而吴人之闚未艾也亦奚庸必朝哉蓋晉平不能修文公之業使我不能自安而玉帛驅馳歲不遑暇以是知王室不綱而霸主猶有功于諸夏也叔孫婼如齊涖盟以暨齊平故婼往涖盟也涖者我欲之以朝楚故結好于强國也昭公自是遂以善齊故孫于陽州卒以齊為寄夏四月甲辰朔日有食之雖有常度亦人事所召有食之者秋八月戊辰衞侯惡卒衞襄公立九年庶子元立是為靈公按元年曰衞齊惡此曰衞侯惡何為君臣同名也古者生不諱名既死卒哭乃諱之然君子不奪人名不奪人親之所名重其所以來也事親者不以存沒生意故不變也人之背死忘先者皆為利害所變者也是以聖人禁之後世以君名之故而聽臣下易名者猶之可也或以私嫌而改賜人臣名字則尤非禮矣九月公至自楚自公如楚今半歲餘冬十有一月癸未季孫宿卒此季孫行父之子季武子也其子紇嗣十有二月癸亥葬衞襄公襄公之卒晉反戚田王有追命此可以蓋獻之愆矣故卒葬皆曰承天寵也亦因魯往會而著其臣子私諡之罪八年春陳侯之弟招殺陳世子偃師此陳公子招也其曰陳侯之弟招殺陳世子偃師者正其天倫之次所以甚招之罪且以見陳侯寵其弟假之以權致此禍也陳哀公三子太子偃師次子留次子勝留有寵屬諸公弟招招専陳國之政與大夫過皆愛留欲立之哀公疾招遂殺偃師而立留夫留庶孽也偃師冢嫡也招以叔父之親専國之政而不顧宗社之重殞冡嫡以立庶孽致楚滅陳皆陳侯屬之之由故書陳侯之弟招殺陳世子偃師以罪之且見其骨肉相殘也夏四月辛丑陳侯溺卒陳侯以廢疾不能討殺世子之賊因自縊而死夫楚觀從納公子比而靈王縊春秋謂比弑其君陳侯之弟招立公子留而哀公縊春秋不謂留弑君何也比之立無君者也靈雖不縊亦不與比並存是靈王之死由比也招之立留由君之廢也且君有命哀雖不縊亦不可以君國是哀之死不以留也君臣之間生死之際善惡之嫌賞罰之别大矣聖人所以正其名也哀公立三十五年公子留遂立叔弓如晉前年楚成章華之臺召諸侯落之至是晉成虒祁之宫而諸侯遂皆往賀之晉之效尤如此霸業之不振宜哉楚人執陳行人干徵師殺之招殺世子而陳侯死干徵師赴于楚且告立公子留楚執而殺之春秋貶楚稱人又稱干徵師曰行人蓋罪其殺使者也雖然干徵師為告喪之使不告于天王反赴于楚雖楚不當執而殺之然其死也亦宜哉故春秋書之與慶封同陳公子留出奢鄭恐楚人之來討故也留既為君矣不曰陳留者立非其正位未定也與楚公子比同且偃師曰世子留曰公子别嫡庶也春秋明微大率如此秋蒐于紅備楚故也夫蒐非春事也紅非蒐地也況當旱歲乎蓋蒐者簡車徒也凡魯車徒之賦三家分而有之則蒐田振旅非公政也故不書威靈失矣自五年舍中軍始也接傳紅亦大蒐而不曰大者以無君故微之首一見也書紅之蒐間陳之亂以類比義皆由辨之不早辨也書蒐自此始陳人殺其大夫公子過招専歸罪于過而殺之以説于楚其不書招殺而書陳人者過亦有罪故稱人以殺且見陳之亂未有君也招雖殺過不足以贖然楚人竟受其欺放之而已大雩因旱祭志僣也冬十月壬午楚師滅陳春秋之書滅者惡之甚也稱師者見其恃衆也楚以蠻夷而數興師以滅中國之諸侯者實由陳侯骨肉相殘以致然嗟乎陳背中國而即荆楚乃卒為荆楚所滅深可為後世之戒故謹而日之執陳公子招放之于越殺陳孔奐葬陳哀公陳國之亂中國不能正之遂使楚藉口以為討而滅之由是楚益恣横率情妄行如公子招者死有餘罪反宥而放之蓋招之所以自免者以歸罪于公子過也孔奐雖招之黨乃獨殺之其曰執陳公子招曲辭也殺陳孔奐直辭也楚乘人之亂滅人之國釋其首惡又誅其黨又奪取哀公之殯而葬之使陳之臣子不得盡禮于其君夫楚靈豈可以禮義責之哉罪中國不自正而致楚之恣爾春秋書殺他國之大夫者四皆楚人殺之而中國未有書殺之者此見楚人暴虐之甚故哀公之葬以中國自葬為文所以深惡之且使楚子欲求名而不得也楚害至于此由宋向戌之謀也九年春叔弓會楚子于陳夫中國諸侯而為荆楚所滅中國既不能救亦宜同心疾之奈何反使大夫往聘問耶書會于陳與宣十五年會于宋同義觀去年叔弓如晉之事知晉之不競有以使天下之歸楚矣許遷于夷此楚遷之也許以畏鄭復求遷于楚故以自遷為文陳滅許遷皆中國無霸之禍也夏四月陳災陳雖為楚所滅而土地居民猶在焉聖人不與楚滅之也故還繫之陳如邶鄘二國既為衞所幷聖人還存邶國鄘國之風蓋不與衞人幷諸侯而存天子之建國也夫陳之社稷為楚所滅今其人民又被火災天下諸侯莫之能救春秋存亡國繼絶世王道之大者也秋仲孫貜如齊自叔老聘齊至今二十年復修舊好此暨齊平之故也齊平而不志來聘則著齊志輕公非特居鄆之時也其來久矣凡經略不書者各比其事以見情也冬築郎囿文王之囿方七十里何可築也公内制于强臣不此之念而逺築郎囿非特𠞰民也芻蕘雉兔者皆不得往怨有所歸矣十年春王正月一時無事書首月存天道王法也夏齊欒施來奔欒施與髙彊以兵攻君宫欲挾君以伐陳鮑遂與君戰不勝而出奔此其罪大矣春秋不書髙氏非卿故也魯方通齊而受其奔亡之臣非義也秋七月季孫意如叔弓仲孫貜帥師伐莒向也舎中軍矣今也合紏師徒三卿並將大夫始張自案之役而卒極于此是時魯間晉之衰故三卿帥師同伐莒見疾莒之甚欲一舉滅之而三卿擅以為已功也此年無冬著不克終始以此夫戊子晉侯彪卒晉平公立二十六年其子夷立是為昭公九月叔孫婼如晉葬晉平公不及期而薨簡也卿會葬非禮因著其臣子私諡之罪十有二月甲子宋公成卒不書冬義見上宋平公立四十四年卒其子佐嗣是為元公十有一年春王二月叔弓如宋葬宋平公卿共盟主之葬猶可言也卿共同列之葬非禮甚矣因著其臣子私諡之罪夏四月丁巳楚子䖍誘蔡侯般殺之于申此惡楚子誘殺中國之君故謹而日之也蔡般弑逆之罪雖以公義當討而楚子誘而殺之跡雖近義而意實藴姧聖人恐後世以楚之殺般為討有罪故特名楚子以明不然蓋楚子亦弑逆之賊也以賊討賊何辨曲直況般之弑君天子不誅方伯不問今十有三年矣而蠻夷弑逆之賊反來討之此罪中國也況楚子者非直治般也志在滅蔡者也故春秋書楚子䖍蔡侯般同斥其名以見其罪同而蠻夷乃敢誘殺中國之諸侯也不曰戕而曰殺者又見般之罪宜死也楚公子棄疾帥師圍蔡楚之君既誘殺中國之蔡侯而楚之臣又帥師而圍其國必期于滅蔡也夫楚滅陳易滅蔡難此書圍蔡者般出會而世子有守尚能拒楚且望中國諸侯之救也五月甲申夫人歸氏薨大蒐于比蒲備楚故也僭天子之制也十年書蒐此書大蒐見三家益强車徒日衆也夫蒐雖素定然公以夫人之喪不自臨也而大蒐不廢則是三家者以馳騁田獵間君喪也仲孫貜會邾子盟于祲祥始也公及邾儀父盟于蔑公及邾儀父盟于趯是魯侯親與之盟會今公雖以夫人之喪使仲孫貜會邾子盟于祲祥要是大夫與其君盟會爾然則邾子之更為强弱斷可知矣雖與邾盟以修好然而魯人之志必欲滅邾而後已此盟豈可信耶後書可見秋季孫意如會晉韓起齊國弱宋華亥衞北宫佗鄭罕虎曹人杞人于厥憗楚師在蔡諸侯將謀救蔡而不能也故不書救蔡夫蔡能堅守不下此其勢易助也而晉合天下之兵畏不能救遣使請命示以不能使楚益驕有以量中國之力而卒取之此韓起之罪亦以宋之盟故也卿不足書而書之者中國不競苟有善意斯存之矣自是春秋記事益略鮮有深譏重貶者蓋不復以禮義繩諸侯之君臣矣間一見之者存不忍棄之仁也九月己亥葬我小君齊歸妾母而以夫人之禮薨葬又别為之諡從先君之例也冬十有一月丁酉楚師滅蔡楚子滅陳蔡皆稱師者著其無道恃衆强滅之也雖滅之不與其滅也故有存之之辭焉四月圍而十有一月方滅者世子有之力也執蔡世子有以歸用之滅國而用世子有者怒其拒師之久也用之者以為牲也夫蔡本中國之諸侯乃背中國而即楚必以楚為可恃也今蔡侯既為楚所誘而殺之又從而滅其國其世子有又為所執而虐用之以絶其世然則楚何補于蔡哉此萬世人君之戒也蔡侯已死而有稱世子何也未得乎立也般誘死則外亂國被圍則内急外亂内急喪柩未至則世子固未得乎立矣而能拒强楚者三時不改真所謂世子也不言以世子有歸者有不從楚故也斯得古人不共戴天之義矣楚子誘人君而殺之乘人之喪而滅之執其嫡嗣而歸用之不道之甚聖人所以詳録之非専罪楚也乃所以罪吾中國王綱既墜霸統又絶諸侯莫能救致楚之自恣一至于此也然則宋向戌之謀實何利于中國十有二年春齊髙偃帥師納北燕伯于陽三年北燕伯欵出奔齊六年齊將納之而不果欵播越在外蓋十年矣不能自復而藉齊之力僅能納之别邑而已其失國難反如此可以為公戒矣名其出奔而不名其納者方其出奔已自絶其國矣此不名者罪其國之臣子也三月壬申鄭伯嘉卒鄭去中國即楚久矣至于簡公乘晉悼之方興以國反正遂息諸侯之兵子産相之薰然慈仁在位三十六年民蒙其澤蔚為春秋之賢諸侯其子寧立是為定公夏宋公使華定來聘宋元公即位公始以卿共平公之葬故宋來聘之且通嗣君也公如晉至河乃復晉昭公嗣位公徃朝焉公四如晉皆至河乃復穀梁子曰季孫氏不使遂乎晉也左氏謂伐莒之役莒人愬于晉晉有平公之喪未之治也故辭公蓋託辭爾五月葬鄭簡公因魯往會而著其臣子私諡之罪楚殺其大夫成熊楚子謂成虎若敖之黨也或譖焉成虎知之而不能行遂殺之懐寵也楚殺大夫義見僖二十八年秋七月一時無事書首月存天道王法也冬十月公子慭出奔齊季氏之臣南蒯將去季氏而立慭不克而以費叛慭遂奔齊是以君子譏其妄而哀其志也楚子伐徐徐吴姻國也楚人疾吴故遷怒于徐既執其君又伐其國也晉伐鮮虞春秋之法夷狄舉號蓋賤之也諸侯稱國蓋狄之也據左氏載荀吴偽會齊師者假道于鮮虞遂入昔陽夫崇信明義中國之道也懐利尚詐夷狄之道也楚奉孫吴伐陳因而滅陳誘蔡般殺之因而滅蔡晉人視其殘虐莫之能救則亦已矣而反效其所為以伐人國是悖中國之道而行夷狄之事故以夷狄書之況楚靈不道既滅陳蔡今方伐徐晉為盟主又坐視而不救若力不能君子不責也能伐鮮虞而不救徐非力不能也棄中國也如此則與夷狄何辨哉鮮虞姬姓蓋晉同姓之國也春秋集註卷三十二
