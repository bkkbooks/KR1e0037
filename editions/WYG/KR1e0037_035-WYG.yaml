body:
  text: 春秋集註卷三十五宋髙閌撰昭公五二十有六年春王正月葬宋元公三月而葬簡也且魯往會著其臣子私諡之罪三月公至自齊居于鄆入魯境故書至猶在外故書地公雖不得至齊然得見齊侯故書曰至自齊凡公行反而告廟則書至在外雖不告而書至者所以存公也公有朝廷不能居之反為季氏所逐今出居于外又不能告赴于諸侯以誅絶其亂臣賊子但假齊侯之力取鄆而居之亦可憐哉夏公圍成春秋未有以兵自圍其國之邑者也成乃吾孟氏之邑而公自圍之若異國然公之失政可知也時齊侯將納公反惑幸臣之説使公子鉏帥師從公圍成不書公以齊師伐成者惡齊受季氏之賂而有異志焉雖得其師不足以也故獨舉公以為重且見國内皆叛公也嗚呼君失國臣叛君春秋書公圍成而意在是矣秋公㑹齊侯莒子邾子把伯盟于鄟陵公失國而㑹諸侯者何求入也求入不能主晉而主齊故齊侯矯為此盟以莒邾把皆魯之與國故也惟齊侯不信雖謀納公而不能是以此盟不日不月不為信辭也公至自㑹居于鄆以㑹致者見魯之臣子以諸侯欲謀納公不急助之反使吾君棲棲然復居于鄆也九月庚申楚子居卒楚平王也立十三年其子軫立楚子卒義見宣十八年冬十月天王入于成周尹氏召伯毛伯以王子朝奔楚立王子朝獨書尹氏而奔楚并舉召伯毛伯者明罪本于尹氏先治其逆首而後治其從也二十三年先書天王居于狄泉而後書尹氏立王子朝此年先書天王入于成周而後書子朝奔楚者由嗣君不自正故亂臣得以乘之及能反正然後罪人竄迹皆上之人有以召之也書奔楚者見天王之令不行于天下故逋逃罪戾之人楚敢受之而不歸也二十有七年春公如齊公至自齊居于鄆公至自齊居于鄆者二至自㑹居于鄆者一至自乾侯居于鄆者一書至書居不外公也我君故也君播越于外不得其所而魯國臣子之義可絶乎春秋之作明君臣也君臣之義明而天下安且治矣夏四月吳弑其君僚此公子光弑之也吳王夀夢四子長曰諸樊次曰餘祭次曰夷昧次曰季札季札賢欲立之札不可于是兄弟更將以次傳國于季札季札終辭不立則諸樊之子光以嫡孫當立而夷昧之子僚乃以父故遂繼立焉于是光弑之而立也不直書光弑者光既以嫡孫嗣立故舉國以弑舉國則光罪在其中矣然則春秋不專罪光乎曰季子之言春秋之㫖也季子曰爾殺吾兄吾又殺爾是父子兄弟相殺終無已也聖人度義之輕重與時推移故湯武之事不以為非然有湯武之志則可也或曰光之志亦可取乎曰篡已成矣春秋成其為君爾猶齊桓晉文本志豈專為天下哉然功及于天下故聖人成其為霸光愈于篡而亂國者也桓文愈于不善而無功者也春秋彼善于此則取之爾楚殺其大夫卻宛卻宛直而和國人説之費無極譖于令尹子常而殺之以其君不明故臣得以專其威以至殺其大夫而莫之止故舉國以殺義見僖二十八年秋晉士鞅宋樂祁犁衛北宮喜曹人邾人勝人㑹于扈此㑹本于戍周也戍周者以朝在楚故也而魯卿不㑹者諸國因謀納公故也晉人取貨于季氏遂弗克納而此㑹具書卿名者不可以不克納公之故以掩其謀戍周之善故録之亦以見諸侯大夫皆專權無君與季孫意如等爾冬十月曹伯午卒曹悼公立九年其弟野立是為聲公邾快來奔快之書亦三叛人之黨魯為逋逃之藪而受之豈所以為訓也此魯之彊臣所以逐君也逐君而邾快來奔各從其類也公如齊復自鄆行公至自齊居于鄆齊侯飲公酒使宰獻而請安公以齊之卑我也遂歸而明年如晉據范獻子之言曰季氏有齊楚之助然則齊固助季氏安肯納公二十有八年春王三月葬曹悼公六月而葬簡也且著其臣子私諡之罪公如晉次于乾侯公之奔也不知先如晉而連年如齊皆不見禮乃始如晉此晉所以不納公也次于乾侯者以不得入于晉次于晉境而已公之失所益甚矣夏四月丙戌鄭伯寧卒鄭定公立十六年其子蠆立是為獻公六月葬鄭定公三月而葬簡也且著其臣子私諡之罪秋七月癸巳滕子寧卒滕悼公立二十五年其子結立是為頃公冬葬滕悼公因魯往㑹而著其臣子私諡之罪且公不在國凡喪葬之禮皆季氏專之也二十有九年春公至自乾侯居于鄆齊侯使高張來唁公唁于野井齊地也唁于乾侯晉地也今在鄆乃魯地故但書來而已齊侯今復唁公者以公自鄆如晉而不為晉所納故使高張來唁乃所以嗤公也然此淺事也而書于經者罪齊侯不修方伯連率之職以討意如之罪也公如晉次于乾侯齊侯唁公比公于大夫故公復如晉冀晉見恤也而晉復不受公故次于乾侯在易坎之井曰來之坎坎險且枕入于坎窞勿用此昭公之象也諸侯出奔狼狽未有如公者春秋書公狼狽之甚如此者所以深罪季氏之施惡于公與諸侯之不救也夏四月庚子叔詣卒叔詣欲納公而卒季孫意如曰叔詣無病而死此天命無公也非我罪也觀意如此言逆莭甚矣宜公之不能忍也秋七月一時無事書首月存天道王法也冬十月鄆潰此齊侯誘之使潰也所以責鄆也鄆固畏季氏以齊侯故居而不憚今齊不終惠固不足責而鄆亦不可潰敗而叛公也雖然君子無入而不自得焉以順民之心而民自歸之故詩曰在彼無惡在此無斁今昭公居于國國人逐之出居于鄆適去而鄆潰見魯民皆叛但知畏季氏而不寧公也故榖梁子曰昭公出奔民如釋重負聖人書之以為萬世人君之戒三十年春王正月公在乾侯在乾侯者以鄆潰故也公出至此五年矣公雖在鄆猶在魯也自去年鄆潰而公無所歸遂寓于晉而國内闕然無君故每歲于朝正之時書公所在則存君父罪臣子譏諸侯之義皆可見矣夏六月庚辰晉侯去疾卒晉頃立十四年卒其子午立是為定公時公在乾侯蓋晉地也而不弔其喪者晉不受故也秋八月葬晉頃公三月而葬簡也且著其臣子私諡之罪冬十有二月吳滅徐徐子章羽奔楚徐本夷狄自齊桓時自附于中國而爵為子今背華而即夷故楚人以為貳于吳而執之吳人以為貳于楚而滅之夫附中國則與于中國之㑹盟而附蠻夷則遂至于執其君而滅其國然則附蠻夷者可不戒哉凡國滅君奔不名而徐子獨名者傳以為徐子已服矣後復奔楚以經義攷之為信彼既降于楚矣安有興復之志乎生名之著其絶也三十有一年春王正月公在乾侯著公不能外内乆失其所魯國闕然無君也乾侯曰在而鄆曰居者鄆魯地公所有乾侯晉地非公所得而專也故春秋凡言居者境内之辭如天王出居于鄭之類是也凡言在者境外之辭如公在楚之類是也季孫意如㑹晉荀躒于適歴夫晉為盟主不討意如之罪以昭霸討又使其卿與之㑹而議納之嗚呼此又何議之有是奬亂臣以安其意也夏四月丁巳薛伯榖卒入春秋以來惟莊三十一年書薛伯卒及此始書名晉侯使荀躒唁公于乾侯秋葬薛獻公季氏恐失鄰國之歡故使人㑹其喪葬冬黑肱以濫來奔邾子封黑肱于濫若謂之邾黑肱則邾大夫矣而非也若謂之濫黑肱則濫之君矣亦非也諸侯不得擅相封其籍不通乎天下故謂之黒肱以濫而不繫之邾則見濫已非邾所有矣所以罪邾之專封也三叛人以地來奔皆公不在國季氏受之蓋以類至也十有二月辛亥朔日有食之日食雖有常度亦人事所召有食之者三十有二年春王正月公在乾侯每歳正月必書公所在者不與季氏專正朔也昔唐沈既濟論史謂武后不當立紀當繫于中宗每歳首當書帝在房陵然後繫以武后之行事是亦不與武后專國政得春秋書昭公之㫖也取闞此承上文言在乾侯之取也闞雖叔孫氏之邑乃魯羣公之墓所在也公在乾侯使人誘取之而春秋與外取邑同文者著公在外得邑于季氏猶取而後得是已絶于魯矣夏吳代越前此越與楚子伐吳故吳始用師于越而國自是亡矣秋七月一時無事書首月存天道王法也冬仲孫何忌㑹晉韓不信齊髙張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周自子朝之亂諸侯戍周至是王使告于晉請城成周以休請侯之戍于是何忌往㑹諸國大夫城之天子有道守在四夷今至于城王都可以不書乎成周乃天子所在而大夫城之曾縁陵之不若故列數大夫所以貶諸侯也孔子曰天下有道則政不在大夫今城成周葢天子之事也而大夫主之是時天子微諸侯又微故權在大夫也不言城京師而言城成周者不與大夫城京師故以國舉之所以見京師之弱諸侯大夫之強也申世叔儀之子參子産之子何忌者孟僖子之子也夫古之人三月無君則弔公之出也今八年公為旅人而何忌不能從季孫逐君而何忌不能去雖受晉命城成周然不告于公而自往㑹之此實覩文知罪不待貶絶而自見也十有二月己未公薨于乾侯昭公自出奔之後如齊如晉次乾侯者再居鄆者四所以奔走往來于道路中者冀以求納也初魯之臣亦意其復國故未忍絶之所以待公者猶若在國然然而齊晉終無意公亦遂絶望自鄆潰之後遂茫然無所歸因止于乾侯故每歲書公在乾侯以明公内為強臣所逐外無大援見納卒為旅人死焉薨于乾侯著不復國也春秋集註卷三十五
