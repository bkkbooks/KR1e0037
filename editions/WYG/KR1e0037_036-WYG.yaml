body:
  text: 春秋集註卷三十六宋髙閌撰定公一元年公雖即位在六月然亦統此嵗也故即稱元年不書正月者是時季孫專國昭公薨于乾侯公尚未立國未有君以承正朔故畧而不書所以黜強臣而存公室也春王三月晉人執宋仲幾于京師春秋之法諸侯不得專執況大夫乎宋仲幾㑹城成周乃不受功苟莫之討則諸大夫不聴于一正事不成矣然韓不信不請于天子以陪臣而敢擅執諸侯之大夫于天子之側亦可謂無忌憚矣此履霜之漸故稱人以貶之不言執于成周而曰京師者自諸侯言之以明天子在是也蓋天子所居自諸侯言之則稱京師魯君臣朝聘皆稱如京師是也自周言之則以地名為别王猛入于王城天王入于成周是也景王以前都王城因謂王城為京師至敬王始都成周則謂成周為京師故諸侯之大夫奉王命而城王都則亦自周而言城成周及晉人不以王命執仲幾于成周則自諸侯而言京師也夏六月癸亥公之喪至自乾侯公薨至今半歲餘矣季氏不以國君喪禮迎之者謀廢公衍公為而立定公故也立衍為則不利于季孫者也是以詳著其日以見魯國臣子忽慢無君之甚戊辰公即位凡即位不日此書日者非正月朔旦故也國家不可一日無君昭雖在外猶魯君也自薨至今統紀之絶若是其乆也故聖人日以謹之爾季氏既逐其君君薨又不即以國君喪禮迎之今又廢其嫡嗣而專立其弟公子宋宋于授受之際不擇所䖏汚于偽誘于利昭公喪至五日而殯遂自即位此非受之先君而專受之意如者也既為意如所立故不復討意如之罪在易漸之象曰日進得位往有功也進以正可以正邦也豈有進不以正而能正邦者哉秋七月癸巳葬我君昭公昭公薨于外凡半歲餘始以喪歸今歸及周月而遽葬葬于墓道南是終不同乎先君也見魯之臣子無恩于先君如此儀容講明曰昭此又其臣子私諡也九月大雩因旱祭志僭也立煬宫昔季氏行父嘗立武宫矣煬公比武宫尤逺蓋伯禽之子廟毁久矣季孫意如之逐君也懼而禱焉昭公薨季氏以為應遂為之立宫蓋季氏用此欺人若曰昭公之死鬼神實貶之也春秋誅其意而微其辭但書立煬宫而季氏行事之迹自可見矣此之謂世濟其惡也而公從之公之惡可知矣冬十月隕霜殺菽建酉之月隕霜殺菽害于民食是異而且災也五行志曰菽草之難殺者也言殺菽則知草皆死矣言不殺草則知菽亦不死也董仲舒以為菽草之強者天意若曰加誅于強臣而殺菽者微見季氏之罰也是時季孫強甚故大雩而隕霜雨暘寒燠為之失序二年春王正月一時無事書首月存天道王法也夏五月壬辰雉門及兩觀災雉門兩觀皆天子之制也魯僭久矣今天示災故因而著之與郊牛之傷同義所以正天下之大典也然兩觀設于雉門之上但書雉門災則知其及兩觀矣必書及兩觀者所以重著其罪此聖人之深意也秋楚人伐吳吳人致楚師來伐已遂敗楚師于豫章但書楚人伐吳者以囊瓦見誘而敗乃所以惡吳也冬十月新作雉門及兩觀莊二十九年新延廐不言作凡言作者改舊制而増大之也魯僭天子之禮天示變以警之今習舊而不知以為非遇災而不知以為戒乃更作而新之反加其度焉是魯之僭竊終無已也聖人特書曰新作重著僭竊之罪自在定公而不在先君也定公覩變而益侈如此無怪乎季氏之脅其主矣此春秋微辭至意也三年春王正月公如晉至河乃復昭公自有嫡嗣而季孫意如上不請于天子乃專立定公公為逐君者所立聞晉怒而往朝焉晉問其故且以緩朝見辭是以公臨河而不濟也公之進退皆失矣故明年因㑹而請盟于臯鼬也二月辛夘邾子穿卒夏四月一時無事首書月存天道王法也秋葬邾莊公七月而葬慢也僭也因魯往㑹而著其臣子私諡之罪冬仲孫何忌及邾子盟于拔春秋之季大國日亢小國日侵兵力勝而禮敬亡故書公如晉至河乃復著晉之輕魯也此書仲孫何忌及邾子盟于拔著魯之輕邾也邾子居喪而以吉禮與魯大夫盟則其微弱可知義見昭十一年四年春王二月癸巳陳侯吳卒陳惠公立二十四年其子卯立是為懷公三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚入春秋來蔡人首叛中國而附楚至是蔡人不滕楚之凌虐乃使告于諸侯首能伐楚者蔡願為之先鋒晉侯于是合諸侯于召陵以救蔡伐楚也夫楚恃其強侵害諸侯晉人上請于天子大合諸侯以伐之而不能明暴其罪以行天討未及于楚境而還故書㑹于召陵侵楚者以見諸侯不振不能救蔡伐楚也卒使救蔡伐楚之功歸于吳此年冬蔡侯以吳子及楚人戰于柏舉楚師敗績是也夫晉為盟主大合諸侯十八國之衆天子使大夫臨之可謂盛矣乃不能攘夷狄之患而吳以一國之師敗之此見中國衰微之甚也召陵近蔡地㑹兵于此而欲伐楚著其師之不進也故書侵以罪之是時晉荀寅求貨于蔡蔡人弗與遂辭不進晉是以失諸侯中國遂大亂吳子主黄池之㑹自此始也夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之沈不與于召陵者與楚故也與楚者不受晉令也故晉因使蔡滅之蔡屢為楚所滅今而舎楚不易矣晉侯不能恢宏霸業求所以服楚而保蔡從蔡侵楚固已失之一沈子不能容而殺之歸惡于蔡是重楚人怒蔡而易晉爾蔡雖齊桓之世不深即中國非不即中國也國近楚有畏焉不能保其無他也昭侯毅然棄之蔡計則失蔡意則可嘉乃復為此舉嗚呼使昭侯而知保國則必悔之五月公及諸侯盟于臯鼬此召陵之諸侯也襄二十五年重邱之盟亦㑹盟異䖏而不言公及此書公及諸侯盟于臯鼬何也公以不獲見于晉故因㑹而求盟焉則此盟公意也故特書公及把伯成卒于㑹不言卒于師者以不成乎伐楚也把悼公立十二年世子乞立是為隱公七月其弟過弑隱公而自立是為僖公六月葬陳惠公此見陳侯背殯出㑹也蓋君在殯則子辭㑹可也雖不得已于晉令而齊亦止使國夏來爾況召陵之役不成于伐楚是以君子惡之且因魯往㑹著其臣子私諡之罪許遷于容城自葉遷也至是蓋四遷矣其㣲弱可知也秋七月公至自㑹晉以伐楚召諸侯而以㑹致者見不成乎伐也劉卷卒召陵㑹罷而卒則知臯鼬之盟以疾不預也不曰劉子卷者非列國也先王之制内諸侯禄外諸侯嗣此三代之禮所最重者也經未有以言之觀乎劉卷卒則可信矣葬把悼公因魯往㑹而著其臣子私諡之罪楚人圍蔡以召陵之㑹諸侯見侵且為沈子故也然此楚子也貶而人之者楚子以一裘之故拘蔡昭三年此無道之甚也然蔡昭惜一裘之微受譖幾死歸而謀伐其不量力亦已甚矣晉士鞅衛孔圉帥師伐鮮虞葬劉文公尹氏王子虎皆不書𦵏此書葬者以魯方與之㑹而特往葬之且著其僭也凡大夫卒以字配諡如祭仲夷伯之類是也劉卷雖天子之大夫豈可僭稱公乎雖天子賜之諡而稱之亦非禮也冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績春秋摟諸侯以伐諸侯者皆不言以以者彼非起意于用兵而我行其意也楚人圍蔡晉師不出故蔡侯棄晉而求救于吳吳子初立無意用兵而蔡侯以之戰焉遂敗楚師于柏舉柏舉楚地也其不以楚決吳戰者不使楚為主也春秋内諸夏外夷狄故以蔡主之也稱吳子者善其能佐中國而攘楚也晉合十八國之君不能救蔡伐楚而吳子救之伐之此晉吳之事強弱之勢較然可見自是諸侯大小皆宗于吳矣楚囊瓦出奔鄭此柏舉之敗將也書奔鄭者罪鄭以中國而主夷狄奔亡之臣也庚辰吳入郢郢本先王之建國而楚之先僻在荆山厥後強大出并諸侯遂滅郢而都之今吳入楚都而曰入郢者聖人不與楚人之滅郢故因吳人之入而存先王之建國也與詩存􅆁鄘二國之風同意夫吳子救蔡伐楚斯可善矣然而至于入吳則吳之志乃不為蔡也伍子胥復讎之故也舉吳國而為匹復復讎故乘囊瓦之敗長驅入郢君居其君之寢而妻其君之妻大夫居其大夫之寢而妻其大夫之妻聖人又惡其乘人之敗而深為利故反其狄道而稱吳又謹而日之疾其已甚也夫楚自春秋以來肆禍于中國尤甚觀其恃甲兵之利乘時竊號斥地數千里以吞以噬驅逐迫脅魯衛陳宋蔡許鄭薛之君望風畏威惟其指顧奔走之不暇也齊桓晉文舉中國之衆傾中國之力止能一盟屈完于召陵敗得臣于城濮爾二霸既往天下諸侯莫有能與抗者惟柏舉之戰吳能勝之夫柏舉之戰囊瓦既奔吳人長驅入郢汚其妻夷其宗廟慘不道甚于水火蕞爾楚昭僅以自免烈此吳之盛也自是諸大大小罔不俛首與吳為㑹而中國愈不能抗至于黄池之㑹吳子主焉而春秋于是乎終矣五年春王三月辛亥朔日有食之日食雖有常度亦人事所召有食之者夏歸粟于蔡患難相救有無相賙此諸侯之正也春秋之世相攻相滅此道不行矣然當是時諸侯未嘗供職貢于天子至使天王有求于下國則知夫魯歸蔡粟非濟其難而賙其無也蓋以蔡與呉相援而敗楚入郢故魯畏而賂之所人所以追其意而罪之也於越入吳呉在楚故也嗟夫闔閭爭入郢之利而於越入呉夫差取盟晉之功而於越入呉意有所逐而憂有所忘矣是以君子終日行不離輜重惡輕而戒動也按昭五年楚子以諸侯伐呉而越人已見於經至此及十四年至哀十三年皆書於越何也越人自名曰於越君子名之越越治國有狀能與中國通則以中國君子之辭言之治國無狀不能與中國通則以其俗之辭言之越始稱人以其慕中國之義也改稱於越者惡之也呉之伐楚有安中國之意而越乃乘其士卒罷敝掩入其國至十四年又敗吳于檇李哀十三年又入吳若為楚復讎者是以君子惡之以其本俗之辭謂之於越與漢書於越同義蓋於于越粤皆發語辭經書於餘邱亦即其自稱書之也六月丙申季孫意如卒此季孫宿之孫悼子紇之子季平子也其子斯嗣是為桓子秋七月壬子叔孫不敢卒此叔孫婼之子叔孫成子也無見于經而卒之者著叔孫之有後也子州仇嗣是為武叔冬晉士鞅帥師圍鮮虞以四年之伐未得志故也兵益憤義不勝益是以君子惡晉焉六年是年冬天王避儋翩之亂處于姑蕕而經不書春王正月癸亥鄭游速帥師滅許以許男斯歸此見楚之弱也夫鄭許之怨舊矣小大之不侔明矣許人本恃楚以固其國至于四遷而楚不能為之強而鄭游速以偏師一出滅其國而俘其君楚則弱矣而亦已甚焉者也故謹而日之豈非楚人累敗于吳故鄭因乘許之㣲弱而肆其暴耶許男不死于位故名之二月公侵鄭召陵之盟口血未乾而鄭保囊瓦滅許故晉命公興師而討之以其為晉出師故書侵以罪之是時季孫斯初嗣卿位陪臣陽虎執國命又迫于晉命進退皆不由公也公至自侵鄭公内有強臣不能討乃為晉討鄭内外結怨危之道也夏季孫斯仲孫何忌如晉季孫如晉聘且獻鄭俘陽虎強使仲孫往報夫人之幣夫一卿將命可兼他事豈可每事一卿乎故累數之見二卿為陽虎所制也嗚呼天子微諸侯僭諸侯微大夫凌大夫微陪臣脅理勢然爾秋晉人執宋行人樂祁犂祁犂私與趙鞅飲酒范鞅言于晉侯而執之稱行人言不當執也晉自是失諸侯矣冬城中城成九年城之矣此復城者三家張矣公之所有者中城而已又外有齊鄭之怨故懼而城焉季孫斯仲孫忌帥師圍鄆鄆自昭二十五年齊侯取之以居昭公三十年鄆潰遂貳于齊至是二卿圍而欲復取之蓋陽虎欲傾季氏以謀政也季仲圍而曰陽虎何哉虎專季氏季氏專魯仲何為哉春秋集註卷三十六
