body:
  text: 春秋集注卷二十七宋高閌撰成公四十有六年春王正月雨木冰雨著木而成冰是上溫而下寒也與隕霜不殺菽相反劉向謂木者少陽貴臣卿大夫之象也是時叔孫僑如出奔公子偃誅死此雖漢儒傳會之説然後世雨木冰多應在大臣以此言之天人或可推也漢儒之學豈無所受但不當每事求合爾至其有所不合適所以致不信今此學遂絶者正以漢儒求之大過傅會其不可推者後世因其傳會不合之處遂廢其説也夫廢其説者亦非通論也春秋聖人和同天人之書其記災異皆有深旨漢儒不得其旨而強言之故識者以為非後世當有能知之者蓋災異之説亦可使人君知天道之可畏也人君挾崇高之勢所畏者天而已今或不畏則無所畏矣漢儒之説不為無補於世去其傳會者可也夏四月辛未滕子卒滕入春秋至今三書其卒皆不名至是日之矣鄭公子喜帥師侵宋楚求成于鄭鄭服中國五年矣至是始叛晉附楚為楚加兵于中國故書侵以見其義不直也自是與楚同害中國諸侯之兵無復寧嵗矣六月丙寅朔日有食之日食雖有常度亦人事所召有食之者晉侯使欒黶來乞師鄭之叛晉實晉有以致之以其失霸主之義不足以令諸侯故也于是晉將伐鄭而恐諸侯厭惡其後特使卿來乞師實欲公親行矣是時穆薑與叔孫僑如將作難故公之出師後期甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績晉將伐鄭鄭告于楚楚子遽引師而來于是晉不暇俟諸侯之兵先與之合戰而大敗之我既未致伐于彼彼志非來伐于我故直書戰而已稱晉之及以晉為主也楚敗不言師以君為重也楚殺其大夫公子側此鄢陵之敗將也凡楚師之敗必行兵法於主將而殺之此中國外裔之相為強弱其事易曉而時君莫之察也即春秋之世言之楚實強於天下其所以能強者兵強也兵所以能強者將師之力也將師之所以力者賞罰行也即敗績而言之二百四十二年之間凡十有六而楚居三焉城濮之敗殺得臣鄢陵之敗殺公子側柏舉之敗囊瓦逃刑而奔鄭至于中國之敗凡十有三不聞加兵法于一主將者國勢寖弱遂成姑息漢魏而下率皆踵之端可為之龜鑑秋公會晉侯齊侯衛侯宋華元邾人于沙隨不見公沙隋宋地此諸侯之兵始至而會焉喜敗楚也鄢陵之戰晉獨敗之諸侯之師皆未至蓋非特魯而已晉人乃聽叔孫僑如之譖而沙隋之會獨不見公夫聖人于魯事凡有可恥者必微其辭而不敢斥若我無失道為橫逆所加則直書其事故沙隋之會魯有內難晉不見公我何恥焉君子正已而無恤乎人魯之後期所當察也晉不見公為非矣故直書之以著在會諸侯皆有罪也昭十二年公不與盟義亦同此公至自會公出會而為盟主所拒故危之公會尹子晉侯齊國佐邾人伐鄭楚師既敗而鄭猶不服見政之斁于人矣晉為曹伯請于天子因假王命以再伐鄭故以尹子主會也宋衛以後至不書是役也晉尚以僑如之譖不使公與其事曹伯歸自京師十三年諸侯伐秦而曹伯卒于師曹人使公子負芻守負芻殺世子而自立故晉侯會諸侯執之歸于京師奈何天王不能用晉之執置之典刑今已嵗餘又因晉請反使復國失王道矣故書歸自京師而不名曹伯所以深貶天王之釋有罪也不書復者不與其復也蓋諸侯在他國則是失地之君故反國則書復歸而名之今曹伯在京師而王不黜之是不失國故亦不名也嗚呼篡逆之人殺其君之子而自立既列于諸侯之會又赦于天子之庭是率天下而入于亂爾九月晉人執季孫行父舍之于苕丘冬十月乙亥叔孫僑如出奔齊公之會伐鄭也僑如復譖行父故晉侯執行父而置之于苕丘魯一後期而晉再辱魯更執其臣此晉之惡也故貶而人之既而晉侯知魯有故且辨僑如之譖故許魯平而釋之蓋晉之所以不見公與執行父皆用僑如之譖也既而晉知其情季孫得釋將與公皆歸僑如聞之遂出奔齊僑如之意詭祕其出則魯國之利也是以春秋謹而日之魯人立其弟豹以為叔孫後是為穆叔十有二月乙丑季孫行父及晉郤犨盟于扈晉釋行父行父自苕丘與之盟也季孫在晉故稱及焉公至自會大夫執則致行父不致者公待行父偕歸焉舉公為重也乙酉刺公子偃刺偃者何治僑如之黨也僑如通乎穆薑欲去季孟使譖于晉晉于是不見公而執行父其罪大矣然僖二十八年公子買戍衛不卒戍刺之是猶明言其罪也直直云刺公子偃則若無罪焉其故何哉曰言其罪者著其事實以明非其罪也不言其罪者刺得其罪又何言哉且公之將行穆薑指偃與鉏曰皆可為君是時鉏尚幼則穆薑之意當在偃也公以是歸而刺之得其罪矣是以謹而日之十有七年春衛北宫括帥師侵鄭晉命也凡為他人興師者皆書侵以譏之據左氏鄭子駟侵晉衛北宫括帥師救晉遂侵鄭夫鄭雖背晉猶畏晉之強豈敢遽興師自與晉抗乎此必不然雖楚來入中國亦不過侵伐宋衛而已觀經之所書事實可見夏公會尹子單子晉侯齊侯宋公衛侯曹伯邾人伐鄭晉未能服鄭故假王命討焉重之以王之兩大夫庶乎其我從也晉雖主兵而先尹單以王命為重也夫晉厲之失道也而能數合諸侯力捍強楚者由假王靈扶義以令天下也伐秦之役劉康公成肅公在焉而不書者以受命京師為重矣六月乙酉同盟于柯陵齊桓晉文之盛諸侯與王臣會而不盟蓋尊周也今柯陵之會尹單始與諸侯之盟故書同盟以惡在會之諸侯且譏王臣下盟也自是習以為常矣秋公至自會不以伐鄭致者鄭猶未服始盟而逺齊無咎出奔莒齊靈不公其聽而逐其世臣然亦無咎有以取之爾故春秋以自奔為文九月辛丑用郊魯自每嵗僭郊之後聖人以為常事不書也其書之者或因卜不從或因牛傷死有變則書爾今無他變故而書之者以其自出己意非時之郊而不之卜遂不疑而用之是無天也其不宜用未有甚于此者故特書用以著其非成公之瀆郊蓋自四月而五卜始使公而知次辛之不可用則亦不敢用九月而郊矣晉侯使荀罃來乞師伐鄭之役諸侯往往厭之而不欲故晉侯特謙以求諸侯而以乞為名也冬公會單子晉侯宋公衛侯曹伯齊人邾人伐鄭齊國佐從諸侯圍鄭而稱人者以難請而先歸遂以穀叛是以春秋貶之十有一月公至自伐鄭前以會致今反致伐者非得志也晉厲有事于鄭而公之會伐皆至是而止至晉悼魯襄二年而鄭服者蓋蒙故業亦斯師之功也故于是乎致之壬申公孫嬰齊卒于貍脤此叔肸之子聲伯也從公伐鄭還至貍脤而卒按下書十有二月丁巳朔則壬申非十一月蓋十月五日也據左氏諸侯以十月庚午圍鄭壬申距圍鄭三日爾致公而後書其卒者公既歸而後舉其喪見嬰齊與公偕出而不與公偕入也古者人君遇臣之禮生則以恩義相接如父子朋友然來朝則改容當坐則為起疾則君親問之又賜之醫藥死則君親臨之又為之徹樂斯蓋君臣之間死生以恩義相接者也嬰齊子叔老嗣是為聲子十有二月丁巳朔日有食之日食雖有常度亦人事所召有食之者邾子貜且卒貜且立四十年宣公牼立晉殺其大夫郤錡郤犫郤至晉厲公侈反自鄢陵將盡去諸大夫而立其左右以三郤族大多怨故使長魚矯殺之盡以郤錡欲謀亂郤犫取賂于魯郤至專殺孟張皆可誅也然一朝而尸三卿將誰與處矣此自禍之道也故别數之以著專殺之中罪至重也又見晉之用人不求賢德惟取世族而已楚人滅舒庸舒庸人以楚師之敗導吳圍巢伐駕遂恃兵而不設傋故楚人滅之夫楚既摧敗而其餘烈猶足以滅國于要荒使其得志于鄢陵則毒被華夏豈勝道哉宣十二年楚入陳圍鄭之後書晉師敗績楚子滅蕭是也此書滅舒庸著中國能折其鋒使不得為我患者晉厲之成勞也蓋晉厲有宏才而無令德是以威震于外而亂生于內身雖不終功亦足録十有八年春王正月晉殺其大夫胥童胥童者胥甲之孫胥克之子謀殺三郤而晉國遂亂于是欒書中行偃先殺胥童然後弒厲公或曰宋督孔父而弒殤公春秋書曰及其大夫孔父書偃殺胥童而弒厲公而書晉殺其大夫胥童何哉孔父忠于殤公者也胥童嬖于厲公者也嬖臣道君為不道亡其身以及其君故春秋兩治之以為萬世戒庚申晉弒其君州蒲漢應劭作舊君諱議曰昔周穆王名滿晉厲公名州滿又有王孫滿是同名不諱然則此州蒲乃滿字之誤也州蒲立八年多殺大夫使下反側遂為欒書中行偃所弒而立襄公少子捷之子周是為悼公周為弒君者所立而不復討賊故稱國以弒所以罪其嗣君也齊殺其大夫國佐國佐擅殺慶克而以邑叛罪也然齊侯既盟而復之矣慶克作慝濁亂中闈譖害大臣不誅不殺使國佐無所發其忠憤起而殺之顧與俱靡而已于是因以為國佐罪罪纍上矣公如晉奔喪且朝嗣君也夏楚子鄭伯伐宋宋魚石復入于彭城此楚鄭間晉國之變伐宋取彭城與魚石守之以逼宋也其曰宋魚石復入于彭城者不與楚鄭伐宋取邑與宋叛臣也故以魚石自入犯君為文魚石之入不曰自楚者先書伐宋則自楚也不曰叛者將以作亂非止叛也與晉欒盈同公至自晉晉侯使士丐來聘不書厲公之葬以公在晉且賊不討故也公朝晉甫歸而聘使紹至晉悼之下諸俟肅矣此列國所以睦而叛國所以服也然書晉侯與宣十年書齊侯同義秋把伯來朝勞公如晉且問晉故八月邾子來朝即位而來見也夫諸侯不朝王而相繼朝魯可乎築鹿囿成公之季大國來聘小國來朝國家間暇矣不務修其刑政而築鹿囿而已所謂冥豫在上何可長也前此未有書築囿者自此之後昭九年築郎囿定十三年築蛇淵囿人君之示子孫也可不戒哉可不戒哉己丑公薨于路寢成公能正其終故薨于路寢義見莊三十二年冬楚人鄭人侵宋前書楚子鄭伯伐宋稱爵稱伐罪宋有以致之也此又舉兵助魚石之叛故稱人稱侵以罪之以左氏考之是時晉侯救宋何為不書蓋未足以為悼公烈也春秋之法存著小善者不足之辭也簡棄小善者有餘之辭也晉悼之烈在圍宋彭城絀楚服鄭蓋人楚鄭以微之而晉崇矣晉侯使士魴來乞師宋告急于晉晉為之乞師于諸侯悼公之時霸業復興而乞師救宋猶遵厲公故事焉自元年後遂無乞師直召兵而已矣霸體正也先君非大過未踰年不敢變焉禮也十有二月仲孫蔑會晉侯宋公衛侯邾子齊崔杼同盟于虛朾諸侯師至而楚鄭之師已退故宋人辭諸侯而請其師以圍彭城而先為此盟也以協謀惡鄭之導楚故書同盟襄公不會當喪故也此悼公所以仁諸侯也春秋善之而邾子居喪出盟則不待貶而惡可見矣丁未葬我君成公安民立政曰成此臣子之私諡也仲孫蔑請于諸侯而先歸會葬然後復往會圍春秋集注卷二十七
