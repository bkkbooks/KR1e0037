body:
  text: 春秋集註卷十宋高閌撰莊公三十有四年春齊人陳人曹人伐宋宋背北杏之盟故伐之然齊侯圖霸自宜惇信明義率先天下不當自恃威強以役屬列國也後書會伐則此稱人者將卑師少故也齊自管仲為政之後二十年間未嘗遣大夫為主將亦未嘗動大衆盖用兵以制而賦于民者寡矣曹屬于宋而伐宋及宋旣服齊而曹遂不列于盟會乃知霸者之時先王之禮制猶存也夏單伯會伐宋去冬柯之會公旣與齊盟矣今春伐宋之後猶躊躇未敢從命者念讎也然魯度齊之強不可不從至是單伯往會而助之伐者非旣約而後期也盖與陳袁僑如會同意秋七月荆入蔡十年荆敗蔡師又執其君此年又為息媯故而入其國見夷狄輕中國如此而齊桓未能救也故蔡侯怨之自是亦不復與中國盟會矣冬單伯會齊侯宋公衞侯鄭伯于鄄諸侯伐宋踰時不解至是宋公始服于齊而為此會也十有五年春齊侯宋公陳侯衞侯鄭伯會于鄄此齊侯再謀會諸侯也北杏之會諸侯猶貳去冬會鄄宋公已服至是諸侯始以禮會而霸體定矣公以仇讎不與焉自入春秋陳序衞下今齊侯將霸楚亦始彊陳介于二國為三恪首故特進之終于春秋左氏以此會為齊侯始霸非也旣霸則當主諸侯諸侯莫先焉此年秋伐郳宋序齊上明年夏伐鄭宋又序齊上齊侯未主諸侯明矣然則齊侯之霸在明年同盟于幽之時也自幽之會齊侯常在諸侯之上矣夏夫人姜氏如齊秋宋人齊人邾人伐郳此齊為宋伐郳也郳即五年犂來也未成國謂之郳旣成國謂之小邾齊侯未霸以前凡班序上下以國大小為次夷狄在下此宋序齊上者以宋主兵故推而上之鄭人侵宋宋方同諸侯伐郳而鄭輒乘間加兵于宋者盖突宋所立也責賂不已幾于失國已而請修好突從之宋恃立突而不謝至是遂討宋斯可見鄭背鄄之盟而有二心矣故書侵以惡鄭且見其從楚也盖自此舉之後鄭國不寧矣冬十月十有六年春王正月是年齊侯始合諸侯同奬王室故書王正月自去冬至今春兩時無事皆書首月存天道王法也夏宋人齊人衞人伐鄭報去年之侵宋且討其從楚之罪也齊侯旣伐宋服之又復推而上之佐其征誅此宋之所以畏懷而不復貳也宋盖自是與齊為一宋親中國而諸侯定矣秋荆伐鄭齊旣與宋衞伐鄭鄭服中國而荆又伐之此鄭自取之也盖楚與中國爭鄭自是干戈不已雖然荆之稱楚久矣春秋猶以荆書之何也深惡其僭而黜之也或曰諸侯僭王徐不先楚乎春秋治楚而不治徐何也徐之僭穆王能治之楚之僭桓王不能治也桓王不能治而春秋治之此春秋之所以為春秋也冬十有二月會齊侯宋公陳侯衞侯鄭伯許男滑伯滕子同盟于幽齊桓九合諸侯此幽之會是其一也會者公會也不書公者公首畔大盟故沒之也夫齊之讎易世也桓之霸諸侯服之矣况齊侯欲尊王室仗大義以盟諸侯如之何而不與盟耶公旣來會而首畔其盟此所以沒公而秪書會也上無明王下無方伯諸侯交爭夷狄恣横齊侯始霸諸侯予之同心而盟非率之也故書同盟許男先于滑伯滕子者是時霸主同事輒以其意之向背以為升降或諸侯自以其彊弱而相上下聖人因而書之以見先王之制不復存于當時也邾子克卒諸侯之國至五十里而止矣不能五十里不達于天子附于諸侯曰附庸若有功加地滿五十里則列而為子男邾本附庸齊侯始霸從其征伐有功王室齊侯以是請王命而爵為子故聖人因克之卒而著之其不書薨者不會也不會者何猶以附庸視之也曰禮歟曰非禮也邾可也天王之命不可也子瑣立十有七年是年僖王崩葬皆不書此見齊桓霸諸侯諸侯皆知有齊桓而不知有天王惡逆之甚也僖王在位五年世子閬立春齊人執鄭詹執鄭詹者何責侵宋也侵宋嘗報伐矣同盟于幽矣猶執詹者何親宋也不書行人者非行人也執得其罪故詹不氏然稱人以執則非霸討盖人臣委質各于其主已非其君而輒執之王法之所不容也孟子以搏執無罪之臣為非禮豈有他國之臣而諸侯得以妄執之哉夏齊人殲于遂齊師滅遂以兵守之翫而無備遂人討而盡殺之不曰遂殲齊人而曰齊人殲于遂者言齊自取之也斯足以見民心之不附所謂以力服人者非心服也夫亡國餘民而能殲強齊之戍則包胥一身可以存楚楚雖三户可以亡秦盖無足怪可以為強而不義者之戒而弱者亦可省身而自正矣秋鄭詹自齊逃來逃者何以囚錄也詹為鄭卿見執于齊不能辨之以理取直而歸反如匹夫逃遁苟免越來他國斯可賤也故書逃以著其幸免不知命之罪且齊之執詹本以責信于諸侯而魯受詹之逃是蔽罪人而背齊盟也齊盖用是伐我西鄙此執言之例也故書來以罪魯詹何以不歸鄭曰突不足恃也冬多麋麋多而害五稼故以多為異十有八年春王三月日有食之隱三年日食不書朔王失正統也桓十七年日食不書日王無以紀天下也至是朔日皆不書盖弛之也此惠王元年之變按長歴三月癸未朔而春秋弗正之者因舊史以見王政之弛也然春秋日食三十六而後世厯家推驗精者不過得二十六惟唐一行得二十七而本朝衞朴得三十五獨此年古今算不入蝕法則其為變大矣夏公追戎于濟西敵勝而去則不可追追者敵之敗者也敵緩而去則不俟追追者敵之奔者也先王之法從緩不及逐奔不逺逐奔不逺則難誘從緩不及則難陷故敵知畏而遁斯上矣吾弗追也今不書戎之侵伐我是魯人不覺其來戎兵旣去公始追之故沒其戎來之端而直書追戎以見魯無疆場斥堠之政且見中國蕩無禁制任戎狄之去來也若僖六年公追齊師則先書侵我後書至酅是寇及境而遽退非不知其來也秋有蜮蜮短狐能含沙射人生于南方此必非魯之所有也以春秋古𨽻較之盖其文非蜮實蟘也亦作或而公羊亦作蜮豈非縑簡失傳因亂而為蜮歟蟘即蠈也食苗葉者以農災故書冬十月十有九年春王正月夏四月連三時無事義見桓九年秋公子結媵陳人之婦于鄄遂及齊侯宋公盟此公子結非因媵婦之故遇齊宋來伐而遂自與之盟也其實為齊宋之盟而出爾是時鄄之巨室嫁女于陳人而結將以其女媵之故因會齊宋盟而挈之以往焉先地後盟見二君之先在鄄也夫結好大國而乃以私事取怒故聖人以盟為遂事而特書遂及所以深罪結也先儒謂大夫出境有可安社稷利國家者則專之可也此乃聘禮大夫受命不受辭得以便宜從事所謂使于四方而能専對者也若本無此命而欲専之是教後世人臣矯命竊權不恭之大者非可以為法也且公子結果有功何以秋旣盟而冬致三國之來伐今若是是召寇耳結自是不見于經又不書卒盖三國來伐歸罪于結絀其爵位故也而先儒習于遂事之説至如陳湯傅介子之徒皆有矯制之大罪于王法當誅反取先儒義斷之乃悉以為功而受封賞是其為害不淺也夫人姜氏如莒婦人無如如者朝聘之辭非婦人之事齊魯不睦故夫人不自安而如莒莒非父母之國也冬齊人宋人陳人伐我西鄙公之事齊後于諸侯又受鄭詹齊來討而公子結又以私事取怒焉故齊侯連宋陳來討之以其有辭故曰伐也雖加兵西鄙而不及國都然自背其盟非仗義之舉故皆稱人以貶之二十年春王二月夫人姜氏如莒齊魯不睦姜氏無所容其身故雖非父母之國而數往焉夫以齊侯之女魯侯之妻莊公之母非不貴也然以失德遂無所容其身而明年遂薨春秋迹其淫亂不可勝書故于將薨復三見之要其由惡以終為萬世婦人之戒夏齊大災大災疫也以别火災故加大且重民也且齊之強盛諸侯莫加天道虧盈降此大戾凡世之人凌蔑天下勢張權盛人不可奈何者必有天災以及之春秋之為書託已往之事為將來之戒故凡災異内悉書之外則書其大國之甚者爾秋七月一時無事書首月存天道王法也冬齊人伐戎齊人曷為伐戎戎嘗我侵焉者也西鄙之伐我則服矣伐戎者固我也此小白之善經也然不合諸侯者齊侯自擅以貪功冀功立則足以夸耀别國而示人以莫已若也春秋探而人之者原齊侯之心非實為中國攘夷狄也然而中國亦賴其賜二十有一年春王正月是時王室有子頽之難而鄭伯有納王之功春秋弗于此乎書其諸為齊桓故歟齊桓有雄霸諸侯之心而無尊事天王之意故于此但書首月以存天道王法而已夏五月辛酉鄭伯突卒秋七月戊戌夫人姜氏薨夫人之行甚矣亦以夫人之禮薨葬者盖父子之道天性也君臣之義也君雖不君臣不可以不臣父雖不父子不可以不子子為父隱父為子隱直在其中矣為君父者不以臣子之故得沒其罪為臣子者不以君父之惡而虧體焉此春秋所以責臣子之備而篤忠孝之深也冬十有二月葬鄭厲公八月而葬者慢也因魯往會而著其臣子私諡之罪二十有二年春王正月肆大眚文姜之罪應誅絶誅絶之人不葬雖天子有肆眚之命亦在不宥之列諸侯當守天子之法豈得擅肆大眚乎莊公内存母子之義必欲備禮以葬之又恐為國人之所譏故先肆眚盡釋魯國之有罪者以悦之其曰肆大眚者元惡大憝俱肆之辭也春秋書此見公以子赦母乖尊親之義以母忍父忘宗廟之敬旣不能防制于其初又縱釋姦惡于其後後世惠姦仇賊良民其流盖出于此殊失春秋之㫖矣癸丑葬我小君文姜曷為七月而葬難之也曷為難之文姜失道國人難之亦難乎公故卒葬之然婦人無爵何諡之有先王之制但取夫之諡冠于姓之上以明所屬詩所謂莊姜宣姜共姜經所書宋共姬是也豈有不繫其夫而别自為諡者哉夫人姜氏弑逆淫亂之人旣得罪于宗廟國人之所不容今也云亡雖以母子之故不忍棄絶則亦葬之足矣旣又迫于大義不敢加以夫之諡先肆大眚然後别為之諡曰文而不復繫于桓公將以掩其惡也然而欺天罔民壞先王之制則其罪又不若從其夫之諡爾自是魯國從而效尤凡夫人之死皆為之别立諡後世因循不改大失春秋之㫖矣陳人殺其公子御寇此不稱大夫者何非大夫也非大夫則何以書據左氏則君之嫡子也何以不稱世子曰未誓于天子也君之嫡雖未誓于天子未可以稱世子然已有為世子之端矣故不可不重也王法貴嫡嫡子之生其禮固已異矣王法正名嫡子雖生而異其禮苟未誓則不可名世子也此並行而不相悖者也夫君之嫡子而國人得以殺之陳無君矣其曰陳人殺之者亂辭也國亂而不知主名故貶稱人也夏五月春秋未有以五月首時者此非五月以下脱簡則是誤四月為五月爾秋七月丙申及齊高傒盟于防高傒齊之上卿魯必不使微者盟之盖公與之盟也十九年公使公子結與齊侯宋公盟是冬伐我西鄙自是失好今公將圖婚于齊故齊侯亦彊使高傒盟所以不斥公而書及也齊侯負強以辱同列高傒苟順君命不能正諫是以斥名高傒而著抗敵之罪亦公有以取之故不去其族又異乎晉之處父也于防者避于國也防我地冬公如齊納幣齊疑婚議故公自行自行者喜也有喜于哀姜也告文姜而不娶文姜薨而後自媒焉夫禮有親迎而無觀納幣者况公之于齊義不共戴天豈可娶仇讎之女以事宗廟又况母喪未終冒哀圖婚是無恩于父母惡逆甚矣公之慙德由此可攷春秋集註卷十
