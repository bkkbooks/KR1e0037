body:
  text: 春秋集註卷十八宋高閌撰文公二六年春葬許僖公因魯往㑹而著其臣子私諡之罪夏季孫行父如陳臧文仲以陳衞之睦也使行父繼舊好且娶焉行父季友之孫公孫無佚之子也以王父字為氏季氏自是世執魯國之政秋季孫行父如晉問晉侯之疾也故求遭喪之禮以行移此心以事天王則魯可以為政于天下八月乙亥晉侯驩卒晉襄公立七年晉人以太子夷臯少欲立長君遂使先蔑如秦迎公子雍將以為君既而不果乃立夷臯是為靈公冬八月公子遂如晉葬晉襄公卿共喪事非禮也因著其臣子私諡之罪晉殺其大夫陽處父晉狐射姑出奔狄此二事也而連書之何也曰晉射姑出奔由晉殺處父也晉殺陽處父則射姑何為出奔曰射姑殺也射姑殺則何以稱國曰君漏言也初晉襄公欲使狐射姑將中軍趙盾佐之乃謀于陽處父處父謂趙盾能且曰使能國之利也襄公曰諾既而公謂射姑曰吾欲使盾佐汝今汝佐盾矣及襄公没處父主境上之事射姑間晉之喪使人殺之夫君不密則失臣春秋之作所以明微處父本為國舉能而其見殺實因襄公之漏言故以專殺大夫之例書所以儆天下之為人君者也昔宋太祖誡江夏王曰凡事皆應謹密人有至誠所陳不可漏泄以負忠信之款也豈知此耶先書晉殺處父繼書射姑出奔則實殺處父之罪自著矣亦所以釋上累也按二年及晉處父盟以其抗公也故不書族以貶之此書陽處父則以明其無罪異乎宋山矣射姑奔狄是自棄于中國也射姑者狐偃之子也閏月不告月猶朝于廟閏月曰告月常月云告朔告朔者諸侯受一歲朔政于天子藏之祖廟毎月朔告于廟使大夫南面奉天子之命君北面受之乃察一月之政頒于其國故又謂之視朔必受之于廟者孝子歸美不敢自專故朝于廟而告之曰廟云者縁生以事死親存則朝朝而夕夕已死不敢忘故感月始而朝之也至閏月則雖有晦朔而無時令可察惟朝廟告月而已春秋二百四十二年閏月多矣獨此書不告月則是常告也文公以閏為附月之餘故不復告月則不成朝廟之禮矣猶者幸其不遂已之辭也苟知朝廟之禮不可已則告月之禮易為而可已哉按漢律歴志是歲亡閏而置閏閏者所以正中朔也亡閏而置閏故經曰閏月不告月言無此月也七年春公伐邾三月甲戌取須句僖二十二年公伐邾取之以歸須句子矣後復為邾所取今公又取之寘文公子焉以成僖公之志先書公伐邾而後書取須句者以見始則擅興兵以伐人之國既又奪取其地寘人之叛臣重其罪也故謹其日月遂城郚自伐至取須句兵之在外非一日又因之而城郚勞民甚矣城郚所以備邾也内城無遂遂城郚者不君乎公也不君者何先君取須句而歸其君公取須句面不顧其君夏四月宋公王臣卒宋成公立十七年其弟禦殺世子而自立國人共殺禦而立其少子杵白是為昭公以國亂故不日不葬凡治則禮詳亂則禮略宋人殺其大夫宋昭公初即位欲去羣公子羣公子率國人以攻公乃殺公孫固公孫鄭于公宫稱人以殺非有主名也大夫不名又非大夫之罪也貶責無所寄直志其衆亂無政而已戊子晉人及秦人戰于令狐晉先蔑奔秦令狐之戰非因殽之役而報復未已也晉使逆公子雍于秦既而悔之故秦興兵以納之晉不謝秦秦納不正兩國大夫輒廢置人君皆罪也故悉貶而人之晉懼秦之不肯已遂擊之故書晉及而不書秦敗者秦非志乎為此戰也所以惡晉也晉趙盾實起此戰特推為首也以其舍世子而外求君又不能終反自將而禦之二三其德不令之舉也晉使先蔑如秦逆公子雍既而食言及秦加兵于晉則先蔑不當與之偕來故既戰而後書其出奔以自令狐復如秦故不言出也雖然趙盾之議先蔑之使志在靖國非不忠也而明不足以慮難是以至于此然則定國大䇿自有常經豈可易哉狄侵我西鄙魯間晉難而伐邾則狄亦間晉難而侵魯聖人書此罪魯之不自正也秋八月公㑹諸侯晉大夫于扈凡盟㑹皆列叙諸國惟文公之世再盟一㑹但云諸侯者中國無盟主也何則自晉文以來世主諸夏之盟襄公既殁趙盾既背秦約而立靈公懼諸侯之討已故不以靈公㑹諸侯而已臨之諸侯知靈公年少政在大夫而靡然甘心俛首而與晉大夫盟故春秋内斥言公外統言諸侯而不列叙者示無盟主且見趙盾之專也何以不斥越盾盾而置君廢君居然晉大夫而已晉㑹諸侯而大夫臨盟是諸侯聽之也盾之專施于靈公可也施于諸侯而諸侯皆聽之亦所以慚諸侯爾及新城之盟復列叙者以諸侯再㑹晉而盾復主之故特列叙以見靈公不君而政在趙盾諸侯微弱之甚皆聽命于盾也自是終靈公之世未嘗一合諸侯至黒臀繼立始有黒壤之㑹爾或曰齊桓以前未有盟主何為盟㑹以爵列為次耶曰是時未有同攘夷狄之事其相盟㑹者諸侯自相疑貳爾雖無盟主又何害焉冬徐伐莒徐本戎也厥後自進于中國數與中國盟命盟㑹僖十五年楚人伐徐齊桓為之大合中國諸侯以救之為其能去夷即華不復侵犯中國故也今輒興兵而伐莒莒如有罪不可不討則冝告于盟主以問之乃自舉師長此安窮必以中國無盟主是以敢爾故聖人復以夷狄書之公孫敖如莒涖盟莒為徐所伐故來求援而請修洮之盟公孫敖娶于莒故許其盟而請往涖之敖于奔莒本此八年春王正月夏四月兩時無事義見桓九年秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍盾來請盟俾遂敵之于衡雍衡雍者晉文公㑹諸侯朝王之處也夫天王崩諸侯不奔赴其喪而盾與遂皆國之正卿乃自相㑹盟于王㡬之内惡莫大焉乙酉公子遂㑹雒戍盟于暴雒者天地之中而戎醜居之著其亂華也暴亦王畿之采邑雒戎處于王畿之内而諸侯至于與之盟則其干中國甚矣大夫無遂事自壬午至乙酉四日之間不能再歸又出一事再見故兩舉公子遂以見之晉戎同使失事霸主之義無尊中國之心也公孫敖如京師不至而復丙戌奔莒天王崩魯侯不奔其喪國卿出㑹盟于畿内如弗間也至是乃使公孫敖如京師而敖委棄君命不至而復滋見魯侯不臣之罪又失為國之道不能使一大夫而其大夫亦棄慢不臣廢君之命也不言所至者舉京師為重也然敖之所以不至而復者欲奔莒從已氏故也夫以疾而復猶且不可況于奔乎此春秋所以謹而日之且見人慾勝而天理滅也螽蝗也宋人殺其大夫司馬宋昭公不禮襄夫人夫人因戴氏之族以殺襄公之孫孔叔公孫鍾離及大司馬公子卭皆昭公之黨也稱人以殺見國亂無政也公子卭之死雖若無罪然司馬之職在于主兵而人得以殺之春秋因書其官而不書其名氏意可見矣宋司城來奔此蕩意諸也不書名氏者就出奔之中宜若無罪然孟子曰無罪而殺士則大夫可以去況殺大夫乎意諸為司城不能捍宋至于窘迫而出故以奔書葢宋之亂正由官非其人不能輔其君是以秦秋書其官不書其人也九年春毛伯來求金公孫敖既不至京師而奔莒魯遂不供天王之喪毛伯于是乎來求金不曰求賻者周人諱以喪事求也文勝也不曰天王使者王在諒隂之中百官總己聽于冡宰書曰伯相命士須材此冡宰當國之文也夫冡宰秉國之鈞豈可以用度之闕而下求于諸侯又況新君即位德未下于民固不可遽以王命誅求于天下也不書王使其意深矣以此為坊而後世猶有假仗主威脅制中外凡有所行動以詔書從事者夫人姜氏如齊夫人出境惟歸寜及奔父母之喪爾皆常事不書也非此三者則書之此憫出姜之失位而志之也二月叔孫得臣如京師辛丑葬襄王天子所以七月而葬者欲使諸侯畢來㑹也禮無卿共葬之文若有王命止之則使上卿可也魯不討公叔敖之罪遂廢賻禮以致毛伯來求金于是不得已而復使叔孫得臣如京師焉然則得臣之如京師本非㑹葬也據昭二十二年叔歎如京師葬景王此乃會葬之文也惟得臣如京師本非會葬故别舉辛丑葬襄王以重著魯之罪也晉人殺其大夫先都凡稱人以殺者國亂無政衆人擅弑之詞也先都以作亂見殺而稱人者晉政不自其主出而趙盾專生殺之權故也三月夫人姜氏至自齊夫人行不致此獨致者聖人傷文姜哀姜之亂而出姜又不安于魯終以子弑而去故謹之而從始至之例且見其無故而出危其失位也晉人殺其大夫士縠及箕鄭父及者累辭也累者必有可憫者也楚人伐鄭楚不伐鄭久矣今晉文襄既殁而靈公年少中國無盟主楚雖負弑逆之罪而中國莫敢誰何益無所顧忌至是遂伐鄭欲與中國爭盟也于是復見齊桓晉文之有功于諸夏矣公子遂會晉人宋人衛人許人救鄭楚自城濮之後不復事中國矣于是而伐鄭不可不救也然舉五國之兵不能討楚國弑君父之賊乃奔走以救鄭亦見中夏之衰夫晉主夏盟不在諸侯以啓戎心今既救之又不及楚師故悉貶稱人然書曰救亦善之也蓋存其意也夏狄侵齊晉宗諸侯而兵不禦楚齊僅自保而力不支狄夫狄不侵齊五年矣今復肆其强則桓文之緒亦可謂衰矣秋八月曹伯襄卒曹共公立三十五年以下泉候人之詩觀之其為君可知矣其子夀立是為文公九月癸酉地震地道安靜以震為異故謹而日之冬楚子使椒來聘此見中國無盟主故楚敢通于諸大國而魯亦不能遽以禮義謝絶之也天自僖公以來雖交通于中國而聖人以蠻夷僭逆之故但書其君臣皆曰人而已至是齊晉日衰楚雖有弑君父之大惡而中國不復敢問之反與交通而使之接跡于中國于是書其君臣同吾中國之例夫天下之惡一也弑父與君人人皆得而誅之今中國不能討楚子之罪反受其聘于是楚遂入為中國之患而不可遏矣椒之不氏與秦術同秦人來歸僖公成風之禭衣服曰禭禭所以送死者秦晉方不睦而魯數與晉通于是秦人疑魯之助晉故來歸禭以觀魯之情也然僖公薨已九年成風薨已四年其葬久矣而秦方以禭為名魯不能以非禮卻之將焉用之乎是以不君不大夫不使皆狄之也狄之者未能用周禮也成風于僖公雖曰母子而先君後夫人者禮當然也以過時始至故曰來歸夫庶子為君者為妾母無服魯僭事成風以夫人之禮天子猶來含且賵則秦人歸禭雖為非禮亦中國有以召之爾葬曹共公因魯往㑹而著其臣子私諡之罪春秋集註卷十八
