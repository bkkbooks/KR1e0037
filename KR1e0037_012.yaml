body:
  text: 春秋集註卷十二宋高閌撰莊公五二十有七年春公㑹杞伯姬于洮婦人無相㑹之禮伯姬既歸于杞復來與公㑹其迹幾與文姜齊襄無以異矣此書公㑹杞伯姬于洮若在杞史則當曰夫人姬氏㑹魯侯于洮此書夫人姜氏㑹齊侯于禚若在齊史則當曰公㑹魯孟姜于禚矣互文求意則其事可知也夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽齊侯九合諸侯此其二也十三年北杏之㑹稱人十五年鄄之㑹不稱公而去年伐徐之後猶以宋主兵故榖梁謂此盟為授之諸侯也授之諸侯者齊桓得衆也左氏諸陳鄭服也然則前此猶有未服者矣至是諸侯之志同奬王室同攘夷狄故書同盟秋公子友如陳𦵏原仲大夫不交諸侯諸侯不行使乎大夫今公子友住㑹他國大夫之葬盖私行也魯人聽其出故同出使之文而繫之葬原仲以重其罪按公子遂如晉葬晉襄公叔弓如宋葬宋共姬背再舉國此不言葬陳原仲者明非國事乃季子之私行也冬杞伯姬來伯姬春方出與公㑹而冬又來何其不安于杞也此書杞伯姬來在杞史則當曰夫人姬氏如魯也此書夫人姜氏如齊在齊史則當曰魯孟姜來也杞伯不能制其妻如其國何莒慶來逆叔姬叔姬者伯姬之妹皆非莊公之女也伯姬歸于杞不以叔姬娣而以適莒慶者卑杞故也亦有嫌焉云爾古者三十而娶五十而爵為大夫故大夫無出境親迎者莒慶已為大夫而與魯為婚越境逆婦其非禮可知矣不曰逆女而曰逆叔姬者以别卿為君逆者也慶不氏者莒小國無命卿盖與齊高固異杞伯來朝致伯姬也杞伯不能治其内縱伯姬之數出又朝朝而致之則其卑弱可知矣杞二王後而稱伯者當是齊侯以彊大致霸主盟故一時皆尚彊右大于是弱小者皆降號以從列次之位也使大國下小國則齊桓不能故以固之大小為次或降而稱伯稱子春秋悉志之以見亂先王之制也公㑹齊侯于城濮城濮衛地也公何以㑹齊侯于衛地曉衛侯也曷曉之初蒍邊奉子頽犯王而不克奔衛衛興兵反犯周立子頽逮鄭虢納王之後衛不謝王王命齊侯伐之齊侯諸㑹衛侯子城濮曰有王命盍謝以紓討衛人不聽明年遂與之戰二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衛人敗績王子頽作亂齊衛衛受亂臣又與兵助頽犯王而齊為霸主不能奔救及鄭虢既納王王乃使召伯廖錫齊侯命使討之齊侯既曉衛而不從于是乎伐衛曰伐之者討得其罪也以衛反齊盖惡衛也猶曰衛人為志乎此戰云爾然齊人與衛戰既敗衛師數之以王命矣乃取賂而還嗟乎齊侯以能尊王室霸諸侯而所為乃若是是與衛無異故既書伐又書戰悉貶而人之所以惡齊也凡敗皆稱師此獨稱人者重衛罪也凡伐不日此獨書日者齊人兵至之日衛人俟其至而即與之戰以是日而戰以是日而敗績是以春秋謹而志之夏四月丁未邾子𤨏卒秋荆伐鄭夷狄加兵于中國而書伐者罪中國之不自正也前此稱荆人以其來聘能以禮自進也今復伐鄭創痍中國故復書荆以賤之公㑹齊人宋人救鄭齊宋使㣲者救鄭而公親往㑹之者以齊來召師公不敢不親之也凡書救者皆善之善之則公雖與㣲者㑹亦無嫌也夫以夷狄伐中國而諸侯能相率救之雖不由王命是亦變之正也冬築郿嵗饑而興役無愛民之心也凡邑書城不書築築郿者以凶年造邑而欲其固雖驅民于死地不恤也是以春秋志之大無麥禾是嵗未嘗有水旱螟蟲之災而書大無麥禾何也見人力不書農事不修魯不修其國政非天災使然臧孫辰告糴于齊大無麥禾舉國無也民饑甚矣于是告糴于齊告糴者貨取之也非所謂求焉者也非所謂乞焉者也彼此之利也不曰如齊告糴者言如齊則其辭緩告糴于齊則其情急吾情雖急而彼之得否未可知故但書此之告糴以譏仕國事者務名而不治實之蔽也夫務農重榖節用愛人則倉廩實矣不知為此至于饑而憂之亦末矣魯人悦其名而以救急拯危為功君子青其實而以素無儲蓄為罪盖公即位二十有八年矣國無儲蓄之備一無参禾遂告糴于師國國非其國矣二十有九年春新延廐修舊曰新馬閑曰廐其曰延廐者延之為言長也以馬多故廐長也昔廐焚孔子退朝曰傷人乎不問馬盖魯侯僣乘天子之車備十有二閑之馬聖人不敢斥言之也是以特因其修舊而書以譏之且去冬大無麥禾民將轉徙于溝壑今又新延廐廐有肥馬民有饑色是重馬而輕民也何以為民之父母夏鄭人侵許許鄭鄰也諸侯救鄭而許不至故以為討而書侵者不可罪他人之不救而遽加之以兵也秋有蜚蜚之為物行水水竭行草草死此非所宜有而有也春秋書之以紀物理之變物理之變如此則人事之變固有不可量者此亦外裔居中國之象也自此中國不以為怪故一書而不復書如鸜鵒之類今中原皆有之盖始于春秋之時古者橘踰淮而化為私命淮宋之間橘大如柑乃知物理之變殆不可測後世之事古人不能知者衆矣冬十有二月紀叔姬卒其國既亡其夫既没婦人有歸宗之義而魯不能變恤遂歸于酅故聖人書其卒以憫之且存紀以罪齊也嗚呼齊滅紀以自强雖得志于一時而聖人罪之則其惡流于不泯紀見滅于强齊雖無告于天下而春秋存之則其志伸于無窮城諸及防前年冬築郿大饑告糴此年新延廐又城諸及防公不恤民而屢與役無人君之心矣三十年春王正月一時無事書首月存天道王法也夏次于成齊人之降鄣盖盛兵以震服之魯是以警備而次于成此在易所謂震不于其躬于其鄰者也不稱公不稱師直曰次于成者伏戎而微之不敢自背于齊故也齊魯之結厚矣而于此不能無危疑者非徳言也夫秋七月齊人降鄣鄣紀之附庸也齊之滅紀二十有五年矣而鄣猶見者義不屈于齊故也齊侯肆其兵威而力取之故不書鄣降而書齊人降鄣者明非自降也不書滅者服屬之以為附庸也八月癸亥葬紀叔姬齊人降鄣而後葬紀叔姬與紀侯大去其國之後齊人葬紀伯姬同意皆所以罪齊也夫叔姬亡國之娣自卒之後停殯于酅踰厯九月今始克葬聖人憫之故紀雖滅矣復志其𦵏復繫之紀不以酅易紀也春秋之于紀其致意之深如此葢先王之建國非他人所可滅而齊亦不得滅人之國故曰興滅國繼絶世天下之民歸心焉此聖人之志也九月庚午朔日有食之鼓用牲于社二十五年六月日食而鼓用牲于社已為非禮至二十六年十二月日食則知其非禮而弗為矣今又舉而行之冬公及齊侯遇于魯濟及者内為主遇者無人君相見之禮也濟水厯齊魯界在齊為齊清在魯為魯濟齊侯將伐山戎道由魯濟公于是乎出而迓之故書曰遇若邂逅相值然齊人伐山戎山戎伐燕燕人求救于齊齊侯伐之是攘夷狄也而經無異辭何也齊侯既霸而王室有子頽之難不能奔命而坐視鄭虢之納王乃越千坐之險為燕開路是徒欲耀威武于山戎以誇示逺近爾既又自一其功謂與三代受命無以異而晏然欲以封禪為事聖人惡其强僭而無尊王之心故同侵伐常例書之又貶爵書人以抑之謂其功不足揚也以此為坊而後世猶有開邊拓境好大喜功者如秦皇漢武實萬世之龜鑑也三十有一年春築臺于郎文王以民力為臺而民歡樂之今逺築于郎是不與國人同樂也夏四月薛伯卒薛在隐時稱侯而此稱伯者衰弱之甚也前此未嘗書薛之喪而此書薛伯卒者為下築台起也故略不書名與葬築臺于薛薛雖魯地亦近于薛薛伯方卒而魯遽築臺以臨之盖其用意逺矣六月齊侯來獻戎㨗齊伐山戎得其㨗侈然自以為功因來誇示以威我而聖人書曰來獻者抑之也始伐稱人此稱其爵者方其伐戎過我固已貶之此獻㨗而稱人則疑若㣲者故特書其爵以誅齊侯矜功威魯之罪此春秋大公之義也秋築臺于秦公比年興役今又一嵗之間三時築台又不在國中之地逺至于郎于薛于秦非所築而築既為失矣築而又築之抑又甚也管子曰臺榭相望者亡國之廡也當是時慶父執國政而通乎夫人故數築臺于逺地以為公㳺觀之娯公亦為其所惑而不自知也可為後世戒冬不雨凡不雨必踰時而後書今一時不雨未為災也以公一年而三築臺明年又城小榖故其中間特書不雨以見意葢公暮年興役不已而災異數至故書以為戒三十有二年春城小榖小榖魯邑也今曲阜西北有小榖城先儒以為齊邑魯為管仲城之若然聖人亦當異其文而繫之齊矣且公雖感齊侯之私豈肯為管仲城邑乎彼殆見昭十一年傳云齊桓城榖而寘管仲焉故有此説殊不知齊自有榖如文十七年公及齊侯盟于榖宣十四年公孫歸父㑹齊侯于榖此齊榖也非魯之小榖夏宋公齊侯遇于梁邱齊侯請㑹于諸侯將為鄭謀楚而宋公請先相見故遇于梁邱宋公序齊侯之上者地主也用兵則以主兵者為先㑹盟則以主盟者為先若相遇則以地為賔主皆非其地莫適為主則序以爵而已秋七月癸巳公子牙卒此僖叔也左氏具載季友殺叔牙之事攷之于經全不寓㣲意且公既有子何必問後正使問後而叔牙輒以慶父對若公以為不當立則自不立爾何至于殺叔牙耶殺叔牙而反使慶父執國政此又何理耶况此去公薨尚逺豈公臨終之事耶公榖謂將弑莊公此又無謂之甚者以此言之公子牙盖自卒爾牙卒其子乃公孫兹兹之後則有公孫得臣得臣之後則有叔孫僑如僑如之後則有叔孫豹豹之後則有叔孫婼婼之後則有叔孫不敢不敢之後則有叔孫州仇皆執魯國之政者是以聖人謹志其卒八月癸亥公薨于路寢路寢正寢也書薨于正寢以明莊公得其死所非有他也且君病必居正寢就公卿也大位姦之窺也危病邪之伺也若蔽于隠所是使小人女子得行其志也故宗嗣素定之兵權散主之閨門嚴飭之小人女子不尸重任而賢良受託鼎是交輔則篡弑奪易之禍何由而興哉不謂之正寢而曰路寢者天子有路門盖路寢之門也又因著魯之僭冬十月己未子般卒新君未踰年稱子今莊公薨般既立不幸而卒故書子般卒與襄三十一年書子野卒同義三傳皆以為慶父所弑攷之于經全不寓㣲意而所書正與子野同若以子般為被弑則子野亦豈被弑乎惟文十八年書子卒而不名者乃被弑也何則既書子卒既書夫人姜氏歸于齊盖文公既薨子赤為宣公襄仲所弑而弑君之賊又自立矣姜氏不能容自歸于父母之國聖人不名子赤者以其被弑不忍名之與成君同也若書其名則與自卒者無以别矣或以為先君未葬則名文十一年書子卒而不名者以先君既𦵏故爾是不然景王既葬矣王子猛之卒何為而名乎豈有天子未踰年則名之而諸侯反不名乎以此騐之子般乎野皆非被弑而子般特以哀姜慶父之故疑若為其所弑爾或實為圉人犖所弑因而歸咎于哀姜慶父未可知也春秋别嫌明㣲而深辨之疑似之際豈有實弑其君而全不寓㣲意乃區區曲為叔牙季友諱乎必不然也公子慶父如齊若以慶父弑君而出奔則聖人豈不著其出奔之罪乎乃知此非出奔也盖莊公既薨子般又卒繼嗣未定慶父雖有僥倖之心而身為國卿加以公子之貴寜有嫌疑之避于是如齊告難盖以桓公始霸謀定其君及自齊歸魯已立閔慶父始有篡弑之意故明年齊侯使仲孫湫來省難而仲孫謂不去慶父魯難未巳也秋伐邢此為齊侯救邢而書也亦見中國之衰也春秋集註卷十二
