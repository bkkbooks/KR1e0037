body:
  text: 春秋集註卷三十一宋髙閌撰昭公一元年春王正月公即位公雖上不受于天子而内亦繼正有所受之故書即位叔孫豹會晉趙武楚公子圍齊國弱宋向戌衞齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢此會乃楚公子圍帥諸侯之大夫尋宋之盟也宋之盟齊人不與焉今齊又從楚矣中國微弱可知也然不書盟者以盟先楚故沒之是時晉主會而楚主盟故也然宋盟亦楚主之爾特書之者著諸侯因弭兵以為名皆不外楚也莒人弑君諸侯不共討之者是時楚人方聽莒人之訴而欲執魯大夫是不以莒人為可討也春秋不書莒人葢斥之爾衞齊惡在陳蔡之上者上卿也三月取鄆莒魯爭鄆為日久矣今尋盟未退而魯人乘莒之亂取鄆聖人直書之其辭雖畧而惡有餘也時叔孫豹在會楚人聽莒人之訴欲執之而不果夏秦伯之弟鍼出奔晉鍼桓公之子景公之弟也有寵于桓富如二君及景公立懼偪而出仕于晉書曰出奔者著其棄兄忘君奔于他國也曰弟云者見秦伯以一國之大而不能容一弟也六月丁巳邾子華卒邾悼公立十五年卒晉荀吳帥師敗狄于大原案經文公穀作大原左氏作大鹵此從公穀大原晉地即大鹵也中國曰大原夷狄曰大鹵號從中國名從中國詩曰薄伐玁狁至于大原是也狄來犯晉故荀吴得以敗之書曰敗狄者所以與中國之勝也箕與交剛之役皆書晉人至是書卿帥師則晉益衰矣矜能敗狄也秋莒去疾自齊入于莒莒展輿出奔吴去疾齊出也密州之弑去疾奔齊展輿立而奪羣公子秩羣公子召去疾去疾因假齊之力入莒以討展輿之罪此討得其正也故稱莒然去疾遂自立無所禀命故不稱公子去疾自以為公子可立故也展輿為弑君者所立而不討賊是與聞乎弑也斯不可以有國矣而亦以國書者罪諸侯也虢之會雖不與然諸侯已與其立矣故欲執叔孫也稱莒展輿見諸侯之與其立也不稱莒子聖人不予其為君也展輿吴出也故奔吴叔弓帥師疆鄆田文十二年季孫行父嘗帥師而城之復為莒所取今乘莒之亂而取之又帥師以疆其田必帥師者何以不義得之懼不服也葬邾悼公入春秋來邾始書葬葢邾滕薛皆小國也秦逺國也皆至昭公而書葬方是時魯衰甚矣小國如大國逺國如近國冬十有一月己酉楚子麇卒此楚熊郟敖也初康王即位弭兵息民而麇嗣其仁心申盟守約春秋善之凡立四年其令尹圍因其疾也殺其子而代之自改名曰䖍故戰國策載不修春秋之言曰楚王子圍聘于鄭未出竟聞王病反問疾遂以冠纓絞王殺之因自立由此觀之郟敖實弑也聖人直書卒者此與鄭伯髠頑無異葢春秋新意也楚公子比出奔晉靈王既弑其君又殺其君之子而自立比為右尹力不能制亦不從亂是以出奔春秋書之為十三年起也二年春晉侯使韓起來聘起韓厥次子也襄七年韓厥老長子無忌有廢病讓起為卿公新即位晉不敢輕魯釋其奸盟取鄆而以貴卿來聘焉及冬公弔少姜為晉所卻自是習以為常一棄禮而辱不可救以是知人君之動不可輕也夏叔弓如晉秋鄭殺其大夫公孫黑黑欲去游氏而代其位以疾不果子産使吏數之有死罪三于是縊黑而尸諸周氏之衢黑則有罪而鄭人初畏其彊不之討也今因其疾而幸勝之亦云殆矣故稱國以殺冬公如晉至河乃復公如晉朝而晉不納春秋以公至河乃復為文者臣子之心不欲其君見拒于人而以為公臨河而不濟懼涉難而自復也乃者有阻之辭公不以禮自重而輕舉妄動以晉有少姜之喪而徃弔之晉侯辭曰非伉儷也請君無辱是公棄禮自取輕辱于大國也且公得至晉是公得與乎國事也季氏不使公與國事故公不得至晉焉季孫宿如晉少姜卒致襚服也以是知晉不納公季孫冇以使之也晉平以閨闥之愛勤動天下使諸侯釋位羣臣祇役以為少姜之哀勞是知晉德之衰矣而公自如晉則拒之季孫如晉則納之是權已移于下公不自省其身曾季孫之不若也亦可悲矣三年春王正月丁未滕子原卒滕至是凡三書其卒夏叔弓如滕五月葬滕成公入春秋來滕始書葬夫以卿共其葬非禮也以我襄公之葬滕子來會故魯報之然與二十二年葬景王無辨矣秋小邾子來聘公即位故也昭公之始大國來聘小國來朝非不可為之國也而終之以流播使魯大絀靳侮于齊晉矜憐于杞宋詩曰靡不有初鮮克有終可不戒哉八月大雩因旱祭志僭也冬大雨雹為災故書秋旱冬雹皆人事所召且為四年起也義見僖二十九年北燕伯款出奔齊燕簡公多嬖寵欲去諸大夫而立其寵人于是上下乖離自取播越故稱名以罪之北燕葢召公奭之後以其逺在北荒故不列于中國會盟而其終始與昭相類是以志之四年春王正月大雨雹自去年冬至今春正月連大雨雹故前以時紀此以月紀夫天道如此人事可知五行志曰凡雹皆冬之愆陽夏之伏陰也夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷會于申楚子而會諸侯者何尋宋之盟也尋宋之盟者何謀吴也圖霸也然是會上主楚子下不殊淮夷是在會之諸侯皆狄也何者楚䖍弑其君殺其世子自立而求諸侯于晉晉人許之諸侯從之末有以為賊而討之者反推為盟主相與朝事之以順聽其所為而不敢忤春秋首書楚子末書淮夷而列羣諸侯于其中以著在會諸侯皆反周室以為悖亂之行也葢中國自晉平始衰齊靈莊背之平公屢合諸侯以討焉襄二十四年莊公遇弑始與晉平晉侯自是不復出與盟會其大夫趙武為政不在諸侯故諸侯少安然而晉日益衰政在六卿自宋之會諸侯不相見者十年雖然楚之會諸侯也非與國則小國爾魯齊衞曹薛邾杞不會也宋鄭滕小邾雖會而終不與也以是知夷狄必不能主盟會也蔡入春秋以來常在陳衞之上自莊十六年之後以服屬于楚故未嘗先陳衞今楚子大合諸侯故復居陳之上而滕子居喪出會又不待貶絶也楚人執徐子徐子吴出也楚子既為申之會將以在會諸侯伐吴故以徐子為貳于吴而執之執之非道也葢楚子亦欲效桓文之舉以示威于諸侯爾不言以歸者申楚地且因以伐吴故也秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吴中國之所以為中國謂有理也義也理義人心之所同葢不待驅而後從也舎中國而從夷狄豈人心之所欲哉迫不得已爾申之會楚靈王不修德而求諸侯諸侯畏楚之彊守宋之盟而從之然猶不能致魯衞曹薛邾杞至伐吴之役則中國諸侯皆去惟楚屬從之爾人心之向背可知也夫中國不競然後楚得恣其志有天下國家者苟知自强于理義以固其心其憂有弗從者耶執齊慶封殺之楚子會諸侯以伐吴而執齊慶封殺之者以慶封在吴故為齊討之假仁義以重其會所謂盜亦有道也初崔杼弑其君而慶封為之黨齊人欲併討之慶封走之吴吴予之朱方而居之至是楚子目以弑君之罪而殺之也殺夏徵舒殺陳孔奐不言執者直辭也此先言執者曲辭也然始執徐子亦非其罪也而稱楚人此執慶封疑若有罪焉而不主于楚者以慶封不為靈王服故不與楚討也然慶封之罪雖不浮于殺亦在所當討其言不與楚討者楚以蠻夷而主中國盟會非如殺徵舒孔奐之比也陳嘗背中國而屬于楚矣楚固得而討之今慶封得罪于中國中國諸侯不能討而楚得以為資故聖人不予楚之討中國也不與楚之討中國者所以深罪中國之不能自正也遂滅賴遂者繼事之辭見楚肆禍于中國假義為利以惡終也夫晉固不能霸矣楚以僭王而以吴故乃勤于營霸維不知尊周而其規模則小焉者也諸夏之幸也嗚呼彼以夷狄既會中國之諸侯又帥之以伐吴又因以專殺中國之大夫今遂以諸侯之兵滅人之國其流毒如此葢出于宋向戌弭兵之謀也然則謀人之國者其可忽哉九月取鄫襄六年鄫為莒所滅今以莒亂故鄫叛而來魯因取之鄫亦故國爾國而書取者易辭也鄫無嗣以女之子為嗣是鄫之宗祀已滅矣若取無主之物爾冬十有二月乙卯叔孫豹卒此僑如之弟叔孫穆叔也質直好義博聞强識季文孟獻所不逮也然蔽于近習卒以餓死其子婼嗣是曰昭子五年春王正月舍中軍襄十一年魯作三軍三家分公室而自専之今雖以次國二軍之故而舎其中軍然四分公室季氏擇二二家各一皆盡征之而貢于公然則軍之作舍皆在三家而公無與焉季氏特因叔孫豹之死欲乘其弱而去之名曰復古實欲自强爾自是公室有貢而已無復有民矣楚殺其大夫屈申楚殺大夫義見僖二十八年公如晉朝也公至是受三家之貢而已無復有民故雖如晉非季氏所忌也夏莒牟夷以牟婁及防兹來奔牟夷者展輿之黨也公如晉未反而魯受莒牟夷邑惡季氏専且見莒益弱矣書及者以防與兹固别二邑也防本屬魯葢嘗為莒所取今還吾所喪邑而與受叛邑同者不以私邑害公邑故也莒不書大夫以我事書莒以利摟我而我入其利故兩譏之義見襄二十一年秋七月公至自晉魯人受莒之叛臣而取其地莒訴于晉晉人將止公故歴三時乃得歸戊辰叔弓帥師敗莒師于蚡泉蚡泉我地也魯既受莒人叛邑莒人興師而來軍于蚡泉而不設備故叔弓得以敗之曰敗莒師者幸魯之勝乃所以罪之也故謹而曰之秦伯卒秦景公立四十年子哀公立史皆失其名然亦不必名也春秋書其卒者罪中國諸侯逺赴其喪也冬楚子蔡侯陳侯許男頓子沈子徐人趙人伐吴徃年伐吴矣今又伐吴者吴不畏故也不會宋鄭滕邾者不能會也是楚子之不能霸也越於是始見然吴楚與徐雖與中國盟會皆以夷狄不遽稱人今越始見而遽稱人者不可云沈子徐人越伐吴故也其曰越人蓋其君也然徐之人何以先越之君曰是徐子也貶而人之爾豈有諸侯皆在而徐子獨不至乎蓋徐自入中國已與中國盟會惟前年從楚子會于申又貳于吴而見執于楚今又從以伐吴三者皆罪也三十年吴滅徐而諸侯莫之救其禍蓋始于此六年春王正月杞伯益姑卒此把文公即襄二十九年所書杞子是也至是始稱伯者豈自城杞之後復振歟立十四年其弟郁釐立葬秦景公秦于是始書葬因魯往會而著其臣子私諡之罪夏季孫宿如晉謝前年取莒牟夷叛邑蓋莒既伐魯則魯有辭是以晉受季孫之聘而不見討也弭兵之時莒亦合好矣葬把文公因魯往會而著其臣子私諡之罪宋華合比出奔衞合比請為太子佐殺寺人栁栁譖于公逐之為太子殺君之嬖臣非所以安太子也故以自奔為文秋九月大雩因旱祭志僭也楚薳罷帥師伐吴三書伐吴者見楚終不得志于吴也初楚子執徐之聘使既又懼其叛而伐之吴人救焉楚令尹因帥師伐吴而為吴所敗楚自是不敢伐吴吴人休兵息民國始寖强然不書楚伐徐者徐無可伐之罪且不與楚戰也冬叔弓如楚左氏以為弔敗非也楚恃强暴雖敗猶諱之魯豈敢弔乎蓋四年公不會申已而震楚兵威將朝楚而不能故以叔弓先聘而明年躬繼之也齊侯伐北燕將納款也故書其爵然受賂而還君子弗予也春秋集註卷三十一
