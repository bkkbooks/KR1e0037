body:
  text: 春秋集注卷十一宋高閌撰莊公四二十有三年春公至自齊不書王正月者著公以納幣行不復朝正于廟也夫公在喪服之中親如齊納幣久留于齊人心危疑今其歸也何辭以見宗廟故書至以危之蓋自是公如他國致矣祭叔來聘祭叔王臣也王臣無自聘諸侯之禮天王實使之來也莊公方居喪納幣而天王乃以禮聘之祭叔不能輔王以王法正其犯禮自恣之罪而反為之聘使是以春秋沒去天王使來之文而専著祭叔自來之罪也古者諸侯大夫皆命于天子夏公如齊觀社婚姻之議尚疑故公以觀社為名而再往議之自納幣後二年方逆蓋齊難之也夫齊社亦與魯社同爾又何足觀之有觀公之行事如此而春秋所書之意蓋可見矣公至自齊公出非禮故書至以罪之荆人來聘是時楚成王頵方弒其君囏而自立中國不能治而反敢來聘聘者上聘下大聘小之辭故凡受聘必于宗廟之中所以敬之重之也彼蠻夷僣逆之人來聘中國中國當以禮義外之詩謂戎狄是膺荆舒是懲周公方且膺之而後世子孫乃受其聘于宗廟之中此中國衰微無禮義之甚也凡書來聘者必曰某君使某來聘今直曰荆人來聘無復君臣之辨蓋所以敗蠻夷也公及齊侯遇于榖及者公意也婚嫁猶未定故公往見齊侯于榖榖齊地也無諸侯相見之禮故曰遇此見公不恤國家之事惟婚姻是務蕭叔朝公公在榖遇齊侯已無人君相見之禮蕭又從而朝之失其所矣㑹謂莊公反不如杞梁之妻乎蕭叔者附庸之君未有爵自後稱子矣正與邾儀父同夫公納幣而還則祭叔聘之觀社而還則荆人聘之及遇于穀則蕭叔又從而朝之此其志所以自得而無復忌憚也秋丹桓宫楹莊公不能為桓復讎而反娶其女以奉宗祀其無父之心夫人皆知之而莊公惡人之議已也故丹楹刻桷以示孝心之不忘甚矣莊公之無父甚矣莊公之行詐也夫宗廟之飾國有彛典而妄肆奢麗加于禰宫亂王制瀆先君不恭莫大焉聖人直書其事具文見意故凡加非禮十先君之廟者皆春秋之所誅也後世人君崇侈廟宇踰禮越制自謂吾嚴奉之勤而臣子一有敢議者則指以為不忠不孝而加罪焉是皆不知春秋所書之㫖者也冬十有一月曹伯射姑卒十有二月甲寅公㑹齊侯盟于扈此離盟也齊已霸矣復為離盟者婚議雖定齊猶疑之故為此盟此盟齊志也齊侯以公求婚之急甘心卑下恐公有心報齊不憚屈辱為可憂也于是致公于扈以盟冀絶婚後悔吝云爾惟公樂婚于齊故數以身親之以為恭焉是以春秋謹而日之二十有四年春王三月刻桓宫桷以丹之而必渝也又刻其桷焉自謂致孝乎朝神而其本意則以將逆夫人故加盛飾以誇侈之于桓公雖薨于齊而吾無怨齊之意鳴呼莊公真忍人哉志先君之讎娶讎人之女又加非禮于先君之廟以欺其臣民御孫謂之大惡豈不信夫葬曹莊公因魯往㑹而著其臣子私諡之罪夏公如齊逆女公先與高傒盟乃始納幣觀社于齊然其心猶未相信又遇于穀猶以為未也又盟于扈至是遂如齊逆女然則讎女之難娶也如此而公甘心必娶之蔽惑甚矣此不曰親迎而曰逆女者不與其親迎也公不念殺父讎國而與之婚又親至其國而逆焉人之無父未有甚于莊公者且又見其婚之不時也按桓六年子同生至今三十有七歲矣公即位二十四年始得婚者以文姜制之爾是以文姜既薨喪服未期而納幣諌娶若是之速惟恐其不得也聖人不敢斤言之但微寓其意使後人自求之爾秋公至自齊公既親迎則當與夫人偕歸今公先至而夫人八月乃入安在其為親迎乎以是見夫人不肯偕至者恐魯之臣子有以拒之所以齊人方議婚之際躊躇再三疑慮不決也雖然又豈可使婦人不從其夫之導而自入人之國乎君子以永終知敝宜其不終也八月丁丑夫人姜氏入夫婦人倫之本所以成孝敬也孝敬備然後夫人之職舉桓公見殺于齊而莊公乃以齊女為夫人欲責其孝則彼嘗賊我臣子之所疾也欲責其敬則我方讎彼鬼神之所棄也是不可以奉祭祀不可以當夫人之職矣莊公不知敬其身而嬖于孟任不能間其母而昵于讎黨即位二十四年而始娶喪母未及三年而圖婚既忽宗廟之制而侈飾以誇讎又違婚姻之義而先至以從約今夫人之歸虧從夫之義于理不順于禮不可姑不以至書而變文曰入入者自外而不順之辭以宗廟為弗受也夫婦者正始之道王化之基也夫人淫于慶父殺其二子幾喪魯國而終見討于父母之邦者由其始之不正也是以春秋盡其辭焉戊寅大夫宗婦覿用幣公見曰見私見曰覿此書覿者夫人既入公務奪示于國使大夫宗婦私見之非故隆其禮也以夫人始疑魯之臣子衆所不與今令私見而直用幣以重其事者所以示禮意而釋夫人之疑也凡男女相見之贄禮有定制公之孤四命以皮帛視小國之君今公乃使大夫宗婦用幣以見夫人是一舉而壞贄見之禮亂男女之制故書用幣以著其罪按特牲饋食禮佐食則宗婦統于主婦此曰宗婦謂此宗族之婦蓋主婦在其中也宗婦繫大夫猶惠公仲子矣大水內事失則土德壞簡宗廟悅婦人則水行佚而斯民被其災是以春秋志之冬戎侵曹所以納赤也納不正故書戎夫戎而敢專制諸夏廢置人君此見中國不自正亦所以病齊桓也曹羈出奔陳赤歸于曹曹羈出奔陳赤歸于曹以戎侵故羈奔而赤歸制在戎故也與桓十一年宋人執鄭祭仲突歸于鄭鄭忽出奔衛同故春秋一貶之嗟乎使鄭忽曹羈在喪而哀臨事而恭大夫順之國人信之雖有宋戎之衆赤突之孽何由而起所以君臣交爭此弟為仇者由上失故下得也按史記世家自曹莊公之後僖公夷昭公旺冬立九年今考經文自赤歸至于班卒共十八年合之于史則各據九年疑赤即僖公而世家誤作夷也郭公先儒謂公當作亡字之誤也按管子載桓公問郭公亡之事今考其時則正相接也故知當作郭亡與梁亡同義此乃自取滅亡之實可為萬世之戒二十有五年春陳侯使女叔來聘十九年公子結媵陳人之婦至冬而陳人伐我西鄙自是陳魯不睦此使女叔來聘者始結好且為曹羈故也是時原仲相陳使女叔來以和二國之好春秋嘉之夏五月癸丑衛侯朔卒衛惠公立通及三十一年不書葬者天王已黜之矣強為諸侯所納又敢奉子頽以亂王室故貶其葬正與鄭厲公相反是以見春秋之尊王也其子赤嗣立是為懿公六月辛未朔日有食之鼓用牲于社夏書稱仲康肇位四海及季秋月朔辰弗集于房瞽奏鼓周禮鼓人救日月食則詔王鼓太僕救日月食則贊王鼓然則救日有伐鼓之禮矣傳曰天子伐鼓于社責上公也諸侯伐鼓于朝退自責也然則曾國不當鼓于社矣且日食雖有鼓于社之禮又未聞有用牲者今魯國以日食而鼓用牲于社是僭也是妄作也此春秋之所譏也伯姬歸于杞凡內女書歸者皆有謂也若時君之女則加子字以别之此伯姬若桓公末嵗所生之女則于今殆二十有餘歲蓋已失時矣公既娶而后嫁之何哉秋大水鼓用牲于社于門去年秋大水今秋又大水以其災之甚而思所以息之故鼓用牲于社于門也古人遇水旱雖有雩榮祈禳之禮然靡神不舉靡愛斯牲已為宣王之變雅况于社于門非所以致水災者也自古豈有伐鼓用牲以救水災之禮乎冬公子友如陳報女叔之聘且為曹羈誅也魯使大夫聘皆書如者春秋假魯以託文凡聘皆非禮之正故志其非王事而出境爾若有故則書故葬原仲逆女之類皆兩罪之二十有六年春公伐戎伐戎者何為曹羈也然戎之病我非一日也費誓曰徐戎並興東郊不門是春秋以前已為魯患矣入春秋以來隱二年公㑹戎于潛秋公及戎盟于唐七年戎伐凡伯于楚邱桓二年公及戎盟于唐莊十八年公追戎于濟西二十四年戎侵曹然則戎之害中國如此今公伐之雖四百名非禦戎之道也夏公至自伐戎公自春伐戎及夏而歸故書至以危之曹殺其大夫除羈之黨恐其內應也夫諸侯之卿雖有上下之殊以周禮考之皆不過大夫之位故總謂之大夫凡諸侯大夫皆命于天子故欒盈以士丐為王之守臣管仲以國高為天子之二守晉景公請以鷩冕命士會將中軍而周景王以為鞏未有職于王室是知春秋之世諸侯雖僭而命卿之制猶有先王之舊焉夫既以天子之命佐其國立其朝則其生殺之柄乃天子所持故春秋無天王殺大夫之文而書諸侯殺其大夫者以刑不上大夫大夫有罪則當請于天子而聽命焉諸侯不得専殺也且諸侯之臣其名宇見于經者必大夫也但書某國殺某則知其大夫矣安用更書殺大夫耶其必書之者乃所以著其不當殺也五霸桓公為盛而葵邱之會著明天子之禁其四㑹曰無專殺大夫五霸已為王王之罪人然桓公南克如此况王道之行諸侯敢專殺哉况有不至于殺者乎入春秋以來未有專殺者而曹以小國首惡故春秋不顯其名氏惟著其擅命專殺之罪為萬世之大戒也凡殺大夫稱國者疚在上也明其君之專殺也此年曹殺其大夫是矣稱人者亂在下也見國亂無政而衆人擅殺也若晉人殺其大夫先都是矣其大夫書名氏者各著其事其有罪者定以為世戒其無罪者或昭其節使大夫朽或矜其不幸殞身使人求所以免也秋公㑹宋人齊人伐徐齊已霸矣其伐徐不主齊何也齊不主兵也齊何以不主兵此舉為曹伐戎也曹者宋之屬也戎即徐戎也齊侯因命宋主之聖人而因書之其意深矣夫諸侯不専征是以屬之方伯連帥今齊為霸國而謀伐徐為其事小而用兵寡因使宋主之則是人自為政殆與諸侯無霸無以異矣天下之事有具變微而損大者此類是也故春秋因伐徐一見之徐蓋自是服于中國論者以徐楚吳越皆本夷狄非也徐伯益之後楚祝融之後吳泰伯之後越大禹之後而諸戎皆四嶽之後也其上世皆有功德顯功通乎王室與中國之君等耳但見王室卑弱自以逺于中國王靈不及皆僭名號故徐首稱王楚後稱王吳越又後皆稱王其僭亂已甚是以春秋亦因以外裔待之蓋惡其僭也冬十有二月癸亥朔日有食之莊公兩年之間日再食此不復代鼓用牲者知其非禮無益也春秋集注卷十一
