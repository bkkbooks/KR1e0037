body:
  text: 春秋集注卷四十宋髙閌撰哀公二七年春宋皇瑗帥師侵鄭晉衰齊亂故宋公窺霸也不務德而加兵于人非霸主之義故學侵以譏之晉魏曼多帥師侵衛衛侯棄其父至今六年矣猶未納也晉不以此致討而以范中行氏故加兵于衛故書侵以譏之夏公會吳于鄫吳欲霸諸侯公親往會之遂徴百牢魯人以吳為棄禮必不能霸然其徴令無度乃兵至之兆也可不戒哉會吳不致不專以夷狄危公也會大夫伐小國亦如之秋公伐邾是時邾已服于吳矣公反自鄫以吳為無能為也季孫因請伐邾公弗能禁故直書公以示貶八月己酉入邾以邾子益來邾入春秋之始自儀父與魯盟㑹結好凡二百四十年矣今不明過之在我君臣更伐之至于四至于五取田取邑亦云極矣終入其國又執其君以歸雖因其國之漸衰然公一闔閭也春秋隱君之惡故伐人書取婉而成章而不失其實也恃强陵弱無故伐人而入其國處其宫晝夜掠以其君來獻于亳社囚于負瑕此天下之惡也吳師為是克東陽齊人為是取我二邑辱國亦甚矣何以備書于䇿况仲尼躬事哀公未嘗不盡禮焉曷不少為我君隱乎聖人不以無過為美而以能改過為美故于人之有惡苟務去之而不積則亦不念其惡而進之矣書伐邾書入邾書以邾子益來是天下之惡也及其歸邾子益于邾則是知其為惡而能去矣故于此詳著之而不少隱者乃所以欲見厥後歸邾子之能去其惡而與之也聖人之情見矣明此然後可以操賞罰之權矣邾子以見獲故名之不言滅者諸大夫請救于吳吳為之伐魯而公遂歸邾子故也不言以歸而曰以來者內外之辭也不書至者以邾子益來則公之至可知矣宋人圍曹曹伯奸宋是以致討然宋之伐曹數矣今又圍之亦已甚矣故貶人人之先儒謂將卑師少稱人按經稱人以圍國者凡十有一若皆將卑而師少又豈能圍之乎明年書宋公入曹則知此書人者乃貶之也冬鄭駟宏帥師救曹鄭與曹疏矣此所以救曹者非志于義也欲報皇瑗之師也疾宋也八年春王正月宋公入曹以曹伯陽歸此滅曹也而不書滅滅者亡國之善辭上下之同力也據左氏曹伯背晉奸宋宋公伐之將還曹人詈之公聞之怒遂命反師滅曹執曹伯以歸焉然則宋公非有志於滅曹而曹自滅之也故此書宋爵又止稱入而已所以罪曹人輕怒以亡其國也吳伐我邾子請救於吳故此年吳來討焉嗟乎公入人之國俘人之君以致吳師之來討見公不能處已絶亂矣不曰伐我某鄙而直云伐我者吳師加魯國都而盟于城下是以聖人深恥之故沒而不書也夏齊人取歡及闡邾嘗屬齊而益又齊之甥也魯入邾而以其君益來遂致齊人亦怒于是賂齊以說之凡內失邑不書蓋不能保其土地人民辱孰甚焉故沒之也若已與之彼以背義而受則書取此年齊取歡闡及宣元年取濟西田是也歸邾子益于邾益齊甥也齊侯使如吳請師吳方圖霸亦受邾人之訴而謀伐我故公懼其復來乃歸邾子以紓國難雖非公之自能悔過遷善然亦因敵國外患而知警懼思變也以此見國君造惡不悛則四鄰謀取其國家莫能自保苟去惡而不積則四鄰不侵其封境自安矣春秋前書伐邾次書入邾又書以邾子益來不少為我君隱者以明歸益之能掩其前惡而美之也秋七月一時無事書首月存天道王法也冬十有二月癸亥把伯過卒杞僖公立十九年其子維立是為閔公齊人歸歡及闡公既歸邾子益于邾故齊人歸歡及闡前書取逆辭也此書歸順辭也去逆效順息爭休兵齊無取地之罪魯無失地之辱斯可謂善變矣然不云歸我者公既歸邾故齊亦歸歡闡非以為惠也上既書取則知此必歸魯故亦不書來九年春王二月葬把僖公三月而葬簡也史記把悼公卒子隱公乞立七月隱公弟遂弒隱自立是為僖公然則僖立不正而春秋于葬不少貶者見世亂如把僖尚且得葬則諸侯無不葬者矣宋皇瑗帥師取鄭師于雍邱取易辭也師而易取則鄭病矣鄭罕達之屬有許瑕者求邑而無以與之遂越境而圍其邑斯用師為利而不以義自取喪師之禍故書取以惡鄭也春秋以是為帥師之戒夏楚人伐陳秋宋公伐鄭報雍邱也稱爵稱伐以惡鄭也冬十月一時無事書首月存天道王法也十年春王二月邾子益來奔吳恃歸益之功而恣為不道而益亦不能嗣守先業上下乖離國人不君吳人討而囚之乃使其大夫奉其太子華以為政故稱名以絶之且先為魯所獲而又來奔其不知恥甚矣公會吳伐齊吳欲求霸怒齊不服故伐之公會強吳伐親鄰之國是助吳為虐而致齊之亂也是時中國無主之甚蓋自是春不書王矣三月戊戌齊侯陽生卒八年齊侯請吳師伐魯既而取魯之賂而辭吳吳子怒反與魯伐齊齊人弒悼公赴于師吳人乃退夫悼公之立非齊人之志非衆大夫之謀特陳乞詐其國人誣其大夫而劫立之雖殺孺子誅鮑牧大夫國人猶莫之肯君故因兵難而弒之齊人共立其子壬是為簡公夏宋人伐鄭去年春取鄭師而秋又伐之今雖復有辭于伐而聖人惡其瀆兵不已故貶而人之晉趙鞅帥師侵齊齊率諸侯以二晉可以討矣然趙鞅加兵于有喪之國雖討得其罪聖人弗豫也故書侵以譏之異乎士丐矣五月公至自伐齊齊與魯接境而公會强吳伐之致齊侯之遇弒今既聞其喪則遂班師可也其所以久而歸者公之進退制在吳故也葬齊悼公不及五月而葬簡也以公會吳伐齊故齊弒君以說公雖不廢喪紀往會其葬不足以贖其過故承上文言之且著其臣子私諡之罪衛公孟彄自齊歸于衛公孟彄以蒯瞶之黨見逐晉納蒯瞶齊助出公而反納彄則知逐非其罪矣始彄奔鄭自鄭奔齊至是遂假齊之力以歸焉薛伯夷卒不書曰史闕文秋葬薛惠公冬楚公子結帥師伐陳陳即吳不服楚故再伐之吳救陳此與狄救齊同義所以罪中國諸侯也蓋陳背中國而即楚又背楚而即吳故致楚師來伐則吳之救之非真能行義也故不稱師亦不稱子直曰吳而已十有一年春齊國書帥師伐我夏陳袁頗出奔鄭案經文公羊作袁頗左氏穀梁作轅頗此從公羊袁頗為陳司徒取于民無制國人怨而逐之故以自奔為文五月公會吳伐齊會者外為主吳劫之也公非得已也甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書公因齊國書之見伐乃再㑹吳伐齊而戰于艾陵不書公者沒公乃所以貶公也且書及吳我師戰于艾陵不可也書及公吳戰于艾陵不可也先言公會吳伐齊繼書及吳戰則公預其貶可知矣公與强吳伐中國不可與强吳同貶又不可以大夫敵公故微其辭而獨出公也其書及書獲則罪國書也與宋華元同然華元生獲而國書死獲故公使太史固歸國子之元也國書復繫以國者與宋華元皆以國事見獲也秋七月辛酉滕子虞母卒滕隱公立七年冬十有一月葬滕隱公因魯往會而著其臣子私諡之罪衛世叔齊出奔孔文子以齊淫而欲攻之故齊出奔宋春秋書內外大夫出奔者凡五十有八蓋君之股肱治亂所寄故重以書之然春秋之末何其出奔之多也是時政在大夫各欲自專故始則相猜相忌終乃相攻相逐也十有二年春用田賦譏重斂也田者井田也賦者財賦也宣公奢泰始什二而稅至于哀公則又甚焉既什二而稅其田又什二而飲其財故書曰用田賦言用田以為財賦之率也民到于今受其患夏五月甲辰孟子卒此昭公之嫡夫人吳女也記曰夫人之不命于天子自魯昭公始昭公欲結好彊吳以去三家之權因娶于吳以吳同姓不敢請命于天子而謂之吳孟子當是時大臣不能匡救國人不以為非而昭公乃知避其名不敢請命于天子是猶能改過也故孔子以為知禮而春秋亦因其實而書之曰孟子卒而已孟子于哀公為祖妣不夫人不薨不葬不祔廟著哀公之忍也觀季氏于昭公之葬尚欲溝而絶之况其所娶同姓之女乎故春秋但書孟子卒而魯國臣子之罪可見矣雖周道親親百世而婚姻不通而昭公既已尸其過矣為之子孫者豈忍絶之哉然則如之何曰倣諸仲子别考宫焉庶乎其可也公會吳于槖臯尋鄫之㑹秋公會衛侯宋皇瑗于鄖此為吳故也按會衛宋于鄖者不與公之會所以外吳于中國也亦所以存內也宋向巢帥師伐鄭宋平元之族自蕭奔鄭鄭人為之城嵒以處之于是向巢伐鄭而圍嵒冬十有二月螽建亥之月不宜有螽此著魯厯不得其正也十有三年春鄭罕達帥師取宋師于嵒宋師之在嵒也不設備鄭罕達因宋師之不戒而取之亦以報九年雍邱之役也二國覆師以相償報惡孰甚焉然則出師而不設備者皆棄師之道故春秋著之為伐國者之戒夏許男成卒許元公立二十二年其子結立是為悼公公會晉侯及吳子于黃池黃池之會書公會晉侯及吳子者主在吳子也黃池之會不主晉侯而主吳子者晉侯不能主諸侯故也吳自柏舉之戰勢橫中國諸侯大小震栗皆宗于吳晉侯不見者二十四年此不能主諸侯可知也元年書齊侯衛侯伐晉見霸統之絶已受諸侯之伐故黃池之會吳子主焉不言公會吳子晉侯者不與吳之主中國也不與吳之主中國者存中國也故以晉侯及吳子為文稱吳之爵所以見中國之衰書晉之及所以抑强吳之橫春秋謹嚴其義甚微故首止先及而後會所以尊王世子黃池先會而後乃及所以外吳子也按吳自定四年入郢哀六年伐陳夏叔還會吳于柤七年公會于鄫八年伐我十年公會伐齊十一年公又㑹伐齊十三年公會于槖臯皆曰吳以狄之此稱子者復與其爵也夫吳乃泰伯之後與周同姓雖用夷禮而數為中國伐楚所以伸中國而攘楚者其功甚多此宜春秋之所豫而春秋與楚同貶者以其狂僭大號擾亂中國與楚同也夫天無二日民無二王楚以蠻夷而僭稱王罪不容誅幸齊桓晉文相繼抑之是時齊桓晉文雖主夏盟而以中國諸侯之故猶知有周王在焉今吳乃為黃池之會以主盟中國是二王也將置周王于何地耶聖人自十年吳伐齊之後春不書王以見天下之無王此春秋之所以作也楚公子申帥師伐陳楚畏吳之强無如之何故乘吳子出會而伐陳也於越入吳吳方為黃池之會爭權上國而於越又乘其無備而入之自是吳不復振而越亦僭號稱王遂入于中國而天下淪胥不復知有周室矣原周之衰自幽厲失道王綱紊亂而禮樂征伐猶出于天子諸侯畏周之威不敢肆也及平王東遷王室不競諸侯國自為政周道凌夷等于列國逮隱之世習之成俗而楚遂僭竊王號無所忌憚然而文武成康之德猶在民未忘周也故齊桓晉文相繼而起莫不秉大義以攘夷狄而尊王室其盟會征伐必以王命為首諸侯順之者存逆之者亡世雖無王而法猶立故春秋推王法以絶之以天下猶知有周也及定哀以來齊晉既衰政出于大夫吳楚橫行于中國以勢力相吞滅自於越入吳之後吳楚又衰夷狄愈橫禮義無可復施政刑無所復加諸侯習于凶亂不可告語靡然入于戰國不復知有周而皆自稱王矣故春秋因西狩獲麟而止焉冬田曰狩而周之正月二月皆冬也明年止書春西狩獲麟而不具夏秋冬則秋會于黃池之歲乃春秋之所終也故何休曰獲麟于春而言狩者去周之正而行夏之時也秋公至自會吳主會故書至以危之晉魏曼多帥師侵衛蒯瞶在戚今有十二年矣晉人不能以此致討于衛以范中行故而數興師故書侵以罪之公羊作晉魏多與仲孫忌同義葬許元公因魯往會而著其臣子私諡之罪九月螽周之九月夏之七月也其為農災又非冬十有二月之比也冬十有一月有星孛于東方不言宿名者董仲舒劉向以為不加宿也文十四年有星孛于北斗昭十七年有星孛于大辰皆言所次而此獨不言則不加宿可知也蓋著人事所召自是周家業業墜地矣盜殺陳夏區夫夏區夫徴舒之後也徴舒弒君楚子殺之而陳人猶使世執國政故春秋因其為盜所殺而書之與華孫同意凡書盜者以人皆可得而執之也盜殺蔡侯申盜殺陳夏區夫當春秋之季世變之甚至于盜興而專殺國君卿大夫則亂已極矣十有二月螽去嵗十有二月螽今年九月螽十二月又螽則為災甚矣而明年春乃獲麟豈不怪哉十有四年春西狩獲麟麟者和氣之所致治世之應也曰見曰來乃為瑞爾因狩而獵得之則混于禽獸之中同為虞人之所驅斯麟之出不遇時矣曰獲云者悼之辭也孔子卒于獲麟之後二嵗則是時孔子巳老故感以作春秋而絶筆于此一句也以因感而作故因以此終焉然而麟使不獲聖人豈遂無意于天下後世乎黃池之會乃聖人作春秋之所終也何以知黃池之會乃春秋之所終前此猶可言也後此則不可言也夫惟不可言此春秋之所以終也何者天子失政自東遷始前此猶可言黃池之會晉魯在焉後此不可言者諸侯泯泯制在强國無復知有周室矣聖人為是作春秋深有望于天下後世苟有王者作能舉吾春秋之法以拯天下之民此春秋之所終而孟子深得仲尼作經之㫖故以王道游于諸侯而終不入于秦楚吳越也春秋集注卷四十
