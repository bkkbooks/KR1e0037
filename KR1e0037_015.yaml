body:
  text: 春秋集註卷十五宋高閌撰僖公二五年春晉侯殺其世子申生諸侯世子皆誓于天子不可專殺也且父子人之大倫非他人所得間者今至于相殺則人倫廢矣况世子至親非其君自殺之則無敢殺者是故斥言晉侯所以深罪其聽讒而忍殺其子也觀宋苓之詩盖可見其好聽讒矣然申生志安其父而陷之于大惡不容無譏故甚晉侯則申生之譏在其申矣何則父子之間雖以恩掩義義有不可已者舍恩從義可也曽子小杖則受大杖則走此以義愛其父者也若申生者知恩而已非君子所貴也使申生能自直獻公慨然知自及雖居不安食不飽君子猶以為孝也直而不勝逃而免難俟其自悟父子之恩猶可全也申生不知出此二者而為臧獲之計其不智甚矣非特陷父于不義自是晉國大亂庻孽覬覦互相簒殺至文公始定迹其禍端實由此爾或曰世子實有罪則如之何曰先以讒譖為慮可也若不免乎疑則加温辭以訊之勿盛怒以恐之使世子得盡其情可也世子辭盡而實有罪則亦教誨之而已若終不改焉諸侯則聽命于天子天子則大㑹羣臣于朝而顯議之羣臣有辨其讒譖則父子釋然無疑可也然以為有罪必可廢則廢其爵位如堯之待丹朱俾終其天年以全吾父子之愛可也又何必殺為夫為人父而殺其子未有不由内寵者故春秋特書晉侯殺其世子以為後世之戒以此為坊而後世猶有以堯毋名門使姦臣逆探其意以成巫蠱之禍者杞伯姬來朝其子杞伯姬來者不宜來也朝其子者不當朝也先王之制諸侯未冠而即位謂之童子侯童子侯不朝盖不可以成人之禮接之也伯姬歸杞方十三年如其有子必尚㓜穉又未嗣位如之何而勝朝乎若伯姬歸寧而與其子偕來則亦常事不書矣今特書杞伯姬來而繫之以朝其子盖無故而來以朝其子為名春秋别嫌辨疑與書子同生同意意在言外也夏公孫兹如牟按桓十五年牟人來朝盖小國也魯必不使大夫往聘此書公孫兹如牟者直著其託聘使以圖昏左氏以為娶是也盖大夫非君命不踰境今以聘行則其出為有名矣然小國不能自進于禮而我先聘之公孫兹雖可逃責于一身適自取卑辱耳公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止齊侯九合諸侯此其六也凡魯與一二國盟伐則有稱㑹稱及之異以辨起意之主若大㑹諸國盟伐皆盟主所召而往就之故悉不書及此書及者非内為主也殊㑹王世子故不言㑹齊侯而書及也齊桓恃平楚之功坐致天王之世子故聖人不與齊桓之致世子而以諸侯㑹王世子為文盖王世子天王之貳也不可以並諸侯之列也春秋之法尊君而卑臣抑强而扶弱君弱矣則扶而尊之臣強矣則抑而卑之豈特懲當時之變亂盖將以明天地之義也故殊㑹王世子所以示諸侯不可得而抗之且避不恭也然而世子出㑹非王命也天王以惠后故將廢世子鄭而立王子帶齊侯以為議之于朝覲貢之以諌詞從則王子安不從則廢之是從違未可知也莫如為㑹以見世子使天下諸侯曉然皆知世子之為鄭而共尊之吾從而與之盟則雖有惠后之愛天王不得行其私則世子終可不易矣此齊侯之志也雖然諸侯不以王命而敢㑹世子世子不以王命而出㑹諸侯此皆天王弱諸侯强以公義而脅天子天子以私懲而見制子諸侯君臣父子之間皆失正矣王世子位定是為襄王而許男居喪出㑹則又覩文見義也秋八月諸侯盟于首止此復舉諸侯者尊王世子不敢與之盟也㑹者辨上下之禮修和好之道而王世子與焉猶之可也盟者以不相信故也若王世子亦與焉則是以所不信者加之王世子與約束諸侯無異故齊侯不敢盟世子而與諸侯自盟諸侯自盟乃所以定世子也夫齊既不敢盟世子而以㑹世子為名可謂知尊王矣然齊侯之霸既致王世子而㑹之晉侯之霸遂致天王而朝焉孔子罪作俑者由召世子至于召王則其弊不可勝誅矣凡諸侯期盟而往㑹者則書公㑹某人盟于某地盖期㑹至而遂盟也若盟非前定則書公㑹某人而後言某日盟于某地盖明既㑹而始盟也或間有他事則再言諸侯如重丘之類嫌盟擊于他事也今首止之㑹中無他事而再舉諸侯者董仲舒曰書之重詞之複其中必有大美惡焉首止之㑹雖衰世之事亦變之正者彼善于此亦可謂之大矣是以書法如此鄭伯逃歸不盟齊侯以楚數病鄭之故遂率諸侯伐楚攘夷狄救中國遂㑹王世子于首止明大義于天下此盛徳之舉也當是時諸侯未有從夷狄之心而惠王由嬖孽之私棄理義之正啓鄭從楚以惎間中國召鄭伯曰吾撫汝以從楚于是鄭伯喜于王命遂棄諸夏外交蠻夷逃歸不盟陰與楚通自是楚復與中國爭衡鳴呼若權輕重而言之天王之召私意也諸侯之盟公義也與其外與蠻夷通孰若内附中國之為愈也故書曰逃歸言義當留而竊去曰不盟者言可以盟而不盟所以深罪鄭伯也夫齊之服楚所以營圖之則有日矣裁踰年而惠王已率鄭伯以叛之故知王室之不競非獨彊楚與諸侯之罪也周室實有以來之抑又齊侯之霸不知請命恃强而預王政所以惠王之與楚亦齊侯實有以致之上下相習煽而成俗謂之春秋之世而不復西周之盛盖以此一變而為春秋再變而為戰國陵夷至慎靚赧王之世共主不復與起矣雖名世大儒亦以王道説諸侯俾之自王不復更談周室矣楚人滅弦弦子奔黄齊侯自侵陳之後已起諸侯之叛心至是鄭伯竊與楚通楚人遂滅弦以為寇中國之兆也弦子奔黄以黄睦于齊藉以依中國也不名者何楚人恃强逼而去之非弦子之惡其義未虧其國可復而齊侯雖霸不能救之也九月戊申朔日有食之雖有常度亦人事所召有食之者冬晉人執虞公虞公嘗為天子三公故稱公此晉人滅虞而曰執虞公者不與其滅也盖滅者亾國之善辭上下之同力也今虞已自滅晉人但執其君爾晉初以詐謀假道于虞以伐虢其意欲以兼取虞也虞國托于晉之側以虢為捍蔽而其君庸啫不能辨晉之詐謀而貪其賄賂導之伐虢虢亡而虞見滅國滅而不知諌又不察至執而後省謂之執虞公可也聖人方罪虞以立萬世之戒若書曰晉人滅虢遂滅虞執虞公以歸則不見虞公之惡非春秋之義也故前書虞師晉師滅下陽此書執虞公皆罪虞也其人晉侯而爵虞者則又以明晉人之甚也甚者何虢保逆旅以侵南鄙猶可以為罪賄虞而虞從之何罪而滅之人晉而爵虞非聖人孰能别之此之謂明㣲六年春王正月一時無事書首月存天道王法也夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭去年齊侯㑹王世子于首止而鄭伯逃歸不盟遂與楚通是啓諸侯之伐七年齊又伐之八年甯毋之㑹遂不敢與盟而令世子聽命焉九年㑹于洮而鄭伯遂乞盟也噫諸侯之尊始于逃歸終于乞盟甚矣哉鄭伯之可羞也圍新城新城實新密鄭人新造之邑也鄭伯逃歸盖王之意也從王之意不可伐也投䑕忌噐之義也故鄭誰諛王意以與楚而齊當請王命以服鄭不當遽伐之此鄭人所以不服也鄭既不服乃以其非時城邑為罪從而圍之聖人即書圍新城以示義秋楚人圍許楚人圍許者所以救鄭也夫楚之所以敢背召陵之盟而興圍許之師者以天王撫鄭使背齊而即楚故也齊侯不能以王命懐徠諸侯而自恃威强不有天子此所以使楚有圍中國之心而起救鄭之謀也諸侯遂救許楚人圍許以援鄭故諸侯釋新城之圍遂移兵以救之然則伐鄭未足以討罪救許不足以為功徒勞民而已爾齊侯誠能輔王修徳以懐諸侯則鄭不須伐許不須救而諸侯之兵不動矣故春秋書此所以病齊也楚子于是乎還冬公至自伐鄭暴師三時而不以救許致者救許因伐鄭故也七年春齊人伐鄭此復伐鄭者何齊侯以鄭伯求救于楚而不我服故又與師伐之不懷以徳而類加以兵强暴甚矣書之曰人不亦宜乎夏小邾子來朝隠公之時邾尚未爵曰儀父而已後始進稱邾子今郳犂來又得王命而稱小邾子矣于是見五等之號不復出于王者皆由齊侯之霸凡有邑者皆得以專封矣鄭殺其大夫申侯陳袁濤塗怨申侯之反已于召陵也故勸之美城虎牢而以叛譖之及齊人伐鄭鄭將服齊故殺大夫申侯以説夫申侯賣鄰以自封欺霸以禍國此足以殺其身矣然齊之伐鄭以逃首止之盟也今聼讒専殺大夫以説于齊則鄭伯失刑矣故殺稱國而大夫稱名秋七月公㑹齊侯宋公陳世子款鄭世子華盟于甯母齊侯九合諸侯此其七也齊侯伐鄭之意未巳鄭伯雖殺申侯矣猶有懼心故遣世子以嘗弑之齊侯宥之故為此盟以定之然而諸侯之心已不甚與于齊侯矣所以㑹四國而世子在焉見齊侯之盟已漸衰矣曹伯班卒曹僖公立九年不見于經其子班立是為昭公昭公亦立九年詩刺其國小而迫無法而自守好奢而任小人將無所依焉然卒無患者恃齊侯之霸也其子襄立是為共公公子友如齊罷盟而聘謝不敏也能事大國如此其恭僖公君臣之有道盖見于此懐不移此以事大王耳冬塟曹昭公因魯往㑹而著其臣子私諡之罪八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子款盟于洮齊侯九合諸侯此其八也王人者王世子之使也以王室有叔帶之難世子之位猶未定故使齊以求援也齊侯不盟王人此盟王人者何牢世子也惠王疾惠后主帶故齊㑹諸侯盟以牢之是以世子之使稱王人而序于諸侯之上所以尊王室也曹伯居喪出盟覩文見義洮我地鄭伯乞盟乞者賤辭鄭伯前此不盟者恃惠王也自逃歸之後屢遭兵革鄭不勝其敝而楚亦不敢與争故先使世子與盟今以王人在㑹而王世子之位已定矣將何所恃哉于是自請與盟故書乞以賤之且著悔也夫楚為中國患久矣而鄭先受其害也自莊十六年書荆伐鄭至二十八年荆又伐鄭僖元年楚又伐鄭二年楚又侵鄭三年楚又伐鄭凡五伐鄭與中國争衡自齊桓召陵之役兵不血刃楚自懾服然則鄭之為鄭非齊侯撫以徳禮則鄭終不知反遂為蠻夷之人矣攷之于經自此十七年齊侯小白卒楚人絶迹不復加兵于鄭則小白之功亦盛矣鄭伯曷可背齊而附楚耶故聖人備書其逃盟乞盟之事既以罪鄭伯見義之不明亦以惡惠王御世之無道也夏狄伐晉齊桓率諸侯以攘夷狄而秦晉不至亦不强致狄知晉不與中國之㑹故敢伐之其謂之伐則以晉不自正故也書此以見狄之熾而齊侯不救亦不害霸秋七月禘于太廟用致夫人按明堂位言成王命魯公世世祀周公以天子之禮樂是以魯君于季夏六月以禘禮祀周公于太廟今用七月者夏之五月也失禘之時矣而雜記載孟獻子之言曰七月日至可以有事于祖故七月而禘獻子為之也獻子此時雖未見于經要之改用七月者出于後人之私意爾用致夫人者言不當用禘而致夫人也入春秋以來惠公夫人仲子以再娶而弗致于廟隠公夫人子氏以先薨而弗致于廟桓公夫人文姜以夫弑而弗致于廟莊公夫人哀姜以殺子而弗致于廟閔公則未娶焉然則由閔公而上五世之廟闕夫人以配祭者多矣今僖公因禘于周公之廟而盡致之以不可悉志其姓氏故但書曰用致夫人豈非因審諦昭穆而皆致于太廟歟越禮妄作之罪可見矣冬十有二月丁未天王崩左氏謂惠王以七年閏十二月崩今年正月諸侯㑹洮謀王室之難襄王位定而後𤼵喪若然二月間位已定矣何得直至十二月而後𤼵乎此必不然或者去歳惠年疾不蒞政世子懼難而圗諸齊故為洮之㑹至是惠王姑廂歎按厯七年閏十一月八年又閏十一月此雖置閏之失豈此年閏十一月王崩秘之至十二月乃𤼵喪幾然聖人作春秋必㨗質而書之宜以經為正惠王凡在位二十五年不書塟者罪諸侯致宰周公㑹于葵丘而不㑹天王之喪不臣之甚也九年春三月丁丑宋公御説卒宋桓公立三十一年世子兹父立是為襄公不書塟者宋子出㑹諸侯故諸侯併與天王之塟皆不㑹也夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘齊侯九合諸侯此其九也且齊侯圗霸内師諧侯外攘夷狄經營馳驟出入上下二十條年勞亦至矣然自服楚之後其心乃盈不能朝子京師翼在天子興衰振廢以復文武之業前此致王世子于首止此又致宰周公于葵丘周公以宰兼三公固亦尊矣然非世子足擬故秪書在諸侯上其他王人亦然所以尊王室也且惠王方崩諸侯不㑹其喪襄王在諒闇之中百官總已方聼政于冡宰而齊侯既不帥諸侯朝之及自相㑹以致天子之宰以天子之宰及来下㑹諸侯大義乖矣故聖人不予齊侯坐致天子之宰而以周公主㑹為文也凡諸侯在喪者稱子以吉杼者稱爵夫君子不奪人之喪齊為霸主當遏密之時大㑹諸侯又使宋子與㑹然則齊侯所仗大義果安在哉秋七月乙酉伯姬卒此内女已許嫁而未歸者公自夏出㑹聞伯姬之卒不復歸臨其喪無親親之義九月戊辰諸侯盟于葵丘復書諸侯者周公不與盟也攷孟子與穀梁所載葵丘之㑹諸侯束牲載書而不歃血是不盟也以不盟盟之也是以君子善葵丘之盟善葵丘之盟者非善其不歃血也善夫不盟宰周公也觀五禁之辭是齊侯所以約束諸侯者也聖人不使天子之宰反受諸侯之約束故以諸侯自盟為文又見齊侯自恃服楚之功故敢致天子之寄以約束諸侯盖襄王以危難纘嗣乃齊侯之功也因使宰周公來㑹以尊寵之觀其初㑹之辭曰誅不孝無易樹子無以妾為妻則齊侯翼載襄王之事昭然矣聖人再書葵丘者詞意雖然美之然亦實著周之極衰也使時君有宣王之資能任賢使能則齊桓管仲皆吾中興之功臣也雖然桓盟不日凡日者著不信也此盟在九合之末自此不復有衣裳之㑹桓徳寖衰諸侯日犯其盟而桓不復能征之矣是以謹而日之甲子晉侯佹諸卒謝湜曰晉侯晉獻公魯不㑹塟故不書塟冬晉里克殺其君之子夷齊獻公五子世子申生次重耳次夷吾次奚齊次卓子獻公不道申生以無罪見誅奚齊以不正為嗣非國人之志特君意所欲耳于是里克内懐不平遂率㔻鄭謀殺奚齊而立重耳也凡嗣君在喪稱子今奚齊不稱子者非正也若直曰殺奚齊則嫌乎簒者而里克之心在乎立正非若其他弑逆之比也故書曰殺其君之子盖明里克之意不在奚齊而本在其君則知奚齊非奸位見殺特以其非冡嗣之故國人不君之耳聖人特立此義以罪獻公殺嫡立庻為後世之戒此春秋辨疑似之罪而曲盡人情之所難也以此為防後世猶有欲立趙王如意致戚夫人之為人彘者十年春王正月公如齊公朝他國皆書如著其出境也若又有故則書故重其罪也納幣觀社之類是矣春秋書公如他國者三十五如京師一而已此又罪其朝王之簡也狄滅溫溫子奔衞著狄益熾也益熾者何伐邢矣入衞矣伐晉矣今又滅溫是益熾也益熾而齊侯不之問盖略之也略之者非若楚之僭也以傳攷之溫子叛王即狄又不能于狄故狄滅之然奔衞不名者不與夷狄滅王畿之邑而逼逐天子之大臣又見狄之強暴居然而滅溫密邇王畿矣齊侯可不治溫溫子乃司寇蘇公之後晉里克弑其君卓及其大夫荀息晉獻公殺適立庻非國人所欲是以里克殺奚齊特殺其君之子而已至于殺卓亦猶奚齊也而書弑其君者是里克之君也初驪姬将殺申生而難里克使優施飲之酒而告之故里克聽之乃欲以申立自免稱疾不朝居三旬而難作是以持祿容身速獻公殺嫡立庻之禍故成其君臣之名以正其弑逆之罪也觀春秋之書里克見聖人用心如天也殺奚齊不恕則後世忠臣無以行其志弑卓不正其罪則後世亂臣得竊比以為奸里克之心則是也其義則非也與荀息同心輔卓使社稷有奉足矣又何必重耳哉荀息者奚齊之傅也獻公病使荀息立奚齊而告之曰士何如則可謂信矣對曰使死者復生生者不愧其言則可謂信矣及里克殺奚齊苟息將死之人曰不如立東而輔之荀息立卓里克又弑之荀息死焉其曰及大夫者但以其守信而死君難故春秋名之又異乎孔父也栁子厚曰春秋之進荀息非聖人之情也進苟息以甚苟免之惡也此言是矣子是里克㔻鄭父以公子重耳之避嫌也乃與秦伯迎夷吾而立之是為惠公夏齊侯許男伐北戎前此書齊伐戎此書伐北戎又稱其爵者與之之辭也然秋之害中國甚矣齊侯不攘而斥之北戎未嘗入為中國患而齊侯以許男逺伐之何哉春秋與其伐北戎乃所以著齊侯無心乎中國也晉殺其大夫里克里克旣殺其君之子奚齊又弑其君卓及其大夫荀息而不以討賊之辭加之何也奚齊及卓之立皆非國人之所欲則里克之罪亦非國人之所憝也晉侯初許賂秦伯里克㔻鄭而得入旣而背内外之賂又恐其復召重耳以為已害故殺里克以自解本非討罪之意故以專殺大夫例書之明其託不得已而殺之所以著夷吾之忘恩背惠如此也初里克欲以中立祈免于死自謂智矣而終不能免等死耳不死于世子而死于此其亦不知命之蔽哉為人臣而不知春秋之義者必陷于簒弑誅死之罪克之謂矣秋七月冬大雨雪春秋書大雨雪者三隱以日書桓以月書此以時書建申建酉建威皆非大雨雪之時也故以此為異春秋集註卷十五
