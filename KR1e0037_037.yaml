body:
  text: 春秋集註卷三十七宋高閌撰定公二七年春王正月夏四月兩時無事義見桓九年秋齊侯鄭伯盟于鹹二國相約叛晉齊人執衛行人北宫結以侵衛以者行其意也齊侯召㑹于衛衛侯欲叛晉而諸大夫不可乃使北宫結如齊而私于齊侯曰執結以侵我齊侯從之衛遂叛既書行人而又書侵所以著齊侯之奸詐也結稱行人明其叛所當執也夫衛侯欺其羣臣以紿晉殘其百姓以奉齊齊之執結也固為有罪矣而衛之無良又甚焉齊侯衛侯盟于沙執其行人而求盟是劫盟也何有于信哉大雩因旱祭志僭也齊國夏帥師伐我西鄙齊叛晉與鄭盟故為鄭伐我且報二卿之圍鄆也九月大雩一時再雩見旱之甚冬十月一時無事書首月存天道王法也八年春王正月公侵齊公至自侵齊去年齊伐我西鄙有辭于我也公加兵于齊則無名矣是時魯政不復在公矣而三家者實使公欲歸怨于公故也春秋因而欲見公之舉動書至自侵齊者侵齊本出于三家而三家者欲歸怨于公故未踰時而致之且為下復侵齊起也二月公侵齊三月公至自侵齊公踰月之問再出侵齊雖三家者之所為然乍來不得休息見公之進退益不自專矣故兩書侵至以見之曹伯露卒此曹靖公也自曹悼公卒其弟聲公野立五年而其弟弑聲公而代立是為隱公隱公立四年而其弟露又弑隱公代立而經不書者習亂故畧之也凡立四年其子陽立遂為宋所滅夏齊國夏帥師伐我西鄙以公不與鹹沙之盟且報此春之再侵也按昭公之孫也齊雖不克納而有意存之矣定公即位未嘗修好于齊故齊比伐我而我亦再侵齊觀春秋書齊伐公侵則其曲直可見矣公㑹晉師于瓦公至自瓦晉將來救而齊師已退故公出而逆之于瓦瓦衛地也不書救者齊師先自退不因晉救之至也不以㑹致者公非出㑹也秋七月戊辰陳侯柳卒晉士鞅帥師侵鄭遂侵衛鄭伯與齊為鹹之盟衛侯與齊為沙之盟二國皆為齊而叛晉晉以是先侵鄭復侵衛所以絶齊之與國也夫晉不聲其罪以行天討而士鞅專用其兵又不能取服故兩書侵以罪之葬曹靖公因魯往㑹而著其臣子私謚之罪九月葬陳懷公此特書月又著其簡季孫斯仲孫何忌帥師侵衛為晉伐也以其為晉興師故書侵冬衛侯鄭伯盟于曲濮結盟叛晉也去年公侵鄭今年二卿侵衛皆為晉故而去鞅又自帥師侵之故二君同為此盟以固其謀從祀先公從順也不曰順者其事順其意則非故變其辭曰從也夫魯祀之不順多矣武公煬公在所當祧僖公閔公在所當正昭公則又當祀而不祀者也今當稱先公則盡從典禮不止為一公設也然不舉所祀之名不指所祀之所者非時妄祀其事可醜出于陽虎之矯舉故雖禮之復正者而聖人實書之在盜竊寶玉大弓之上所以誅陽虎之亂也當是時魯國之政季氏專之季氏之室陽虎有之魯之君臣拱手聽命無敢誰何此孔子所以歎陪臣執國命而知三桓之子孫微矣彼陽虎所以濟其奸謀者必有所挾故因人之所欲者而假譽焉以魯祀之不順久矣舉國之人皆以為非然百餘年間莫或釐正陽虎一旦去之自謂足以借譽于國人而已因得以肆其亂是為小正以售其大不正立小義以遂其大不義是虎之謀去三桓意若可善而其事則亂也其祀雖順而非所當祀也夫祀者國之大事而辭臣賊子得以專其廢舉處其升降聖人但書從祀先公而意皆可見矣所謂定哀多微亂者意在言外也嗚呼千載之下奸偽之迹禍亂之變彼得假託以濟其私者豈特一陽虎而已哉宜聖人之丁寧如此盜竊寶玉大弓明堂位以大璜為天子之器大弓為天子之戎器蓋成王以是賜魯是先君之分器也周官天府之職掌祖廟之守藏與其禁令凡國之玉鎮大寶器藏焉若有大祭則出而陳之既事藏之然則寳玉大弓宜藏之祖廟有禁令焉今因從祀先公出而陳之遂為盜所竊則國亂無政可知矣是時公室卑三桓弱陽虎以陪臣執國命將殺季桓子不勝而出故因從祀先公竊取寳玉大弓以行聖人以國之分器藏在宗廟非陽虎所宜有又不欲陪臣得奪而莫有抗之者故書曰盜竊凡盜竊者人皆可得而執之也九年春王正月一時無事書首月存天道王法也夏四月戊申鄭伯蠆卒鄭獻公立十三年卒其子勝立是為聲公得寶玉大弓陽虎徐思其不義又國之分器無益于用故使來歸之以解衆也若實書盜歸寶玉大弓則是見盜不禽非復成國故秖書得寶玉大弓以見器之空還而不獲盜者以正典刑則亦幸而得之爾盜竊之罪于誰責而可乎六月葬鄭獻公三月而葬簡也因魯往㑹而著其臣子私謚之罪秋齊侯衛侯次于五氏據左氏則是齊衛二君同伐晉也而書曰次者春秋傷中國之衰而存盟主也王道廢則存王霸業替則存霸公室微則存公此春秋撥亂之志也是以春秋之初不書伐王春秋之季不書伐霸至是知晉之不足與而齊衛二君未可以深罪也故稱其爵秦伯卒冬葬秦哀公秦哀公立三十六年世子蚤卒乃立世子之子是為惠公因魯往㑹而著其臣子私諡之罪十年春王三月及齊平魯與齊平故書及蓋平八年再侵齊之怨也然則魯已叛晉矣孔子何為相之耶曰是時晉已不能主諸侯矣孔子曰如有用我者期月而已可也三年有成此可以有為之時也而孔子已用于魯務崇德矣與大國為鄰而連兵不已則無以崇德故與齊平然後國可以靖而文徳以修也夏公㑹齊侯于夾谷及齊平故也以傳攷之夾谷實盟而齊侯使萊人劫焉非義也是以微之不志于經也公至自夾谷夾谷之㑹齊侯使萊人以兵劫故書至以危之晉趙鞅帥師圍衛報五氏之師也齊人來歸鄆讙龜陰田夾谷之㑹孔子相焉以禮卻齊齊人愧服故歸三邑以謝此服義而來歸之故書來歸蓋其致之有禮文故也鄆自昭二十五年齊侯取之以居昭公尋自有之讙龜陰亦魯田始失不書義見哀八年夫孔子夾谷之事人可能也而使大國失守悔過效順所不可能也此修誠之至崇徳之素感于其人之天譬如干羽格有苖非任智者所能測也揚子曰孔子用于魯齊人章章歸其侵疆惜乎魯不能終用之叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈郈叔孫氏邑也公若藐為郈宰州仇有怨于藐使其馬正侯犯殺之不能又使其圉人殺藐故犯懼而以郈叛書二卿師師圍郈著家臣專有大夫之邑也家臣專大夫此所謂出乎爾者反乎爾者也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣又曰祿之去公室五世矣政逮于大夫四世矣故夫三桓之子孫微矣自隱至昭十世而季孫意如逐昭公自季文子至桓子五世而陽虎遂囚桓子陽虎事季平子至囚桓子不克而亡歴昭定纔二世而孔子有十世五世三世之辨者蓋以魯約之而已非專指魯也自公室而言則宣至定為五世自大夫而言則文子至桓子為四世言三桓之子孫而不言陪臣者蓋孔子所致意以戒者尤在公室而不在大夫故再見之皆據春秋而言也二卿帥師圍郈而不服卒用反間以出叛人而後國安于此見孔子雖未去司寇已弗用矣故再書帥師圍邑帥師圍之弗勝所以著家𨽻之強國政絀也不書齊之致郈者弗子齊致也宋樂大心出奔曹樂祁犂死于晉晉人止其喪以求成于宋宋使樂大心盟晉且逆祁犂之喪大心偽辭疾于是祁犁之子訴于宋公而逐之故以自奔為文然辭使非大譴而讒言乘之罪累上矣宋公子地出奔陳宋公奪地之馬以與向魋地乃抶魋而奪之公弟辰使地出境以為君禮于是奔陳而公弗止焉不書弟者罪不專在兄也冬齊侯衛侯鄭游速㑹于安甫三國皆叛晉而㑹于此者蓋結謀也晉德之衰可知矣然春秋卒為晉諱者以齊景公不足以定霸故也非王道成不易王非霸道立不易霸此春秋所以定天下之定也霸統在晉已久久則難承矣聖人不忍輕絶之也叔孫州仇如齊夾谷之㑹歸我鄆讙龜陰由侯犯以郈奔齊齊又致郈是以叔孫州仇如齊謝焉宋公之弟辰暨仲佗石彄出奔陳辰以公子地故為二卿所書暨暨者以者以彼及此也夫國君必有左右大臣以輔其政今宋卿大夫或奔曹或奔陳數月之間五人逃去則君孰與處矣蓋宋公寵一向魋而暴虐大臣使骨肉離散相牽而去故書宋公之弟辰暨仲佗石彄出奔陳以譏之辰之勢力能使大臣挾之以去君則其寵任可知矣十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛始辰之出奔非其本心為佗彄地所疆故書暨今入于蕭以叛則惑于三子之言而變其初心故書及始奔書曰暨恕其不得已也叛而書曰及及猶汲汲然辰欲之矣蓋君者可貧可賤可殺而不可可使為亂今辰既出奔又聚合逋逃之徒藉陳之力入于蕭以叛焉甚矣人心之難于善也今既不能違三子之謀則其為首惡也何逃殆習見魚石華亥華寧向定之事而不知其為非也然必曰宋公之弟云者以明宋公寵任之過不能親親以致然亦見辰之本心非有叛意也而三子疆辰以叛與首惡者無差故同書以叛夏四月秋宋樂大心自曹入于蕭春四子入于蕭以叛而宋公不能討至是大心亦入于蕭以從之為其從叛人故不復書叛此五子者大為宋患由宋公寵以向魋故也然則為人君者豈可偏有所寵哉冬及鄭平平六年侵鄭之怨且復著公之叛晉也叔還如鄭涖盟魯與鄭盟則是同叛晉矣鄭未來盟而魯往涖盟則魯衰可知又見晉定公覇業衰甚故諸侯多叛春秋集註卷三十七
