body:
  text: 春秋集注卷十七宋髙閌撰文公一元年春王正月公即位先君未葬例稱子而文成定之即位皆稱公何也既踰年也一年不可以二君故終年稱子又不可曠年無君故踰年雖未葬稱公也公雖上不受命于天子而內受于先君異乎無所受而自立者矣故書即位二月癸亥日有食之日食雖有常度亦人君所召有食之者天王使叔服來會葬葬者臣子之事而會葬者諸侯相送終之辭也天王惟有弔贈含襚之禮爾今使叔服來會葬是自同于諸侯則天王之微弱可知矣具文見義夏四月丁巳葬我君僖公小心畏忌曰僖此臣子之私諡也詩頌僖公惟曰侯而已春秋例書公蓋臣子之辭也大王使毛伯來錫公命凡諸侯之立世子必請命于天子及諸侯之薨也必告于天子天子命立其世子為諸侯世子喪畢乃朝于京師以士服見天子于廟而受命焉未受命不敢服其服已見天子錫之韍冕圭璧然後服之歸設奠于祖廟然後臨其臣民焉蓋諸侯不命于天子則不成為君故世子雖有世繼之義必待天子爵命乃得為君也今文公未畢喪而天王使人即命之非禮甚矣韓奕之詩宣王錫命韓侯也其辭曰韓侯受命王親命之纘戎祖考無廢朕命夙夜匪懈虔共爾位朕命不易則諸侯之立必朝京師而受命可知矣晉侯伐衛晉襄欲紹文公霸業前年敗秦敗狄以其冒喪用兵非所謂以正伐不正也故皆敗而人之今衛侯以元咺之故文公之季年輒背晉而侵鄭襄公既祥遂告諸侯而討之據左氏人有朝王之實故春秋子其爵叔孫得臣如京師公初即位在衰絰中未嘗朝王而王遽使卿來錫公命公于是使陪臣如周拜焉天王之使毛伯來錫文公之使叔孫得臣往拜皆非禮也由君不君故臣不臣得臣公子牙之孫公孫茲之子也衛人我晉衛孔逹為政不共盟主興兵鄰國受討喪邑貶而人之不亦冝乎旦晉師未退而孔逹遽報其伐雖曰有辭失事大之禮矣晉師于是入于戚而強其田秋公孫敖會晉侯于戚晉襄初立公在衰絰中使公孫敖聘之晉侯伐衛已入于戚公孫敖因往致禮焉凡聘禮必受于廟今非其所故書曰會非公孫敖敢抗晉侯為會也不書晉師之入乃所以深罪衛也冬十月丁未楚世子啇臣弒其君髠春秋夷狄之君卒皆略而不日日髠之卒者所以謹啇臣之弒也啇臣弒君父自立惡逆甚矣人人皆得而誅之況楚蠻夷也中國當討其罪晉襄王盟中國不能奮中國之威以誅其賊而制其命聖人于此深惜之蓋當是特中國亂臣賊子往往而是是中國夷狄舉相似爾況楚僭竊大號自謂王子今書世子豈以其誓于天子哉特以啇臣世嫡當立而惡逆如此故聖人特正名為世子其旨深矣且傷中國不能自正見楚之悖亂莫敢誰何者是中國無人故也公孫敖如齊聘晉歸而復聘齊蓋魯人于是兩事齊晉且圖婚于齊故也二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績直在晉故書晉之爵秦師忿以取敗書敗績以戰而敗故不曰敗秦師于彭衙又謹而日之所以均晉罪于秦也丁丑作僖公主周人卒哭而祔祔而易主是謂虞主既期而練練而易主是謂練主僖公旬薨至今蓋十有五月矣非虞練之時而此方作主者猶未祔廟也猶未祔廟者欲躋之之故也是以謹而日之三月乙巳及晉處父盟凡盟必書地惟他國大夫來魯盟及魯大夫往他國盟不地蓋各于其國中故也今經不書處父來魯魯無亦如晉者而書及處父盟然則孰與盟耶曰我公也公如晉不書者晉襄公立貢魯背盟伐邾公雖居喪未朝天王而畏晉之威越禮朝晉晉侯反使大夫盟以辱之未有躬朝其國而下使大夫盟之者是以沒不書公也凡大夫與公盟者若非彼強迫我則但書人以明其非大夫之罪今晉實迫公今與大夫盟故特名處父又去其族以著其罪雖然此非專罪晉處父也亦所以罪魯之臣子也夫公之如晉豈無卿大夫以從行乎皆不能推明大義而以正理折之遽自屈辱甘心受盟是豈主憂臣辱主辱臣死之義耶夏六月公孫敖會宋公陳侯鄭伯晉士縠盟于垂隴盟于鄭地者聖人以此盟為謀討楚也故雖晉魯二卿而與宋陳鄭之君抗盟猶以爵以卿而書之尚冀其奮中國之威以制蠻夷弒逆者之命也奈何實因衛人請成而為此盟將復有事于秦爾故于伐秦乃悉貶之自十有二月不雨至于秋七月此可以見一歲之望盡失矣八月雖雨無及也文公無意于民怠于政事可知矣八月丁卯大事于太廟躋僖公大事者特祭也非時祭也以躋僖公故大其事也文公所以緩于作主意在此也夫僖公雖閔之兄然閔實先立僖公嘗北面而事之君臣之義已定矣及其傳繼則父子之義又定矣臣不可以先君子不可以先父今文公故自尊其父而躋于閔公之上則紊亂宗廟顚倒禮經先親後祖昭穆失序謂之逆祀不亦宜乎以此為防而漢儒猶有兄弟不相為後之論夫父子相繼此禮之常也至于傳之兄弟則亦不得已焉爾既授以天下國家則所傳者雖非子亦猶子道也傳之者雖非其父亦猶父道也以天不國家為重矣漢儒迭毁之禮引宣昭兩帝為昭穆猶知以孫為昭而不知禮無兩昭使昭帝之天下無所傳宣帝之天下無所受失禮意矣又惠帝文帝皆髙帝子惠帝親受之高祖文帝則受之惠帝雖皆兄弟亦與閔僖無異而當時譏者皆推文帝上繼高祖而惠帝親受高帝天下者反不得與昭穆之正至于光武當繼平帝又自以世涎當為元帝後皆背經違禮而不可傳者也而漢儒例以兄弟不相為後不當以昭穆格之此妄也則天下受之誰乎凡人君以兄弟為後者必非有子者也引而為嗣臣子一體矣而當嗣者反以為兄弟之故不繼所受國而繼先君則是所受國者竟莫有嗣之者一不可也生則以臣子事之死則以兄弟治之忘生倍死二不可也已實受之後君不受之先君今乃自繼先君則不惟棄後君命已之意又廢先君傳兄之命三不可也天下國家則歸之已父子之禮則恥不為四不可也徐邈曰若兄弟六人為君自為昭穆則後世當祀不及祖禰此又妄之甚者禮有所極義有所斷為之後者為之子所以正授受重祖統也兄弟六人相代為君亦六代祀祖禰矣假非兄弟相代而其祖亦當遷爾豈得故存哉即如邈言使有兄弟六人各自稱昭是有十三廟人其最後一君自上繼其父則五君終無後也豈其所以傳重受國之意乎凡言禮者惡其諂時君之意苟曰益廣宗廟大孝之本而不詳授受之道使當傳國者不忍以其國與其宗曰非吾子也當受國者人不肯以臣子之禮事其君曰非吾父也至令宗廟猥衆昭穆駢積而鬼有不嗣者皆不知春秋大義故也冬晉人宋人陳人鄭人伐秦今春之戰秦以忿取敗則晉亦可以已矣為晉計者不若復修城濮之事連秦伐楚討其弒君父之賊以光紹文公之業豈不善乎乃復摟三國以伐秦報復不已殘民結怨況再與兵而過京師此尤其惡之大者故貶而人之公子遂如齊納幣婚禮有六曰納采曰問名曰納吉曰納徴曰請期曰親迎固自有次第而所謂納幣者即納徴也公始祥而納幣則納采問名皆在三年之內矣夫三年之內不圖婚聖人特于此議之所以闡幽也先儒謂婚姻不當使公族而不述其所以蓋公子公孫之于國事皆當盡人臣之義惟婚姻之禮則有家人尊卑之序焉俾尊者而從事則非順矣卑者行之庶幾其可也三年春五正月叔孫得臣會晉人宋人陳人衛人鄭人伐沈沈潰沈在汝南平與縣未嘗與于中國之會若以為服屬于楚而伐之則可伐之國不勝其多矣魯使卿往則諸國必非微者夫中國不能明大義以討蠻夷弒君父之賊乃與兵以問小國之罪此可傷也已聖人悉貶而人之獨叔孫得臣書名氏者詳內且明諸國皆卿行也且文公三年之間書公子遂公孫敖叔孫得臣纍見于盟會則知魯之政刑盡在諸臣矣魯卒以是亡故春秋見微于濫觴書以為戒齊桓九合諸侯不以兵車管仲之力也而管仲之姓名不見于春秋是乃深明管仲知為臣之義有其功而名不在已春秋不襄管仲之功其旨甚微非達識者孰能知之漢五行志文公時大夫始顓政夏五月王子虎卒同盟于翟泉故赴于諸侯而書其卒蓋著其交政于諸侯也未有采地故不志其爵但稱王子而止録其名而已秦人伐晉秋楚人圍江江近楚自齊桓貫澤之明已服從于中國而楚自城濮之役亦絶不敢侵伐今復圍者蓋晉文既沒襄公不復討楚人弒逆之惡故楚人輕視中國復有窺諸侯之意而先圍江以試之也雨螽于宋言雨螽與隕石同義皆天之應也冬公如晉三年喪畢乃朝于晉十有二月己巳公及晉侯監公之如晉蓋朝也非為盟也晉人以往年無禮于公請改盟焉夫盟已定矣又何改為公冝固辭乃復與盟我則非禮故書公及又謹而日之晉陽處父帥師伐楚以救江舉晉國之師非不衆也處父帥之以伐楚豈果能討其弒君父之賊哉直為救江而已爾舍大罪不問而區區為小國解紛其亦不察于先後緩急之義矣伐不目事聖人特繫之以救江者譏其徒取救患之名非仗大義之師此聖人深惜晉襄之不能有為也嗚呼其旨逺矣哉且春秋之義莫大乎伐楚而正書伐楚者二齊桓伐楚先之以侵蔡此年伐楚繫之以救江學春秋者冝致思焉四年春公至自晉公三年喪畢不朝天王而朝強國或執或辱事不可測是可危也夏逆婦薑于齊孰逆之公自往也往不言逆女又不書夫人之至而變其文曰逆婦薑于齊者譏公成禮于齊也公之圗婚喪制尚未終今之娶也又成禮于齊故沒不言公而直曰婦薑者見夫人之位不明也夫人之位不明是不可為小君而奉祭祀也是以去其氏究觀夫人不終其位國亂子弒強臣擅命蓋由文公不能正其始也以此言之禮之于人大矣狄侵齊以齊之強而狄再侵之則狄之強又可知也秋楚人滅江江終為楚所滅則知楚之復張而處父之帥師無益于救適所以堅其敵耳故先儒請之晉人滅江所以深罪晉也事見漢五行志晉侯伐秦秦逞忿以伐晉晉畏而避之則其見報乃其常情也書爵書伐曲在秦也秦至是能悔過矣故不復來報聖人取其能遷善此秦誓所以録于書也衛侯使寧俞來聘垂隴之盟晉與衛成至是晉歸衛孔達故衛侯使來修舊好也且文公之時僖公之烈猶在故以同姓則衛使寧俞來聘異姓則秦伯使術來聘蠻夷則楚子使來聘惜乎文公不能繼其業此其可責也俞即寧武子也當衛侯出奔復歸之際能彌縫以全君故孔子謂邦有道則知邦無道則愚其知可及也其愚不可及也冬十有一月壬寅夫人風氏薨再娶不得稱夫人而況妾乎故庶子為君則為其母無服不敢二尊者也自惠公仲子以再娶始僭然尚未敢同嫡也今風氏乃莊公之妾雖于僖公為母而直以夫人之禮薨之者以天王成之為夫人故也魯禮之變自此始而妾嫡之分遂亂矣後世不知此乃有母以子貴之説甚至于妾死而加以皇后之諡此皆不知春秋之旨者也五年春王正月王使榮叔歸含且賵此不稱天王者以天王之尊而成人臣之妾以為夫人又加厚禮焉亂天倫失天理矣故去天以示無天道也夫風氏僭稱夫人久矣天王當正其非禮之罪今及成之為夫人非重貶王則無以知其非也含不及殯故言歸既含乂賵故言且惟明知其不及事而特使歸之以示恩故不書來三月辛亥葬我小君成風既以夫人之禮薨之復以小君之禮葬之又别為之諡焉實書以示譏也天以妾敵父則卑君父之體以妾並配則黷嫡母之尊禮曰妾不得體君又曰妾之事女君與婦之事舅姑等禮有君之母非夫人者又庶子為父後者為其母總蓋與尊者為一體不敢服其私親也然則母以子貴非禮明甚大失春秋之旨矣王使召伯來會葬妾母而稱夫人小君天王不能正之反使榮叔歸含且賵亦已厚矣今又使卿會其葬恩數有加焉可謂無天道之甚故再不稱天以深貶之既葬始來會人見其不及事也夏公孫敖如晉聘也王含且賵矣又來會葬矣舍天王而謹事晉不待貶而見也秦人入鄀鄀楚屬國也初叛楚即秦既又叛秦歸楚故秦人入之後遂為楚邑楚昭王復國之後畏吳之強去郢而都鄀聖人書秦之入鄀所以深罪晉襄之棄秦也秋楚人滅六六臯陶之後也楚人往年滅江今年滅六所以敢肆其惡逆如此者以中國不問其弒逆之罪故也冬十月甲申許男業卒許僖公立三十四年其子錫我立是為昭公春秋集注卷十七
