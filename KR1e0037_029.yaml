body:
  text: 春秋集注卷二十九宋高閌撰襄公二八年春王正月公如晉公十二月出㑹諸侯于鄬而不書至者蓋公自鄬遂朝晉也是時晉有大政公往聽焉夏葬鄭僖公弒君之賊既不明而諸侯又皆為鄭諱故春秋且因魯往會葬而著其臣子私諡之罪忠恕之道也鄭人侵蔡獲蔡公子燮鄭國新有大變朝廷未安未得從楚而畏晉之討也故以討蔡為說蔡師未嘗戰未嘗敗績而遽獲其大夫有以見民不親上而委之于敵矣然鄭師無名故書侵以罪之公子燮繫之蔡重之也與宋華元同自是晉楚之兵交至于鄭鄭之禍其可既乎季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘邢丘之會公在晉也晉侯不與公會而與大夫會者以公幼弱政在季氏故也陪臣専而公微弱此魯之失政也晉為盟主棄其君而與臣會雖欲修文襄之業改命朝聘之數俾從儉約亦何以宗諸侯是時諸侯之政皆在大夫故悉貶稱人而鄭伯與會者諸侯既不討鄭人弒君之罪故諸大夫使鄭伯獻蔡捷于會而親聽命焉蓋為恭也公至自晉公之如晉朝也非會也以公久留于晉又不得親與邢丘之會故特以晉致所謂遷就而為之辭也莒人伐我東鄙疆鄫田也鄫遂屬于莒矣其田接于魯而經界不明故興兵伐我以正之秋九月大雩因旱祭志僭也冬楚公子貞帥師伐鄭討其侵蔡也鄭遂與楚平觀左氏所載則子駟之弒僖公志在事楚矣是以鄬之會既往復悔遂成弒逆之事也晉侯使士丐來聘九年春宋災宋自昭文以來亂敗相屬三書宋災見人事之不修舉近可以知逺言大可以知小也夏季孫宿如晉公朝晉而晉來聘又使報焉事大國之禮則順矣五月辛酉夫人姜氏薨宣公夫人成公之母通于僑如者薨于東宮秋八月癸未葬我小君穆姜四月而葬又别為諡用文姜之例也冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲自邢丘會罷而鄭遂復從楚是以伐之戲鄭地伐鄭而書同盟則鄭受盟可知矣以左氏考之鄭雖受盟非服晉也公子騑之言已不足信矣故不書鄭伯若鄭未嘗服從云爾此會不致蓋公未嘗至也與鄬之會同公役于外踰年而遂會于柤則委棄其國可知矣楚子伐鄭楚以爵稱又以伐書専罪鄭也鄭于是復背戲之盟而遽與楚平且以著戲之役所以不致也十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光會吳于柤左傳昭六年楚公子棄疾如晉過鄭鄭伯勞諸柤則柤者鄭地而楚人所由之道也諸侯將救鄭鄭已服楚而吳人在柤諸侯因往與吳會以謀楚焉然吳人者名謀楚而實窺中國者也以楚為辭爾而晉令諸侯從之與成十五年鍾離之會同然鍾離之會諸侯之大夫往從吳至戚之會吳子來從諸侯今柤之會則諸侯復親往從吳矣此相取之情也夏五月甲午遂滅逼陽晉荀偃士丐請伐逼陽逼陽妘姓楚與國也因會蠻夷而滅他人之國聖人惡之故以諸侯共滅為文則倡其謀而受其利者不待貶絶矣是時宋堅事晉晉將以逼陽封向戍向戍不受遂與宋公以其因會用師恃衆剽利故書遂書日以重其罪公至自會諸侯不崇禮義以相安反相率以會蠻夷又因以滅人之國聖人不敢斥言但以會致存中國也楚公子貞鄭公孫輒帥師伐宋以宋公受逼陽故也鄭背中國即蠻夷又與蠻夷同伐中國罪不容誅也二國同伐書卿帥師自此始蓋張楚鄭以望晉悼所以懿蕭魚之功而大中國之慶也晉師伐秦晉方帥諸侯會吳滅逼陽又赴千里而伐秦可謂虐用其民矣為晉計者若修文公之業與秦通和庶因秦之兵力共攘强楚可以少安中國不此之圖而反以秦資楚此晉之失也秋莒人伐我東鄙莒人間諸侯之有事也又伐我東鄙其曰伐者必有辭也魯國卿大夫惟私室之務崇則公室之不競宜矣且去年同盟于戲今年又㑹于柤又方同會伐鄭退受莒兵而不能禦魯必有以取之也公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭齊世子光以先至而序于四國之上是無君臣上下之辨也雖晉欲以勤惰勸諸侯故然非世子驕蹇則晉侯何以為此彼能以禮自抑則辭不居矣鄭于是復從晉然亦不敢背楚也冬盜殺鄭公子騑公子發公孫輒尉止聚羣不逞以作亂殺三卿于朝不書尉止者小臣無列于朝伺隙而竊發則盜也三卿不稱官者失卿職也戌鄭虎牢五年戍陳此年戍鄭虎牢皆勤民逺戍然戍陳為善戍虎牢為無益何則陳附中國而楚爭之則戍之者義在救陳而拒强楚雖豫之可也經書諸侯救陳斯可見矣鄭虎牢則異于是諸侯與楚爭鄭久矣諸侯之得鄭者亦已數矣而不能有之隨為楚取是諸侯之無能也今鄭雖行成而諸侯所以為之戍則其意有在矣使鄭復二則虎牢之戍反為心腹之憂如其不二則助之守而為之援焉定則固將反之矣是以聖人亦還繫于鄭以致其意若非得鄭之辭也然五年城虎牢不繫鄭者是時諸侯城之以駐師而禦楚雖鄭亦不能有之也楚公子貞帥師救鄭公至自伐鄭鄭遂兩事晉楚矣書楚救鄭而致公則知諸侯之避楚也諸侯避楚則知戍虎牢為無益矣十有一年春王正月作三軍叔孫豹曰天子六師公帥之以征不德元侯作師卿帥之以承天子諸侯有卿無軍帥教衛以贊元侯自伯子男有大夫而無卿帥賦以從諸侯今我小侯也而為元侯之所無母乃不可乎以此見諸侯無軍作軍非禮也然有所謂大國三軍次國二軍小國一軍乃兵數之大率如此其實皆藏于農嵗役不過三日此先王之法也魯次國也雖合二軍必天子以牙璋起之然後取之于農爾亦何俟于作哉三桓外取强富之名以諛其君而實陰奪其民以弱公室爾于是三分公室各取其一而作為三軍制先王之制而以攻戰為心王法所不容也故不書作中軍而云作三軍者雖二軍亦不可作所以罪三桓也夏四月四卜郊不從乃不郊魯不當郊郊非禮也今不郊者非知其非禮故也乃于四月卜之以四卜而不從故爾直書不郊則不復免牲矣鄭公孫舍之帥師侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭秋七月己未同盟于亳城北以前伐未得志而鄭復來侵宋故也凡世子伐父與盟會當在諸侯之下齊光伐君出會十年在滕子薛伯上已為僭矣此會又在莒子邾子上僭于是為甚以莒邾皆屬于齊故也見世子益驕而主會者亦莫能制也自再會蕭魚之後霸業稍振諸侯不復與光會矣則知十九年同圍齊之役蓋有以取之也亳北之盟救災患恤禍亂同好惡奬王室有葵丘之遺風焉于是鄭稍服而同盟也既又背之復與楚同伐宋故書同以見其反復公至自伐鄭不以會致者見復伐鄭也楚子鄭伯伐宋晉師方退而楚子伐鄭鄭伯復逆之遂同伐宋蓋用公孫舍之之謀以伐宋自信于楚而數致晉使楚道敝而固與晉以托國焉公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭諸侯之師方歸未及解甲息肩而復至于鄭之城下者以鄭人反覆之故也會于蕭魚此鄭遂服晉而請會也上言伐而繼言會者見兵不加鄭鄭遽服而來會也不書鄭伯會者謂其可信也不書盟者鄭自是不服二以見苟有明信雖無盟可也自八年鄭人侵蔡獲蔡公子燮之後于是晉楚爭鄭五年之間晉悼公連會諸侯伐鄭而楚輒救之鄭人乍服乍叛雖不可信而晉悼公推至誠以待人信之不疑至于蕭魚之會楚力始絀鄭志始定至哉誠之能感人也自是鄭固與晉二十餘年楚不能爭諸侯賴之蓋用知罃之謀未嘗與楚人戰故也然則天下之事無大無小皆以不戰而克為貴公至自會不以伐鄭致者兵不加鄭而得鄭伯之辭也春秋以變文為褒貶屢書盟而不信則以不書盟為誠屢致伐而無功則以不致伐為美楚人執鄭行人良霄此聖人著晉之所以得鄭也鄭伯使良霄告絶于楚楚人怒而執之雖執之不殺良霄亦不伐鄭是不能得鄭也不能得鄭者勢分于吳也勢分于吳無如之何故執良霄以舒其憤懣不平之氣自是不復出師以與晉爭斯見楚力盡于此矣鄭于是乎堅從晉也冬秦人伐晉報去年之役也秦景公妹為楚共王夫人于是為楚伐晉以救鄭士魴禦之敗績不書者為晉諱也十有二年春王三月莒人伐我東鄙圍台諸侯伐我未有言圍邑者書圍邑自此始莒人間嵗伐我公五與莒子會宜其釋怨同好矣而見伐不已則魯弱可知季孫宿帥師救台遂入鄆鄆莒邑也善救台惡入鄆也入鄆以報圍台也況季孫宿受命救台不受命入鄆因救台而入鄆是専也是無君也君不得為政矣故書遂以貶之文十二年嘗帥師城鄆矣魯不能守復為莒所取今復入之夏晉侯使士魴來聘秋九月吳子乘卒此吳子夀夢也丘二十五年其子諸樊立吳不立諡而皆僭稱王故不書其葬蓋罪大惡重不可信其臣子之辭書之也夫春秋以來天王崩葬有不見于經者如莊王僖王頃王是也今反為吳楚通好而得書其卒是諸侯不忠于天王而反赴夷狄喪也冬楚公子貞帥師侵宋按左氏秦人與焉而削之者楚人率秦故専罪楚也公如晉晉侯一使人來聘而公遂親往朝之事晉之禮可謂恭矣十有三年春公至自晉罪公在外不朝正于廟也夏取邿邿小國也魯乘其亂而滅之以為附庸而不言滅者內大惡故婉其辭也晉始息民是以楚侵宋不報魯滅邿不討取無大亂而已秋九月庚辰楚子審卒此楚共王也楚自共王亡後不大為中國患者以吳人總其兵以議其後也然則吳楚相持是亦有功于中國也共王立三十一年其子昭立義見宣十八年冬城防防臧氏之邑也厥後齊高厚伐我北鄙圍防則城防者畏齊也城義見隱七年十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人會吳于向四卿帥師自成公始二卿列會自襄公始向鄭地也重言會者與成十五年鍾離之會同吳來在向諸侯往會之因謀伐秦焉夫諸國大夫與蠻夷會已不正矣况又謀伐秦乎齊崔杼宋華閲衛北宮括知其非而意惰焉苟知其非當以大義奪之今乃依隨來會而惰慢不恭是違衆也故貶而人之且叙在鄭卿之上則不嫌非卿也夫楚結秦以病晉而晉又交吳以害楚亦相激而然爾二月乙未朔日有食之日食雖有常度亦人事所召有食之者夏四月叔孫豹會晉荀偃齊人宋人衛北宮括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦晉帥諸侯之大夫伐秦以報十一年之役然春夏興師煩擾中國將帥不和威德兩弛晉國之政衰矣悼公所以不及文襄也北宮括聽子蟜之言遂勸濟師故復出名氏然春秋前此未有摘貶諸侯之大夫者而向之會及此之役其密察如此者以大夫専肆用事莫甚斯時非謹其微而辨之于早則其亂有不可勝圖者故春秋釐之一見其法也其後崔氏亂齊華氏危宋其咎生于過而不及惟北宮括善變者也己未衛侯出奔齊衛侯多行無禮于其國孫林父與寧殖欲立公孫剽為內應而逐之聖人不書逐君之賊者著衛君自取奔亡之禍以警後世之為人君者也其不名者乃所以罪林父也人臣逐君而罪其君則是臣可逐其君矣不可以訓故不名衛侯又加日以謹之所以抑强臣存大義也鄭伯突衛侯朔皆以不勝强臣而出奔獨此加日焉蓋逐君之惡未有若林父者矣鄭厲公衛惠公猶以禮去者也加日不名以絀大夫義用剛克矣莒人侵我東鄙報入鄆也莒自滅鄫之後凡四伐我矣是無晉也秋楚公子貞帥師伐吳伐吳者何吳張矣數會中國以議楚矣楚人則病吳矣于是而伐之者非能伐也伐强以自存也在兵法則所謂以攻為守者也而吳則終不出夫楚有謀者也故其兵不能遽加于楚夫惟吳楚正相攻此中國所以小寧也冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚戚衛地謀定衛剽也夫剽逐其君而篡其位王法所不容而晉合諸侯以定之無王之甚也諸侯書卿者明皆林父之儔也是嵗諸侯之大夫凡三出會或每會各一卿或一卿三與會各隨其國而已春秋集注卷二十九
