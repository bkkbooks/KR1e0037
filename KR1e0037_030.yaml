body:
  text: 春秋集注卷三十宋高閌撰襄公三十有五年春宋公使向戍來聘二月己亥及向戍盟于劉凡因來聘而盟者必在國內如成三年晉侯使荀庚來聘衛侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟十一年晉侯使郤犨來聘己丑及郤犨盟襄七年衛侯使孫林父來聘壬戌及孫林父盟是也劉蓋王畿采地豈有來聘魯而逺盟于劉者乎蓋下文有劉夏傳者以為春夏之夏與文四年夏逆婦薑于齊同文故誤增于劉二字爾劉夏逆王后于齊劉夏何以不稱使不與天王之使夏也婚姻者人倫之本王后者天下之母天子不親迎必使三公逆之劉夏士也士而逆后是不重人倫之本不尊天下之母禮義何由而興風化何由而成乎夫合二姓之好以繼先聖之後以為天地宗廟社稷之主其可輕耶自漢而後皇后見天子則降階而朝自稱曰妾敗壞禮義莫甚于此皇后之禮自此益輕後世不賢之君遂以下里賤人之女立以為后嗚呼天子總陽教后總隂教以共成天下之至治而輕立其人是輕宗廟也輕社稷也輕天地也可不戒哉夏齊侯伐我北鄙圍成公救成至遇齊于是二晉是時衛侯在齊季孫宿為戚之會以定衛而齊不與焉齊固有憾于諸國矣而尤懷夫袁婁之恥者也伐我北鄙以此之故成蓋我孟孫之邑也魯于是時已三分其民而公室卑弱已不足以當敵故書公救成至遇以見意焉若畏而不進則書次矣不當書至也季孫宿叔孫豹帥師城成郛由公不能救故成郛壞而以非時城之也然此孟孫之邑而季孫叔孫帥師城之者見三家相黨以備齊為名而興役之衆故其城堅固可守卒為魯患而不可墮也定十二年公圍成是也郛蓋外城也秋八月丁巳日有食之日食雖有常度亦人事所召有食之者邾人伐我南鄙邾將二于晉以與齊故來伐我我使告於晉請伐之而未果蓋邾黨于莒而屬于齊冬十有一月癸亥晉侯周卒晉悼之霸功亞桓文凡立十五年其子彪立是為平公十有六年春王正月葬晉悼公三月而葬簡也因魯往會而著其臣子私諡之罪三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于溴梁戊寅大夫盟為討邾莒也邾莒連伐魯魯使告于晉晉悼公將為會以討之遇疾乃止平公即位遂成父志夫君喪而出會失主盟之禮矣宜乎諸大夫之張也此書衛侯者剽也二十五年衛侯入于夷儀衎也二君皆稱衛侯春秋不與其一不奪其一何也在外者以無道出雖有君名而無君國之實在內者以無道立雖有君位而無定位之威然國人既君之矣諸侯既會之矣春秋從而君之所以恕國人責諸侯恕國人責諸侯然後篡者之惡不容於貶或謂晉侯在喪故使大夫盟非也晉侯不憚出會豈不肯主盟耶且雞澤之會諸侯已盟而陳袁僑至勢不可拒因與之盟然僑人臣也不可當君故使大夫盟之故以大夫而繫諸侯見諸侯之已盟也今敘諸侯而不言盟言大夫而不繫諸侯者是時晉為魯故將執莒邾二君而齊使高厚來會先知其故遽自逃歸所以諸侯不欲先自盟也夫晉會諸侯而使大夫盟則信在大夫矣烏在其為盟主哉是時齊有崔高衛有孫寧六卿專晉三家柄魯祿去公室浸以衰微聖人因此盟得一貶焉以著喪亂之階晉人執莒子邾子以歸大夫主盟而執諸侯見大夫之強也莒邾二國數侵魯魯人欣之晉晉執之以歸夫諸侯有罪執之以歸而不歸京師己則不正而以討人非正也故書晉人而二君不名蓋罪不至執也齊侯伐我北鄙案自此至襄公三十三年永樂大典闕佚齊既叛晉聞公在會將討邾莒故復來伐是時齊益強自柯陵之會遂不復出但使大夫聽命使世子伉禮出會蓋有輕諸侯之心故前年北鄙之伐為莒伐我邾實附齊故亦伐我南鄙晉會溴梁以討二莒邾畏晉往會而齊獨不至晉執二君以歸齊乃益復伐我三年之間齊師五至于魯矣案此條從春秋傳説彚纂補入夏公至自會見公出會謀齊尚未及還而魯師已見伐矣案此條從春秋傳説彚纂輔入五月甲子地震叔老會鄭伯晉荀偃衛寧殖宋人伐許許欲棄楚請遷于晉既而不果故晉會諸侯大夫同伐之鄭與許有宿怨故君親行案以上從春秋傳説彚纂補入晉卿主兵而先鄭伯者臣不可過君也宋稱人微者也宋當在諸國之上今列衛寧殖下故知微者也案晉卿主兵以下從程端學春秋本義補入秋齊侯伐我北鄙圍成案經文公穀作圍成左氏作圍郕此從公穀去年伐我圍成而壞其郛今春又伐至是又圍成甚之也案此條從春秋傳説彚纂補入大雩冬叔孫豹如晉魯不能內修其政以禦無道之齊而乞憐于晉魯之君臣庸甚矣案此條從春秋傳説彚纂補入十有七年春王二月庚午邾子牼卒宋人伐陳七年鄬之會陳侯逃歸自是十年不復與諸侯會而楚鄭連年侵宋宋于是請于晉而伐之書伐許伐陳皆著楚之詘也案此條從春秋傳説彚纂補入夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃高厚帥師伐我北鄙圍防齊之君臣同來伐我分兵以圍我二邑案以上從春秋傳説彚纂補入其恃衆暴寡如此況齊魯頻世婚姻之國也數年之間見伐不已見魯政之衰矣安其恃衆暴寡以下從程端學春秋本義補入九月大雩宋華臣出奔陳華臣暴其宗室而亂宋政不有國討失政刑矣君子違不適讎國陳乃宋讐而奔焉尤可誅也案此條從春秋傳説彚纂補入冬邾人伐我南鄙邾之先君以伐魯而為晉所執既歸而卒嗣子在喪而復興師伐我者叛晉與齊也齊人使之修先君之怨此祝柯之會所以復見執也案此條從程端學春秋本義補入十有八年春白狄來春秋書白狄于是焉止白狄之來與介葛盧同案以上從春秋傳説彚纂補入罪中國不當與之交接也且宣八年晉師白狄伐秦是晉強而附晉伐秦也成八年秦人白狄伐晉是秦強而附秦伐晉也案自罪中國以下從程端學春秋本義補入夏晉人執衛行人石買秋齊師伐我北鄙冬十月公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子同圍齊曹伯負芻卒于師楚公子午帥師伐鄭楚于是復爭鄭案此條從程端學春秋本義補入十有九年春王正月諸侯盟于祝柯盟者何平公修霸也雖盟焉楚窺于南齊易于後吳人且張一邾之微面從而背睽之盟奚益哉案此條從程端學春秋本義補入晉人執邾子既來同會又來同盟而乃執之非霸討也故稱人下書取邾田自漷水則知䝱人之君而奪其地此平公之霸政也案此條從程端學春秋本義補入公至自伐齊取邾田自漷水邾之病魯信有罪矣魯以諸侯之力既執其先君又執其嗣君亦可已矣又取其田蓋已甚矣晉劫邾使與魯豈霸者之舉哉案以上從程端學春秋本義補入書取田于至自伐齊之後明公獨取之非諸侯取之専罪公之意案以上從春秋傳説彚纂補入自漷水者隨漷水以為界言其取之多也又罪其亂先王之疆理也案自漷水以下四句從春秋本義補入季孫宿如晉葬曹成公夏衛孫林父帥師伐齊十四年林父逐衛侯衎奔于齊故獨伐齊林父逐君霸主所當討而與之會伐則晉平霸業可知矣案此條從春秋傳説彚纂補入秋七月辛卯齊侯環卒晉士丐帥師侵齊至榖聞齊侯卒乃還八月丙辰仲孫蔑卒齊殺其大夫高厚齊高厚嘗帥師伐我矣晉新行義于齊齊侯始立而欲親晉故歸罪于高厚而殺之以説于晉此明年所以與澶淵之盟也案此條從春秋傳説彚纂補入鄭殺其大夫公子嘉冬葬齊靈公齊魯纍世婚姻之國前雖有怨今已易世故不廢喪紀示不忘好案此條從春秋傳説彚纂補入城西郛叔孫豹會晉士丐于柯魯猶懼齊故為柯之會以自固案此條從春秋傳説彚纂補入城武城襄公四書城邑非本務也使民飢而散雖城之孰與守之案此條從程端學春秋本義補入二十年春王正月辛亥仲叔速會莒人盟于向向本莒邑宣四年取之者也莒魯結好自是十五年不交兵速代父為卿未練而從政無復三年之喪也案此條從春秋傳説彚纂補入夏六月庚申公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子盟于澶淵齊以晉不伐其喪而感服居喪而出盟蓋亦越禮畔道矣案此條從春秋傳説彚纂補入秋公至自會仲孫速帥師伐邾蔡殺其大夫公子燮蔡公子履出奔陳侯之弟黃出奔楚黃與履何以奔楚自理也黃以寵任太過權逼其卿慶氏譖之而陳侯不能為之辨明是以一國之大不能容一弟也案此條從春秋傳説彚纂補入叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔庶其叛其君又盜其土地來奔于魯其罪大矣時公在晉而季氏遂納其邑受其叛臣是之謂以利主逋逃惡自見也案此條從程端學春秋本義補入夏公至自晉秋晉欒盈出奔楚盈不能防間其母遂為范丐所逐既取奔亡復有作亂之志故特奔于楚焉以楚疆大今日可恃以逃難他日可挾以復歸也案此條從春秋傳説彚纂補入九月庚戌朔日有食之冬十月庚辰朔日有食之連食兩月變之大者歷家推步之術皆一百七十三日始一交會去度逺則日食漸少無頻食之理而此年九月十月二十四年七月八月頻食下至漢晉以來亦或有之不可委之天數之常故聖人必以為譴異而書之以驚人君之或怠後世任數而不修德德未修而禍未至益以為天無心而數有定也惟天之仁又出災異以申勸之且曰前既無驗此奚為哉亦數而已矣目習于見耳習于聞而不復思上帝之怒不足獨當而下延禍于衆庶于是斯民皆怨其上而民心離矣孟子曰王無罪嵗斯天下之民至焉為人君者可不戒哉案此條從程端學春秋本義補入曹伯來朝公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于啇任范鞅欲使盈無所容于世故盈發憤卒興大亂此以私敗公足為戒也案此條從黃震日抄補入二十有二年春王正月公至自會著不朝正于廟案此條從程端學春秋本義補入夏四月秋七月辛酉叔老卒此叔肸之孫聲伯之子其子弓嗣為大夫是為子叔敬子案此條從春秋傳説彚纂補入冬公會晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯把伯小邾子于沙隨晉以一欒盈之故期年之間再合諸侯見晉失霸者之義不足以令諸侯矣齊侯于是終保欒盈明年伐衛遂伐晉也案此條從趙汸春秋集注補入公至自會楚殺其大夫公子追舒追舒寵近小人故及于難然以楚國之力除一寵嬖之大夫顧豈難哉而康王始則與人之子圖其父終則殺之轘其黨于四竟由威柄失于上故刑不足以馭下也夫威柄既立則責譙足以折姧臣之鋒及其失之則刀鋸不足以當姧臣之罪其怨毒所鍾遂發于靈王之世楚之不亡者幸而已案此條從春秋傳説彚纂補入二十有三年春王二月癸酉朔日有食之三月己巳把伯丐卒把自悼公以來晉悼為婚姻國國恃以興而魯禮有加焉案此條從春秋傳説彚纂補入夏邾畀我來奔葬把孝公陳殺其大夫慶虎及慶寅書及著罪在慶虎以虎之罪而及寅也案此條從春秋傳説彚纂補入陳侯之弟黃自楚歸于陳二慶死則黃之歸易矣讒誣不釋則忠良不顯姦宄不誅則淑善不遂君子小人相為伏見故陳討二慶而公子黃返也案此條從春秋傳説彚纂補入晉欒盈復入于晉入于曲沃曲沃即沃昭公分國以封沃沃盛強昭公微弱國人將叛而歸沃故詩人作楊之水椒聊杕杜之詩以見意然則沃者晉之腴饒強盛必叛之邑也今曲沃大夫不由君命而擅納盈以曲沃乃盈舊所食之私邑故盈帥曲沃之甲以入晉不勝而反入曲沃焉故書入于曲沃見盈有叛心又見曲沃知有盈而不知有晉君也案此條從春秋傳説彚纂補入秋齊侯伐衛遂伐晉齊侯因晉有欒氏之難而助之以報十八年之役也十八年諸侯同圍齊者魯之故也齊之所以數伐魯者衛之故也故先伐衛晉不之問于是遂伐晉晉為盟主而衛其同盟也既伐同盟又伐主盟禍亂成于此矣案此條從程端學春秋本義補入八月叔孫豹帥師救晉次于雍榆己卯仲孫速卒冬十月乙亥臧孫紇出奔邾晉人殺欒盈齊侯襲莒以十八年莒子同諸侯圍齊故也凡用兵者聲言彼罪執辭以伐若乘人不備掩而取之則盜賊之為爾春秋獨此書襲者罪齊侯以諸侯之尊為盜賊之事也案此條從程端學春秋本義補入二十有四年春叔孫豹如晉仲孫羯帥師侵齊齊之伐晉也魯使叔孫豹救之次于雍榆無功于晉故孟孝伯至此復帥師侵齊為晉報焉蓋懼晉之疑也羯代速為卿未練而帥師無復三年之喪罪自見矣案此條從春秋傳説彚纂補入夏楚子伐吳于此見楚弱而吳強也自襄公言之十一年失鄭十四年伐吳自是舍鄭而不取置欒盈而不事又十年而一再伐吳以是而知楚弱而勢分于吳方急吳而緩中國也案此條從程端學春秋本義補入秋七月甲子朔日有食之既齊崔杼帥師伐莒去年齊侯襲莒已與莒平今崔杼因帥師送使者如楚而遂伐莒是見利則乘齊人之無信也案此條從春秋傳説彚纂補入大水八月癸巳朔日有食之公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀自盟于柯陵之後齊有輕晉之心會齊侯環卒而光新立乃受盟于澶淵及商任沙隨之會晉失其令齊于是復二明年乃伐衛遂伐晉又再加兵于莒晉侯為是故會于夷儀帥十二諸侯之師將以討齊然會而不伐是有畏也國勢不競衆志不一也曰水不克者特辭不能伐耳下書崔杼伐我西鄙蓋知晉之無能為也案以上從春秋傳説彚纂補入把伯居喪出會覩文見義案二句從程端學春秋本義補入冬楚子蔡侯陳侯許男伐鄭公至自會諸侯救鄭不書故以會致案此條從春秋傳説彚纂補入陳針宜咎出奔楚叔孫豹如京師襄公即位二十有四年如晉者五出會諸侯者十有三未嘗朝天子也是時榖洛鬭毁王宮而齊侯叛晉求媚于天子故為王城之于是叔孫豹始如京師聘且賀焉案此條從春秋傳説彚纂補入大飢二十有五年春齊崔杼帥師伐我北鄙夏五月乙亥齊崔杼弒其君光崔杼不能防間其妻以淫于家又不絶其妻而行大逆于君齊莊背諸侯之盟數行侵伐崔杼因民之忿遂以宣淫之故弒之案此條從春秋傳説彚纂補入公會晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀晉會諸侯以伐齊齊以莊公既弒為解因納賂以求成焉故不書伐夫以義會諸侯而以姦終之有以知晉平之不競矣案此條從春秋傳説彚纂補入六月壬子鄭公孫舍之帥師入陳去秋夷儀之會楚與陳蔡許三國同伐鄭今嵗復會于夷儀鄭慮楚之復來也故先帥師入陳以奪其心觀左氏所載入人之國未有若子展子産之有禮者也故春秋無貶辭案此條從春秋傳説彚纂補入秋八月己巳諸侯同盟于重丘公至自會衛侯入于夷儀楚屈建帥師滅舒鳩冬鄭公孫夏帥師伐陳十有二月吳子遏伐楚盟于巢卒二十有六年春王二月辛卯衛寧喜弒其君剽衛孫林父入于戚以叛獻公之奔也林父實逐之今寧喜弒剽將納獻公故林父懼而入于戚以叛案以上從程端學春秋本義補入叛甚于奔前此諸大夫有不利于已則奔而已未有若林父之叛者故書叛自林父始案叛甚于奔以下從春秋傳説彚纂補入甲午衛侯衎復歸于衛夏晉侯使荀吳來聘公會晉人鄭良霄宋人曹人于澶淵秋宋公殺其世子痤晉獻公惑驪姬之讒而殺申生宋平公聽伊戾之詐而殺痤春秋以晉侯宋公殺之直罪君之不明惑于讒慝為後世戒漢武帝唐明皇猶蹈之以二君猶爾晉宋不足道也嗚呼自古讒人為國患雖其君之父子不能相保况臣下乎春秋書此當三復其言案此條從程端學春秋本義補入晉人執衛寧喜弒君之賊人人皆得討之晉人執之非討其弒君也討其伐戚而殺晉戍也案此條從春秋傳説彚纂補入八月壬午許男寧卒于楚十六年晉伐許他國皆大夫獨鄭伯自行故許男欲報之案以上從春秋傳説彚纂補入以中國諸侯而死于南楚死非其所矣案二句從程端學春秋本義補入冬楚子蔡侯陳侯伐鄭葬許靈公二十有七年春齊侯使慶封來聘夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋此事利害甚重不可輕舉也而諸侯大夫不詳其故始循其弭兵之名遂會于宋而與之盟自是大啓戎心于盟逼好華夏蠻夷莫知其辨而諸侯亦俯首兩事晉楚嗟乎桓文數十年之功業一朝而壞之生民雖暫免于兵甲天下之勢遂大潰而不可收拾矣彼豈知天下之大計哉案此條從程端學春秋本義補入衛殺其大夫寧喜衛侯之弟鱄出奔晉秋七月辛巳豹及諸侯之大夫盟于宋冬十有二月乙亥朔日有食之二十有八年春無冰夏衛石惡出奔晉邾子來朝邾自晉執其君魯取其田益微弱矣至自悼公來朝案此條從春秋傳説彚纂補入秋八月大雩春無冰秋旱此皆人事所召而僭用大禮以析之不亦悖乎案此條從春秋傳説彚纂補入仲孫羯如晉冬齊慶封來奔十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒二十有九年春王正月公在楚公在齊晉多矣闕朝正之禮亦不少矣但書公如齊如晉而義自見也今書公在楚則聖人之旨深矣二十八年十一月公如楚十二月甲寅天王崩乙未楚子昭卒公不篤君臣之義以奔天王之喪而徇蠻夷之強以俟楚子之葬久留于楚逮夏乃歸故聖人特以朝正之時書公所在與昭公失國在乾侯同且以責季氏之無君也案此條從春秋傳説彚纂補入夏五月公至自楚庚午衛侯衎卒閽弒吳子餘祭仲孫羯會晉荀盈齊高止宋華定衛世叔儀鄭公孫假曹人莒人滕人薛人小邾人城把晉侯使士鞅來聘謝城把且使我歸把田也案此條從春秋傳説彚纂補入把子來盟晉使魯歸前所侵把田故書把子來盟于士鞅來聘之下案此條從春秋傳説彚纂補入吳子使札來聘秋九月葬衛獻公齊高止出奔北燕冬仲孫羯如晉三十年春王正月楚子使薳罷來聘公踰年在楚楚郟敖新即位故使薳罷來聘以報之自文公九年至此歷七十餘年未嘗交聘今薳罷之來蓋為恭也自是吳楚皆不復來聘矣案此條從春秋傳説彚纂補入夏四月蔡世子般弒其君固五月甲午宋災宋伯姬卒天王殺其弟佞夫王子瑕奔晉秋七月叔弓如宋葬宋共姬使卿葬內女非禮也始終之禮皆過于厚成八年夏宋公使公孫夀來納幣十月衛人來媵九年二月伯姬歸于宋夏季孫行父如宋致女晉人來媵十年齊人來媵皆非禮也案此條從程端學春秋本義補入鄭良霄出奔許自許入于鄭鄭人殺良霄冬十月葬蔡景公晉人齊人宋人衛人鄭人曹人莒人邾人媵人薛人把人小邾人會于澶淵宋災故三十有一年春王正月夏六月辛巳公薨于楚宮秋九月癸巳子野卒己亥仲孫羯卒冬十月滕子來會葬此僭天子之禮也案此條從程端學春秋本義補入癸酉葬我君襄公十有一月莒人弒其君密州春秋集注卷三十
