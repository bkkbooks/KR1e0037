body:
  text: 春秋集注卷五宋高閌撰桓公二五年春正月甲戌己丑陳侯鮑卒按長厯正月甲申朔月內無甲戌而太歲乃在甲戌恐纂年者誤加之或疑甲戌在去年冬十有二月而去年不書秋冬誤著此月或疑此日下書陳他殺太子事其簡編脫皆未可知也陳桓公立三十八年陳他既殺世子遂自立夏齊侯鄭伯如紀春秋之法諸侯來朝魯則直書朝以著其罪公往朝他國則書如而已婉其辭也其餘諸侯相朝皆略而不書故二百四十二年外相朝皆不書此書齊侯鄭伯如紀蓋嫉之也夫紀國最小而齊鄭強大宜紀侯朝事之不暇豈肯反朝之乎蓋齊侯將襲紀先欲窺其虛實而不敢自往鄭伯曲附齊侯與之偕行又恐為紀所疑遂行朝禮而還夫大不朝小強不朝弱聖人不正其懷詐以圖人之國使若誠朝然故特書如紀以著其惡天王使仍叔之子來聘桓公弒君自立不敢朝于天子而天子遣使來聘者三此何故哉當是時桓王失信諸侯背叛桓王雖謀婚于諸侯諸侯莫之從也桓公以篡弒之故懼諸侯之討已欲自結于桓王故因紀之故而為王謀焉此桓王所以三遣使而來聘也春秋書之以見桓公懷姧思以紀之婚姻結好于王以掩大惡庶諸侯之不已討而桓王亦知諸侯有圖紀之迹因欲結魯以援紀也其曰使仍叔之子者父在而使子之辭也夫仍叔為王朝大臣若其老則當懸車而退安可不任其事使其子代之斯見王綱不舉容其大夫之子參預國事又見天王徇大臣私意用其子弟之弱者居公選之地所謂官人以世也不稱氏者世權不重于尹武也周之盛時樂正以詩書禮樂造士王太子王子羣后之子卿大夫元士之適子皆造焉説者皆曰為化民也為選賢也殊不知是乃愛諸臣之子保諸臣之家也人不教不善不善則災其親墜其祀是身及家以不教而壞也故明王推恩羣后必先教之與其有寵于今孰若無辱于後不務教而務官之以市井言則未學而仕其幸大矣智者慮之則為禍亦大彼以不美之資而假之勢位鮮不及也葬陳桓公不書月史失之因魯往會而著其臣子私諡之罪城祝丘莊四年夫人薑氏會齊侯于祝丘是齊魯兩境上邑也齊將襲紀公欲助紀而畏齊之來討故非時城此以備之且以桓之暴逆而奪民之力則旱蝗應矣城祝丘為大雩與螽書也秋蔡人衛人陳人從王伐鄭王奪鄭伯政以其與齊侯謀紀故也鄭伯不朝王王以諸侯伐鄭鄭伯禦之戰于繻葛王師大敗射中王肩聖人以桓王伐鄭之舉非天討也故不書天王伐鄭以貶之何則魯桓弒君而自立宗督弒君而得政此天下大惡也王不能討鄭伯不朝貶其爵可也乃自將而攻之移此師以加宋魯誰曰非天討乎況陳他殺太子自立而王又不即討而反用其兵乎詩刺桓王失信諸侯背叛此其事歟既譏天王以端本矣三國以兵會伐而書從王者所以明君臣之大義君行而臣從之正也或曰三國稱人皆微者乎曰天子六軍其將皆命卿今王自將之則三國雖使卿行亦不得以舉名尊尊而抑卑亦云宜矣況從王伐叛而致師敗傷王能勿貶乎雖然諸侯不可以敵王而鄭乃抗拒不服反敗王師不可以訓故不書敗三國之君不行而使陪臣從王此又不待貶絶而罪自見也大雩先儒謂成王康周公故賜魯重祭得郊禘大雩非也成王但命魯祀周公以天子禮樂耳非使魯得用郊禘大雩天子之禮樂也大雩于上帝用盛樂也諸侯雩于境內之山川耳此禮自伏羲以來未之有改也成王豈不知哉意者周之末王賜之歟昔魯惠公使宰讓請郊廟之禮于天子天子使史角往而惠公因止之其後在魯始為墨翟之學由此觀之使成王之世而魯已用郊廟之禮則惠公何請之有惠公之請也魯自是用之矣殆由平王以下乎故夫子曰魯之郊禘非禮也周公其衰矣此其意可見矣大雩歲之常祀當在建已之月故無六月雩者雖不旱亦祭焉蓋常事也因其遇災非時而雩則書之所以見旱太甚且志其僭也春秋大雩二十凡不月者雩而不雨也螽既旱又蝗則為農災甚矣冬州公如曹外相如不書此書者為下文起也六年春正月實來州公者天子之公也而曰實來者天子實使之來何以不書畏諸侯之知也何以畏諸侯之知王師新敗于鄭天討不行而反謀婚于魯是以畏諸侯之知聲言如曹而實來魯也春秋如其實而書之故曰實來何以知其謀婚于魯以四月公會紀侯于郕冬紀侯來朝八年春天王使家父來聘十月祭公來遂逆王后于紀知之也考經則春秋之旨炳然可見而傳汨之天王所為其悖如此是以春秋微其辭也夏四月公會紀侯于郕天王為紀伐鄭鄭既敗王師將與齊侯滅紀紀來咨謀齊難因謀納后于王以自重焉聖人書之以見強國暴恣而弱小者奔走之不暇也雖然以紀之微而捍齊之強者十有七年此紀侯憂畏咨謀之功也歟郕我地秋八月壬午大閲公欲救紀故修戎備夫為國之道武備不可廢必于農隙講肄保民守國之道也盛夏閲兵妨農害民失政之甚名曰大閲又著其僭也蔡人殺陳他他踰年之君也蔡人輒殺陳國之君可乎不曰陳侯而曰陳他者蓋以賊誅也陳厲公蔡出也故蔡人殺他而立之蔡雖他國以私殺之然他殺世子竊位天下之惡人皆得而誅之故書蔡人以見殺賊者天下之公也桓公亦一陳他也九月丁卯子同生此桓之子也其稱子者何明嫡嗣也喜有正也然春秋方疾桓之弒逆而欲討其罪而絶之又豈當著其嫡嗣而喜有正乎曰此春秋之深意也顧學者未之思耳夫婚禮者將上以事宗廟而下以繼後世也故君子重之子同之生月日謹之則以廟祀世系之重實在于此而詩刺莊公以為齊侯之子孫豈不悖哉夫隱桓以嫡庶不明而相篡奪今莊公之生人又疑之故春秋所書莫大乎此然則詩人之言妄乎曰不妄也襄公文薑之淫亂蓋在同生之後當同之生齊魯未嘗亂也故特書之使國統著明焉觀公羊同非吾子齊侯之子也之語正與春秋之意合況莊公母子夫婦男女之分慙德多矣不書其生則其事不見此之謂微而顯當深考之冬紀侯來朝紀侯所以稱爵者志不在于朝桓也時懼齊故數來朝以求援耳然而不能內修其政以和輯其人民效死以守而區區求救于弒逆之人其不能保其國也宜矣是時紀侯方謀連婚于周以自重故欲求公以為之中也七年春二月己亥焚咸丘按左傳昭六年三月鄭人鑄刑鼎士文伯曰火未出鄭其有災乎蓋古者將有田事則焚萊故禮記曰季春出火為焚也然後簡其車賦厯其卒伍而君親誓社以習軍旅今建丑之月而焚咸丘何哉咸丘乃魯地之近齊者故孟子以咸丘蒙之問為齊東野人之語蓋魯為紀謀齊難先清野以備之故二月而焚咸丘所謂自焚也魯自是失齊好夏穀伯綏來朝鄧侯吾離來朝春秋之法諸侯不生名此二君何以名曰臣而弒君天理滅矣宜天下所不容也而兩國反相繼朝之奬亂助惡悖逆天道歲功不能成矣故名其二君而不書秋冬與四年同也然則十五年邾人葛人牟人來朝何以書秋冬乎曰四年與此年其義已明矣三國之來别立義也八年春正月己卯蒸閉蟄而蒸當在建亥之月周以建子為正正月己卯蒸則是去年冬祭而今歲行之得為禮乎夫蒸者備物之祭桓公以備物之祭數享宗廟可謂厚于其親矣春秋書其蒸祭之勤乃所以罪其弒逆之惡也若曰桓非不知有宗廟非不知有父兄苟知其有宗廟父兄曾不思弒隱之殘忍何哉其書之之辭至緩其責之之意至深真聖人之文非精心極意者孰能知之天王使家父來聘謀納后也蓋天王亦欲結魯以援紀也何以知天王之欲結魯以援紀以下文書祭公來遂逆王后于紀是遂與紀為婚姻矣使諸侯知紀雖小國而天下之母出乎紀也又以紀自隱公已有婚姻之舊而天王自知王室之弱不能獨援特為之結魯以兼助紀也不然天王之使何為數數至魯耶夏五月丁丑蒸正月既蒸矣而非時復蒸者見其厚祀之意也稱其祀之厚乃所以責其弒逆之深詩猗嗟刺魯莊公而盛稱其有威儀技藝蓋稱之乃所以刺之春秋之文蓋類于詩以意逆志是為得之秋伐邾桓自弒立恃其強惡以凌小國小國皆畏而從之故紀也滕也鄧也穀也郕也杞也或朝或會惟邾恃舊好而不顧至是遂伐之其曰伐邾必有辭焉邾不能奉辭以討桓公弒逆之罪宜乎其反見伐也冬十月雨雪建酉之月未霜而雪書異也雨自上下者也祭公來遂逆王后于紀祭公受命逆后而先來魯以謀紀難聖人特書祭公來而以逆后為遂事責其不虔王命而輕天下之母也九年春紀季薑歸于京師王者以天下為家既逆為后則天尊地卑乾坤定矣覆載之間皆臣子也天王既使祭公逆王后則王后所過之國皆當致其臣子之恭今乃曰紀季薑歸于京師此豈待王后之禮也哉曰古者后夫人必娶嫡女故天子求后于諸侯諸侯對曰夫婦所生若而人若姑姊妹則曰先君之遺女若而人于諸侯則曰不腆先君之嫡若而人是以伯姬歸于紀則叔姬為之娣今曰季薑則非嫡矣不可以母天下春秋所以嚴其名也以此為防而後世猶有以卑人為后者夏四月秋七月使當時天子諸侯皆無輕動妄舉常若此二時則聖人豈復作春秋耶冬曹伯使其世子射姑來朝曹伯初以桓弒逆不朝既而以魯伐邾之故畏魯之強乃急使世子朝之按周官典命凡諸侯之適子誓于天子而攝其君則下其君之禮一等然則世子固有攝君之禮蓋以朝于天子有時而不可後故老疾者使世子攝之急述職也諸侯間于王事則相朝又何攝之有按明年正月曹伯卒則此年冬固己有疾弒逆之人固不必朝幸而有疾不能來則亦已矣乃使世子朝是危道也十年春王正月桓公弒立積年無明王以討之聖人不與大惡之人久居其位故十年復書王以謹其罪而先儒以為正終生之卒也若此年為正終生則前五年正月陳侯卒何為不正之哉庚申曹伯終生卒夏五月葬曹桓公因魯往會而著其臣子私諡之罪秋公會衛侯于桃丘弗遇弗者遷辭惡失信也衛侯先與公期既而復與齊鄭合謀將以伐我故公往會而弗遇此固衛侯之失信然亦見公以弒逆為諸侯所棄也在易屯之六三以陰居陽其身不正而輕躁妄動求應于五五應在二而弗見納聖人戒之曰君子幾不如舍往吝夫子以世人未達幾之理也復于繫辭贊之曰幾者動之微吉之先見者也君子安其身而後動易其心而後語定其交而後求君子修此三者故全也夫桓公身負弒逆之罪而又輕躁妄動為人所棄與易相契聖人深為萬世之戒也冬十有二月丙午齊侯衛侯鄭伯來戰于郎春秋之中諸侯加兵于魯者為不少矣未有書來戰者此不書侵伐我鄙而以來戰為文者見彼曲我直我有辭也左氏載其事曰鄭世子忽有功于齊齊人餼諸侯使魯次之魯以周班後鄭鄭忽怒請師于齊齊人以衛師助之蓋以齊衛嘗胥命故也夫我則有禮而彼反興戎故特變文曰來戰于郎郎魯地地以魯則魯與戰可知矣而不出主名者三國非義加兵于我故以三國自戰為文也此鄭主兵而序在齊衛下者名雖因鄭而事實本齊齊侯知魯援紀無所發怒故激鄭而嫁其禍于魯也夫魯桓有弒逆之罪三國黨之而不問乃區區以魯班為討此聖人所以深罪之春秋集注卷五
