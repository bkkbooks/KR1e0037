body:
  text: 春秋集注卷三十九宋髙閌撰哀公一元年春王正月公即位楚子陳侯隨侯許男圍蔡楚子以諸侯之師不能伐吳而但圍蔡則楚之衰可知矣其圍蔡報柏舉也夫蔡侯怨楚不思務本修德以俟時而輕謀兵革求得志于大國是益禍也其見報也宜矣定六年鄭滅許以許男斯歸此復見者蓋鄭滅之以為附庸楚復立之也隨世服于楚不通于中國吳子入楚昭王奔隨隨人免之卒復楚國楚人德之使列于諸侯故聖人因而序于經以見當時蠻夷之專肆如此鼷鼠食郊角定公末年哀公元年連書鼷鼠食牛之變則知魯之郊禮嵗一行之餘年皆以常事不書也此不言所食則所傷非一處然牛亦不死也改卜牛魯不當郊故天示變以警之而改卜牛是違天也夏四月辛巳郊雖改卜牛猶非郊時况公斬然在衰絰之中輒行天子之禮以見上帝可乎春秋書郊終于此矣秋齊侯衛侯伐晉五氏埀葭之後聖人書次以存晉晉至是而益衰聖人不復以盟主待之矣書曰齊侯衛侯伐晉者見霸統之絶而受諸侯之伐也以傳考之魯及鮮虞之師在焉春秋以齊衛首惡故沒魯而略鮮虞也夫范中行氏者晉之卿也叛而不能制又豈能以主諸侯乎無惑乎齊侯衛侯之見伐也蓋晉定公召陵之役不能得楚而蔡昭公以吳子勝于是齊鄭衛背之已而我睦齊鄭宋人效之俱叛晉者也文公之業掃地盡矣又十有二年而吳人爭長于黃池雖欲為成景悼厲之世且不可得矣悲夫冬仲孫何忌帥師伐邾觀定公之末邾之事魯至矣去嵗邾子來奔喪今踰年而遽伐之蓋魯人謀邾久矣利取其田不復知有禮義也二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田癸巳叔孫州仇仲孫何忌及邾子盟于句繹定公之薨也邾子來奔喪非能行禮也知三家者欲并其地故事魯不敢不恭此其情也然卒不免故元年伐邾至是三卿同伐而取漷沂之田此三家之意也且襄十九年取邾田自漷水今三卿又帥師伐邾取漷東田因及沂西田然則三卿之專強貪暴如此故列數之以重其罪入春秋來伐國取邑者多矣未有伐國取田者也襄十有一年作三軍則魯公之民歸于三家矣尚有中軍為公之肘腋也昭五年又舍中軍則魯公肘腋之兵盡歸于季氏矣故昭公見逐凡八年而後死于外國定公既立不能誅季氏反聽其邪説淫于女樂而退孔子幸而終于位者非季氏不欲取其位也諸侯服周公之德而尊其後嗣三家雖有無君之心而畏諸侯之義也當哀之時祿去公室蓋五世矣三家盡分魯國之土而兵其民專其賦故書曰季孫斯叔孫州仇仲孫何忌帥師伐邾是三卿各專其師同伐乎邾也句繹邾地故為小邾所取三家既得田遂許受其盟故書及以罪之然三卿伐而二卿盟者季孫臨之叔仲歃之是季孫之汰也自謂猶君矣其卑邾亦甚矣故謹而日之是時魯政不復在公矣皆三家者之所為也故詳志之夏四月丙子衛侯元卒衛靈公立四十二年時世子蒯聵以南子之故出奔在外南子怨之不召乃立蒯聵之子輒是謂出公滕子來朝公新立故也此見滕之微弱尤甚矣晉趙鞅帥師納衛世子蒯瞶于戚戚衛邑也子受命于父臣受命于君蒯瞶雖奔靈公未有廢之之命雖嘗欲立郢亦不果也今靈公卒衛人以世子在外遂立其子輒使輒知已之所以得立者以父為世子故因逆其父而還以位則子道得而亂皆息矣奈何更待人納其父而反拒之耶凡奔者在外非有國逆不可入故趙鞅帥師納之其言納衛世子者明所納者正也異乎趙盾納捷葘于邾而貶稱人也其言于戚者見衛已立輒矣蒯瞶為輒所拒而不得入於衛也聖人惡輒貪國叛父逆亂人倫以滅天性故方其適衛也衛子待子以為政子路問之子曰必也正名乎于是孔子不得政嗚呼孔子而得政必將復世子矣奈何雖由而亦以為迂耶國人于是拒世子曰先君之命也豈知君子之于國也雖其先君之命苟為非義君子不從也然輒已立矣將若之何曰曉輒而後立世子不遂先君之失而父子定不愈于爭乎爭則刑罰不中而民無所措手足故君子名之必可言也言之必可行也今輒以世子之子得立反拒世子蒯瞶稱世子而反不得立得為正名乎由此言之蒯瞶廢則輒不當立輒立則是蒯瞶不當廢故輒當致國于蒯瞶豈可以子拒父也聖人于蒯瞶出入皆正其世子之名所以篤父子君臣之大經也不然貪國叛父之人接踵于萬世矣秋八月甲戌晉趙鞅帥師及鄭罕繞帥師戰于鐵鄭師敗績齊人輸范氏粟鄭罕達送之晉趙鞅遇鄭師于鐵而與之戰故書晉及而不書伐特以兩國之卿自帥師共戰為文也書鄭師敗績者善晉勝也晉雖失道而藉文襄悼公之遺烈天下猶欣嚮焉是以晉一有勝則君子喜而存之庶幾復振此憂世之仁也冬十月葬衛靈公七月而葬父子爭國故也因魯往會而著其臣子私諡之罪十有一月蔡遷于州來蔡殺其大夫公子駟吳滅州來而蔡已降于楚復背楚而請遷于吳吳人許之故以自遷為文今壽春府下蔡縣是其地也初武王封叔度于汝南上蔡蔡叔以叛被誅成王復以封其子仲焉及平侯卒徙于新蔡至昭侯乃徙九江下蔡即州來是也州來本屬楚蔡以畏楚求遷而反遷于楚地故國人皆不欲遷吳人怨其不時遷而以兵襲之故蔡人以駟本謀遷因委罪于駟而殺之所以先書蔡遷後書殺駟也夫蔡之禍生于玩裘而成于遷國人無逺慮必有近憂豈謂是耶吳楚之貪殘無道則又何誅焉三年春齊國夏衛石曼姑帥師圍戚春秋書國外邑則各繫其國今齊圍衛之戚何以不繫之衛主曼姑也主曼姑則何以齊為兵首以曼姑之義不可圍也先儒乃以輒之拒父為尊祖以齊國夏衛石曼姑之圍戚為霸討嗚呼起後世亂人倫賊父子之教者蓋此言也且蒯瞶不過以疑似之迹奔逃于外以待父之察爾父子之恩未絶也輒為蒯瞶之子豈不知之况人子之事親當致之于無過之地今見蒯瞶出奔在外而遂以其父為罪人則輒之為人子巳不免乎罪矣况又據國而拒其父乎昔孟子論舜為天子臯陶為士瞽瞍殺人則如之何曰執之而已矣然則舜如之何曰舜視棄天下猶棄敝屣也竊負而逃遵海濱而處終身欣然樂而忘天下輒之為人子能致其親于無過之地若此可也今反以已之大夫會外大夫帥師以圍其父則君臣之義父子之思皆自此絶矣夫曼姑以臣圍君為子圍父逆亂人倫莫甚于此天下豈有無父之國哉不待貶絶而罪惡可見齊國夏帥師以助之故特重其罪以為惡首且齊既與晉為仇若蒯瞶入則衛從晉矣此齊人所以助輒也夏四月甲午地震地道安靜以震為異故謹而日之五月辛卯桓宫僖宫災諸侯五廟親盡則毁桓僖何以不毁三家者存之也僭天子也三家者出于桓而立于僖故私之也聖人因其災而並録之是時三桓子孫方盛君子于是乎知有天道也不書及者不嫌乎一處也若雉門兩觀則不可不書及矣季孫斯叔孫州仇帥師城啓陽魯懼晉故城啓陽為之備以所城近敵故帥師焉二卿帥師有所畏也自是連年四城宋樂髠帥師伐曹曹本屬宋既而叛之適足以取亡而已矣秋七月丙子季孫斯卒此意如之子季桓子也庶子肥嗣是曰康子夫君之視臣如手足則臣之視君如腹心君之視臣如犬馬則臣之視君如國人君之視臣如土芥則臣之視君如寇讎蓋君之遇之也重則其報之也亦重君之遇之也輕則其報之也亦輕春秋之時君遇臣之禮不止于薄也或專放之殺之矣臣事君之道不止于欺也或敢逐之弒之矣聖人痛君臣之兩失也故于魯大夫書卒者三十不卒者十有七蓋小見其意焉非特記君恩之厚薄臣之終始也其書卒者或親臨之或賻贈之恩及之也其不書卒者或出奔或不親臨或賻贈不加恩意不及亦或卒于春秋之後也如公子翬弒逆也慶父僑如臧孫紇公子憗皆出奔者也其他或恩不及或在春秋之後蔡人放其大夫公孫獵于吳公子駟之黨也放大夫者國也而稱人者皆衆人逐之放有罪也其放之于吳是召亂之道也厥後蔡亂以公孫氏豈獵之黨歟冬十月癸卯秦伯卒秦惠公也詳志日月見恩禮之厚也其子悼公嗣立叔孫州仇仲孫何忌帥師圍邾邾子巳受盟于句繹今二卿踰年而渝之是自敗其盟也雖邾政不修有以致冦然魯之棄信亦已甚矣自是盟不足恃春秋弗志也四年春王二月庚戌盜殺蔡侯申宣十七年蔡侯申卒是為文公此蔡侯申于文公為曾孫豈有曾孫與曾祖同名者乎周人以諱事神必有一誤此蔡侯申將如吳諸大夫恐其復遷也公孫翩逐而射之入于家人而卒國君未有為盜殺之者此書盜殺見變亂之極也公孫翩者又何足録哉故直書盜以絶之而不曰弒其君蓋絶無臣子之義故不列于君臣又甚于閽者所以恕蔡侯而深惡夫弒君之賊也申立二十八年其子朔立是為成公蔡公孫辰出奔吳蔡人以其盜黨逐之而不殺故以自奔為文其奔于吳者以公孫獵在焉葬秦惠公因魯往會而著其臣子私諡之罪宋人執小邾子天下無霸強得凌弱故宋得以執國君而無所忌者蓋窺霸也執非其罪所以貶而人之夏蔡殺其大犬公孫姓公孫霍皆盜黨也其黨或奔或殺則知弒君之盜已得矣晉人執戎蠻子赤歸于楚據左氏楚人圍蠻氏蠻氏潰蠻子赤奔晉晉人偽卜裂田以子蠻使蠻子聽卜遂執之以畀于楚師夫諸侯有罪方伯合命于天子問其罪然後執而歸于京師正也諸侯有罪不請王命而執之歸于京師罪尚可容若晉人執衛侯歸之于京師是也諸侯執諸侯以畀諸侯其罪尤重若晉侯入曹執曹伯畀宋人是也今晉為中國盟主而執戎蠻子苟得其罪則獻之天子猶之可也今既專執之反歸于楚以君臣言則楚為君矣以強弱言則楚為霸矣舍周事楚不足主中國之諸侯矣此晉所以不足與而諸侯皆棄之也城西郛城其西之一面以備晉故役民力也六月辛丑亳社災周自克商之後凡封建諸侯皆使立亳社顔師古曰存其社者欲人君常思敬慎懼危亡也董仲舒劉向亦云亡國之社所以示戒也左氏襄三十年傳曰或呌于宋太廟曰嘻嘻出出鳥鳴于亳社如曰嘻嘻然則諸侯皆立亳社矣閔二年傳曰間于二社為公室輔杜預謂二社者周社亳社之兩間朝廷執政所在也凡亡國之社必屋書亳社災見其不知戒故謹而日之秋八月甲寅滕子結卒冬十有二月葬蔡昭公國亂故緩也春秋于定哀之際録昭公尤詳者哀其不幸也當齊桓晉公之隆蔡猶不能自拔楚楚凌夷至于末季而昭公乃鋭然合中國以興召陵之會卒能以吳破楚入郢此其志力有過人者遭晉德之不競而不能逺撫使之卒陷于楚之禍君子是以哀昭公之不幸而為之數見于經也使昭公出于晉悼之世其功烈當如何哉葬滕頃公因魯往會而著其臣子私諡之罪五年春城毗夏齊侯伐宋伐宋者以求宋也求宋者何晉侯失霸宋人窺之齊人爭之是以伐而求之得宋則霸可圖矣晉趙鞅帥師伐衛衛不受蒯瞶且助范中行氏故也秋九月癸酉齊侯杵臼卒齊景公之不霸也有由哉晉以君臣興兵而齊乃為臣伐君衛以父子爭國而齊乃為子圍父以是令于諸侯是以君子知齊景之國之將亂也景公立五十八年其世子蚤死及疾屬陳乞立其少子荼于是羣公子皆出奔而公子陽生來奔魯不書者非以罪出故也冬叔還如齊使卿弔且會葬非禮也閏月葬齊景公喪不計閏其以月數者計閏可也因魯往會而著其臣子私諡之罪六年春城邾瑕是年冬伐邾明年遂入邾則知邾益微弱魯以不義強城之也聖人因其城而復繫之邾者不與魯之擅并人之土地也晉趙鞅帥師伐鮮虞鮮虞納荀寅于柏人故趙鞅伐之治范中行之亂也吳伐陳陳楚與也吳之入楚使召陳侯不來吳人怨之今伐陳者修先君之怨也聖人惡吳人侵暴中國故狄之而陳自是與吳成夏齊國夏及髙張來奔二子從先君之亂命廢長立少既又不能全其嗣君而陳乞將立陽生故先出奔夫二子以國難不勝而出與他奔異矣然不死君難故亦書出奔以示貶叔還會吳于柤叔還聘于吳吳子自伐陳還至柤而叔還遂致命焉故以會書秋七月庚寅楚子軫卒此楚昭王也昭王委政囊瓦寵費無極使賢人誅戮諸侯怨畔入郢之禍宫汙冡發幾不免其身迄得反國而卒于位者國有一申包胥也凡立二十七年其庶子章立書楚子卒義見宣十八年齊陽生入于齊陳乞使召陽生于魯將立之不書自魯者魯無助也繫陽生于齊而不稱公子者與小白同義且見景公廢長立少以啓亂也昔景公問政于孔子孔子對曰君君臣臣父父子子聖人之意深矣齊陳乞弒其君荼陽生入而君遇弒弒君者雖朱毛而陽生實與聞乎弒也不以陽生首惡者陽生之入陳乞召之荼之遇弒陳乞為之以乞為首惡則陽生之罪自見不然則陳乞廢立之迹不明而後世姦臣得以肆其詐矣故春秋書弒君之賊雖其人不自為必以禍所從發為主所以誅其意也然觀從召公子比而靈王死陳乞召陽生而荼死乞蒙弒君之惡而從乃委罪公子比何也從陪臣也能始禍而不能定其所立比以衆立而不顧其君是比弒之也乞大臣也齊已有君而又外求陽生雖入而不能自定其位乞以強立之而不顧其君是乞弒之也從雖召比然公子有三焉比不自立可也乞召陽生固將君之矣陽生為君則孺子荼安所置哉故春秋别嫌明微不以其迹似而同其誅非天下之至公孰能預于此冬仲孫何忌帥師伐邾魯人必欲滅邾而後己自公即位以來四書邾役積明年入邾之亂也宋向巢帥師伐曹樂髠伐之猶未服且為入曹起也春秋集注卷三十九
