body:
  text: 春秋集注卷二十三宋高閌撰宣公三十有一年春王正月一時無事書首月存天道王法也夏楚子陳侯鄭伯盟於辰陵楚子去冬伐鄭因加兵於陳陳鄭皆聽服故為此盟書楚子於陳鄭之上者所以憫中國之衰也公孫歸父會齊人伐莒自四年公及齊侯平莒莒人不肯公伐莒取向至是齊侯召魯同討之故貶而人之人齊所以人歸父也秋晉侯會狄於欑函書晉侯會者春秋內中國而外夷狄此與隱二年公會戎於潛同文所以同晉於內而離狄於外也陳鄭諸夏之國而從楚衆狄夷狄之國而從晉狄在欑函而晉侯親往會之故聖人以狄主會為文所以罪中國不能自正也冬十月楚人殺陳夏徴舒楚子伐陳謂陳人無動將討於少西氏故入陳然後殺徵舒夫元惡大憝衆所欲誅稱人以殺蓋衆辭爾非與楚也彼弒君之賊固人人可得而殺之豈有蠻夷華夏之間哉然徵舒弒君今已踰年國人不能討天子方伯不能誅而反使楚入中國而殺之彼楚尚知弒君之當殺則中國如之何不能殺之耶聖人書此者非與楚人之能討也傷中國之不自正也丁亥楚子入陳入者內弗受而強入之是時陳侯在晉故楚子不動干戈自入於陳然則人君可輕出乎雖然楚子入陳然後殺徵舒而春秋之志入陳乃在殺徵舒之後何也人之為善惡有名是而實非始邪而終正自衆人觀之或取其名而略其實或執其始而遺其終所以是非失當而邪正舛也聖人則不然楚之伐陳初欲縣陳也聞諫而止遂以討罪為名故春秋書殺徵舒於前而掩縣陳之惡書入陳於後不使全討罪之美此斷大小之獄必以情惡惡疾其始善善樂其終之義也書楚子者著楚之本爵楚入中國故日以惡之納公孫寧儀行父於陳二子皆通於夏姬致徵舒弒君然則二子之罪與徵舒何異聖人特書此者與其納也何以與其納為其能訴於楚殺徵舒而定陳也不繫之陳者與其納而不與其得納也此乃其君之所由以弒者非復可以居陳之位也蓋楚子殺徵舒若能誅賊而出於正者由納二臣以觀之楚子殺徵舒正為二臣殺之非為討賊殺也楚子之情於此不能逃矣夫致陳之亂者此二子也已絶於陳矣故不繫之陳而書納納淫亂之人於中國見中國不自正而楚得以肆行也十有二年春葬陳靈公靈公見弒於今三年因楚入討賊陳人始得伸臣子之義故此書葬者賊已討也又著其臣子私諡之罪楚子圍鄭去冬入陳今春圍鄭以二國背辰陵之盟而從晉故也易曰君子以作事謀始陳鄭之始即楚是乃召楚以亂中國也然楚入陳而討之書曰入入鄭而赦之書曰圍何也楚之入陳也欲縣之人言其不可乃封陳侯其入鄭也欲赦之人言其不可卒與鄭平故封陳侯者非本謀也不善而能改也故書曰入與鄭平者楚本謀也不為利言所誘故以圍言之此君子所以謂楚莊王不絶乎夷狄也此所以屢稱楚子以録之夏六月乙卯晉荀林父帥師及楚子戰於邲晉師敗績邲鄭地鄭既與楚平而晉後至諸大夫皆欲退而先縠佐荀林父獨不可故以林父及楚子以明林父主戰也夫晉欲救陳鄭豈可以一大夫將不協心之屬以與強暴新勝之楚交戰乎徒取敗䘐血肉坐靈非救難解紛之道也故不書救然中國之大夫及諸楚君而不嫌於抗者所以崇中國也故書林父以敵楚子晉既敗績陳鄭於是乎服楚子矣秋七月冬十有二月戊寅楚子滅蕭蕭子姓宋之附庸也楚既得陳鄭又敗晉師遂深入中國憑陵諸夏滅人之國故謹而日之晉人宋人衛人曹人同盟於清丘晉為楚所敗故諸侯懼而同為此盟既又不旋踵而皆背之聖人惡其反覆故皆貶而人之宋師伐陳衛人救陳宋以楚子滅蕭且為清丘之盟故請於晉以伐陳以討其道楚師之罪此非所以報楚也故直以師稱書衛救陳者所以罪宋也然衛方盟於清丘而反救陳凡救雖義事而有背盟之惡故貶稱人十有三年春齊師伐莒莒恃晉而不事齊故齊興師伐莒而晉不救之前稱齊人而此云齊師者略其以師而伐人也夏楚子伐宋以其伐陳也晉衛曹復背清丘之盟而不救者楚人有辭於伐也故楚書本爵秋螽冬晉殺其大夫先縠邲之役三帥皆欲還先縠固請戰遂及於敗至是以為討然釋趙旃魏錡不討而獨誅先縠為政不平殺者不受治矣况又族滅之惡之甚也故稱國以殺十有四年春衛殺其大夫孔逹晉既討邲之敗而殺先縠矣以衛背清丘之盟而救陳也討焉孔達自知不可免乃縊而死衛人因以說於晉故稱國以殺罪纍上也夏五月壬申曹伯壽卒曹文公立二十三年其子廬立是為宣公晉侯伐鄭晉救鄭而敗於邲鄭遂即楚夫鄭背華即夷討之正也故稱晉爵然自文公沒襄公僅能修先君之業靈公幼而趙盾為政其殆庶幾矣成景之世文公之澤寖微干戈日尋積而至於蜀之盟而中國盡夷狄矣豈特失政而已乎至此而後知齊桓晉文之有功於中國也孔子曰微管仲吾其被髮左衽矣然則管仲之功終春秋之世猶或賴之秋九月楚子圍宋國必自伐然後人伐之宋輕用兵至反見伐則自取之效也至是楚使申舟聘於齊曰無假道於宋申舟曰我則必死楚子曰殺汝我伐之及宋宋人殺之楚子聞之投袂而起遂再伐宋不書伐者罪之遂恃強以圍之蓋罪不在宋葬曹文公因魯往會而著其臣子私諡之罪冬公孫歸父會齊侯於穀齊侯在穀而歸父往聘焉故不書如齊而書會於穀蓋謀於齊侯而平楚宋也十有五年春公孫歸父會楚子於宋歸父歸自齊又以楚子之尚圍宋也而往聘之直以宋地者罪魯見楚在宋境反與之聘也夏五月宋人及楚人平楚子自去秋圍宋至今不解天下諸侯莫救者於是華元潛入其師劫其將子反請平子反懼告於其君而與之平凡書平皆以國舉今宋楚之平稱人者貶也何貶乎貶華元子反也六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸夷狄悖亂諸侯驅之可也晉師滅赤狄又執其君此則甚矣故惡而日之後世輕誅夷狄以多殺盡殄為中國威此豈先王之志也哉詩曰薄伐玁狁至於太原此大雅之則也凡滅不氏此氏何也以赤狄有潞氏甲氏二種故也是時楚肆其強圍宋踰年晉不能救而反滅狄利其土地亦怠於憂中國矣秦人伐晉自二年秦師伐晉晉不報秦今十四年矣此復來伐者乘晉兵逐爭狄土而窺其虛也故貶而人之王札子殺召伯毛伯王孫蘇與毛伯召伯爭政使王子札殺之札者名也矯王命以殺大臣宜名之以著其罪然書札而不書王子則與內臣無異若柔溺翬挾之類矣書王子札則與王子虎同無以見其罪故變文以别之夫生殺之柄天子所持毛伯召伯王之卿士今王札子乃敢擅殺而定玉不能禁失政刑矣是以春秋惡而志之舜為天子瞽瞍殺人則臯陶執之何王子之有秋螽為災故書仲孫蔑會齊高固於無婁齊侯在穀則公孫歸父會之齊卿在無婁則仲孫蔑會之蓋公主齊久矣幸晉楚之爭而不我及忽焉而平楚宋俾歸父請於齊侯齊侯則疑我之從楚也蔑於是會焉以修舊好初稅畝古者天子有王藉諸侯有公藉蓋借民力以治吾田而已謂之助而不稅當是時也民知先公後己詩曰雨我公田遂及我私是也及其衰也有法以治之稼不善則非民又其甚也法不足以治之矣此宣公之時所以舍公田之不善乃履民之畝而稅其善者也民日從事於戰鬭而井田之法漸廢此聖人所以書初稅畝以議其壞法自便也云初者自是遂為常稅矣冬蝝生書燠也秋螽未息而冬又生子冬非蝝生之時以是為異此履畝之符也饑蝝生以至於饑公之不恤民一至於此天時人事參而書之春秋之㫖微矣十有六年春王正月晉人滅赤狄甲氏及留吁晉師既滅潞今又并盡其餘黨斯已甚矣故士會董此役而貶稱人且再書晉之滅狄惡其窮兵荒服無復顧懷中國之志也夏成周宣榭災案經文公穀作災左氏作火此從公榖國語曰先王之為臺榭也臺不過望氛氣榭不過講軍實成周宣榭者宣王之榭也宣王中興講武於此焉而書其災者聖人蓋傷之也何則周室板蕩中國微矣宣王嗣之南征荆舒北伐玁狁遂攘夷狄以復文武之境土天下喜於王化復行今周復衰夷狄橫行平惠以降皆庸暗齷齪無能以王道興起之者人思周室中興仰止宣王受其所茇故因其災而傷王者之不作使功烈不得著見於天下而王者之迹又從而煨燼之蓋痛乎王道陵遲之甚也孟子曰夫明堂者王者之堂也王欲行王政則勿毁之矣况我宣王中興講武之屋而子孫當此衰微之際不思振舊而反為火所焚乎秋郯伯姬來歸來歸者見棄而歸也不能乎舅姑之國而為夫所黜此罪伯姬也罪伯姬者乃所以罪其父母失教也君子之道造端乎夫婦是以春秋於內女夫人皆詳志之冬大有年此一句在魯史則為記祥瑞一經聖人之筆則非為祥瑞書也何則宣公不義得國又當饑年而重斂於民宜其不獲時和嵗豐之應今乃大有年聖人從而録之者是為記異也所謂非常則書也然則春秋不書祥瑞乎曰春秋不以祥瑞訓人蓋示以天道也天猶父也君猶子也子有善父而寵賚之非父也子為不善父不譴責之非父也君有善天而祥瑞之非天也君為不善天不災眚之非天也觀天道之於人君父子而已子有善父親之君有善天祚之子為不善父其譴之譴之猶不善廢之棄之爾君為不善天其災之災之猶不善禍之滅之爾故春秋惟書災異以明天道為百王法十有七年春王正月庚子許男錫我卒許昭公立三十年卒其子寧立是為靈公丁未蔡侯申立蔡文公立二十年卒其子固立是為景公夏葬許昭公葬蔡文公不月者略之也許蔡與楚而背中國故略之且因魯往會而著二國私諡之罪六月癸卯日有食之按長歷六月癸卯朔不書朔因舊史也日食雖有常度亦人事所召有食之者已未公會晉侯衛侯曹伯邾子同盟於斷道諸侯同心疾齊故書同盟夫齊自晉文之卒自恃強大欲與晉爭長不復與晉侯會晉欲伐之久矣患諸侯與之交通不同心爾魯自文公末年宣公之立亦背晉事齊逮齊惠公卒始少怠焉然亦未嘗不懼晉之見討也今因諸侯皆有伐齊之志公始即晉而獲同盟秋公至自會公弒君篡立而出與諸侯會踰時而還故書至以危之冬十有一月壬午公弟叔肸卒不曰公子而曰公弟者兄在則稱公弟因兄之尊也兄亡復稱公子是先君之子也肸嘗命以為卿故以卿例書之宣公弒立而肸有傷乎惡與視也終身不食其祿故特書其卒以重宣公之惡且見宣公終命其子嗣為卿其稱叔者乃起其生而賜族是謂子叔氏十有八年春晉侯衛世子臧伐齊晉衛先伐齊故齊人求成以緩諸國之師公伐把把自文公十二年來朝而不復至故伐之稱公專罪公之凌小國也已不修德而欲人之朝已亦不思之甚矣夏四月一時無事書首月存天道王法也秋七月邾人戕鄫子於鄫凡自虐其君曰弒自外曰戕弒起於漸而戕發於暴也僖十九年邾人執鄫子用之是時天子方伯不復討其罪故此肆然復戕鄫子於鄫也夫邾人肆無道之強戕同等之君罪固大矣鄫子為國君而見戕於人必有以致之也國君必有卿大夫及侍衛之臣今鄫子之於邾乃不共戴天之讐又使得造其國都戕弒其君而鄫國臣子恬然坐視無動心者如秦人視越人之肥瘠故聖人書戕鄫子於鄫見鄫無守備且惡鄫之臣子不能拒難與自弒其君無異也鄫子不名與僖十九年同甲戌楚子旅卒此楚莊王也前此不書楚子之卒者外夷狄也此書之者以楚入為中國之害甚於前日故録其卒以見中國不能自正乃與楚相為朝聘相與盟誓相通問好故春秋自此得以詳志其卒也不書葬者僭竊大號罪重惡極不可信其臣子之辭書之也公孫歸父如晉公自篡立以來所以事齊諂矣晚睹齊之不競於晉則翻然事晉而棄齊如遺焉甚哉利之使人輕合易絶也傳載公之晚年謀伐齊至成二年而有鞍之役蓋歸父此行實為始謀亦以三桓專命欲假晉力以去之故也冬十月壬戌公薨於路寢薨於路寢正其終也歸父還自晉至笙遂奔齊歸父以襄仲之立公也欲去三桓以張公室與公謀而聘於晉冬還至笙聞宣公薨而新君與三桓謀欲逐之以是奔齊夫先君未殯而逐其臣是死其君而忘其父也縠梁子曰捐殯而棄其父之使者是亦奔其父也得經意矣歸父既畢使事盡哀而奔是知死亡之不免而能不失度於顛沛造次之時異乎他大夫之奔也故其辭繁而不殺則歸父之善自著矣雖然人臣之正受命而出雖君薨猶當致命於殯前若其有罪待命於新君可也今歸父還自晉未及魯境遽即奔魯則有惡於新君矣故書奔以著其逃刑之罪春秋集注卷二十三
