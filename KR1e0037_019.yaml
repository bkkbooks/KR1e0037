body:
  text: 春秋集注卷十九宋髙閌撰文公三十年春王三月辛卯臧孫辰卒此哀伯之孫臧文仲也孔子譏其竊位又譏其不仁者三不智者三而魯人師其言以為死而不朽蓋非立德立功者也立言而已其子許立是曰宣叔夏秦伐晉此先蔑討盾也初盾舍適嗣而外求君罪也既而悔之正也秦不復顧義理之是非惟以報復為事夷狄之道也故重貶秦以見盾之能悔過而無衣之詩秦人刺其君好攻戰亟用民而不與民同欲豈謂是耶楚殺其大夫宜申宜申亦城濮之敗將也北面而事弒君父之賊今十年矣乃謀弒焉楚子聞而殺之亦可悲也已宜申字子西楚有兩子西其一則公子申也皆楚之用事者或問管仲子産而及子西孔子告之曰彼哉彼哉蓋以其蠻夷非吾黨之士故卻外之不復論其賢否自正月不雨至于秋七月此一嵗之望盡矣八月雖雨無及也故不書雨且見公之怠于民事也及蘇子盟于女栗古者內諸侯不外交外諸侯不內交不敢二至尊也今頃王新立而諸侯不朝反使大夫出聘以盟諸侯而公遂敢與之盟則惡益甚矣故不敢斥公而沒之沒公亦以譏蘇子也夫不雨僭之咎也而繫以女栗之盟是惡知正厥事哉諸侯僭天子大夫僭諸侯天地為之感變而人安行之皆如女栗之盟莫之非也此春秋所以深貶公也雖然公從霸主而盟王臣多矣未嘗沒公何也蓋有首惡者故不嫌也冬狄侵宋狄侵諸大國獨宋未爾自宋亂之後狄既侵之楚次厥貉又將來伐則國幾亡矣此螽之咎也楚子蔡侯次于厥貉此楚子將求諸侯而經不著其事者恐諸侯疑二欲前而未敢也夫楚子者弒君父之賊死有餘罪而中國諸侯如宋陳鄭之君乃皆俯首而聽命焉宜其敢肆暴橫于中國矣聖人不使蠻夷遂加于中國也故于此不從諸侯會盟之例而特書曰楚子蔡侯次于厥貉而已次者遲疑不前之貌著楚子包藏禍心欲以憑陵諸夏而未敢遽前也惟蔡侯首附楚故表而出之以均其罪厥後諸侯知中國之不可棄復同盟于新城非若蔡侯之堅附楚也則此獨書蔡侯者其旨深矣十有一年春楚子伐麇此年不書王者見中國諸侯之無王也何以知之以傳考之麇子逃厥貉之會故楚子伐之楚子侵伐諸侯至是遂稱爵矣以是見中國諸侯自會厥貉之後皆不能加楚也成二年會蜀之後雖其大夫帥師亦出主盟一同中國蓋聖人悼中國無盟主故不以蠻夷待之也夏叔仲彭生會晉郤缺于承筐謀諸侯之從于楚者叔仲彭生蓋公子牙之孫叔仲惠伯也經不書其卒者據左氏文公薨公子遂欲立宣公彭生不可既而遂殺世子惡而立宣公又以世子惡命召彭生入而殺之聖人以其不發仲遂之姦謀而禍及嗣君又及其身故略之略之者乃所以貶之也秋曹伯來朝喪畢而來朝也公子遂如宋為司城蕩意諸故也意諸之歸不書者彼之來奔本非其罪義可以異乎宋華元衛孫林父之徒也狄侵齊七年之間狄三侵齊非特齊之不競也亦當狄之方強爾狄之強如此乃所以大鹹之功也冬十月甲午叔孫得臣敗狄于鹹鹹我地叔孫得臣最善射者也狄既侵齊而後之魯叔孫得臣以一矢斃其酋首故不言帥師春秋書敗狄者四皆不書戰不待戰而敗之喜中國之勝也喜中國之勝者不與狄之抗中國也是以謹而日之狄敗不曰師賤之也十有二年春王正月郕伯來奔莊八年夏師及齊師圍郕郕降於齊師夫郕蓋魯之同姓國也而與齊同圍之自是降於齊而為齊屬今為齊所逼而復來奔魯故書郕伯而不名推其所由然深以罪魯也與莒展輿邾子益異矣把伯來朝杞復稱伯豈以其國或小振歟王命既壅霸主以國之大小易其班諸侯以國之強弱變其號此之謂其命亂也二月庚子子叔姬卒女子雖許嫁筓而字若未及嫁而死自十九以下皆為殤與成人之禮固有差等而文公不以正禮卒之過于常制此春秋所以譏之夏楚人圍巢書序稱巢伯來朝則巢之建國久矣楚遂取之為屬邑後為吳所滅秋滕子來朝此滕昭公也以文公之愚暗而曹杞滕之君皆相繼來朝則置天王于何地耶秦伯使術來聘秦伯者爵秦也爵秦者進之矣前此來歸僖公成風之襚蓋將來聘而以此先之也術來聘意在晉爾夷狄而能進以禮是亦中國也然夷狄之越千里而來聘魯不能以禮外之則又將越千里而報聘矣術不書族以夷狄故略之也冬十有二月戊午晉人秦人戰于河曲河曲晉地秦報令狐之役也凡戰皆以主及客今秦伐晉既退而晉追之至河曲而戰焉莫適為主也故不書及二國報怨償禍迭起師徒其罪均也故皆人之不書敗者兩無敗也季孫行父帥師城諸及鄆春秋書城二十九而帥師城之者二此及哀三年城啓陽是也必帥師者畏他國之擾也夫勞民而城且不可況帥師以出乎十有三年春王正月夏五月壬午陳侯朔卒陳共公立十八年而卒何以不書葬日共公背中國即夷狄而死亦異于成公午之得正而斃矣是以不葬也其子平國嗣立是為靈公明年與于新城之盟始自拔于夷狄也邾子蘧蒢卒邾文公立五十二年卒其子貜且立自正月不雨至于秋七月此一嵗之望盡矣八月雖雨無及也文公怠于民事如此世室屋壞伯禽為始封之君故其廟曰世室世世不遷之義也觀春秋文公事宗廟最為不謹非所謂卑宫室而致孝乎鬼神者也況世室者人子所常有事焉者也公每月朝之有司又當以時黝堊之豈有將壞而不知者且又無淫雨之災而其屋自壞此乃所謂變異也天人之際可不畏哉世或作太與太子太叔同義冬公如晉衛侯會公子沓公為尋盟而朝晉也凡言公及諸侯會者皆公往與會之也沓之會公已出境而衛侯因公之將如晉而來會公蓋欲因公而請平於晉也公許之狄侵衛衛侯輕出其國狄人乘間侵之晉不能為中國而攘夷狄使無侵軼而惡諸侯之二此春秋所以矜小國之多虞而善公成之也十有二月己丑公及晉侯盟公還自晉鄭伯會公于棐十有四年春王正月公至自晉公自去冬初如晉則因與衛會既盟晉而還則又因與鄭會久于道路而不朝正于廟故書至以謹之邾人伐我南鄙邾文公之卒也公使弔焉不敬故邾人來討夫欲修鄰好而反蒙見討雖魯人有以取之而邾人特以使人不敬而遽興兵以伐人之國則又甚焉叔彭生帥師伐邾邾之來也不敢近我止伐我南鄙而已魯之報也彭生帥師往伐其國則又甚焉夏五月乙亥齊侯潘卒此昭公也立二十年夫孝公名昭而諡潘曰昭非禮甚矣春秋惡之與不書吳越之葬同其子舍立蓋子叔姬所生也繼為啇人所弒六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城新城鄭地去冬鄭衛皆因公而請平于晉至是諸侯之從楚者復附晉也然諸侯始皆相會爾衆議既合而後盟且謀納捷災焉故别書癸酉同盟以惡之夫天王崩葬諸侯皆若不聞而晉為盟主政在趙盾乃皆俯首而與之同盟可乎而陳侯居喪出盟又不待貶也秋七月有星孛入于北斗晏子曰君若不改孛星將出彗星何懼乎然則孛之為變甚于彗矣且斗有環域而孛星自外入于中此變之大者劉向曰君臣亂于朝政令虧于外則上濁三光之精五星贏縮變色逆行甚則為孛夫孛星較然在北斗中天之示人顯矣可不懼哉春秋三書孛皆以謹人君之戒公至自會晉人因新城之盟遂以諸侯之兵納捷災而此先致公者見諸侯皆使卿行也自是公出皆致矣晉人納捷災于邾弗克納捷災蓋邾之奔亡公子也晉趙盾專執國政既受他國奔亡臣子又擅會諸侯之兵厯宋鄭滕薛敻入千乘之國欲變人之主諸國皆俯首從行莫敢以正義折之者至邾城下而後盾自知其義之不可而弗克納故不書諸國而獨舉晉人也夫廢置諸侯王者之事而陪臣專之罪莫大焉然聞義能徙亦愈乎遂矣春秋以改過為善故稱人以貶其罪捷災為人之子去君父而奔他國又欲藉他國之兵以歸篡其兄罪不容誅故不繫之邾也其曰納者不當納之辭九月甲申公孫敖卒于齊此著典型之壞也夫公孫敖廢命奔莒此誅廢之罪也已而奔齊主齊而請復公于是乎許之復故爵祿猶列于朝出入猶詔于國兄弟宗族猶存則其卒也是亦大夫而已矣所以特書其率且為齊人歸喪起也齊公子商人弒其君舍商人蓋桓公子昭公弟也舍未踰年而曰君者正舍之為君所以正商人之罪也若以未踰年被弒而不曰君則逆亂之臣皆以未踰年而肆其凶惡故聖人人原情而立此義晉奚齊不正又里克不代其位故異于此商人自立是為懿公宋子哀來奔春秋之法自外至者非有罪則不名自內出者非有罪則不書然人臣進退之節視義理何如爾豈有不義其君遂若匹夫之奔逃乎若但書其來則不見奔義若書其來奔則與有罪者等故書字以示義季子來歸不書出奔蓋為此也冬單伯如齊齊商人弒其君舍舍蓋子叔姬之子魯之出也故魯使單伯如齊以請子叔姬焉以其夫死子弒不安于齊義當歸魯故也齊人執單伯齊人執子叔姬商人弒其君而囚其母又怒單伯之來請因誣單伯以淫子叔姬而併執之春秋兩書齊人執者不可及也不可及者所以明單伯子叔姬之無是事也别而言之若二事焉所以重齊人之罪也明年書單伯至自齊又書齊人來歸子叔姬則知齊人執之者誣也然聖人不直書商人執而以齊人執之之辭何也商人罪惡已著矣齊人不能討弒君父之賊俱北面而事之又聽執其君母而加以汚辱之名則黨惡之罪均不可赦故兩書齊人所以窮逆賊之黨與而治之且以辨單伯子叔姬之誣也春秋集注卷十九
