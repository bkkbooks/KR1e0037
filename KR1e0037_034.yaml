body:
  text: 春秋集註卷三十四宋髙閌撰昭公四二十有一年春王正月葬蔡平公因魯往會而著其臣子私諡之罪夏晉侯使士鞅來聘晉頃公即位六年矣公以晉昭見止之故不復往朝今使士鞅來聘而孫叔婼為政季孫欲惡于晉乃使有司從齊鮑國之禮士鞅怒曰鮑國之位下其國小而使鞅從其牢是卑敝邑也將復諸寡君二十三年晉人遂執婼夫惟禮可以定國而賓客牢禮不以命則長此安窮吳徵百牢自歸費始亂生于交際之間禮好不結而財求無度則聘義亡矣蓋自是聘不復志也宋華亥向寧華定自陳入于宋南里以叛去冬三卿出奔陳既出則義與君絶今乃同入于南里是犯君也犯君當誅宋公不能討之而南里之人又不能為君絶之反為三子所據則是宋之綱紀盡弛矣書自陳者陳有奉焉故也秋七月壬午朔日有食之日食雖有常度亦人事所召有食之者八月乙亥叔輒卒事業無見于經而卒之者為叔肸崇也冬蔡侯朱出奔楚朱立已踰年矣而隠世子有之子東國以世嫡之故攻朱而自立故朱出奔楚以其不正不能自固其位故稱名以絶之公如晉至河乃復公以士鞅來聘故往朝之而晉復辭公故復凡公如晉而復者六蓋魯衰而朝于齊晉晉愈强則其往也愈數及其又强而魯益衰則往而辭焉春秋蓋傷魯之削也滋甚而不能以義自强爾二十有二年春齊侯伐莒齊北郭啓帥師伐莒莒敗齊師于壽餘于是齊侯親伐之莒子行成焉盟莒子于稷門之外夫齊景矜而自功如此安能及逺哉宋華亥向寧華定自宋南里出奔楚大蒐于昌間三家卒徒至是益衆故于蒐復加大字所以甚三家之盛所以見公室之卑也昌間言非其地夏四月乙丑天王崩景王在位二十五年世子壽蚤卒愛子朝而欲立之國人弗順乃立子猛六月叔鞅如京師葬景王天子崩天下諸侯九夷八蠻莫不奔其喪故七月而葬者盡天下臣子之心使逺近得會其葬也今天王崩諸侯無一奔喪者昭公但使叔鞅往會之又以三月而葬是天子而用士庶人之禮也凡言葬王則知往京師矣必曰如京師者别乎以自行為文者也王室亂春秋記事必指其實下書王猛子朝之事自足以見王室之亂而聖人乃于此不隠其辭直云爾何哉前此者王室衰微猶未至于亂也故聖人每扶而尊之言王則曰天王不混稱于吳楚也言周則曰京師不下同于列國也王敗于鄭而書蔡人衞人陳人從王伐鄭以諸侯不可敵王故以自敗為文也以至襄王出奔而書天王出居于鄭晉侯召王而書天王狩于河陽王臣雖微者亦序于諸侯之上則所以嚴其名分者至矣故凡王室可譏可貶者皆遷就其辭而為之隠避今景王不能正其家而致諸子之爭立于是尹氏召伯毛伯欲立王子朝而劉子單子欲立王猛二子相爭遂以干戈相向迭勝迭負五年之間國無定主王室之亂莫此為甚故特書之然莊二十年惠王有子頽之亂僖二十四年襄王有子帶之亂春秋不書王室亂何獨于此乎書惠襄二王亂不在已今景王之亂乃自取之是王室自亂蓋有甚于惠襄者且天下不可一日無君而二子爭立五年始定嗚呼王室者諸夏之本也枝葉未有害本實先撥詩人尚以為戒況枝葉己彫瘁而本又蠧壞若此乎聖人于此所以特書王室亂者深悼周之不復興且罪諸侯之不一救也劉子單子以王猛居于皇猛悼王也子朝乃猛之庶兄有寵于景王王欲立之劉單不可故景王崩既葬而子朝遂作亂也以王猛居于皇者避子朝也以者行其意也貴則行乎賤大則行乎小此君臣也而以行其意言者君昏不能正國危不能正亂而後謀之猶行其意也蓋猛位未定進退在二子見景王不早定以致二子敢専之也皇者畿内之邑不言出而言居者猛所得有也未踰年而稱王示當立也其名之明雖有當立之義未能自定也君前臣名劉單不名而王名不嫌于倒置乎曰君前臣名常禮也禮當其變臣有不名而名其君不嫌者矣惟可與權者能變而不越乎中秋劉子單子以王猛入于王城王城者天子西都非宗廟所在而子朝之黨在焉故言入景王失道不能蚤正王猛之位終致子朝爭立故二子既以王猛居于皇又以王猛入于王城再書劉子單子以王猛其辭繁而不殺則必有大美惡焉冬十月王子猛卒居喪而稱王者明當嗣也出而言居者如成君也卒而書子猛者蓋生已正其當王故死以未踰年之君書之也不崩不葬降成君也按子朝告諸侯之辭曰穆后及太子壽早夭即世劉單贊私立少以間王室夫猛者太子之母弟雖與朝皆景王子猛幼而嫡朝庶而長而子朝之言乃惟太子為嫡而已欲以長奪之豈知太子之母弟亦嫡乎凡立後之法先立嫡無嫡則立子爾立嫡者以嫡為重故太子死立嫡孫未有嫡孫則立太子之母弟以母嫡故也立子則從諸子之長者立之均吾庶子故也今猛又卒于是又立猛之母弟王子匄是為敬王十有二月癸酉朔日有食之杜預曰以長歴推校前後當為癸夘朔蓋癸酉篆相類而誤也夫日食雖有常度亦人事所召有食之者二十有三年敬王即位春王正月叔孫婼如晉邾人城翼師自武城還魯人譎而取之邾人愬于晉晉人來討故叔孫婼如晉也癸丑叔鞅卒晉人執我行人叔孫婼晉人以我取邾師為罪而執我行人然此非大怨也其實則為二十一年士鞅來聘以魯為卑已故也晉人圍郊郊王畿之邑不繫之國者天下皆王土也王臣亦無所繫蓋土無二王所以别異于諸侯也春秋諸侯更相侵伐未嘗敢及于周蓋外相攻奪以傾天下之勢其心實無王而内不敢犯王室者懼天下諸侯執言而攻已也此圍郊者子朝在焉故也晉人助王以討子朝之亂既不書大夫之名不稱師而曰人者微之也事不克濟無功而還勤王之舉果如是乎故書晉人圍郊以罪之夏六月蔡侯東國卒于楚前年蔡侯朱來奔楚而東國以世子之嫡遂自立楚人直朱而召東國東國因朝于楚而卒故貶而不葬凡立三年其弟申立秋七月莒子庚輿來奔庚輿奪正而立又不安其國而出奔于魯如匹夫之逃故稱名與鄭伯突同莒人後迎郊公為君戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧此見吳之强而楚人益弱故先貶吳以抑其横夫頓胡沈蔡陳許皆楚與國也吳伐州來楚人帥六國之師救之于是吳人禦之盡敗其師于雞父凡直以敗為文者不分君臣舉師為重然此六國之師亦皆略而不敘也頓胡沈則其君自將蔡陳許則大夫帥師是以其次如此也然不書楚而舉六國不君不大夫者是時中國有子朝之難而諸侯安然不救乃助楚以攻吳聖人賤其背華而即夷故併罪六國有同夷狄以夷狄敗夷狄則楚尤不足道也終君之終大夫之者滅獲也其言胡子髠沈子逞滅者深惡二國之君不以禮義自守而服屬于楚為吳所敗不得其死故以自滅為文也君死而云滅者小國悉師而行一敗而俱亡之辭也故鄭棄其師齊人殱于遂梁亡胡子髠沈子逞滅皆自取之也陳夏齧不言執而言獲者甚之也夫六國之師盡為晉所敗二君見殺一大夫見獲背華而即夷者其效如此此萬世人君之戒是以謹而日之天王居于狄泉著有天子也然猛之母弟始立而遽稱天王者蓋景王之崩踰年矣曠年不可以無君故踰年則稱之且明正也又以著天下已有主而子朝不可亂之也其曰居于狄泉者復避子朝且罪諸侯不赴難也狄泉在王城之側周墓所在也尹氏立王子朝以諸侯不勤王王師不勝嗣君出居于狄泉故尹氏立王子朝立者簒辭蓋嗣子有常位故不言立此言立者與衞人立晉同然衞稱人者衆人同欲立之也合衆人所同願猶且不可今尹氏以一已之私而立之以致周室之亂罪在尹氏也尹氏即尹子此稱氏者著其世執國柄也然衞人立公子晉祗稱晉而已此稱王子朝何也不稱王子則嫌若尹氏之朝異乎衞之晉也文勢當然八月乙未地震地道安静以震為異當是之時禍亂極矣日至三食地為再動冬公如晉為叔孫婼故也至河有疾乃復公兩朝晉而一見止五如晉而四不得入惟此有疾而復然猶書乃者蓋難辭也逮于有疾乃復爾殺恥也然公之進退得以自専因疾而還可得言之若夫大夫則不得廢君命疾不可書書之是許其復也故公子遂至黄有疾乃復卒于垂不言有疾也二十有四年春王二月丙戌仲孫貜卒此孟獻子之曾孫孟僖子也初公如楚僖子為介不能相儀及楚又不能答郊勞僖子病之乃講學焉苟能禮者從之及其將死也召其大夫曰禮人之幹也屬説與何忌于夫子而師事之而學禮焉以定其位故孟懿子何忌南宫敬叔説皆師事仲尼仲尼曰能補過者君子也詩曰君子是則是效孟僖子可則效矣叔孫婼至自晉夏五月乙未朔日有食之日食雖有常度亦人事所召有食之者秋八月大雩因旱祭志僭也丁酉杞伯郁釐卒冬吳滅巢巢楚邑襄二十五年吳子遏伐楚門于巢巢人射而殺之至是吳因兩女子爭桑相攻遂舉兵肆其毒于巢而盡殺之故書滅與州來同葬杞平公因魯往會而著其臣子私諡之罪二十有五年春叔孫婼如宋婼之聘宋且為季氏逆女也書之以見宋曲棘之役不忘敦篤于急難者以此夏叔詣會晉趙鞅宋樂大心衞北宫喜鄭游吉曹人邾人滕人薛人小邾人于黄父謀王室也自二十二年景王崩王室亂天王播越在外諸侯皆莫奔救四年之後晉始為此會而諸侯不至但合諸侯大夫以謀之令諸大夫具戍曰明年將納王夫王室之急如此豈可坐待明年哉然則諸侯不行無安輔王室之心可知矣然而此會諸侯猶有善意也故無貶辭惟書諸國大夫見諸侯之無霸也叔孫昭子曰諸侯之無霸也害哉季世之事豈特諸侯以為害王室實下賴霸者亦有望焉且王室之亂如此之甚有霸者作苟能舉法以定之如齊桓公盟首止以定王世子鄭晉文公誅叔帶以入襄王豈不美哉桓文不作朝猛相競王室世臣不能明先王一定之制順非而廢嫡使頃公而為桓文果至是乎是以聖人傷王室之亂而又于此著諸侯之無霸也有鸜鵒來巢劉向曰有蜚有蜮不言來者氣所生所謂眚也鸜鵒言來者氣所致所謂祥也鸜鵒雖飛禽多穴居窟中或在枯木之竅此非結巢也今云來巢亦異矣先儒以為非中國之禽則非也攷工記又從而和之曰鸜鵒不踰濟以今觀之鸜鵒所在有之爾彼殆不知聖人所書之意而强為之説也傳曰楚幕有烏楚師其遁又曰城上有鳥齊師其遁蓋禽烏所集必于無人之處今魯之國政出于三家人皆歸之而昭公孤立于朝又不安其國數欲如晉故魯之公室荒凉寂靜閴若無人將為丘墟而鸜鵒以穴處之禽亦來巢也如髙宗肜日之書有飛雉升鼎耳而雊諸儒妄推五事不修之驗符于災異之説亦非也髙宗祭祀特豐于禰宫而簡于祖廟故既祭成湯之後明日將繹而祖廟之中已絶人迹有飛雉升鼎耳而雊焉所以祖已訓諸王作髙宗肜日之書而特言典祀無豐于昵也秋七月上辛大雩季辛又雩旱既太甚因一月再雩而志其僭且數也季辛不言大蒙上文可知也凡雩不日以再雩故日言上辛季辛不言辰者不卜故也夫雩不再者也雩而又雩欲聚衆以逐季氏也此昭公之失也昔樊遲從孔子遊于舞雩之下而問崇德修慝辨惑子告之曰善哉問先事後得非崇德歟攻其惡無攻人之惡非修慝歟一朝之忿忘其身以及其親非惑歟蓋指此也九月己亥公孫于齊次于陽州公將去季孫意如伐之不克反為季氏所逐其曰孫于齊者臣子不忍斥君之奔也次于陽州者不得入于齊待命于其境上公為國君而失守社稷既孫于齊又不得入次于陽州困辱甚矣且魯之失政也數世矣在易屯之九五曰屯其膏大貞凶蓋當屯之時居君之位而膏澤不下于民是威權去已也威權去已而欲驟正之是凶道也昭公徼幸一發而卒于見逐以死與髙貴郷公無以異焉齊侯唁公于野井弔生曰唁唁者安慰之辭若以齊侯之彊自可連諸侯之勢問季氏之罪以納昭公易為力爾今徒唁之以虚辭相恤而已是匹夫之愛非患難相濟之正也凡唁皆造其所居其曰于野井者齊侯將唁公公自陽州逆之蓋為恭也冬十月戊辰叔孫婼卒此豹之子昭子也觀意如之稽顙于昭子叔孫之以逐君責意如其事可見矣而季孫請納公婼遂往告公于齊公許之還既而季孫有異志婼以憂死夫婼不忍自同于季氏而謀納公正也不忍見欺于季氏而反自殺忠也故婼至自晉先書其姓氏春秋特以死襃婼也其子不敢嗣是曰成子十有一月巳亥宋公佐卒于曲棘宋公將為公故如晉卒于曲棘蓋已出其國都故書地季孫娶于宋元則宋元意如之外舅也不此之顧而欲求納公是以正倫恤患為心而不匿其私親之惡蓋激于義而發于誠其賢于當時諸侯逺矣故雖卒于封内特書其地以别之所以罪齊晉失方伯連帥之職無大國字小之義而哀宋公有其志而弗遂也凡立十五年其子欒立是為景公十有二月齊侯取鄆前書公孫于齊次于陽州齊侯唁公于野井示昭公于魯未絶也特罪季氏以臣逐君爾此書齊侯取鄆則見公已絶于魯矣鄆魯邑也公不能有而齊侯取以居公此乃所以罪公不能保其社稷而見逐于其臣也外取邑不書書之未嘗不稱人而獨此稱齊侯者以齊侯不義季氏之强而閔昭公之羈窮也于是取鄆以居公而齊無私焉故春秋與其爵然而齊侯先許公以千社而弗致乃取魯邑以塞前言故書取鄆以罪之嗟乎齊侯若以取鄆之力會諸侯聲季氏逐君之惡討其罪以納公猶反掌爾徒區區取一邑居之見齊侯無意于納公矣公猶不之悟乃居鄆三年以待之及見其終無意然後之晉亦已晚矣春秋集註卷三十四
