body:
  text: 春秋集註卷二十八宋高閌撰襄公一元年春王正月公即位公雖上不受于天子而内非繼故是受之以正也故書即位仲孫蔑㑹晉欒黶宋華元衛􅑔殖曹人莒人邾人滕人薛人圍宋彭城為宋討魚石也魚石奔楚楚子伐宋取彭城使守之聖人不予楚之奬亂助惡取中國之地反使中國叛臣守之故還繫之宋所以抑楚以正疆域黜叛臣也魚石亂奔楚復籍楚之力自伐其國宋不能討而晉悼合諸侯大夫共圍討之若以春秋以來諸侯自相侵伐推而言之則孟子所謂彼善于此也去强惡之臣折强楚之勢亦可謂霸討矣然而不請於天子而使諸大夫專之故與擅興兵以圍人者同文春秋㑹討書郷始此夏晉韓厥帥師伐鄭仲孫蔑㑹齊崔杼曹人邾人把人次於鄫彭城之圍既解而晉遂以西諸侯之師伐鄭故但書韓厥帥師而已晉以韓厥已足以當鄭重勤東諸侯之師故使次於鄫鄫以震鄭心且備楚師之出也是時韓厥遂敗鄭師秋楚公子壬夫帥師侵宋九月辛酉天王崩凡諸侯嗣位必朝於天子而童子侯不朝者天子不與為禮也童子侯雖不朝而聞天王之喪必來奔者明臣子之於君父非有老少也喪事尚質而無周旋之禮焉但盡悲哀而已矣是故雖童子侯亦奔也今襄公雖幼而不奔天王之喪豈以自居喪故耶邾子來朝公雖新立纔四嵗爾又在衰絰之中安能以禮相接况以天子之禮朝之乎冬衛侯使公孫剽來聘晉侯使荀罃來聘剽葢衛國用事者厥後遂逐衛侯而自立二國來聘以公新即位故也凡聘必以禮樂相見公在喪中又遭天王之喪而邾子來朝是時赴未至於諸侯猶可言也至冬而晉衛二國不廢聘好則諸侯不臣之罪著矣縱彼未聞赴而來魯亦豈可晏然受之乎二年春王正月葬簡王五月而葬乃諸侯之禮也亦可以見同軌之必不至矣鄭師伐宋楚以彭城故令鄭伐之鄭受制於楚而為之伐中國不貶而人之而書曰師者非所以伸之葢懲其動衆爾夏五月庚寅夫人姜氏薨此成公夫人也於襄公為母六月庚辰鄭伯㫻卒鄭成公立十四年其子髠頑立是為僖公不書葬者以成公背中國故諸侯不㑹其葬也雖然鄭之託於楚夫豈以中國為終可畔既蒙其徳遂不可反是以君子貴謀始也晉師宋師衛甯殖侵鄭鄭雖有叛中國之罪而三國伐其喪非義也書衛甯殖以鄭嘗伐我喪必欲報之故特著衛鄉以殊晉宋前書鄭師加宋曰伐今三國之兵加鄭曰侵所以直鄭也秋七月仲孫蔑㑹晉荀罃宋華元衛孫林父曹人邾人於戚謀鄭故也於是仲孫蔑請城虎牢以偪鄭荀罃善之曰罃請復於寡君而請於齊得請而告吾子之功諸侯之福也既而遂所請是冬再㑹焉雖然大夫而謀諸侯之事専恣可知矣春秋不加貶削之文而直敘其㑹者為下文起也己丑葬我小君齊姜自文姜哀姜之後魯人輒為夫人立諡且三月而𦵏簡也叔孫豹如宋宋有魚石之亂又再被楚鄭之兵魯人未報衛晉之聘而聘宋者憂急難也冬仲孫蔑㑹晉苟罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人於戚遂城虎牢鄭自鄢陵之敗附楚而背中國諸侯伐之無虚嵗而鄭卒不服諸侯患之故再使大夫㑹於戚以謀之諸大夫皆以虎牢之地可以斷楚之路而為鄭之敝遂從仲孫蔑之謀相與取其邑而乗之夫乗鄭之喪専取其邑於義不可然城之而可以安中國息征伐明年而鄭果受盟不用兵而楚不敢争鄭者七年然則虎牢真中國要害之地也夫王公設險以守其國今鄭有虎牢之險而不能守乃背華而即夷聖人深責之故不繫之於鄭而以中國自城要害之地為文雖然諸大夫前已㑹於戚而議此矣今不直言仲孫蔑㑹諸侯之大夫城虎牢乃再敘諸大夫㑹於戚而繼之曰遂城虎牢者晉既得齊因以會召諸國旣㑹始遂其本謀也盖城虎牢者本自戚之㑹仲孫蔑𤼵之諸大夫皆善之其謀雖善而未敢聲言之至於再㑹而此謀始遂矣楚殺其大夫公子申晉城虎牢有以勝楚矣楚無所歸咎其用事之臣公子申因多受小國之賂遂至於見殺見殺義見僖二十八年案僖二十八年楚殺得臣一條証文已佚三年春楚公子嬰齊帥師伐吳楚始志伐吳吳與鐘離之㑹故也是自鄢陵之敗勢稍屈於中國楚畏中國諸侯并力謀之而吳乘其間故先伐吳以張其勢然呉楚皆僭稱王所謂夷狄攻夷狄也公如晉夏四月壬戌公及晉侯盟於長樗公至自晉禮童子侯不朝王盖不可接以成人之禮也豈可反朝同列乎凡盟者必為壇於國外故晋侯出其國都以與公盟此悼公之敬也公之如晋孟獻子相公稽首焉知武子曰天子在而君辱稽首寡君懼矣移所以事天子之禮以事晋而甘心受盟故稱及也以晋致者以長樗之盟嫌公如晋不得入也六月公㑹單子晋侯宋公衛侯鄭伯莒子邾子齊世子光己未同盟于鷄澤此因城虎牢之故鄭服而同盟又諸侯同心病楚而王臣亦與焉故書同盟也單子王臣而下與諸侯盟故特書曰以間之亦以先㑹而後盟也鷄澤晋地陳侯使袁僑如會陳自辰陵之盟而即楚凡十有八年矣晋屢争鄭而不爭陳者非不争陳也得鄭則亦得陳也今聞鄭伯受盟故俾大夫來求成于晋以其本非召㑹而自來來又後時故書如㑹戊寅叔孫豹及諸侯之大夫及陳袁僑盟諸侯旣盟而袁僑至無盟可也以陳旣舍楚而來雖後諸侯不可不盟而諸侯不專敵袁僑故叔孫豹請使諸侯之大夫盟之盖以虎牢之謀本𤼵于魯故叔孫豹主之所以先書叔孫豹及又書諸侯之大夫及凡兩書及而袁僑以國繫之其辭䌓而不殺則知是盟亦變之正也至溴梁之㑹書大夫盟其辭甚簡盖春秋所以弗子也或者以此盟為大夫私盟是不然繫之諸侯正非私盟君命之盟也再書及陳袁僑盟此盟為陳袁僑之來非諸侯大夫自盟也袁僑必繫之陳盟為陳而盟非為袁僑盟也然則鷄澤之㑹諸侯不責陳侯不親會而與其大夫盟此足以示徳矣故春秋善之秋公至自會公之出㑹方六嵗爾冬晉荀罃師師伐許鷄澤之㑹陳鄭皆至而許獨附楚故晉伐之四年春王三月已百陳侯午卒𤣥經有言曰日月之逝改于尸尚未晚也陳成公旣為鷄澤之盟而卒則是國已變于夏矣曾子曰吾何求哉凡立三年其子溺立是為哀公夏叔孫豹如晉聘且為鄫世子故也事見五年六年秋七月戊子夫人姒氏薨此成公之妾生襄公者以夫人之禮卒之姒叔姓𦵏陳成公因魯徃㑹而著其臣子私諡之罪八月辛亥𦵏我小君定姒死纔三十三日遽以夫人之禮𦵏之又别為之諡時公方七嵗爾冬公如晋公有母喪復如晋朝且受貢賦多少之數焉陳人圍頓僖二十五年楚人圍陳納頓子于頓陳侯畏楚而不敢討頓子恃楚而不事陳今陳復從中國而頓為楚間故圍之自鷄澤之㑹而書伐許圍頓著晉興而楚絀矣五年春公至自晉著公不朝正于廟也且公幼而頻年如晉是危道也夏鄭伯使公子𤼵來聘鄭伯自鷄澤之㑹始離于強楚而來聘于中國諸侯得以息兵修好且通嗣君也叔孫豹鄫世子巫如晉外臣如不書此書鄫世子巫如者以同我内臣行也内臣如者非聘則各書其事此固聘歟曰非也據公羊傳盖叔孫豹率鄫世子如晉也何以不繫其事巫者鄫前夫人之子也莒女有為鄫之後夫人者無男有女女還嫁于莒而有外孫焉鄫子爱後夫人而夫人無子欲立其外孫為後而叔孫豹盖鄫之甥也故率巫偕徃訴其事于晋所以先書豹而正名巫為世子也奈何晉為覇主不能以大義辨正之卒使鄫取後子莒是以春秋不繫其事為六年滅鄫起也仲孫蔑衛孫林父㑹吳子善道晋人將為吳合諸侯故使魯衛先與吳為㑹且告㑹期二國俱受命于晉故不言及吳先在善道而二國大夫徃㑹之故曰㑹吳方是時晉楚爭衡權在吳故晉急吳如此夫楚自晉文僅能攘之至襄公而後漸不能制楚矣悼公子此粗得陳鄭非能強也吳張而楚爭陳鄭未艾也吳張者何吳人遺一大夫求㑹而悼公不敢辭於是乎至勤十二國之君而為戚之會吳則張矣悲夫秋大雩因旱祭志僭也楚殺其大夫公子壬夫此楚用事之臣也楚子討陳叛曰由壬夫實侵欲焉乃殺之此著楚之所以不競公㑹晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薛伯齊世子光吳人鄫人子戚此吳人來㑹中國非若鍾離善道柤向皆中國徃㑹吳也夫吳亦蠻夷也今中國諸侯不惜與之㑹者為其能病楚也殊不知彼能病楚則亦能病中國矣此中國之誤計也觀吳自敗楚之後伐齊伐魯伐衞伐陳以至與晉爭盟則其病中國可知矣按傳戚盖盟而經不書者殷㑹之盟春秋所重而蠻夷參焉没而不志所以崇中國也鄫子欲舍其子巫而立其甥是自絶其後蠻夷之所不為也故序在呉下呉稱人者為叙在鄫上不可云呉鄫人陳侯居喪出㑹以從中國為重矣晋于是命諸侯戍陳公至自㑹冬戍陳陳背華即夷二十餘年為諸侯所伐未嘗少息歸于中國則又為楚所伐旣不能鑿斯池築斯城與民效死守之而勿去又恃人之力以自戍其為國何足道也然此諸侯同戍非獨魯戍之也書於公至之後則知諸侯各遣戍與僖二年城楚丘同義楚公子貞帥師伐陳楚使頓間陳而陳伐之乃歸罪於壬夫楚又為之殺壬夫而陳又不改於是乎伐之初楚公子貞為令尹范宣子曰我喪陳矣陳朝夕急能無徃乎有陳非吾事也無之而後可至是楚果伐陳七年陳侯遂逃歸則宣子之言信矣公㑹晉侯宋公衛侯鄭伯曹伯齊世子光救陳陳方附中國諸侯既戍之後為楚所伐而又相帥救之救之義事也悼公之能也十有二月公至自救陳以救陳致者善救陳也公得善則諸侯皆得其善矣攘夷狄救中國此固春秋之所貴也辛未季孫行父卒此公子友之孫季文子也初齊姜定似薨父子令取穆姜櫬虧姑以成婦又略木於民終亦自及安在其能三思耶然自文子卒而魯有城費作三軍事則知季氏雖專魯政而文子猶忠愼僭亂未啓也其子宿嗣是為武子季氏之強萌于僖公大於成公熾於襄照極于哀定六年春王三月壬午杞伯姑容卒此杞桓公也按左傳僖二十七年杞桓公來朝成九年把桓公來逆叔姬之喪此年杞桓公卒然則自僖公二十三年杞子卒後桓公繼立凡七十年夏宋華弱來奔不言逐而以自奔為文者朝廷尚敬而弱瀆慢如此所以罪弱也曰來者者過我也過我者主逋逃也秋𦵏杞桓公把伯至是日卒時葬者以吾舅甥之國恩意有加故也且因魯徃㑹而著其臣子私諡之罪滕子來朝莒人滅鄫此所謂滅者非兵滅之也鄫人舍其世子巫而立莒甥以為後是取滅之道也何則神不歆非類今以異姓而承祭祀則宗廟不歆而國自滅矣春秋所以書莒人滅鄫以為立異姓之戒而後世猶不知本宗立後之義而疏忌同族輒取異姓如吾代郭大祖無後而以柴世宋為嗣者有國有家若此類者多矣其可不知春秋書滅之義哉冬叔孫豹如邾公初即位邾子來朝後有狐駘之戰乃在四年而經不書者魯人髽而弔自敗於狐駘始於是國人誦之曰我君小子朱儒是使朱儒朱儒使我敗於邾盖魯人怨其上如此故聖人不敢斥言也至是叔孫豹徃聘且修平焉以無忘舊好也季孫叔如晋魯既世卿故之子未練而從政無復三年之喪哀其典廢矣宿始報政而徃朝于霸王且聽命焉十有二月齊侯滅萊滅國目齊侯惡齊侯也齊圖萊乆矣自宣七年伐萊至是而遂滅之不言萊君出奔國滅君死也夫萊亦與齊同姓也衞文公滅邢名齊靈公滅萊不名何也衞文公可責齊靈公不足責故以文公一見之為法焉七年春郯子來朝郯少昊氏之後也前世聖賢之後所封之國皆逼近四夷先王之意非特以蕃王室盖用夏變夷也後世子孫徃徃多變于夷者反漸其習俗然也夏四月三卜郊不從乃免牲四月非卜郊之時故孟獻子曰吾乃今而後知有卜筮夫啟蟄而郊郊而後耕今既耕而卜郊冝其不從也不從故免牲免牲則不郊矣義見僖公三十一年案僖三十一年卜郊不從一條註文已佚小邾子來朝城費季孫宿為卿先城其私邑過于諸侯之制秋季孫宿如衛聘且尋盟也比書滕郯小邾來朝而志我卿如邾如晋如衛衛來報聘著朝廷交際之文也八月螽蝗也為災故書莊公以前螟猶書之荘公以後螟不復書螽然後書以是知災異之益多矣春秋不勝其書舉其重者以見其輕爾冬十月衛侯使孫林父來聘壬戌及孫林父盟報聘也且尋孫良夫之盟義見成三年楚公子貞帥師圍陳晋綽將修文公之業復有志于攘楚而楚先圍陳陳侯遂出㑹諸侯以求救于晉晋悼于是遽為之合諸侯也十有二月公㑹晋侯宋公陳侯衛侯曺伯莒人邾子于鄬鄬鄭地晋悼為此㑹將救陳而鄭伯遇弑陳侯逃歸不成乎救則知楚師方盛晋政未孚也鄭伯髠頑如㑹未見諸侯丙戌卒于鄵鄭伯名者為卒于鄵起也鄵鄭邑也諸侯卒于境不地此書卒于鄵者見其如㑹而卒也㨿左傳僖公不禮其大夫及將如㑹其大夫子駟諌而不從乃隂使賊殺之以瘧疾赴于諸侯春秋之辭䌓而不殺者善其志在見諸侯也志在見諸侯者弗與楚也夫夷不亂華裔不謀夏此春秋之大法古今之通義也今中國雖衰諸侯尚睦糾合與晉以尊天子而鄭僖能背楚而從之誠心不移以是見弑死禮義矣是時中國不競強楚方興使鄭慮難生變以弑其君此中國之恥也故諸侯因為之諱而春秋亦即其偽赴而致意焉亦所以徧絶鄭之諸大夫也何則子駟弑其君使諸大夫有一不同而不能自討則必告于㑹而討之矣今皆以為疾而赴之則非獨駟之所能及也諸大夫盖與聞之矣同弑其君以從楚聖人豈有恕之也哉昔趙盾之弑君也董狐書之以示于朝赴于諸侯仲尼曰良史也崔杼之弑君也太史書之崔杼殺之其弟又書之又殺之其弟又書之乃舍之然後以赴于諸侯故曰君弑臣不討賊命曰非臣親弑子不復讎命曰非子鄭非無臣子也聖人即其所以偽赴于諸侯者而遂書之是所以絶鄭之臣子也于是鄭人立其子嘉是為簡公方五嵗爾此事與齊侯陽生同陳侯逃歸楚人以陳叛故殺公子壬夫而亟討陳晋雖為陳再合諸侯卒不能攘楚以安中國故陳侯内為二慶所逼又聞鄭伯之弑晋侯不明其死竟不為之討賊強臣専君君不得為善遂以晋為不足與而逃歸也然為一國之君而不能自立從楚則懼為中國所伐從中國則又懼楚若匹夫之逃亦可羞矣春秋集註卷二十八
