body:
  text: 春秋集註卷十四宋高閌撰僖公元年春王正月不書即位同閔公義齊師宋師曺師次於聶北救邢齊桓公於是為仁不情而為志不廣矣狄入衞齊不救衛狄不伐邢而齊救邢聖人於是盖昭見其隠而知桓公之不足為賢方伯也衛朔奔匿於齊襄齊實納之是齊有恩於衛一也朔之入實拒王師桓公圗霸尊王釋其拒王師之罪而不問是齊有恩於衞二也荘公十六年幽之盟衛朔同盟及二十七年再盟於幽諸侯皆㑹而衛不至此衛負於齊者一也二十八年齊有伐衞之師問不至之故衛可以服矣而悍然不順與齊師戰此衛負於齊者二也伐衛於此又七年而衛卒不通於齊此衛負於齊者三也齊庇於衛者二而衛負於齊者三此齊所以坐視狄之滅衛而不救也然不救衛固也而邢未被兵乃反救之何也衛與邢為隣狄不伐衛則伐邢邢衛常有狄患齊惡於衞故雖滅而弗救邢無惡於齊未被兵而先救之救邢所以激衛也若曰順已者雖患未至而吾救之違己者雖已被兵而不之救嗚呼此固小人之情矣仁人果如是乎孺子将入井豈必其父母親愛而後救之雖其父母之仇哀其垂死亦将引手援之矣頋乃持他人之子而示之曰此於吾無憾吾持之若父與吾仇吾安視其死而不援也豈人情乎霸主急災救患而以私憾廢之信乎為志不廣而為仁亦不情也聶北在博州博衛地夏六月邢遷於夷儀齊師宋師曹師城邢邢未有以効於齊也而齊厚之為已甚前年狄伐邢齊即救之不留也今狄未至邢桓公帥三國之師次于聶北所以張邢之勢以却狄兵且謀遷之以期於久安城之以設其重險此豈徒為無益之役哉皆所以激衞云爾秋七月戊辰夫人姜氏薨于夷齊人以歸齊桓倡義存魯以示信於天下而亂魯者非他齊女也故召之至于夷而殺之而以之歸夫弑君之賊雖人皆可得而誅之而魯以臣子不得討則齊侯殺之為是此霸者所以行乎諸侯之義故聖人不罪齊侯之殺但書薨于夷則夫人不得其死昭然可見而莊公娶仇讎淫蕩之女以禍魯國又不待貶絶而可知也然齊侯殺之雖是而不當以歸繼書齊人以歸者罪齊不當取其尸歸也不言以喪歸者不成乎喪也雖然夫人義已與魯絶又不當歸之于魯如之何則可曰即其死所而葬之可也楚人伐鄭荆蠻加兵于中國謂之伐者以中國不自正故也荆自莊十年敗蔡師于莘始見于經十四年入蔡十六年伐鄭皆秪書荆荆本子爵僻在南荒不從中國政令而猾夏不恭敢僭大號所以外之也莊二十三年書荆人來聘盖周室微弱而蠻荆敢與中國交聘諸侯不以荆蠻待之而待以中國之禮聖人因書之曰人非進荆蠻也所以懲中國諸侯也然猶君臣同辭無復尊卑之辨二十八年荆伐鄭猶前志也此年書楚人伐鄭則見其地廣兵強暴横難制自是至一經之終不復稱荆矣然終齊桓之世惟秖稱人而不得與于中國之盟會者為齊桓能制其強也至僖十七年齊桓卒于是始横十九年則已盟于齊矣二十一年又盟于鹿上至秋則書宋公楚子會于盂執宋公以伐宋楚于是乎始大張列位于陳蔡之上而書爵矣所以著其強大難制中國不能抗也至冬告捷以威諸侯聖人復書曰楚人使宜申來獻捷貶其爵又稱獻所以抑其強也自晉文卒復有事于中國皆稱其爵以明中國外裔盛衰之漸惟貶而稱人者各隨事以見八月公會齊侯宋公鄭伯曹伯邾人于檉齊侯九合諸侯此其三也此會為衞城楚丘因為鄭謀楚也公雖以喪行亦一時之權也諸國皆君則邾人必非微者以其受姜氏故貶而人之然邾受姜氏莒受慶父公不請于會以討之乃既會而敗其師非禮也九月公敗邾師于偃邾人以哀姜在邾故戍虛丘以窺魯哀姜既誅邾知齊魯之交合將歸其戍公往要而敗之何以知要而敗之曰無伐邾之事而敗邾于邾地故也冬十月壬午公子友帥師敗莒師于酈獲莒挐書公子友帥師見其擁兵得衆而不能明大義以討慶父之罪反以賂求于莒而卒至于興師以毒鄰國無辜之民也夫弑君之賊豈得以親親掩之乎久稽天討一至于今乃慶父聞哀姜已死欲復歸魯魯人不可乃自縊遂致莒人持是興師而來以責賂于魯夫莒受亂不執固異乎蔡人殺陳佗者矣又復責賂不已信有罪矣公子友既不能喻以辭命使知不縮而退乃遽出師以敗之人獲其大夫以償之挐者莒子之弟獲挐者所以絶公子慶父之賂也春秋以季友主此戰特謹而曰之所以深責之也凡諸侯戰而死曰滅生得曰獲而大夫生死皆曰獲者以存之殺之皆在得之之後故也凡獲人之君與其大夫及其見獲者均為有罪其間曲直之義則各存乎其文凡小國之大夫不名事接于魯則名詳内也酈我地十有二月丁巳夫人氏之喪至自齊秋七月齊人殺哀姜而以之歸今歴二時魯不迎其喪者以夫人與弑閔公義欲絶之故也僖公新立外欲固齊以居厚内存母子不絶之義故請而葬焉此所以喪至自齊也然哀姜豈可復配宗廟哉魯以臣子不得討齊以霸主得舉法故臣子可緣霸主之命以尊宗廟霸主亦可縁天子之法以絶魯私請今齊以公義誅之是齊已絶之矣魯以私意請之是魯不忍絶之也是以聖人因其喪之至而特去姜以絶之于齊而存夫人氏以見魯之不忍也何則莊元年夫人孫于齊不稱姜氏者盖與齊侯同弑其夫也弑夫之罪重雖臣子得紀之矣故全去姜氏今此與慶父同殺其子其罪稍輕終不以子故讎母惟霸者得行爾故止去姜而存氏若姜氏皆去之則是弑夫殺子之罪均故存氏以别之也然則春秋者信制事之權衡揆道之模範矣二年春王正月城楚丘楚丘衞邑此會檉之諸侯城之以封衞也而不繫之衞者衞為狄所滅不能保有故也然其辭若魯獨城之何也齊侯之與諸侯會于幽也以攘夷狄尊中國為盟主閉二年狄入衞而齊侯不能救致衞為狄所滅衞亡踰年然後率諸侯城楚丘以封之而齊侯乃自以為功雖衞人亦謂齊侯于我德莫大焉聖人書之曾無異于常諸侯者盖惡其盟之無信救之不速今雖有存亡繼絶之善然天子在上而諸侯輒敢專封非其所守而擅興力役以城之皆王法所不容也故但書城楚兵而齊桓之行事可見矣宋子魚曰齊桓存三亡國義士猶曰薄德斯可見當時已不與齊桓之封也然則為齊桓者如之何則可狄人即逐請命于天子而城之旣城矣請命于天子而封之如是則天王命諸侯城楚丘以封衞而齊桓之徳在其中矣詩曰王命仲山甫城彼東方又曰經營四方告成于王以此言之凡城必由天子之命而經營四方乃人臣之職及其成也又告于王可也豈得自専哉夏五月辛巳葬我小君哀姜十有一月而葬外薨也喪至五月而葬也魯人以姜氏得罪宗廟不敢從夫之諡遂循文姜之例别諡曰哀嗚呼是不若不諡之為愈也聖人書此以罪魯之臣虞師晉師滅下陽晉始見于經以三傳及孟子攷之晉實主乎伐虢而春秋以虞為首何也貪賂忘親以師導晉為之前驅故聖人以虞首惡也不曰虞人晉人而曰師者正著其恃衆以凌虐也取邑而言滅者下陽虢之所保下陽舉而虢亡不待隕其社稷也盖虞不假道則晉不得逞下陽既喪則虢遂已亡聖人作春秋書鄭伯入于櫟而不書入鄭書虞師晉師滅下陽而不書滅虢觀物有要矣秋九月齊侯宋公江人黃人盟于貫齊侯九合諸侯此其四也江黃者楚與國也二國逺小而僻陋今來定盟則楚失其援矣始來服齊齊侯不以逺小僻陋而忽之遂為之合諸侯則此諸侯宜皆會也然大國稱齊宋逺國稱江黃以齊宋大國之君而盟逺國之微者則諸侯不必皆至著齊侯之信而服楚之象見矣冬十月不雨萬物需雨以生需雨以成一時愆亢猶有所損况不雨幾于彌年則其災可知此書首月以見一時不雨而僖公已為之憂矣楚人侵鄭貫澤之會江黃皆至則齊已強而楚人失援矣此書侵鄭楚人懼也懼而侵鄭者何楚失江黃矣能爭鄭猶可抗齊也以是見楚人欲與中國爭衡也惟不得鄭是以服于齊也三年春王正月不雨一時無他事惟首月書不雨見終春猶無雨也夏四月不雨自去冬不雨至于今而不書旱何也凡書旱者雖有時而雨猶以不足而旱也若直不雨則旱在其中矣連于首月總書之見其為災之久而僖公以不雨為念也徐人取舒凡國不言取此舒國也而曰取舒取舒之後復有舒庸舒蓼舒鳩之類皆羣舒夷落雜居江淮之間者當時夷狄無城郭宗廟社稷之守故但以取為文詩曰荆舒是懲然則舒與荆同為中國之患徐人欲與中國盟會故取舒以自効厥後齊侯為牡丘之會盖為此也六月雨此記不雨之終也且建已之月萬物始盛待雨而大古者以是月雩而祈雨則六月之雨尤為可喜國之大事不可不書亦見僖公憂喜在乎民也夫所謂王者豈能使陰陽無旱潦哉如以斯民為憂而已故歴書之以見急雨之意焉所謂務農重穀者也秋齊侯宋公江人黃人會于陽穀齊桓九合諸侯此其五也齊將伐楚旣得江黄二國共掎角乃為此會以諭諸侯故曰陽穀之會齊桓端委搢笏而諸侯皆諭乎桓公之志盖江黄再會而不怠可以大舉伐楚也故但書會而已又異乎貫澤之盟也或曰侵蔡次陘之師諸侯皆在而江黄獨不與焉安知其謀伐楚乎曰兵有聚而為正亦有分而為奇也此用兵之法自召陵退而執濤塗然後及江人黄人伐陳則知諸侯侵蔡次陘而二國不會自為掎角之勢明矣冬公子友如齊涖盟凡魯遣大夫往他國盟則曰涖盟此盖公有他故不與乎陽穀之會故使上卿如齊涖盟也亦足以見齊桓寛政優簡于諸侯矣楚人伐鄭此伐鄭者懼齊也凡謂之伐必有辭焉知齊之定伐故有事乎鄭以拒齊也楚以夷狄連三歳加兵于鄭欲與中國抗衡則中國之衰可知已齊桓豈可已哉于是明年諸侯大舉伐楚也四年春王正月公會齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘此齊侯大舉伐楚所以攘夷狄而尊中國也曷為而先侵蔡乎曰侵者無名興師也齊侯欲攘夷狄尊中國經營馳驟十數年矣豈如左氏所載直為蔡姬舉哉今以伐楚會諸侯則諸侯之師實為楚動而齊侯以為蔡先附楚不與中國盟會者二十有三年乃先加兵于蔡聖人罪其行事之迹殆若怒蔡興師而因以及楚爾故書曰公會齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡盖明其以蔡故而勤諸侯也以蔡故而勤諸侯則是一人之私而非天下之公舉也是之謂齊桓之譎但以伐楚之名正而掩其譎爾聖人實書之見私欲之為害如此然予其爵者正為下文遂事起也以蔡國區區嘗团于楚而諸侯之師遽及其境彼何恃而不駭且潰乎蔡侯以是忿齊終身不與中國盟會雖然諸侯守國鑿斯池也築斯滅也與民守之效死而勿去可也今兵一及境而民遂潰散則君之不能守其民可知矣沈潰莒潰之類皆是也書遂者著齊侯怒蔡興師因乘諸侯兵力以伐之不由天子之命也孟子曰春秋無義戰彼善于此則有之矣齊侯伐楚不能為而非所謂為天吏而伐之也然楚乃蠻夷之國強暴僭逆憑陵中夏天王不能治而齊侯能奮中國之威一舉而服之而天下不胥為左衽者乃其力也聖人于齊侯滅遂之後用兵侵伐皆貶稱人至此稱爵者予其有攘夷狄尊中國之功也是舉也非止八國之師也盖自陽穀之後小國從令而行故不復舉之自曹許以上乃書爾陘楚地齊侯以師壓其境焉屈完所謂君之涉吾地是也是時楚國方強齊將綏之以德故次于陘以待之旣而楚使屈完來遂與之盟此見齊不遽加兵而楚已服矣夏許男新臣卒諸侯非卒于國都則書地此不書許男卒于師何也按成十三年曹伯廬卒于師襄十八年曹伯負芻卒于師蓋陘地近許許師雖已次于陘許男遇疾而歸矣曰卒者卒于其國之辭也新臣即許叔也立四十二年其子業立是為僖公楚屈完來盟于師此楚子使屈完來觀師而屈完因求盟于師也曰來盟者彼欲之也見楚之服齊也雖然齊侯舉義師以伐楚則當罪其僭竊王號侵滅小國也今反以包茅不入昭王不復責之則其辭游矣盖齊桓之行事亦與楚相似故管仲亦不敢以此責之也義旣不充辭又不勝故不敢決戰而許之盟也彼齊國佐如師陳袁僑如會皆書如而此獨稱來者外夷狄之辭也楚于夷狄最彊未嘗與中國為會然屈完之佐楚子能從善服義知尊中國非特楚國之民安而中國亦被其澤焉故春秋特書其族如吾中國之大夫且見楚亦世官也然不曰楚子使者前此未嘗稱楚爵若此稱楚子是進夷狄也非所以攘夷狄也故専舉屈完與齊國佐不同盟于召陵屈完來盟于師楚志也不許盟于師而許之盟于召陵齊志也召陵去陘一舍耳齊侯退而盟之雖冇諸侯之師不復與戰以禮楚焉故復書盟于召陵以明齊侯尚德不尚力也由此言之齊侯此舉求服夷狄而已非若後世必以戰勝為功也二十八年晉楚戰于城濮晉文公退三舍以避楚楚得臣從之不已而後戰焉方其退舍而楚還則文公亦將不戰矣吾以是知齊桓晉文之攘楚皆求服之而不求戰勝也故春秋予之齊人執陳袁濤塗案袁濤塗左氏作轅公穀作袁此從公穀濤塗非有意于誤軍道區區為陳之意則忠矣申侯賣濤塗于齊侯齊侯不之察賞申侯而執濤塗況楚方受盟而退遽執同會之大夫齊侯之志驕矣于是知齊侯之不可為周公而為三王之罪人也周公東征而西怨南征而北怨今齊假道于陳懼以求免又執濤塗故揚子雲曰昔在周公征于東方召伯述職蔽芾甘棠其思矣夫齊侯欲徑陳陳不果納執袁濤塗具斁矣夫雄蓋得之此也貶而人之不亦宜乎秋及江人黃人伐陳此書及者非魯及之也蒙上齊人執袁濤塗之文乃齊及之爾齊所以及江黄伐陳者討其誤軍道之罪也夫陳侯方與諸侯同侵蔡同伐楚又同盟而齊侯遽執其大夫又率二國伐之不義莫大焉故蒙上文而人之盖江黄小國例稱人若書齊人江人黄人伐陳則嫌與江黃同貶故變文稱及盖齊侯知此舉非義諸侯不肯從故俾江黄二國伐之俾江黄二國伐之亦齊侯之善經也何謂善經不以江人黄人伐楚而以江人黃人伐陳者不以江人黄人益楚之怒也愛江人黃人也此齊侯之善經也雖然伐陳非義也陳人亦未肯服罪故十有二月再會諸侯侵之八月公至自伐楚桓會不致于此致者以其事功為足乎揚也且師出踰二時矣又以見諸侯之師正為伐楚而起非為侵蔡也攷觀齊侯伐楚之舉或美或惡而可以知霸者之雜矣葬許穆公因魯往會而著其臣子私諡之罪冬十有二月公孫兹帥師會齊人宋人衞人鄭人許人曹人侵陳齊侯大舉諸侯之兵假塗于陳陳人病之不欲其復過我國使之循海而歸則齊侯之不修師律可知矣乃反執陳之大夫又及江黃加兵于其國今又大合諸侯之兵壓其境聖人于此不曰伐而曰侵者所以深罪其無名也書公孫兹之帥師貶可知矣齊之首惡罪不勝誅也陳人行成遂歸濤塗春秋集註卷十四
