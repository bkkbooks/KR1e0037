body:
  text: 春秋集注卷三宋高問撰隱公三八年春宋公衛侯遇于垂二君曷為遇于垂曰殤公固嘗從州吁之請伐鄭以圖馮矣州吁既誅宣公既立而馮不可不終圖也而未知宣公之從否也是時齊侯將平宋衛于鄭故宋公請衛侯先見因遇于垂以謀鄭十年宋人衛人入鄭蓋垂之謀也君子以是過宣公夫州吁則援殤公矣宣公苟辭殤公以睦鄭不亦近乎且謀人之國不以禮見而陽若相遇非國君之道春秋因其實而書之而褒貶寓焉三月鄭伯使宛來歸祊六年公怒宋使之失辭鄭人由是來輸平然口輸之而實不至魯之憾猶未解今以宋公衛侯遇于垂鄭度其勢不可禦于是歸其所輸之祊以求援于魯也然鄭與吾境素不相接何乃越他國而歸之邑乎蓋鄭以厲宣之親世為周之卿士常從天子巡狩賜以朝宿之邑在泰山之側其地近于魯是時鄭伯因王奪其政而忿之遂棄君臣之義忘親親之恩以天子不復巡狩而祊為無用且欲急得魯之援故使宛來歸焉先儒以為易許田非也按桓二年有鄭伯以璧假許田之文則是隱公之世未嘗易矣且我入祊而不以許田入鄭鄭豈已乎周班後鄭猶且致郎之戰况于易地而不與哉自入祊之後繼好尋盟史不絶書入郜入防悉歸于我終隱之世無釁可觀則先儒之妄不辨自明而聖人特書來歸之意斷可識矣夫朝宿之邑先祖受之于先王而鄭伯輒以私情歸于人而謂天子不復巡狩此無君之心背叛當誅也而宛為鄭臣不能以義正其君而親以其國之土地歸于他人則鄭之在位者無君子可知矣觀國風遵大路風雨羔裘之詩是鄭無人也庚寅我入祊此見公貪土地而不顧義也入者義不可而強入之是以謹而日之也春秋外歸田邑如齊人來歸鄆歡龜陰田未嘗言入以其本我之邑歸則有之矣此特書入者以其非我之有不當入也夫鄭以非義歸我以祊而我能以義拒之則免矣奈何見利忘義遽遣吏治之據有其地孟子所謂子噲不得與人燕子之不得受燕于子噲鄭之歸魯之入其罪均也夏六月己亥蔡侯考父卒蔡宣公立三十五年其子封人嗣是為桓侯辛亥宿男卒元年蓋嘗及宋盟于宿矣至是宿男卒而不以名赴是無禮也人而無禮何以立國莊十年宋遽遷宿宿自是不復見矣秋七月庚午宋公齊侯衛侯盟于瓦屋此宋公主盟謀鄭魯也諸侯自相盟王法所不容况瓦屋乃周地而三國敢盟于此故詳日以謹之夫宋連諸國以伐鄭雖魯與謀今魯不加兵而得土地之利是鄭不懼宋而反畏魯也宋公疾魯之得祊又怒鄭之不賂已故會齊衛之君以為此盟使無援魯鄭雖然齊先已與鄭通好矣又已與魯通好矣其情可見而宋衛與之盟可謂不察矣宜此盟之不信也鄭因叔段興兵而蔓延至此者以魯為艾之盟是以起此相傾相奪之事也八月葬蔡宣公諸侯五月而葬今不及期是簡也且因魯往會而著其臣子私諡之罪九月辛卯公及莒人盟于浮來公見三國之謀已故結此盟以求援焉夫莒雖小國其力猶能及他人觀其入向伐杞蓋可見矣然小國微者非敢盟公公自屈已出境而與之盟耳故稱公及又謹而日之凡公與外大夫盟內斥言公外大夫稱人惡在公也此盟與成二年蜀之盟是已內不言公外書大夫之名氏者惡在外也莊二十二年防之盟與文二年及晉處父盟是也螟春秋書螟者三隱二莊一書螽者十桓一餘皆僖公之後蓋螟食苗心螽無所不食故其為災也螟輕而螽重春秋之初災之輕者亦書之及其久也輕者不勝書書其重者耳不然豈隱莊之後二百年間魯無螟耶冬十有二月無駭卒此公子展之孫未命故名之夷伯展禽其後也九年春天王使南季來聘前年天王使凡伯來聘而戎輒伐之以歸諸侯皆坐視莫有救王臣之難者天王不問復使南季來聘又不見答失道甚矣三月癸酉大雨震電庚辰大雨雪建寅之月而大雨震電八日之間復大雨雪大雨震電者大雨而又震電也大雨雪者甚言乎其雪也雨自上下者凡稱大者皆非常之辭夫天反時為災人反德為亂隱公以讓國為名而乃從事于爭此反德也利將反而為害親將反而為賊天之見戒深矣而弗警弗戒以及于難挾卒古者四十而仕五十而爵為大夫苟未五十雖有賢德猶服士服行士禮春秋之始此禮猶存故多不書氏僖公之後此禮又廢故大夫鮮不氏者夏城郎魯自受祊之後將為鄭伐宋又恐他國有議其後者故城郎以備之秋七月一時無事書首月存天道王法也冬公會齊侯于防此會乃齊侯背瓦屋之盟反與公連謀為鄭伐宋也又見隱公得利則合失利則離知齊鄭之好終不可奪今鄭既歸祊而吾之憾釋矣遂反會齊與之併力以伐宋也又見齊之強大諸侯爭與之盟以為齊之力可以為他國之助齊之兵可以伐人之國故宋公既與之謀鄭而魯鄭反與之謀宋也故以齊主會防宋地明年魯遂取之或作邴與周官八柄作枋同義十年春王二月公會齊侯鄭伯于中丘此三國相會為師期也七年城中丘蓋為此會耳然則公之處心積慮將以伐宋也夏翬帥師會齊人鄭人伐宋此見公之于宋始相和好終為仇讐惟知貪利不復顧義也自公元年及宋人盟于宿四年又遇于清是其和好非一日矣今一旦變為仇讐反以兵加之者豈徒然哉始為宋謀鄭既得鄭利今為鄭謀宋又欲得宋利也於是使翬先以師會二國伐之齊侯鄭伯皆貶稱人者齊渝瓦屋之盟鄭乃造兵之首是以春秋深惡之六月壬戌公敗宋師于菅翬已帥師會二國伐宋矣此又書公者所以著公盡渝宋盟也棄好黨惡吞奪其利實公所為故不言戰而書敗蓋公無憾于宋而以公之勝為幸也凡魯勝曰敗某師敗則書戰而已辛未取郜辛巳取防郜本小國在春秋前已為宋併其土地取其寶器而遷其君矣猶書曰郜存之也公以祊故先以翬會伐已而自將傾衆悉力以敗宋師又浹旬之間取其二邑但曰公敗宋師于菅取郜取防亦足以見其惡矣而書法如此者甚之也魯受人不義之惠遂興兵以伐同盟無罪之國虐用其民久留于外卒取二邑以報私惠是以春秋甚之也若謂鄭之歸祊實以許田易而得之亦豈至是哉秋宋人衛人入鄭宋人蔡人衛人伐戴鄭伯伐取之此宋又連衛以報鄭鄭幸菅之敗而不備故師還未及郊而宋衛已乘其虛而入之矣春秋雖無義戰未有奇譎輕疾如宋衛之入鄭者也鄭勞力外務而不知守其國則二國之入宜矣宋殤公方喪邑敗師而連兵不已殤公之民于是乎不堪命矣宋既連兵入鄭又乘勝以召蔡人伐戴戴鄭所與之微國也而三國伐之所以報鄭也鄭師猶在郊因又伺三國之便伐而取之盡得三師之輜重焉相傾相奪一至于此春秋人三國而不奪鄭爵惡三國之遷怒也且前曰宋衛入鄭今曰鄭伯伐取之是宋衛雖能入鄭不能為鄭之弱也不能為鄭之弱此殤公所以終不得馮冬十月壬午齊人鄭人入郕戴鄭所與也三國伐之非理甚矣郕衛所與也而齊鄭入之是效尤也長此安窮故謹以日而又人之十有一年春滕侯薛侯來朝二國見魯之方強故相率朝之朝者諸侯見天子之名今滕薛之于魯同為天子諸侯同受天子土地是同列也而乃同朝于魯是尊卑上下無辨也左氏有周之宗盟異姓為後之説亦非禮也成三年晉侯使荀庚來聘衛侯使孫良夫來聘而魯尚不敢同日與之盟豈有同列來朝而班見者乎班見者朝天子之禮也異姓為後正謂朝天子時耳然在周之盛時則可當春秋之時則不可也春秋諸侯未嘗朝天子乃相率朝魯豈以桓王微弱凡伯見伐為不足恃而隱公敗宋取郜取防為可畏耶隱公名欲讓桓方且自恃其強晏然坐受同姓諸侯之旅朝而無謙避之意死不亦宜乎夏公會鄭伯于時來謀伐許也公既得宋地又會鄭而謀許是貪欲無厭也時來鄭地秋七月壬午公及齊侯鄭伯入許及者內為主非內為主則必先書會伐而後書入矣公二年之中與齊鄭連兵既伐宋又入許其罪大矣以左氏所書奉許叔之事考之則鄭非有意乎取許也以鄭伯許田之事觀之則知公實貪利其地而擅有之也蓋鄭雖怨許而力不能報故推魯為主而假齊為助魯既為鄭敗宋師取二邑今又為鄭入許蓋由歸祊之故也冬十有一月壬辰公薨翬譖公于桓公而請弒之故但書薨而已然則桓當討乎曰在他國則衛州吁是也惜乎魯無石碏之臣使獲免耳夫諸侯無二嫡元妃卒則次妃攝行內事惠公越禮再娶而生桓公故仲子不得為夫人桓公不得稱嫡子凡立庶子皆以長此隱公之立為得正也非攝也先儒謂仲子以手文之故實配惠公遂為之説曰子以母貴母以子貴嗚呼瀆亂王法莫此為甚後世遂援為故事如漢哀帝尊定陶傅太后丁姬為帝太后是也誤天下後世者其此言也夫雖然隱公以長自處請命于天子正位君魯以奉周公之祀其誰曰不然不知出此輒探先君之邪志匿情以欺人謂為桓而立竊揖讓之名冀桓公之信已故邀天王而歸仲子之賵考仲子之宫而獻六羽上以欺天子下以欺大夫桓公因信其為已立也冀其歸政于已而公偃然欲終其身以待他日遂致篡弒之禍蓋由隱公不知大義故至此耳夫以不知大義而其斃至于殺身然則有國者固不可不學春秋也春秋集注卷三
