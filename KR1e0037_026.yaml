body:
  text: 春秋集注卷二十六宋髙閌撰成公三十年春衛侯之弟黑背帥師侵鄭此晋命也與六年侵宋同凡受大國之命而輕用其師者皆書侵以譏之蓋晋人執鄭伯鄭人置君圍許戾狠不道于是為甚故再侵之而晋人則終不出夫鄭䇿者也五月之伐于是乎歸鄭伯黑背者公孫剽之父也衛侯愛其弟寵以兵柄終致篡國之禍故書衛侯之弟帥師以為戒夏四月五卜郊不從乃不郊四月方卜已失時矣卜不習吉况五卜乎慢孰甚焉夫魯不當郊也今之不郊非據禮也五卜不從乃不郊爾五月公㑹晋侯齊侯宋公衛侯曹伯伐鄭鄭已立君故晋㑹諸侯伐鄭而歸鄭伯因與之成焉然不書鄭伯復歸者所以咎晋也晋既敗人之國使其君臣變亂而後伐之而歸其君春秋惡其首亂不以舍服與之也伐鄭不致公與有貶焉以伐鄭為不義故也是時晋侯已病以左氏考之厲公實代父出㑹而經不書者諸侯各以兵會伐不行相㑹之禮故春秋亦略之而不辨齊人來媵媵伯姬也夫伯姬嫁已久而諸侯以其賢猶來媵之然諸侯夫人惟有二媵耳今晋衛已備其數豈可復加乎况媵賤事也又何必歷紀之哉蓋春秋所急者禮也所制者欲也以禮制欲則治以欲敗禮則亂今三國來媵則是以欲敗禮矣自當備書之以為後世戒又况春秋反覆有所致者不可不察也必有深意于其中蓋齊人欲復修魯好故以是先之爾先儒謂諸侯同姓則媵異姓則否是不然諸侯三國必各一族豈皆同姓耶丙午晋侯獳卒晋景公立十九年其子州蒲立是為厲公秋七月公如晋公昔不奔天王之喪今乃奔齊侯之喪又為晋人所執使之送葬故聖人于景公之喪沒而不書也冬十月按傳冬當書葬晋景公而不書者前以有公如晋後有公至自晋故難之若一時無事然也十有一年春三月公至自晋晋侯使郤犫來聘己丑及郤犫盟晋侯使郤犫來聘公之疑已白故己丑及郤犫盟公之疑雖白乃留于晋者九月晋侯不與公盟乃反公于國而使大夫盟之見晋人無禮于公甚矣故貶郤犫不繫之國夏季孫行父如晋秋叔孫僑如如齊謝其來媵因修好焉自鞍之役而齊魯絶交至是乃復通冬十月一時無事書首月存天道玉法也十有二年春周公出奔晋周無出也天下皆周也周公出奔晋者周公自絶于周也為天子三公而不能同寅協恭乃與伯輿爭政不勝而出王既復之又違命而奔于諸侯之國故書出以為萬世之戒當是時王室衰微號令不行于天下故逋逃罪戾之臣諸侯敢受之書此而晋罪亦昭然矣夏公會晋侯衛侯于瑣澤左氏謂宋華元克合晋楚之成而考其事實與經不合殆其不然夫晋厲之㑹實始乎此略諸國而致魯衛則以見厲公之德不能謹始諸侯多解體矣秋晉人敗狄于交剛此狄即白狄也何以知其白狄九年秦人白狄伐晋此先敗狄而後伐秦是以知報九年之役也前書白狄者罪欲明也此秖書狄者敗狄而已不必辨其狄之種類也冬十月一時無事書首月存天道王法也十有三年春晋侯使郤錡來乞師自齊桓以來霸者征伐召兵諸侯蓋以是為王者事故與天下公之至于晋景始使士燮來聘以齊伐郯之役厲公承之始乞師矣當此之時晋尚強盛惟忠信之厚不崇而僞飾之文彌勝是以不召兵而乞師乞師謙辭也霸體貶矣是一國之辭也非所以公天下也夫晋不報秦久矣九年秦復連白狄而來晋欲大舉伐之而以私讎之故特使卿來以乞為名實欲公親行爾夫列國之禮大小雖殊皆分治天子之民苟非有天子之命以徴兵則諸侯豈可親帥師以出乎又况為他國報私讎者乎三月公如京師公如京帥專行之辭也然公之此行蓋㑹晋伐秦道出王畿不得不朝焉者也其以專行之辭書之何也曰舉其可道焉者志敬也然上書來乞師下書公自京師遂會諸人伐秦則是挾他事以往而非專行者矣乃志其不敬也蓋聖人于魯乃父母之國有君臣之義特遷就而為之辭故直以如京師為文先明君臣之大義若專以朝事行者而不言朝王以著實因㑹伐而行不成乎朝也其辭若志敬而實志不敬此春秋微辭也夏五月公自京師遂會晋侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦諸侯出㑹必自其國故㑹不言自會而言自者非其自也書公自京師遂㑹諸侯伐秦者以伐秦為遂事明以朝王為重也且見公㑹諸侯伐秦而自京師若以王命伐之聖人遷就而為之辭也夫諸侯擅興兵而大㑹于京師此其罪之大者然而晋厲之意欲挾王師以為重因使諸侯過京師行朝禮以為恭故聖人亦因以正君臣之大義乃所以深著其惡也曹伯盧卒于師非戰死也死于行爾故不書地凡立十七年其弟負芻篡立是為成公秋七月公至自伐秦以伐秦致者著公此行實非如京師朝也書曰爾其敬識百辟享亦識其有不享惟不役志于享凡民惟曰不享此春秋之意也冬葬曹宣公曹人使公子欣時逆曹伯之喪公子負芻殺曹太子而自立因魯往會而著其臣子私諡之罪十有四年春王正月莒子朱卒莒大于邾至此始書其卒者庶其見弒不得卒故然不書其葬非魯不㑹春秋之法莒不書葬其號夷也吳楚不書葬其號嫌也夏衛孫林父自晉歸于衛晋受衛國逋逃罪戾之臣又強歸之衛獻之出奔禍根在此秋叔孫僑如如齊逆女公即位十有四年矣國家無事迄今方娶又不親迎而使同姓之卿逆之援公子遂之例也故書以為戒此春秋防微杜漸之旨鄭公子喜帥師伐許此著許之所以遷亦見晋厲之不霸也夫許鄭之怨久矣三年再伐四年復伐九年圍之而今又伐焉使厲公而霸則鄭人者怒鄰兼弱且如是乎明年遷于葉避晋以依楚明晋不足恃也而襄三年晋荀罃帥師伐許者猶討其與楚也夫九月僑如以夫人婦姜氏至自齊夫人不以以夫人非正也刺不親迎也然此宣公元年公子遂之例成公得以藉口而行之也然則人君所以貽子孫者可不慎乎傳曰君舉必書書而不法後嗣何觀此人君之深戒也其稱姜氏者異乎宣公之喪娶故也冬十月庚寅衛侯臧卒衛侯卒夫人姜氏見太子之不哀也歎曰是夫也將不惟衛國之敗其必始于未亡人然則獻公之見逐已兆于此矣定立十二年衎嗣立是為獻公秦伯卒桓公立二十八年景公繼立史皆失其名十有五年春王二月葬衛定公因魯往㑹而著其臣子私諡之罪三月乙巳仲嬰齊卒此仲遂之孫公孫歸父之弟也而謂之仲嬰齊者歸父既奔齊魯人徐傷其無後使嬰齊紹之為卿故前不經見而特卒之者譏世卿且著其亂昭穆之序失父子之親也以後歸父則弟不可為兄之嗣以後襄仲則子不可以父之字為氏也癸丑公會晋侯衛侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚戚之㑹將討曹伯也若欲討之勿與之盟可也假他事相㑹而與之盟既盟而執之故特書同盟以譏之而衛侯居喪出盟則觀文可見晋侯執曹伯歸于京師曹伯負芻殺世子而自立晋侯會諸侯而執之又不敢自治歸于京師使即天刑此執得其罪是謂霸討故與其爵然曹伯之立于今三年今始見執亦稽天討矣况諸侯既與之同盟是已成之為諸侯乃不待王命而擅自執之耶故不名曹伯著其以諸侯而執諸侯也公至自會若諸侯有罪者可㑹諸侯而執之則魯侯不可謂之無罪者是亦可危也夏六月宋公固卒戚之會宋世子會焉公病故也公病而使世子出此召亂之道宋共公立十三年世子成立是為平公楚子伐鄭據左氏瑣澤之會鄭已聼成至是楚將北師子囊曰新與晋盟而背之不可子反曰敵利則進何盟之有嗟乎楚人之難信如此然則瑣澤之㑹謂之克合晋楚以成是果然哉是時鄭子罕侵楚則知楚人亦有辭于伐爾秋八月庚辰葬宋共公三月遽葬亂也且著其臣子私諡之罪宋華元出奔晋凡大夫失守宗廟而往于他國者春秋皆以出奔罪之今華元為宋正卿當喪禍之際不待君命擅自出境雖意自有在而罪不可免故以出奔書之宋華元自晋歸于宋再書華元者善華元也與鄭良霄異矣蓋華元之志非奔也欲挾晋自重以攻蕩氏之黨爾然迹其所為又與衛孫林父亦何以異故其所書之辭亦同宋殺其大夫山此蕩山也先書宋華元自晋歸于宋而繼書此則知其為華元殺之矣蕩山實宋之公族乘君之喪作亂以虐公室而殺公子肥是背其族也背其族者伐其本也人而無本人道絶矣故去氏以示法宋魚石出奔楚魚石蕩氏之黨也凡大夫有罪不殺而逐之者皆以自奔為文據左氏華元既攻蕩氏殺子山而五大夫皆出奔獨魚石書者五大夫皆蕩族華元已誅其罪首餘奔者皆不足書惟魚石奔逃于楚遂為中國之害故為十八年復入彭城書也春秋有事在後而先書其始者此其例也冬十有一月叔孫僑如㑹晋士夑齊髙無咎宋華元衛孫林父鄭公子鰌邾人會吳于鍾離㑹列書卿蓋始于此會而又㑹者非復㑹以外吳也吳未嘗與中國㑹今始來通是時中國病楚而吳敢與之敵故諸侯亦欲與吳通晋于是為合諸侯之大夫以㑹之然諸國大夫不敢致吳子也因吳子伐楚在鍾離故相與㑹之爾左氏昭四年傳曰楚針尹宜咎城鍾離楚邑也夫吳實夷狄反安坐于鍾離而待中國之㑹已見中國不自正霸主之不足恃微弱之甚也聖人深罪中國所以外夷狄也非待殊㑹以外之也許遷于葉許微弱之國鄰于鄭鄭亟加兵自三年去疾伐許四年鄭伯伐許九年鄭人圍許十四年公子喜伐許今遂遷焉蓋畏鄭而南依楚故以自遷為文而鄭人之罪著矣春秋集注卷二十六
