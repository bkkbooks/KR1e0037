body:
  text: 春秋集註卷九宋髙閌撰莊公二七正春未人姜氏會齊侯于防防伐地齊志也齊侯來而夫人出㑹之也夏四月辛卯夜恒星不見夜中星隕如兩恒星者常見之星有名可知者也夫日入而星見天道之常也既夜而恒星不見則其餘星皆見矣及夜中而餘星隕墜衆多如雨則其為異大矣几言隕者不見其所自來隕星隕君隕霜是也言兩則見其所自矣雨雪雨雹雨螽是也螽必自地起雪與雹則有雲霧之勢非若霜忽然自天隕也此皆人事所召井為之示變以為他日應驗之祥秋大水無麥苖為災亦人事所召義見桓十三年秋天水而無麥苗與隕霜殺菽同莪固水災而無也水災之不政者猶有存焉異乎大無翏未書于一嵗之卒舉無牧者也此聖人傷井田之壊也冬夫人姜氏㑹齊侯于穀榖齊地夫人往就齊侯而與之會也然夫人之惡聖人一貶之足矣至于再至于三猶未巳者春秋書其可書者以為役世戒至於言之醜者春秋蓋有所不書也且桓公之禍起于姜氏成于齊侯而死于彭生魯人知彭生之殺公而不知齊侯之怒公姜氏之背公故起于齊曰請以彭生除之齊人殺彭生則莊公以為怨已報矣明年齊侯遇弑其事乃泄于是公因納紏之役始知以齊為讎矣八年春王正月師次于郎以俟陳人蔡人甲午治兵夏師及齊師圍郕郕降于齊師秋師還春秋之際諸侯興師多矣未有所書如此之詳者蓋莊公此年之師尤為非義既無王命無故興師師必有將據左傳是時慶父請伐齊師公不可則是君與上卿同為此役也不以公為重而止稱師者正著其暴衆也夫舉師以伐郕自度力不足而邀陳蔡偕行陳蔡未有必從之意遽自正月出師久次于郎以待之既而為陳蔡所棄于是甲午治兵者久役不用有失伍離次逃亡潰散之變故先自治之也至于暴露逾時始得更連齊師以俱圍郕郕人不我服而即降于齊則在我者徳不足懐威不足畏可知矣厯三時之父始得以師還凡師還不書今書之者喜脱難而返也與公至自唐同意嗚呼逆天道親仇讎圍同姓勦民力與國不信伐國不服故聖人傋書之以見魯莊徒困無罪之民奪取郕國之利以益強暴之齊者由此師之舉也故魯罪為大齊次之郕伯不能守社稷又次之陳蔡為可免也冬十有一月癸未齊無知弑其君諸兒觀襄公之行其不能保厥躬也宜矣無知者僖公為年之子也有寵于僖公衣服禮秩如嫡及襄公即位絀之于是弑襄自立嗚呼衞莊之寵州吁齊僖之寵無知皆兆禍亂相蹈一跡是以春秋務亂名分使後世得以全恩也九年春齊入殺無知稱人者見弑君之賊人皆得而誅之也初襄公立無常于是羣公子懼禍皆奔他國次弟糾奔魯其母魯出也魯立又次弟小白奔莒其母有寵于僖公而小白自少與髙傒善公及齊大夫盟于蔇按國語韋昭注云齊人殺無知子糾于魯莊公不即遣而盟以安之齊大夫歸遂隂召小白于莒則知此盟蓋公意也故書公及國亂而嗣君未定則方伯請天子之命以正之可也今公既不能請天子之命乃損禮以求盟比齊人義納糾而自通之又何以盟為然齊來求君而公固欲盟苟辭不盟恐生他變故以一時之權抗公而盟于藐所以稱齊大夫而不見名氏者聖人深察人情所難而曲盡一時之變有異乎處父髙傒也公之所為如此宜乎齊人之背盟也我地夏公伐齊納糾案左氏經文糾存士有于字公穀無之此渡公穀齊大夫既歸遂背蔇之盟隂召小白而不迎糾魯人間之始引兵伐齊而納糾而公尚以之盟強欲納之也夫失地之君内為強臣所拒非假大援不可復其位經書納頓子納北燕伯是若出奔之公子則異此矣素既無位又在外焉必有君父之命乃可以還否則國人義欲奉之庶乎其可苟非此二者而鄰國以兵來脅必欲其立則是專亡諸侯而擅廢置也豈王法之所客乎故晉納㨗菑雖弗克猶貶稱人則人之伐齊納糾罪當何如齊小白入于齊糾與小白皆襄公之弟而糾于諸苐最長當立魯之送公子糾也間齊人召小白于莒乃使管仲别將遮莒道射中小白帶鉤于是小白佯死以誤管仲管仲馳報魯魯送糾者行益遲及至齊則小白已入而高傒已定立之矣此書小白入于齊是也入者纂辭不稱公子者王不由王命下不受于君父特以公子之故國人欲以為君而自立焉故去公子以絶之其繫之齊者見其已得國也秋七月丁酉𦵏齊襄公君弑賊不討不書葬此書葬者齊人已得弑君之賊也齊弑君之賊不得逸是齊之臣子得免也齊之臣子得免則魯之臣子無所逃其罪此意在言外也故書齊襄公之葬以見之且著小白既入而主其喪又罪其臣子私諡也八月庚甲及齊師戰于乾時我師敗績糾之不立葢由公不即遣而要盟也今公雖伐齊而更欲納之然齊已有君矣公班師可也奈何必欲取勝而遂戰乎曰此不書公葢國人以辭直自欲戰而公弗能禁也辭直者糾當立也自欲戰者葢自我桓公遇弑之後仇讎之人復與吾君之母宣滛于通道大都魯人羞之甚矣曾未嘗一與齊交鋒以少雪我國之恥也令公興師伐齊故魯人樂致其死以紓稽年憤懑之氣初不繫于納糾也故納糾雖不克而衆怒不能自已于是賊于乾時而敗焉内敗不書獨此書我師敗績者魯人咸自誇其能伐讎樂于死戰而不以為辱也先儒謂復讎者以死賊為榮此言是矣于是可見魯國之人不忘君父之讎而莊公特以納糾興師初無力戰刷恥之意遂致軍氣不振績用弗成也九月齊人取子糾殺之此特書子糾者見其以次當立又齊大夫已與公盟請立為君故用未踰年例若曰齊人之子云爾又異乎里克殺其君之子奚齊乃其君一人之私也于是齊人乘我乾時之敗必欲得子糾甘心焉夫齊人不欲立糾殺正而立不正罪可見矣不直曰殺子糾而曰取子紏殺之者子糾在魯魯因齊人之請而盟之又舉兵欲納之卒不能庇其身反為仇讎所制若探其嚢中取之而去是魯有國而齊為政可羞之甚也以論語攷之桓公殺公子糾是殺之者齊桓也春秋書齊人者昇其國人罪之也桓公非齊人不能殺子糾當魯伐齊納糾之時齊人受之則小白不能入以其罪歸之國人不亦宜乎然則小白之罪免乎曰不免也書齊人殺則小白在其中書齊侯殺則國人之罪免矣春秋深惡齊人助小白殺其兄之惡也深閔子糾當立而不得立又竟殺于其弟也故書曰齊人取殺之重之也冬浚洙公自乾時之戰始知以齊為仇讎于是設洙以為備十年春王正月公敗齊師于長勺公曷為能敗齊師能強也能強者何辭真也其辭直奈何子糾宜納而敗績于乾時既共命而殺之矣持小白之道于是為至待之至而猶以師加我我因敗績而修備齊師侍勝而益驕是以能敗之所以齊師之來不書侵伐盖因其兵入吾境而遂敗之不待友戰也凡非交戰而獲勝則書敗某師若戰則書敗績矣長勺我地二月公侵宋公既敗齊帥遂秉勝加兵于宋非義之甚也故書侵以罪之三月宋人遷宿宋將伐魯故先遷宿以昭武也葢宿介于宋魯之間屬于宋而親于魯故宋人以為貳于魯而遷之夫宿雖小亦天子所建國也宋豈得而強遷乎其不地者宿自是不復見矣夏六月齊師宋師次于郎公敗宋師于乘丘長勺之役既深其怨于齊退又侵宋以益其敵故二國興師以來償報然魯兵方强欲伺隙乘便而未及攻故次于郎而已夫齊桓始入未撫其民而輕用之是以再不得志于魯晉文之入五年而後用其民盖鑑此也次者未敢前也有畏也無名也宋惟知報怨于魯而以不整之師深入魯境故魯人得以乘之未嘗交鋒而遂為公所敵秋九月荆敗蔡師于以蔡侯獻舞歸荆即楚之夲封也始見于經是時王室衰微不能自救齊桓始入威令未行是以荆人強暴敢肆毒于中國也然荆之病中國尚矣商頌曰奮伐荆楚裒荆之旅此髙宗中興之時也周雅曰蠢爾蠻荆大邦為讎此宣王中興之時也盖荆最蠻夷之強者中國盛則後服中國衰則先叛故中興之君先以服荆楚為急自桓王失信諸侯背叛于是荆舒不至敢以蠻夷之賤輒犯中國甚至于僭號稱王則王綱不振可知矣春秋修中國之教荆舒是懲至是而始見于經者前此名號離僭猶不與中國撞有不治也今居然而敗蔡俘其國君以歸矣雖蔡侯輕動妄舉有以取之然自是而江漢之間皆服于楚聖人深惡荆之亂華一至于此故不曰荆人荆師而直書曰荆無復君臣之辦師師之别此春秋尊周黜楚之至焉者也盖楚自熊繹始封僻在荆山篳路籃縷以處草莽及熊通始居江漢之間僭竊大號為中國患故春秋先書其本封以見僻小蠻夷之國敢肆強暴僭横如此几書敗書滅書入而以其君歸者皆書名為其虜服而以之歸也故生名之盖諸侯死社稷正也逃之罪也虜賤甚矣此不書戰不書獲直敗其師而以之歸見荆之詭討出察之不意而敗之亦所以罪蔡侯之輕敵也春秋書以某人歸者九此獻舞即蔡季也留于楚九年死是為哀侯其子盻立是為穆公冬十月齊師滅譚譚子奔莒齊侯之出也過譚譚不禮焉及其入也譚又不賀故興師滅之曰師云者明恃衆也且齊與譚此肩為諸侯豈得以私憾而滅其國乎凡諸侯為人滅其國而力有所不勝者于其奔皆不名盖彼實無罪而為横逆所加其義來虧其理可伸固可豈于天子而求復焉未可遽絶之也凡奔不書出國滅無出也特其力之微不能勝夫強國爾十有一年春王正月一時無事書首月存天道王法也夏五月戊寅公敗宋師于鄑宋忿魯不已為乘丘之敗故復興師而來公敗之子鄑鄑齊人所遷紀邑也秋宋大水此何以書甚宋之災也宋連年喪師加以大水害于粢盛故春秋志之是時天下之災異多矣齊秋悉書之則不可勝紀故聖人惟日食與内災則詳而書之外災或舉其一二于齊宋陳鄭則天下之災異可得而見矣大水義已見桓十三年此聖人痛井田之制非特吾魯國壊之也即宋亦然矣一有時兩灌注則泛溢為災是九河故道塞而不洩也又治水之官廢間有如白至者孟子猶誚其用心之不愽而以鄰國為壑則暴君汚吏之慢其經界又豈勝誅哉冬王姬歸于齊我主之也何為復見于莊公惟齊不可與主婚惟公不可主齊婚故因而重見之且天王不治齊侯殺兄簒國之罪反以王姬嫁之亦在貶中也夫王姬之嫁下王后一等而春秋書之乃與列國之女同辭何也有男女然後有夫婦有夫婦然後有君臣後世欲尊君卑臣者謂列侯尚公主乃使男事女夫屈于婦逆天地之義其弊至父母不敢畜其子舅姑不敢畜其婦然後知春秋書王姬侯女同辭不異垂訓之意大矣十有二年莊王奔葬皆不書見諸侯偃寒不奔不㑹惡逆之甚也凡在位十五年世子胡齊正春正三月紀叔姬歸于酅此見紀季以酅入齊非叛也欲以存國爾衆人疑其迹而春秋明其心故因叔姬之歸以見之然叔姬至是始歸于酅者以紀侯方卒而宗廟在酅故歸奉其祀也夫魯為宗國而婦人有歸宗之義紀既亡矣不歸于魯者其父母亡故思歸而不得且有共巢自誓之志所謂全節守盖不以存亡而虧婦道者也春秋髙其節特繫之以紀見襲此以貶彼夏四月一時無事書首月存天道王法也秋八月甲午宋萬弑其君㨗及其大夫仇牧乘丘之殺魯人獲宋大夫南宫長萬既而歸之閔公戲以魯囚呼之萬以是弑君道仇牧于門而殺之書及大夫見其能死節也然仇牧徒殺其身不能執賊無益于事也亦足取乎曰食焉而不避其難義也徒殺其身不能執賊亦足以為利焉而逃其難者之戒夫豈為無益者以此為坊而後世猶有視其君如土梗弁髦者萬之不氏惡之甚也與華督同閔公立十年于是宋萬立公子游羣公子奔蕭復以蕭攻萬殺游立公子御説是為宣公冬十月宋萬出奔陳譏失賊也且萬八月弑君至是方出奔是宋之臣子緩于討賊矣且天下之惡一也弑君叛國凡民罔不憝况均諸侯乎王道之行不容有受之者矣書所奔之國則保賊之罪自見異乎殺州吁于濮者矣十有三年春齊侯宋人陳人蔡人邾人會于北杏自此三年不書王某月者著王政不行齊侯將霸也此齊侯始謀會諸侯也始謀會諸侯遂皆人之獨舉齊爵何也此聖人抑揚之辭也是時王室微弱四夷交侵無如之何齊侯既入乘此衰季義欲尊周以攘夷秋因此年僖王新即位而諸侯不復朝事故為此會以諭諸侯使同心協力以輔王室故聖人特書其爵以著周之極衰而齊侯始霸得免民于左袵也宋陳蔡邾雖其君親自會而猶有貳心也據明年伐宋又蔡邾二國不與後會故聖人特書桓公之爵以與之然齊桓公自此滅遂伐宋伐郳伐鄭執鄭詹伐我西鄙伐戎伐徐伐衞降彰伐山戎遷陽執陳濤塗凡二十餘年聖人未嘗予其爵也夏六月齊人滅遂北杏之㑹諸侯尚有未服者桓公于是滅遂以示威夫藉小國示威以脅大國此齊侯之術也然齊侯未見其救中國之功而先恃強以滅人之國使其宗廟無所歆享人民無所休歸故聖人深青之何則桓之圗霸若未為諸侯所附當崇禮義以懷徠之乃欲恃強以恐動諸侯前此伐魯滅譚稱師者事尚襲襄猶未深責今既合諸侯將以行義乃先滅遂故貶稱人春秋書滅國四十七皆罪來滅者盖見滅者皆力屈而死猶可恕也秋七月一時無事書首月存天道王法也冬公會齊侯盟于柯北杏之會遂人不至而齊滅之魯雖不至而齊無以加之者齊自知有負于魯也齊既滅遂乃為柯之會獨會魯而不會他國者度魯之必從故也此亦齊善圗霸之術也魯于是時國弱而小若莊公以父讎之怨棄絶之則社稷存亡未可知春秋通之以一時之權以明莊公之為是盟者非釋怨以交齊蓋亦不得已焉故書曰㑹此春秋所以曲盡人情之所難而深明輕重之權也春秋集註巻九
