body:
  text: 春秋集注卷十六宋髙閌撰僖公三十有一年春晉殺其大夫丕鄭父丕鄭父者里克之黨也惠公以私意殺里克故其黨皆懼謀召重耳是懷二心以事君也然則丕鄭父之死雖可傷亦可罪也故並書其名字夏公及夫人薑氏會齊侯于陽榖公之娶夫人之歸皆不書者合禮故也此會齊侯于陽榖則非禮矣公稔知桓莊之失而不改其轍齊桓親見二國之事亦循其故薑氏婦人何知焉以齊桓魯侯二君相會而使婦人厠于其間何以示兩國侍御僕從之臣乎秋八月大雩因旱祭志偕也冬楚人伐黃黃雖先屬楚前此屢從中國盟會及伐楚之役聖人雖不明書而以下文考之黃實與焉及楚滅弦弦子又奔之故楚人以為討而管仲既死桓公霸業已衰不復能救是故君子憫之也十有二年春王三月庚午日有食之是月庚午朔不書朔因舊史也日食有常度亦人事所召有倉之者夏楚人滅黃黃人恃中國之睦于齊也故舍夷狄而即中國今楚人自去冬見伐而齊侯不救至是遂為楚所滅滅弦滅溫皆不書伐而此先書伐蓋所以深刺齊也秋七月一時無事書首月存天道王法也冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛狄嘗滅衛衛遷楚丘今又侵之衛保溫子也自楚伐黃不救則狄有以量中國矣觀狄之疆而知諸侯之衰也夏四月葬陳宣公因魯往會而特著其臣子私諡之罪而陳侯居喪出會視下文而義可知也公會齊候宋公陳侯衛侯鄭伯許男曹伯于鹹鹹衛地衛為狄所侵諸侯莫救于是衛侯因淮夷之病杞遂請齊會諸侯以禦之蓋將假此聲勢以威狄也是時王室有戎難而春秋不書者齊侯至是不復知有王室矣而杞以二王之後反獲諸侯之會以免淮夷之難秋九月大雩因旱祭志僭也冬公子友如齊鹹之會諸侯皆受齊侯之命同力助把故公會罷而歸使公子友如齊蓋將為把城緣陵故也諸侯皆然十有四年春諸侯城緣陵此乃會鹹諸侯前目後凡也緣陵把邑也不繫把者把不能自保其國也把小而弱又以淮夷之故且二王之後故齊侯特率諸侯同力城緣陵脟遷焉而不遷者城之之力也故詩人頌僖公有淮夷獻琛之美然則服淮夷者齊侯也而獨頌僖公者國人之辭也然城楚丘亦齊侯也友若魯自城之何也杞為淮夷所病其國其君猶存而霸者能率諸侯城之固非不義之舉特以無王命而貶故猶可以諸侯道也衛為狄人所滅不請于王而創建其國更立其君非制節謹度之道故不可以諸侯道也夏六月季姬及鄫子遇子防使鄫子來朝女子許嫁笄而字其曰季姬是已許嫁矣然不繫之鄫則是女而非婦未嫁之文也未嫁而及鄫子則是內女為主也內女為主與鄫子遇而使鄫子來朝者傳謂非行朝禮也使鄫子來請己也來請己者本非許嫁鄫子故也何休謂季姬許嫁邾子是己自是邾人怨鄫子兩國禍難不解蓋由季姬未嫁而所為如此故稱及稱遇稱使以著其惡而鄫子之擇配魯僖之治家從可知矣秋八月辛邜沙鹿崩案自此至僖公三十三年永樂大典並闕狄侵鄭冬蔡侯肸卒十有五年春王正月公如齊楚人伐徐三月公會齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐夏五月日有食之秋七月齊師曹師伐厲八月螽九月公至自會以會致者始于此春秋致會凡二十有七公自正月如齊因而會盟暴師于外已踰三時而以會致見救徐之無功也案此條從春秋傅説彚纂補入季姬歸于鄫己卯晦震夷伯之廟冬宋人伐曹楚人敗徐于婁林齊桓大合諸侯以救徐固有餘力而師出三時無功而返故書楚人敗徐于婁林以罪之案此條從春秋傅説彚纂補入十有一月壬戍晉侯及秦伯戰于韓獲晉侯十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都三月壬申公子季友卒夏四月丙申鄫季姬卒季姬嫁于鄫才及八月而卒然所以為鄫之禍甚酷故春秋詳志之以為後世之戒案此條從程端學春秋本義補入秋七月甲子公孫兹卒此公子牙之子叔孫戴伯也世秉魯政至春秋之終而猶未絶案此條從程端學春秋本義補入冬十有二月公會齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮邢侯始與會而在鄭許之下者此齊次之也案此條從程端學春秋本義補入十有七年春齊人徐人伐英氏夏滅項秋夫人薑氏會齊侯于卞論其情則可矣而禮則不可也小白入魯地而會聲薑能無嫌乎案此條從春秋傳説彚纂補入九月公至自會冬十有二月乙亥齊侯小白卒十有八年春王正月宋公曹伯衛人邾人伐齊夏師救齊五月戊寅宋師及齊師戰于甗齊師敗績狄救齊此非善狄之能救也所以甚惡中國之不知義也諸侯伐人之喪不義之甚而狄乃假義名以救之案此條從程端學春秋本義補入秋八月丁亥葬齊桓公冬邢人狄人伐衛十有九年春王三月宋人執滕子嬰齊此宋求霸也莊十六年幽之會齊桓始霸滕子與焉既而背之至齊侯卒凡三十七年衣裳兵車之會未嘗列于其間宋襄既有求霸之心而首執滕子以令諸侯也然宋襄圖霸當以德懷徠之今乃肆已之強擅執國君以陵轢諸夏亦以甚矣案此條從程端學春秋本義補入夏六月宋公曹人邾人盟于曹南鄫子會盟于邾己酉邾人執鄫子用之宋公之盟曹南怒鄫子不至故欲用之而子魚諌焉邾人修鄫舊怨遂承其意執而用之也不然則宋修霸業邾從宋盟安敢輒戮鄫子而不懼討乎宋既不討則意從可知矣宋襄圖霸而縱容同盟暴虐與國何以求諸侯乎經書鄫子與蔡世子有皆曰用之而不書所用之迹蓋聖人所不思言但曰用之則知其以人為用也諸侯終則名鄫子不名史佚之案此條從春秋傳説彚纂補入秋宋人圍曹衛人伐邢衛不伐狄而伐邢是以人之案此條從春秋傳説彚纂補入冬會陳人蔡人楚人鄭人盟于齊梁亡二十年春新作南門改舊制而增大之罪不止于勞民而已案此條從春秋傳説彚纂補八夏郜子來朝五月乙巳西宮災鄭人入滑鄭伯與滑伯同等諸侯而入滑強陵弱也案此條從程端學春秋本義補入秋齊人狄人盟于邢冬楚人伐隨隨自是服屬于楚至哀元年會楚子圍蔡案此條從春秋傳説彚纂補入二十有一年春狄侵衛宋人齊人楚人盟于鹿上夏大旱言大者久且甚之辭案此條從春秋傅説彚纂補入秋宋公楚子陳侯蔡侯鄭伯許男曹伯會于盂執宋公以伐宋冬公伐邾楚人使宜申來獻捷十有二月癸丑公會諸侯盟于薄釋宋公書會諸侯者以諸侯皆在是故前目後凡且見公之續至也案此條從程端學春秋本義補入二十有二年春公伐邾取須句歸其君使為我附庸也為我附庸則是我取之也案此條從春秋傳説彚纂補入夏宋公衛侯許男滕子伐鄭秋八月丁未及邾人戰于升陘邾來伐我而魯遽及邾人戰也公伐邾取須句以起此戰案此條從程端學春秋本義補入冬十有一月己巳朔宋公及楚人戰于泓宋師敗績二十有三年春齊侯伐宋圍緡夏五月庚寅宋公兹父卒秋楚人伐陳冬十有一月杞子卒不名者史伕之入春秋以來始書杞卒案此條從程端學春秋本義補入二十有四年春王正月夏秋伐鄭秋七月冬天王出居于鄭罪諸侯之不赴難也案此條從程端學春秋本義補入晉侯夷吾卒魯尚未與晉通而此書惠公卒者以見文公之入也惠公立十四年而卒懷公立秦人納文公而殺懷公焉然則文公纂立而不書其入者以晉獻既殺世子申生則文公自以次當立故也案此條從程端學春秋岑義補入二十有五年春王正月丙午衛侯燬滅邢始則邢逺狄以伐衛固可罪矣今衛又舉兵以滅之抑又甚焉案此條從程端學春秋本義補入夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦夫不親迎而姑來迎魯不能以禮正之是棄其親戚也案此條從程端學春秋本義補入宋殺其大夫秋楚人圍陳納頓子于頓葬衛文公冬十有二月癸亥公會衛子莒慶盟于洮二十有六年春王正月己未公會莒子衛寧速盟于向齊人侵我西鄙公追齊師至酅弗及夏齊人伐我北鄙衛人伐齊公子遂如楚乞師是不有天子而導荆蠻以伐中國也案此條從程端學春秋本義補入秋楚人滅蘷以夔子歸冬楚人伐宋圍緡公以楚師伐齊取榖齊人加兵于魯魯欲報之當請命于天子會諸侯以同討其罪夫楚蠻夷也安可逺引其師來入華夏以伐親鄰之國乎案此條從程端學春秋本義補入公至自伐齊二十有七年春把子來朝夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙巳公子遂帥師入把弱國既來朝而用師以報之把魯乃舅甥之國而伯姬在焉魯人不義甚矣僖公之德衰矣案此條從春秋傳説彚纂補入冬楚人陳侯蔡侯鄭伯許男圍宋宋不與楚宋諸侯且有先君之怒又自以為霸國故終不與楚楚人前年伐之今又圍焉夫楚以蠻夷恣其強盛來犯中國而陳蔡鄭許皆中國之諸侯反會蠻夷同伐之伸蠻夷之強屈中國之義罪昭然可見矣案以上從程端學春秋本義補入曹南之盟諸侯稱人而宋獨稱爵圍宋之役諸侯稱爵而楚獨稱人聖人之嚴如此案以上從春秋傳説彚纂補入十有二月甲戍公會諸侯盟于宋公畏楚之強而來為此盟亦報乞師之役案此條從程端學春秋本義補入二十有八年春晉侯侵曹晉候伐衛公子買戍衛不卒戍刺之楚人救衛此書救者非善之也著衛國附楚之罪晉文果能致楚師之出也楚師既出故有城濮之戰案此條從程端學春秋本義補入三月丙午晉侯入曹執曹伯畀宋人夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績城濮衛地及楚人戰者與救衛之師戰也楚之強甚于齊桓之時晉文公一戰勝楚終文以及襄之世楚人不敢復窺中國則功莫盛于此矣案此條從趙汸春秋集傳補入楚殺其大夫得臣衛侯出奔楚五月癸丑公會晉候齊侯宋公蔡侯鄭伯衛子莒子盟于踐土楚自齊桓沒為中國害晉一戰敗之威震諸侯句之附會楚者皆會踐土而請盟焉晉于是遂霸諸侯也衛子不以成君之禮故稱子而在鄭伯之下案此條從程端學春秋本義補入陳侯如會公朝于王所諸侯非王事不出境今因出盟遇王而朝此為何禮案此條從程端學春秋本義補入六月衛侯鄭自楚復歸于衛叔武雖不能避嫌然亦請復衛侯衛侯不之信先期而入因殺之故春秋不書叔武之事是専責衛侯也案此條從春秋傅説彚纂補入衛元咺出奔晉陳侯款卒秋杞伯姬來公子遂如齊冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫天王狩于河陽壬申公朝于王所晉人執衛侯歸之于京師衛元咺自晉復歸于衛為人臣而訟其君雖直亦曲矣案二句從程端學春秋本義補入晉文聽其臣子之訟而執其君非霸者所以靖亂之義也書曰自晉晉侯之罪亦已明矣案以上從春秋傳説彚纂補入諸侯遂圍許前目後凡也案此條從春秋傳説彚纂補入曹伯襄復歸于曹遂會諸侯圍許二十有九年春介葛盧來夷狄以禮義外之可也凡書夷狄之來皆罪中國不自正而輕受之耳案此條從程端學春秋本義補入公至自圍許夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉秋大雨雹劉向以為盛陽雨水溫暖而濕熱陰氣脅之不相入則轉而為雹盛陰雨雪凝滯而氷寒陽氣蕩之不相入則散而為霰故雹者陰脅陽也霰者陽薄陰也春秋不書霰猶不書月食也案此條從程端學春秋本義補入冬介葛盧來三十年春王正月夏狄侵齊狄之侵齊自背其盟也齊桓召陵之後書狄侵晉晉文城濮之後書狄侵齊狄之輒敢陵侮如此而二霸不攘斥之案此條從春秋傳説彚纂補入秋衛殺其大夫元咺及公子瑕殺而書及者以某之故而纍及某也如文九年士縠及箕鄭父襄二十三年慶虎及慶寅皆是也不書及者其罪同其殺之之志均也成八年趙同趙恬十七年郤錡郤犨郤至是也案此條從春秋傳説彚纂補入衛侯鄭歸于衛晉人秦人圍鄭介人侵蕭夷狄數來我不能以禮義正之故敢稱兵犯附庸之國案此條從程端學春秋本義補入冬天王使宰周公來聘公子遂如京師遂如晉三十有一年春取濟西田嘗為鄰國所奪今復取之案二句從程端學春秋本義補入凡取人之冇其惡易見而取已之有不以道者其罪難知聖人亦正名曰取所以顯微也案此條從春秋傳説彚纂補入公子遂如晉晉未嘗來聘而公子遂去冬往聘之今春又聘焉何厚于晉而薄于周也案此條從程端學春秋本義補入夏四月四卜郊不從乃免牲猶三望秋七月冬杞伯姬來求婦狄圍衛十有二月衛遷于帝丘三十有二年春王正月夏四月己丑鄭伯捷卒衛人侵狄秋衛人及狄盟冬十有二月己卯晉侯重耳卒或間春秋孰賢日東遷之後土疆不守職貢不奉朝覲之禮盡廢征伐之事専出皆罪人也曰不有齊桓晉文乎周室既衰諸猴既熾以大吞小以強暴弱夷狄乘之橫乎中國天子所存位與號爾是時二霸奮起齊桓仗大義倡之于前晉文明大順和之于後內率諸侯以尊王室以攘夷狄以安中國而皆謂罪人可乎曰齊桓晉文役冇尊周之名而無尊周之實雖曰曰內率諸侯以尊王室其實內率諸侯以尊已也假尊王室之名以令諸侯爾孔子作春秋以明王道以撥亂世故召陵之盟城濮之戰與其攘夷狄救中國一時之權也故孟子曰仲尼之徒無道桓文之事者又曰五霸三王之罪人也案此條從程端學春秋本義補入三十有三年春王二月秦人入滑齊侯使國歸父來聘夏四月辛巳晉人及薑戎敗秦于殽秦輒興兵以加中國既入滑又伐鄭秦亦張矣楚患未已而加之秦中國則殆矣書曰敗秦所以惡秦而豫晉之勝也案此條從黃震日抄補入癸巳葬晉文公此見襄公父死未葬而尋干戈也案此條從程端學春秋本義補入狄侵齊公伐邾取訾婁秋公子遂師師伐邾升陘之敗十餘年此年因晉喪而報之案此條從黃震日抄補入晉人敗狄于箕冬十月公如齊公本事齊逺晉文霸而受盟焉至是晉文已卒齊侯一使鄉來聘而公遂往朝之蓋魯因晉喪既伐邾矣故懼晉而故事齊也公之季年所為若是案此條從程端學秦秋春義補入十有二月公至自齊二已公薨于小寢生不請天子之命而自立既不正其始死又不于正寢是不正其終也春秋所以詳著之案此條從程端學春秋本義補入隕霜不殺草李梅實晉人陳人鄭人伐許春秋集注卷十六
