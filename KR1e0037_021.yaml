body:
  text: 春秋集注卷二十一宋高閌撰宣公一元年春王正月公即位宣公受弒賊之立而不復討賊是與聞乎弒也是篡也此不天無王之甚而書春王正月公即位者以天道王法正其自即位之罪也其自即位奈何以不弒自居聖人因如其意而書之此春秋之誅意也宣公之弒雖天王不問方伯不討而夫人姜氏歸於齊齊豈不知其篡弒乎曰齊人之知乃在夫人未歸之前蓋同惡相濟已先許其復通婚姻之好矣公子遂如齊逆女不待喪畢親迎而公子遂遽如齊逆女者此乃公子遂之本謀恐姻好久不通而齊人來討也且娶於齊則公因得以列於會而諸侯不復討矣公子遂之情狀可知也夫逆女親者也使大夫非正也公子遂蓋公族之尊者尤不可也而不憚如齊者勢不能自已故爾始文公未終喪而娶故其子遂於即位之初而逆女三月遂以夫人婦姜至自齊不直書夫人婦姜至自齊而稱遂以者明公子遂不當以夫人歸也婚禮莫重乎親迎豈容大夫得以歸哉不稱公子者一事再見卒名也文公逆婦姜於齊不稱夫人自逆故也此稱夫人者臣下之辭也不稱氏者夫人當待禮而行如野麕草蟲之詩蓋古者一禮不備女不肯行故詩曰雖速我訟亦不女從雖速我獄室家不足今公以喪娶又不親迎夫人不能以禮自固而公子遂以之歸故去氏以貶之婦者有姑之辭曰夫人姜氏至自齊可也而曰婦者姑敬嬴也敬嬴也而姑之蓋以是暴其惡也曷為暴其惡敬嬴以嬖妾私事襄仲而以其子屬之殺世嫡兄弟出主君夫人乃援成風故事即以子貴為國母今斬焉在衰絰之中而請婚納婦此其罪之未見者也故因夫人至特稱婦姜以顯之此春秋推見至隱著妾母當國用事為後世鑒也有姑則以婦禮至無姑則專以夫人之禮至書至自齊又見齊人以非禮嫁女失父母國之道矣夏季孫行父如齊公既婚矣然後季文子如齊納賂請列於會蓋春秋時凡國君不以其道立苟得一與於諸侯之會則他國不得復討其罪所以季文子不憚自行者欲假大國之權以定宣公之位也宣公之位定則一時臣子黨亂誤國之罪庶皆可以逃矣昔人稱季文子三思而後行今當魯國喪禍之際而舉動乖錯如此安在其為三思哉是必思之過多而方寸亂矣故孔子曰再斯可矣蓋譏之也晉放其大夫胥甲父於衛舜放歡兜於崇山此天子之討有罪也諸侯之大夫有罪則當請於天子或殺或放上由天子不得自專也故專殺大夫王法之所不容今晉乃專放其大夫可乎然放與逐不同放猶有禮焉退之以禮不深罪之也然舜治歡兜之罪而放之崇山者投之逺方也崇山猶在吾封疆之內非蠻夷外國也今晉之於衛同為列國爾晉輒放其有罪之臣於衛是鄙衛也是直以蠻徼待吾同列之國也衛人受晉之逐臣而不辭豈亦迫於大國之勢歟按文公十二年河曲之戰晉人將薄秦人於河胥甲趙穿當軍門呼曰薄人於險無勇也乃止至是晉人討不用命者乃放胥甲於衛夫胥甲趙穿之罪一也放甲而舍穿是政之不一也以非其罪故特加父字以别之異乎蔡之公孫獵也晉主諸侯而內討如此又安能正魯公會齊侯於平州春秋凡篡立者諸侯一與之會則他國不得復討遂列於諸侯之會而以成君書之罪諸侯也非有王命則國人亦不得討之恐滋亂也此當時大概然爾今宣公與齊侯雖同惡相濟然實公欲為此會而不書及者討賊之辭也凡亂臣賊子必深絶其黨而為惡者孤矣故書會而不言及公子遂如齊此又如齊者謝得會也前年公子遂與叔孫得臣如齊請於齊侯歸弒其君出其母而立宣公今年公子遂得為公冒喪逆女季孫行父又為之納賂請會齊惠公新遭弒逆之變而助成弒嫡之謀不念出姜之戚而繼為喪婚之好貪取濟西之賂而遂定篡者之位廢君臣兄弟夫婦之義是謂以亂濟亂者也昔季子然問仲由冉求可謂大臣與孔子曰大臣以道事君不可則止今由與求可謂具臣矣然則從之者與曰弒父與君亦不從也公子遂與季孫行父叔孫得臣居大臣之位相與周旋於篡奪之事曾具臣之不若當時庶幾於孔子之言者帷叔仲彭生耳自是祿去公室政在大夫魯君遂失其民此春秋所以盡其辭也六月齊人取濟西田此專罪齊也宣公不義得國故以先君封界之田賂齊此吾國之惡聖人為之辭曰齊人取之云爾若非我豫之也齊受篡逆之賂而助之則其惡尤大春秋討賊尤嚴於利其為惡而助之者所以孤其黨也雖非強取要亦不義而得之所謂非其有而取之曰盜也魯國本非宣公之所有也不義得國宜不能保其土故不云我其不書公納賂者與鄭伯假許田同義桓宣之計若出一軌春秋志之以見世平則正與法皆勝世變則亂與賂偕行自然之符可不戒諸秋邾子來朝首朝篡逆之賊此不待貶絶也故與滕侯朝桓之文異公羊子曰其餘從同同此類是也楚子鄭人侵陳遂侵宋十五年扈之會晉將為魯討齊十七年晉以諸侯之師伐宋以討弒君之罪皆取賂而還於是鄭伯以晉為不足與遂受盟於楚此雖晉有以取之然鄭遽背中國而即夷狄又同楚子加兵陳宋是助夷狄以攻中國也罪不勝誅故稱楚子而人鄭伯所以甚鄭伯之罪也非與楚子也兩書侵者所以深罪鄭伯此舉之不義也既正此師為不義然後中國之師可舉矣晉趙盾帥師救陳趙盾先自帥師救陳而後致中國同伐鄭也然鄭人連楚以侵陳與宋則晉何為獨救陳曰楚鄭之兵主在於陳因加於宋晉人踰宋而救陳救陳而師退是救宋也故舉救陳則及宋舉救宋則不及陳矣宋公陳侯衛侯曹伯會晉師於棐林伐鄭此言趙盾救陳之師也會晉者著諸侯為盾所致也不曰會晉趙盾者不與其以卑致尊也若列數諸侯而會趙盾則是諸侯會大夫之辭爾故止稱師焉師衆可以敵諸侯矣夫征伐自天子出非諸侯可得而專也諸侯專之猶不可况大夫乎自隱桓以來諸侯無大小皆專而行之及宣成而下大夫無內外皆專而行之棐林之會天下之事中國之政皆在趙盾矣冬晉趙穿帥師侵崇崇在西土秦與國也晉方病楚而欲得秦趙穿曰我侵崇崇急秦必救之吾以求成焉鳴呼此謬計也豈有欲求成而反加兵於他人之國乎適足以衆晉之敵爾夫其謀之迂如此而當國者亦豈不為之裁正而從之乎意者穿已有逆心欲得兵權托於伐國以用其衆爾故書侵以著其罪晉人宋人伐鄭宋人怨鄭伯與楚子之侵我也復請晉伐鄭晉亦以前救之無功也遂連兵伐之夫晉以貪賂致諸侯之叛不能退而自責乃謀動干戈於外以遂宋之復怨况宋人弒君豈可與之合兵乎故雖討得其罪亦皆貶而人之二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰於大棘宋師貶績獲宋華元大棘宋地春秋二十四戰主客並書帥師者惟此及哀二年趙鞅罕達而已夫主於伐人則書帥師此主與客無辨何也蓋鄭公子歸生興師伐宋而來不稱伐者背中國即夷狄為楚來無以為辭曲在鄭也然元年秋鄭人與楚子侵宋宋公既為棐林之役以報之是冬又與晉人伐鄭一役而兩報之遂起此役今鄭師之來宋當明大義以諭之否則慎固封守使鄭不得而犯焉華元乃遽帥師出與之戰於是三軍大敗以至見獲不能效死徒殄民辱國而已以見中國因夷狄之故而自相殘如此故兩書帥師以惡之書宋之及又書宋敗深罪其不當與之戰也上書宋華元矣下云獲華元可也復云宋者以國繫之重其以國事獲也秦師伐晉此秦之師由晉侵崇以起之則惡在晉故秦稱師稱伐見此師之出有名也一侵一伐而秦晉之曲直可見矣聖人誅趙穿之意亦明矣夏晉人宋人衛人陳人侵鄭鄭為楚伐宋敗其師獲其大夫晉趙盾興諸侯之師將為宋討鄭而不果者非力不足理曲故也晉惟以取賂釋宋不討以至於此故春秋著其失羈者之義既貶而人之又書侵以惡之所以甚趙盾也盾執晉政以主諸侯而二扈之盟貪宋齊之賂縱大惡而不治勤諸侯而無功故鄭伯以晉為不足與道楚以伐陳宋自是楚與晉爭晉不能競反有弒逆之禍於是楚益自肆明年遂有問鼎之事秋九月乙丑晉趙盾弒其君夷臯諸侯以晉為盟主而晉國之政在趙盾盾之專制諸侯幾二十年矣天下惟知晉之有趙盾而不知有靈公也靈公雖不德亦不堪盾之專權故有殺盾之志焉盾欲出奔而未越境其族子趙穿遂弒靈公而盾即復其位不復討賊然則盾之臣節安在哉故聖人原其情而書之曰趙盾弒其君夷臯而不使趙穿尸其罪也誠使趙穿尸其罪則奸臣僞亡詐竄而隂使人弒其君者遂得以免其罪矣夫弒君之罪豈可計免乎况盾又使穿逆成公則其迹嫌矣故聖人正趙盾之罪以戒天下後世專權懷姧之臣也善乎西晉陳泰能明此義也方高貴鄉公之見弒也抽戈者成濟倡謀者賈充而當國者司馬昭也昭雖流涕問策於陳泰泰曰惟斬賈充可以少謝天下爾昭問其次意在濟也泰以為有進於此不見其次蓋指昭也然則趙穿弒君而盾為首惡春秋之大義明矣以此為坊而鄧扈樂之徒猶蒙歸獄而受戮靈公立十四年趙盾使趙穿逆襄公之弟黑臀於周而立之是為成公不書葬者賊不討也冬十月乙亥天王崩三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望諸侯為天王崩斬衰而魯本不當郊因喪紀而不郊可也今所以不郊者非為天王崩也牛口傷而改卜而牛又死故也且公弒君篡立無天道矣豈足對越在天乎祭天之牛或傷或死此天示變以警公也三望本因郊而設既不郊則三望之禮不備矣夫魯僭郊禮久矣隱桓莊閔不書者聖人不敢無故斥言君父之過故因變異而言也葬匡王前期而葬者簡也且以著王室之微罪諸侯之不王也楚子伐陸渾之戎僖二十二年秋秦晉遷陸渾之戎於伊川使雜居中國而天子置之不問至是楚子興兵來討其罪故稱伐以見中國之不自正也然楚自南海長驅中原觀兵周疆定王使人郊勞輒敢問鼎之輕重雖有窺周室之心而不敢輒動以先王之澤未竭夷狄猶有畏義之心焉故稱本爵以正其狂僭之罪而不書問鼎者蓋私問之也夏楚人侵鄭按左傳晉侯伐鄭鄭與晉平而經獨書楚人侵鄭者書楚人侵鄭則知鄭復從晉也鄭本以晉不足與而從楚今晉成公初立而復從晉是鄭伯之反正也故獨書楚人侵鄭以抑夷狄之強秋赤狄侵齊曰赤狄者見狄之種類已分矣宋師圍曹宋文公即位三年武氏以曹師作亂聖人削而不書此年圍曹以報武氏之亂而書之者夫武氏之亂非曹人所致也宋人不能反躬自治內睦九族而興兵以圍人之國不亦左乎蓋宋惟有不赦之罪故書法如此冬十月丙戌鄭伯蘭卒葬鄭穆公觀其葬之速則知其禮之不備也且著其臣子私諡之罪四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向莒郯相怨而郯乃魯婚姻之國故公及齊侯平之公欲為郯平莒而挾齊以為重非平之道此莒之所以不服也肯者心以為然而後從之者也此見公之義不足以服莒之心矣曰莒人又見其不肯者非特其君也及齊侯者以公為主及郯者以莒為主齊魯二大國以好平兩小國之怨而且不能蓋信不足故也不知自反而取邑以致忿於人則公之所為亦已甚矣公既無以得莒後書郯伯姬來歸則郯亦不能固其好也雖然向吾故地桓十六年城向是也其後或入於莒豈魯與莒有好而向還莒歟至此莒不肯平然後公復取向也秦伯稻卒共公立四年其子桓公立夏六月乙酉鄭公子歸生弒其君夷歸生鄭之正卿也公子宋以染指黿鼎之故鄭伯將殺之宋輒與歸生謀先歸生若即發姧謀則宋之惡可遏靈公亦得而免矣既不以告又懼其譖而從之雖公子宋手弒其君而歸生為國正卿縱其為逆意尤可誅故特書公子歸生弒其君夷所以教天下後世之為人臣者也蓋春秋之作常施於可疑而不施於所不疑宋之罪無疑也歸生或疑於可免故治歸生則宋罪自見非重歸生而輕宋也以此為坊後世猶有失身而為逆賊所制如司馬亮沈慶之輩者且傳曰慎微又曰飲食必有訟又曰戲生患又曰輕則失巨鄭伯輕戲於飲食之微而致殺身之禍聖人書之其示來世之意深矣靈公立一年鄭人立穆公之庶子堅是為襄公赤狄侵齊以齊之疆而連年為狄所侵則惠公之無政可知矣秋公如齊公至自齊狄在齊境而公往朝之公之無政又可知矣故雖未踰時而書至以危之且為明年再如齊起也冬楚子伐鄭中國諸侯不問鄭國殺君之罪而夷狄加兵以討之故書楚子伐鄭所以病中國也且楚之病鄭久矣侵伐之事始稱荆次稱人至此稱楚子所以深罪鄭也五年春公如齊公以不義得國故亟朝於齊蓋當是時魯益以弱故謹事大國以自固也夏公至自齊公春如齊而夏至者以齊人止公而強為高固請婚也故書至以危之秋九月齊高固來逆子叔姬時君之女也故稱子以别之古者三十而娶五十而爵為大夫故大夫無出境親迎者高固為齊正卿而始與魯為婚又越境逆女非禮可知矣不曰逆女者大夫不敵於諸侯故但稱子叔姬以見高固之自逆也齊許之來魯與之婚高固之娶叔姬之嫁皆非禮也叔孫得臣卒此公子牙之後莊叔也內大夫卒無不日者以春秋魯史故詳之也仲遂殺嫡立庶往謀於齊而得臣有並使之罪故特不書曰以謹之而仲遂之惡不可勝誅特於繹立義故文起於此也冬齊高固及子叔姬來子叔姬來者歸寧也歸寧常事不書先儒謂壻有反馬之禮是亦常事不書矣夫髙固已為齊之正卿非王事不當出境既未娶而為國卿又不可以國卿而有新婚反馬之禮也故書齊髙固及子叔姬來以罪之子叔姬不冠夫氏者承上髙固及之也楚人伐鄭去冬之伐稱楚子所以譏鄭也今祇稱人又罪其數犯中國也春秋集注卷二十一
