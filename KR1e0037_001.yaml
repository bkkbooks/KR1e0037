body:
  text: 春秋集註卷一宋高閌撰春秋者古史記事之名也凡古史必編年年有四時故錯舉以為記事之名蓋欲後人以時思之而不忘非獨魯國然也此書乃仲尼約魯史而修之觀公羊傳載雨星不及地尺而復則以為不修春秋之辭而晉韓宣子所見禮記載里克吳孟子之事皆謂之魯春秋則知魯舊有是書非仲尼作經而名之曰春秋也仲尼之道旣不行于天下將損益三代之制立為百王不易之大法而不欲載之空言然而之杞之宋其文獻皆不足徴惟周監于二代而其禮盡在魯魯又周公之後吾父母之國而舊史春秋乃其行事之深切著明者故仲尼因而修之以明王道以正王法非但爲魯設也隱公一周平王東遷之二年孝公薨四十八年惠公薨春秋不始于孝惠而始于隱何也以平王之所終也昔周有天下厯歳數百世修其德雖有辟王而王道尚行人心眷眷不忘故厲雖板蕩而宣繼中興幽雖暴虐而諸侯不替朝事方平王東遷之始典刑尚在天下猶禀號令仲尼不忍遽絶之也不忍遽絶之者若曰猶有所待焉耳至于在位旣久恬于頽靡無振起之略諸侯以周室不足憚專肆擅橫變法壊紀蕩無禁制禮樂征伐各自己出亂臣賊子接迹海内夷狄強暴憑陵中夏是時楚熊通弑君自立莫討其罪卒僭大號以抗天子平王正當中興之時略無撥亂之志厯孝逾惠逮隱而死夫生猶可以有冀也死則復何望哉自是而後周之子孫日失其序徒以名位苟活于世故詩至黍離而降書至文侯之命而絶然則王者之迹熄適在隱公之時仲尼默觀天運知三代循環之治至是而極懼先王經世之法墜地莫傳欲立爲中制俾萬世可以通行故假周以立王法而託始于隱公焉且以文武之道期後王以周公之事業望魯之子孫也以此推之春秋固非一王之法乃萬世通行之法也元年歲在己未是隱公之始年周平王之四十九年也春秋之義大一統今天下之統在周曷爲不用周平王之年曰人君嗣位必踰年稱元者自古天子諸侯皆然非仲尼作春秋始爲此法也然諸侯嗣君得有其年不得有其正正朔必禀于天子故仲尼因魯史修春秋以正月繫之王而元年繫之魯蓋託魯史以立法故也元者始也董仲舒曰謂一為元者示大始欲正本也一元既建累而數之爲國之久新厯年之多少顯然可見矣此記久明遠萬世可行之法也自秦惠王十四年以初自王改稱元年漢文因之改後元年孝武又因事别建年號後世帝王遂因襲之數年一改以爲美事乃以改元之多寡爲享國之久長或于一歲之内有改元再三者又一國之中有前後重複者甚至于不待踰年而自改元又復有改年為載者斯皆率意妄作又豈知春秋書元之義乃萬世不易之法乎春王正月春秋託文以示義大要尊周而主魯尊周者使天下知有天王也主魯者略諸國而詳魯以盡作書之體也文既主魯故元年春下書王正月若周史則不復稱王矣然以建子爲正正月非春也聖人蓋假天時以立義耳斯可見行夏之時者萬世不易之法也在聖人之門惟顔子一人足以知此耳後世不知時變如秦始皇以建亥爲正魏明帝以建丑爲正唐武后以建子爲正或有以正月爲建寅月至十二月爲建丑月者又有以正月爲一月以至十二月爲臘月者斯皆率意妄作者也聖人傷文之勝耳目聞見事與時亂乃參酌三王而立爲中制故春秋雖書周事而斷用夏時苟一時無事則書春王正月夏四月秋七月冬十月以明夏正據人所見而孟仲季皆得其正可以萬世通行也夫春者天時也王正月者王正也諸侯當上奉天時下承王正知王正月之爲春則知王道即天道矣春秋因天命以正王道稱天王以奉天命故先書春王正月以見王與天同大而二百四十二年之事皆天理王道也雖然天下之事不可悉紀故春秋常事不書非常則書隱之即位此非常事史法當書而不書者或曰攝也或曰讓也春秋别嫌明微之書深察夫隱之立也名曰爲桓而其心則殆將竊名者耳豈有十一年之間居處魯君也號令魯君也偃然在位當天王之聘受滕薛之朝凡所行之事未見其所以爲攝亦未見其讓而實已即位乃徒爲此名以召亂耳聖人所以不書者正王法于始也蓋諸侯之立必由王命平王以降王命不行諸侯之嗣皆不請命其間近正者特承之以正而已如隱文成襄昭哀皆不請王命而承之以正者也隱獨不書即位者入春秋之始聖人即以王法奪之而大義既立矣若文成襄昭哀例亦不書則與夫繼故而不承以正者無以爲别故五公書之猶言繼正而有所受之也如莊閔僖則旣無王命又皆繼故而非承以正故不書即位者不正其始也桓宣定之書即位則著其自立之罪蓋桓弑隱自立宣受弑賊之立定爲逐君者所立皆無王無君何命之受欲書其自即位也定之比宣則又有間矣春秋大率所書事同則辭同後人因謂之例然有事同而辭異者亦有事異而辭同者不可以例拘也三月公及邾儀父盟于蔑案邾儀父公穀作邾婁儀父蔑公穀作昧此從左氏隱之即位不能自正自謂爲桓而立内懼諸大夫之不己悦外慮諸屬國之不己從而邾以附庸有不相得于是乎首與邾盟夫盟者先王因人情之所不免而制爲之禮此嘉禮也非在喪者所可行公旣越禮畔道而爲之及其位旣定諸侯稍附至七年而遂伐邾則其不信反覆之情可見矣故元年先書此盟以發之凡盟内爲主稱及外爲主稱㑹其曰公及所以過公也其過公奈何旣爲桓而立矣又何憾焉而求盟之汲汲也其不自正之意可見矣邾者附庸之國儀父者其君之字也春秋之法周稱天王尊無二也列國稱爵重王命也附庸稱字尊命卿也夷狄稱名降中國也儀父稱字與蕭叔同非貴之也秦始附庸亦稱秦仲耳蔑我地夏五月鄭伯克段于鄢此見鄭伯以骨肉之故輕動干戈而鄭亦自是用兵不息也克者勝之難夫以君討臣以兄討弟而謂之克者何其難也以詩攷之鄭伯不勝其母而縱段于京段不義得衆亦不易勝然鄭伯初畏人之多言不早爲之所卒養成其惡乃始用兵欲力除之是其處心積慮欲克段者在鄭伯而已故聖人特改舊史叔段出奔之文直書鄭伯克段以罪之且段本居京今克之于鄢又見鄭伯追勝之是不教其弟而忍以干戈相向又必窮追之然後已春秋推見至隱首誅其意以正人心爲萬世人君之訓也段不稱弟者恃母叛兄聖人不以弟銀之亦見鄭伯不以弟畜段而以路人待之若討賊辭也兄雖不兄而段之不弟又異乎衞鱄陳招宋辰秦鍼也聖人交譏之見兄弟之道壊于是矣鄢妘姓之國爲鄭武所滅國語曰鄢之亡也由仲任特書于鄢者存先王之建國以惡鄭也秋七月天王使宰咺來歸惠公仲子之賵此譏天王之壊典禮也隱之立也不敢自安故以桓公之喪告于天王天王不能正典禮順適魯隱之意遽使使來歸仲子之賵公羊傳曰成公意也蓋得之矣夫王者奉若天道故稱天王一失其道則冠履顛倒名器溷淆人倫亂而天理滅矣夫婦人倫之本終身不變者也本無再娶之禮然大夫而下内無主則家道不立故不得已而有再娶者焉惟天子諸侯内職具備后夫人亡則可以攝治又何必再娶乎哉惠公再娶仲子非禮也己卒於春秋之前而天王至是來賵者隱公立而以桓爲請故也隱受天王之賵陷天王於非禮罪可知矣不謂之夫人而繫之惠公者若曰惠公之仲子云爾春秋以非禮之嫡故特正其名而以妾稱之也婦人于法無諡惟繫以夫之諡以明所屬然衆妾不當繫夫諡故以字配姓示不忘本且以别同姓焉今天王不探隱公之情不能明辨其自當立之義遂以夫人之禮下賵人臣之妾此不天亂倫之甚也然入春秋之始天王之義未見故王不去天而特貶其使咺咺者天王之宰也以天王之尊而賵諸侯之妾以天王之宰而為賵妾之使故名其宰又去其爵邑以見王之不王也夫王臣雖微猶不名况于宰乎九月及宋人盟于宿惠公之季年敗宋師于黃桓乃宋出也天王既賵仲子故公懼宋而求成焉盟于宿魯志也稱及稱人皆非卿也雖微者往亦由君命而與之盟耳聖人書此又見隱公始與宋合而終以干戈相向反覆不信也宿風姓國地以宿則宿亦與焉冬十有二月祭伯來此見周室不競大臣不法也夫祭伯王臣也不以罪來故不可謂之奔不以命來故不可謂之使然則何爲而來曰祭伯來則魯國定矣隱之即位此國疑之時也非王靈紹至則無以鎭撫之當時諸侯之立不由天王之命失臣子之義王法所當誅也祭伯爲王臣不能輔王正典刑而反定魯侯之位顚倒甚矣故特書來以見意焉凡王臣三公稱公卿大夫稱爵元士稱字中下士稱名書曰召公爲保周公爲師又曰周公位冢宰又曰乃同召太保奭芮伯彤伯畢公衞侯毛公蓋六卿有兼公者則稱公若周召毛畢是也其不兼公與諸侯入爲王卿士者王制曰天子之卿視伯天子之大夫視子男天子之元士視附庸其所受采地既與外諸侯同故其名位亦然若祭伯凡伯召伯渠伯皆王朝之卿士也劉子單子尹子温子蘇子皆王朝之大夫也榮叔南季家父叔服皆王朝之元士也元士視附庸附庸之君例稱字故也中下士稱名劉夏石尚是也子突亦士而變文稱王人者著諸侯之逆王命也劉文公卒而直曰劉卷卒者非列國也故不稱子其奔殺則記其名以别其人王子瑕王札子是也其有曾爲三公在畿内者亦稱公虢公虞公州公是也武氏尹氏則又著其世卿矣凡諸侯之大夫命于天子者亦與天子之元士同稱字宋孔父鄭祭仲陳女叔魯單伯是也蓋諸侯大夫入京師則稱士左傳襄二十六年晉韓起聘于周自稱晉士起靈王聞之曰韓氏其昌阜于晉乎辭不失舊公子益師卒此魯國之卿也卿者佐君以治國而其卒乃國之大事于此見君臣之義矣或日或不日見恩意之有厚薄也益師乃孝公之子衆氏也凡諸侯之卿必受命于天子當春秋時不請命故諸侯之卿皆不書官惟宋以王者後得自命官故獨宋卿書官此稱公子者以公子故使爲卿也諸侯之子曰公子公子之子曰公孫公孫之子則以王父字爲氏二年是年閏十二月按自古厯法雖不同然前閏後閏大約相去三十二月十九年七閏爲一章而杜預長厯既非五歳再閏之法又非歸餘于終之法但據春秋經傳攷日辰晦朔前後甲子不合則置一閏焉不知用何法據文公元年左氏傳曰于是閏三月非禮也夫周衰歴法雖差然入春秋九十七年左氏始譏其失則知前此置閏未必盡如杜氏之所言也春春秋之法凡事在正月則書春王正月事在二月則書春王二月事在三月則書春王三月若無事則但書春王正月蓋有事則道在事無事則存天時王朔而已天時備則歳功成王道存則人理立春秋之大義也此春㑹戎非無事也而不見日月者聖人者隱之不自正也平王之正月而公不自正何也禮天子頒厯于諸侯諸侯告朔于廟而後布政公欲讓桓焉若政不自己出者也所謂不自正也公㑹戎于潛犬戎之禍實遷周室隱公居喪之際未㑹諸侯事王朝而先與戎㑹是誠何心哉春㑹而秋與之盟故先書此㑹以見事始也夫與戎㑹而能以王室爲憂則雖㑹夷狄亦春秋所不惡也觀天王使凡伯來聘戎伐凡伯于楚丘以歸則知魯㑹戎盟適所以貽王室之患耳此春秋之所誅也夏五月莒人入向夫刑于寡妻以御家邦人君之道也今莒子爲國不能御妻至使棄其夫而去是夫婦俱失道矣既又以兵擅入人之國彊取其妻以還向人亦無如之何豈非夫婦之間本無大過非有心于棄絶故耶聖人不責其夫婦之小失而尤惡其擅興兵以入他人之國故不示其事而直書莒人入向以罪之蓋舉天下之大法而非窮一天之惡且以見向國微弱之甚也凡書入者國之存亡未可知此書入者向亦自此屬于莒矣宣四年公伐莒取向是也無駭帥師入極春秋諸國遣其大夫將命必以君使爲文至于帥師則直書帥師而不言君使亦無内外之辨何也帥師者將也將在軍君命有所不受不可以使言也夫兵者凶器雖天子行之猶曰致天討也况諸侯乎諸侯行之猶曰奉王命也况大夫乎人况微者乎極者附庸同姓國也今一月之間外則莒人内則無駭皆以兵入人之國是當時國無大小皆專兵也無駭不氏未命故也古者五十而爵爲大夫而列國之卿皆受命于天子至春秋時王道不行諸侯自命故聖人于此辨之凡書字者皆天子命卿也凡書族者皆諸侯自命者也其未命者但名之而已秋八月庚辰公及戎盟于唐唐我地彼來而我及之也公春與戎㑹復不相信秋又與戎盟以中國禮義之鄉聖人之後而與戎割牲㰱血以相誓辱亦甚矣故特書日以謹之聖人深責中國而不罪夷狄也不罪夷狄者乃所以外之也以此禮垂訓而後世猶有信尚結贊之甘言致暴兵起于壇下如唐德宗者九月紀裂繻來逆女詩稱大姒之家在渭之涘文王娶之親迎于渭又稱蹶父之女嫁于韓侯韓侯迎止于蹶之里然則諸侯親迎自古而然故魯哀公問于孔子曰冕而親迎不已重乎孔子對曰合二姓之好繼先聖之後爲天地宗廟社稷之主君曷謂已重乎由此推之親迎之禮自諸侯達于庶人未嘗可廢其使三公逆者惟天子之尊而已紀侯不達上下之分輒使大夫來逆而魯遂受之故聖人書此以見婚姻之禮壊也冬十月伯姬歸于紀春秋十二公之女出嫁者多矣豈當一一書之凡書者必有以也且女子生而願爲之有家又惡不由其道今魯不以紀廢親迎爲非禮乃使伯姬隨其大夫以往而無嫌疑之避古者后夫人親蠶而出郊尚以三棘圍之蓋其以禮防閑如此况女子有行遠適異國而乃隨其大夫于道路之中豈禮也哉齊侯親送于讙蓋知此也然則魯于伯姬生則以非禮嫁之死又爲齊侯所𦵏非父母國之道失親親之義矣紀子帛莒子盟于宻其事雖不詳然已足以見莒紀之同好矣十有二月乙卯夫人子氏薨隱公之夫人也夫人與君同體故國人稱之曰小君而其沒也亦曰薨以明齊也先卒則不書𦵏以明順也于此見夫婦之義矣蓋婦人無外行當繫其夫之諡夫諡旣定妻即終而稱之先夫而死則不祔于廟無所稱也夫人薨有常處故不地雖然隱將不終爲君必不成其爲夫人而以夫人𦵏也其稱夫人而書薨者聖人加之臣子之辭以見正也鄭人伐衞鄭段之亂其子滑奔衞衞人爲之伐鄭春秋略而不書專罪鄭伯克段而已今鄭之報伐則有辭矣故于此著衞人之罪也夫春秋無義戰其侵伐圍入取滅之類各隨其事而書之其有善惡輕重則變文以示義此聖人精微之志大中權衡之法也然其責常在被兵者蓋彼加兵于己則當引咎自辨諭之以禮義不得免焉則固其封守告于天子方伯若忿而與戰則以與戰者爲主處已絶亂之道也春秋凡書伐者皆聲其罪以討焉鄭以公孫滑之故加兵于衞衞服則可免矣而鄭擅興戎之罪自不可逃三年春王二月己巳日有食之日月之食有常數焉此巧歴者所能推也而周官乃言救日月食之法至于春秋又獨書日食何也日君道也而被侵害豈徒然哉必有以也春秋書之其辭必曰有食之者蓋歸咎于人事而不以爲常數也是以人君遇其食則當恐懼修省而百官惟當修輔厥后更不推之于數蓋以有食之者故耳此春秋之深意也後世推求臆度指陳某事之應則失之矣劉歆曰凡日食有變人君能修政則災消而福至不能則災息而禍生故經書災而不紀其故蓋吉凶無常隨所行而成禍福也星辰陵厯亦然按長厯二月己巳朔此不書朔因舊史也然則聖人作經盍不攷而正之乎曰周衰天子不班歴魯歴不正置閏不得其月月之大小不得其度或在朔前或在朔後聖人因舊史而書之爲後世戒三月庚戌天王崩崩者上墜之形薨者上墜之聲臣子之心常倚君父如山岳平王在位五十一年而崩此天下之大變也夫春秋爲天下作也天下者天王之天下也天王崩則四海之内皆當奔赴而當時諸侯無復奔喪㑹𦵏之禮惡極罪大不可勝誅故天王崩必書而此不書其𦵏以見諸侯不臣之罪也平王世子洩父蚤死乃立洩父之子林夏四月辛卯尹氏卒案經文公穀作尹氏左傳作君氏此從公穀春秋之時王臣自同于列國交政于諸侯故因其來赴而錄其卒𦵏以譏之如尹氏王子虎劉卷皆奪其爵秩不使同于外諸侯而尹氏特書氏者又起其世繼也古者四民皆世守而不遷其卿大夫之子孫亦不得棄其祖父之業幼則入小學長則入太學行成而志定業具而身修三十而后試以事四十而后授以禄世禄而不世官是以俊傑在位庶績咸煕及周之衰士皆世官凡公卿大夫之子孫雖至不肖亦襲其位故幽王之詩曰尹氏太師宣王之詩曰王命尹氏然則尹氏世秉周權其來逺矣其後尹氏立王子朝尹氏召伯毛伯以王子朝奔楚皆書曰尹氏其終可監矣秋武氏子來求賻此著諸侯不共天王之喪禮法之壊遂至于此重可傷也武氏亦王臣之世官者曰武氏子蓋以父喪未命故也若曰仍叔之子則其父在矣不稱使者太子當喪未君未王命也天王崩諸侯不共喪事武氏子當輔新天子正典刑以責諸侯無臣子之心乃躬自徴求于四國據其來魯而書之以見周室微弱諸侯不賻不敢責之故不書天王之𦵏而書求賻穀梁傳以爲交譏之深得聖人之㫖八月庚辰宋公和卒凡外諸侯卒書名降于天子也不曰薨異内外也先儒謂天子曰崩諸侯曰薨大夫曰卒士曰不禄是不然天子至尊天下共稱曰崩可也諸侯曰薨則本國臣子之辭至于赴告雖大夫以至于士皆曰不禄史官書之亦皆曰卒耳豈得定配以爲品例耶後世遷固曄壽之作史凡有爵位之臣皆書曰薨失春秋之法矣且悼王乃未踰年之天子也猶書王子猛卒况人臣乎凡諸侯之卒必書者重一國之變也而襃貶之意未嘗不宻寓于其間故有書卒而不名有書卒而不𦵏皆可以懲戒于後世宋穆公立九年將卒屬孔父立宣公之子與夷乃使其子馮出居于鄭鄭宋由是交惡冬十有二月齊侯鄭伯盟于石門春秋外盟不志此其志者齊鄭大國其盟㑹征伐繫中國之輕重故也是時鄭已受公子馮又恐宋人之謀已故結齊以爲援夫天下無王諸侯不守信義數相盟誓此所以長亂也故書此盟爲十一年入許起文癸未𦵏宋穆公古者諸侯壤地相比王事相從則必有聘問和好之事至于告終易代又豈無弔恤賻𦵏之禮乎春秋之時王制亡矣徒以國勢之強弱私情之疎宻而爲之禮故經書諸侯之卒者百二十有三而書𦵏者八十有八蓋以魯往㑹之則書所以不稱宋𦵏穆公而稱𦵏宋穆公者據我而言𦵏彼也今天王崩魯不㑹其𦵏而𦵏宋穆公可乎此睹文見義不待貶絶也春秋之法諸侯卒稱本爵至于𦵏皆舉諡而例稱公者據會𦵏者從彼國私諡而稱之也凡諡必請于天子天子命有司攷其行實善則受善諡惡則受惡諡是諡者天下之公法也以天子之尊而名之曰幽厲雖孝子慈孫百世不能改也今春秋諸侯生則擅權亂常無所不至死又擅取美諡雖其臣子之罪而聖人一切書之以見其不正也蓋正終大事也死而加以不正之諡知忠孝者肯爲之乎故春秋之諡皆非行實不足論也春秋集註卷一
