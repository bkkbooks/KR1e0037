body:
  text: 春秋集注卷六宋高閌撰桓公三十有一年春正月齊人衛人鄭人盟于惡曹此即齊侯衛侯鄭伯也而書人者聖人惡三國之不能討弒君之賊以正人之國而徒殘民焉以逞其欲則此盟不足為神所聽故前書來戰此奪其爵與公會衛侯于桃丘弗遇事義參見聖人之意深矣夏五月癸未鄭伯寤生卒鄭莊公立四十三年世子忽立是為昭公而不終于位自是五世兵革不息自入春秋考之其存心處慮見莊公之積不善知其必有餘殃矣秋七月葬鄭莊公鄭忽既立不待五月而葬其父是生亂階九月宋人執鄭祭仲宋人怨鄭久矣恨力不能報耳祭仲鄭之權臣也君之廢置盡在其手宋公誘而執之使廢嫡立庶者蓋欲鄭之償吾賂故爾祭仲身為鄭卿國之安危所繫不能慎重輕出其國既見執于宋則當盡死節以拒宋乃所以報國也今就執而突遂歸忽遂出則是祭仲納突而逐忽其廢置之權在祭仲矣詩刺祭仲謂之權臣而公羊氏因以為可與權豈不異哉雖然亂鄭國者實由宋公故春秋奪其爵而貶稱人也祭仲稱字者非賢之也以天子之命卿故字之也春秋尊王命貴正卿乃所以大祭仲之罪而深責之也突歸于鄭突自外入篡其兄而曰歸者見祭仲已立之也不曰祭仲立突者聖人原其情實自宋公逼之若書祭仲立突則罪歸祭仲而未見祭仲之本意故蒙上文而書突歸于鄭以見宋公擅立諸侯之罪突外假強大之勢篡兄而自立故不書公子言不可以有國也鄭忽出奔衛忽不稱爵者未踰年也若稱子則已葬矣其稱鄭忽以國繫之明其正也既立出奔而名之者見其失國也忽不能自固其位以至于亡由不能自固而進退之權在祭仲仲既被執故突歸為已立忽出為失國也柔會宋公陳侯蔡叔盟于折此盟謀定鄭突也故宋公為主柔魯大夫之未命者叔蔡侯弟也凡異母弟曰叔季許叔蔡季紀季皆諸侯之異母弟爾諸侯之弟國而字之言與君同體也魯柔蔡叔敢與諸侯抗盟亦宋公陳侯自取之也春秋凡陪臣専征伐盟會者據左氏之文有稟其君命者有不稟其君命而自出者而經無明文以别之蓋以當時陪臣非自己之専君命即輔其君以専天子之命聖人皆不與之也昔人論春秋無賢臣以為諸侯之視天子猶父也陪臣于諸侯亦猶子之于父則其視天子猶祖也人子孝于父者必欲其父孝于祖陪臣忠于諸侯者必欲諸侯忠于天子則忠孝兩全矣今陪臣皆強公室而弱王室是弱祖而強其父也佐諸侯以敵天子是佐父以敵其祖也貽祖之怨成父之逆惡莫大焉故管仲相桓公霸諸侯一匡天下雖不自専惟輔其君一以専天子之命是亦挾父而叛其祖也春秋惟一管夷吾爾而猶若是謂之無賢臣也宜哉公會宋公于夫鍾宋公以立突故多責賂于鄭鄭人不堪宋公怒為夫鍾之會以謀之會者外為主公宋出也故往會宋公因為之請平焉蓋十年郎之戰由鄭忽也故公怨忽而助突可謂喜于助亂者矣冬十有二月公會宋公于闞闞我地宋公不與鄭平必欲得賂于是公又為闞之會復為突請焉嗚呼公為鄭之意亦可謂勤矣十有二年春正月一時無事書首月存天道王法也夏六月壬寅公會紀侯莒子盟于曲池按經文公穀作紀侯左氏作杞侯此從公穀曲池我地尋隱二年密之盟也紀有齊難故公尋舊盟以篤好秋七月丁亥公會宋公燕人盟于穀丘穀丘宋地宋公連燕人將以討鄭故公復往會而為之請平因與之盟也入春秋以來燕未嘗預中國之會亦未嘗交玉帛之使也其孤特僻陋可見于此矣幸而穀丘之盟與中國通曾未旋踵而反伐所與盟之國是以春秋貶之八月壬辰陳侯躍卒陳厲公立七年子免不得立立其弟林是為莊公不書葬者蔡人殺陳他而立之不正尤甚於衛宣公也公會宋公于虛虛宋地用見宋益懈疏公而公強從之不已秖自辱也冬十有一月公會宋公于龜龜亦宋地公委宗社人民而六出與宋會蓋公憾鄭忽而欲定突是以不憚屈辱力為鄭請然諸侯臨蒞一國之民民不可一日不治則國不可一日去之故先王之法諸侯無事不得出其四境朝事天子則出境天子巡狩則出境方伯率諸侯以征伐則出境親迎則出境若無事而出境則誅春秋之時侵伐盟會無時無之諸侯未嘗安居國中以治其民也強大之國則奔走之弱小之國則侵陵之未嘗一歲而無出境之事也聖人悉書之以著其罪于罪之中又為之輕重焉蓋當時王政不行天下無王諸侯不從事于盟會則又無以安其國故有相會而謀安天下者有相會而謀侵伐者各從其會以見其事以王法論之凡諸侯去其國家而擅相會者皆罪爾聖人又通以一時之權而較其輕重也今公區區為鄭而數出會宋宋公亦為求賄而數與公會皆非為國為民其罪均爾丙戌公會鄭伯盟于武父武父鄭地宋公辭平故公自龜還遽會鄭伯而謀伐之夫宋鄭之事公何必預焉而同惡相濟一至于此傳曰為義偃兵造兵之本也是故謹而日之丙戌衛侯晉卒卒而日之蒙上文也重書丙戌必有一誤衛宣公立十九年其子朔立是為惠公十有二月及鄭師伐宋宋責賂于鄭而無厭屢盟于魯而無信故二國聲其罪以致討其曰伐者討有罪也然宋雖有罪而魯與鄭不容無貶故內沒公而書及鄭不爵而稱師均其罪也丁未戰于宋書伐又書戰者宋人之罪雖為可伐然桓公弒兄自立鄭伯篡兄自立其惡均爾鄭既假宋援以篡國及既得國不償宋賂公棄宋和好助鄭興戎是謂凶德參會聖人深惡之故重書戰于宋若魯鄭二國自戰然與來戰于郎同義春秋惡其敢行非義怙終不反故為之盡其辭焉十有三年春二月公會紀侯鄭伯己巳及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績此因丁未之戰勝負未決故退而各挾其黨以再戰也曷為後日得紀侯齊侯然後能為日也然內兵以紀為主外兵以齊為主而不以鄭宋首兵者蓋齊欲圖紀久矣六年公會紀以謀齊難是年紀侯又來朝欲求平于齊齊人以鄭忽嘗有功于已亦欲伐突故因鄭宋之戰率衛以助宋也魯先已與鄭連兵亦以郎之戰怨齊聞齊人助宋故又率紀以助鄭也聖人微顯闡幽惡不再貶丁未之戰已譏魯與鄭宋矣今齊紀助兵勢傷夷七國之師故發其罪以為首惡但書及而不書伐者所以深惡七國無名興師交相攻伐其罪均也公既為鄭率紀以敗四國之師遂少紓紀難至十七年乃會于黃以平之燕戰則稱人敗則稱師者背穀丘之盟賣信而沽怨故戰稱人敗皆以衆故稱師也三月葬衛宣公凡諸侯在喪而有境外之事以喪行者稱子以吉行者稱爵此見衛侯非有急故背殯用兵自取敗績罪不容誅且見魯人不廢喪紀因以著其臣子私諡之罪夏大水九疇以五行為本五行以水為本是民一日非水不生也自堯有洪水之患使禹治之禹能疆理天下正其經界有畎有澮有溝有洫有川有遂絶無水患但有其利故年之豐凶一係農力而水旱不能為之害何者經界既正則畎澮溝洫川遂之屬遍乎阡陌或天時久雨則由畎注澮由澮注溝由溝注洫由洫入川由川入遂以次疏導入河入江至于海蓋以決之而不為災也或天時久旱則于溝澮川遂之間遞引其水以為灌溉又得其利焉春秋之時暴君汚吏壞其經界使畎澮溝洫之屬皆蕪平而不治于是遇大水而無以決遇大旱而無以溉民為兵戰所驅無暇治田畝聖人書大水者上痛禹迹之亡下悼井田之廢而生民受其大患無以拯濟之也春秋書大水者八而此獨書夏者又見其害于耕也秋七月冬十月義見九年十有四年春正月公會鄭伯于曹鄭伯欲結曹好故公往會之也公與鄭伯皆有篡逆之大惡天下所不容今相會于曹曹之容惡可知也無冰聖人之治天下苟可以防患者無不備也冰可以達陽和之氣又足以禦暑豳風七月之詩周官凌人之職可見矣今書無冰則非特見其時燠之異而凌陰無所藏又何以為備乎凡不宜無曰無夏五先儒謂傳疑也聖人作春秋為萬世法豈有傳疑者乎後之傳者或脫月字或誤加五字耳鄭伯使其弟語來盟修曹之會也夫鄭伯以不正篡其兄又數出會以伐人之國今遣其弟以盟于弒逆之人罪何如哉且將命者大夫之事不可使弟也語為子人氏實達君命其寵任之蓋有自矣曰來盟者來盟于我彼欲之辭也曰涖盟者往盟于彼我欲之辭也鄭魯既同惡又相疑忌而屢盟可惡之甚也秋八月壬申御廩災春秋記災不記火災者天所為也火者人所為也天所為故謂之變而記之人所為則被其災者乃火之性爾何足記也御廩災此將不得奉其宗廟之象也宗廟之事君躬耕夫人獻種稑之類以共粢盛今御廩災咎在君夫人矣宗廟鬼神之怒兆見于此矣乙亥嘗新穀收而遇災天意可見矣豈可遽用其餘以嘗乎且始穀而嘗嘗者物成之祭周之八月夏之六月未當嘗而嘗已為非禮況因災之餘而遽以祭之是不顧神靈之享否為具而已矣此見公無恐懼之心不恭孰甚焉且人君將祭必前期齋戒有司各謹其職今壬申乙亥相去四日爾不成乎齋也冬十有二月丁巳齊侯祿父卒宋人以齊人蔡人衛人陳人伐鄭此諸侯之師也纍數者也加以焉著宋首惡也夫折之盟陳蔡在焉紀之戰齊衛在焉皆與宋同好惡者也宋公不道執人之卿易人之君既又求賂無厭深怨突之背己而自量其力不足以加之于是復以齊蔡衛陳之兵伐之夫諸侯之國甲兵有制皆統乎天子乃敢私用之與私為之用以伐人之國大亂之道也宋公之罪斯為尤重故加以焉以者行其意也四國助宋興兵不道之甚故皆貶而人之貶四國則病桓可知以十二年十三年之戰魯實為之故也然而書伐者鄭亦有罪焉爾春秋集注卷六
